        bt(bloques.map((_, i) => i));

        // Limpiar si el timeout dejó current no vacío
        while (current.length > 0) {
            const { bloque, dia, hInicio } = current.pop();
            quitarAsignacion(bloque.grupo, bloque, dia, hInicio);
        }

        // Aplicar mejor solución encontrada para este docente
        mejorLista.forEach(({ bloque, dia, hInicio }) => {
            aplicarAsignacion(bloque.grupo, bloque, dia, hInicio);
            bloque.preAsignado = true;
            asignadosTotal.add(bloque);
        });
    }

    return asignadosTotal;
}

// Pre-asigna todos los bloques de inglés de un mismo cuatrimestre al mismo
// (día, hora), garantizando que todos los grupos coincidan.
// Restricciones DURAS: no conflicto de docente (mismo profe en 2 grupos), no doble-asignación de slot.
/**
 * Elimina huecos internos en cada grupo-día causados por la contiguidad relajada
 * durante la pre-asignación de PAs. Mueve bloques (1h o 2h) hacia el extremo
 * inferior del día para cerrar los huecos, respetando disponibilidad del docente
 * y sus compromisos en otros grupos.
 *
 * Se llama DESPUÉS de preAsignarPAsOptimo() y ANTES del greedy principal.
 */
function compactarHuecosPAs() {
    MAPA_GRUPOS.forEach(grupo => {
        diasSemana.forEach(dia => {
            const base = grupo.baseHoras;
            let changed = true;
            while (changed) {
                changed = false;

                // Encontrar rango ocupado
                let primeraIdx = base.findIndex(h => grupo.horario[dia][h] !== null);
                if (primeraIdx === -1) break;
                let ultimaIdx = -1;
                for (let i = base.length - 1; i >= 0; i--) {
                    if (grupo.horario[dia][base[i]] !== null) { ultimaIdx = i; break; }
                }

                // Buscar el primer hueco interno
                for (let i = primeraIdx + 1; i < ultimaIdx; i++) {
                    const hGap = base[i];
                    if (grupo.horario[dia][hGap] !== null) continue; // no es hueco

                    // Encontrar el bloque que viene justo después del hueco
                    let afterIdx = i + 1;
                    while (afterIdx <= ultimaIdx && grupo.horario[dia][base[afterIdx]] === null) afterIdx++;
                    if (afterIdx > ultimaIdx) break;

                    const b = grupo.horario[dia][base[afterIdx]];
                    if (!b) break;

                    // Buscar el inicio real del bloque b en este día
                    let bStartIdx = afterIdx;
                    while (bStartIdx > 0 && grupo.horario[dia][base[bStartIdx - 1]] === b) bStartIdx--;
                    const hBStart = base[bStartIdx];
                    const hNew    = hGap; // nueva posición: el primer hueco

                    // Verificar que b cabe en [hNew, hNew+dur-1] y que el docente está libre
                    let ok = true;
                    for (let o = 0; o < b.duracion; o++) {
                        const hCheck = hNew + o;
                        if (!base.includes(hCheck))              { ok = false; break; }
                        // Solo rechazar si hay OTRO bloque (no el propio b) en esa posición
                        if (grupo.horario[dia][hCheck] !== null &&
                            grupo.horario[dia][hCheck] !== b)    { ok = false; break; }
                        if (!b.docente.disponibilidad[dia].has(hCheck)) { ok = false; break; }
                    }
                    if (!ok) continue;

                    // Verificar que el docente no está comprometido en otro grupo en [hNew..hNew+dur-1]
                    // (quitarAsignacion liberará las posiciones actuales antes de verificar)
                    quitarAsignacion(grupo, b, dia, hBStart);
                    let libre = true;
                    for (let o = 0; o < b.duracion; o++) {
                        if (b.docente.asignado[dia][hNew + o]) { libre = false; break; }
                    }
                    if (libre) {
                        aplicarAsignacion(grupo, b, dia, hNew);
                        changed = true;
                        break; // reiniciar búsqueda desde el principio
                    } else {
                        // No se puede mover → restaurar
                        aplicarAsignacion(grupo, b, dia, hBStart);
                    }
                }
            }
        });
    });
}

// Regla institucional:
//   • Cuatrimestres 1-7: TODOS los grupos del mismo turno toman inglés al mismo
//     tiempo (día + hora). Los horarios giran alrededor de estas sesiones fijas.
//   • Cuatrimestre 8+: sincronización solo entre grupos del mismo cuatrimestre
//     (comportamiento original).
//
// Los bloques colocados aquí se marcan preAsignado=true y se excluyen de la
// cola principal del greedy.
function preAsignarInglesSimultaneo() {
    let asignados = new Set();

    function cuatriNum(nombre) {
        let m = nombre.match(/^(\d+)/);
        return m ? parseInt(m[1]) : null;
    }

    // ── Núcleo: sincronizar un conjunto (grupo → [bloques]) en los mismos slots ──
    // Encuentra (día, hora) donde TODOS los docentes activos tienen disponibilidad
    // declarada y NINGÚN grupo ha usado ya esa materia ese día.
    // Los grupos cuyo bloque se agotó simplemente se omiten en slots posteriores
    // (para manejar distintas cargas de inglés entre cuatrimestres).
    function sincronizarGrupos(porGrupo, maxSesionesDia = 1) {
        if (porGrupo.size === 0) return;

        let grupos   = [...porGrupo.keys()];
        let baseHoras = grupos[0].baseHoras; // mismo turno → mismo rango de horas
        let idx      = new Map(grupos.map(g => [g, 0]));

        function quedanBloques() {
            return grupos.some(g => idx.get(g) < porGrupo.get(g).length);
        }

        // Filtra los grupos pendientes que pueden colocarse en (dia, h)
        function gruposDisponibles(dia, h) {
            return grupos.filter(grupo => {
                if (idx.get(grupo) >= porGrupo.get(grupo).length) return false;
                const b = porGrupo.get(grupo)[idx.get(grupo)];
                if (grupo.horario[dia][h] !== null) return false;
                if (b.docente.asignado[dia][h]) return false;
                if ((grupo.sesionesDia[dia][b.materia.nombre_materia] || 0) >= maxSesionesDia) return false;
                if (dia === "sabado" && b.docente.disponibilidad["sabado"].size === 0) return false;
                if (!b.docente.disponibilidad[dia].has(h)) return false;
                return true;
            });
        }

        // Sincronización parcial: en cada iteración se elige el slot (dia, hora)
        // que maximiza el número de grupos colocables simultáneamente.
        // Si no todos los grupos caben en el mismo slot, se colocan los que sí
        // pueden y los demás se buscan en la siguiente iteración.
        // Resultado: máxima sincronización posible con los datos de disponibilidad.
        let baseHorasRev = [...baseHoras].reverse();
        while (quedanBloques()) {
            let mejorDia = null, mejorH = null, mejorGrupos = [];
            for (let dia of diasSemana) {
                for (let h of baseHorasRev) {
                    const disp = gruposDisponibles(dia, h);
                    if (disp.length > mejorGrupos.length) {
                        mejorDia = dia; mejorH = h; mejorGrupos = disp;
                    }
                }
            }
            if (mejorGrupos.length === 0) break; // ningún grupo puede ubicarse → salir

            for (let grupo of mejorGrupos) {
                const i = idx.get(grupo);
                const b = porGrupo.get(grupo)[i];
                aplicarAsignacion(grupo, b, mejorDia, mejorH, false);
                b.preAsignado = true;
                asignados.add(b);
                idx.set(grupo, i + 1);
            }
        }
        // Grupos sin slot común caen al greedy principal con el bono de coincidencia.
    }

    // ── REGLA GLOBAL: cuatrimestres 1-7, agrupados por turno ─────────────────────
    // Todos los grupos matutinos 1-7 → un único slot compartido por sesión.
    // Todos los grupos vespertinos 1-7 → otro slot compartido (distinto turno).
    let inglesPorTurno = new Map(); // turno → Map<grupo, [bloque, ...]>

    MAPA_GRUPOS.forEach(grupo => {
        let c = cuatriNum(grupo.nombre_grupo);
        if (c === null || c < 1 || c > 7) return;
        grupo.bloques.forEach(b => {
            let nm = b.materia.nombre_materia.toUpperCase()
                .normalize("NFD").replace(/[̀-ͯ]/g, "");
            if (!nm.includes('INGLES')) return;
            let t = grupo.turno;
            if (!inglesPorTurno.has(t)) inglesPorTurno.set(t, new Map());
            let pm = inglesPorTurno.get(t);
            if (!pm.has(grupo)) pm.set(grupo, []);
            pm.get(grupo).push(b);
        });
    });

    // maxSesionesDia=2: permite hasta 2 sesiones de inglés por día en grupos 1-7
    // (necesario para llenar toda la disponibilidad del docente sin concentrar
    //  5+ horas en un solo día). Los grupos 8+ conservan el límite de 1.
    inglesPorTurno.forEach(porGrupo => sincronizarGrupos(porGrupo, 2));

    // CUATRIMESTRES 8+: no se sincronizan — se tratan como docentes normales
    // y sus bloques de inglés se colocan por el algoritmo greedy estándar.

    return asignados;
}

/**
 * Pase 6 — Rescate por docente.
 *
 * Cuando quedan bloques sin colocar después de los 5 pases, el problema suele
 * ser un "compromiso temprano irrecuperable": el greedy colocó el bloque B del
 * docente D en el lunes porque era el único slot disponible en ese momento, pero
 * eso bloquea permanentemente el bloque C (también de D) que necesita el lunes.
 *
 * Solución: para cada docente que tiene bloques fallidos, quitar TODOS sus bloques
 * del horario y volver a colocarlos dando prioridad a los fallidos primero.
 * Los otros bloques del horario (de otros docentes) permanecen fijos como contexto.
 *
 * Se prueban hasta R rotaciones del orden de los bloques fallidos del docente.
 *
 * @param {Array}    bloquesFallidos  Bloques que no pudieron colocarse
 * @param {Function} progFn          Callback de progreso (pct 0-100, msg)
 * @returns {Array} Lista actualizada de bloques aún sin colocar
 */
async function rescateBacktracking(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const failingSet   = new Set(bloquesFallidos);
    const docentesFail = [...new Set(bloquesFallidos.map(b => b.docente))];

    let mejorFallidos = bloquesFallidos;
    let mejorSnap     = tomarSnapshot();

    const MAX_ROTACIONES = 4;

    // Intenta colocar un bloque con todas las técnicas disponibles
    function colocarBloque(b) {
        return intentarAsignar(b, false, false, false, false) ||
               intentarAsignar(b, false, true,  false, false) ||
               intentarSwapDeHorarios(b, [])                  ||
               intentarCadenaSwap(b)                          ||
               intentarReestructuracionCruzada(b)             ||
               intentarCadenaSwap(b, 2, new Set([b]))         ||
               intentarCadenaAumentanteGlobal(b);             // BFS sin límite de profundidad
    }

    // ── Fase A: rescate encadenado por docente ────────────────────────────────
    // Cada docente parte del MEJOR estado dejado por el docente anterior.
    // Así las liberaciones de un docente benefician al siguiente.
    let snapEncadenado  = mejorSnap;
    let fallsEncadenados = bloquesFallidos;

    for (let di = 0; di < docentesFail.length; di++) {
        const docente = docentesFail[di];
        const bloquesFailDocente = fallsEncadenados.filter(b => b.docente === docente);
        if (bloquesFailDocente.length === 0) continue; // ya resuelto

        // Leer posiciones en el estado encadenado actual.
        // Usamos fallsEncadenados (no failingSet original) para incluir bloques
        // que antes fallaban pero fueron rescatados por un docente anterior.
        restaurarSnapshot(snapEncadenado);
        const fallsEncadenadosSet = new Set(fallsEncadenados);
        const bloquesOkDocente = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (b.docente === docente && !fallsEncadenadosSet.has(b)) {
                    const pos = encontrarPosicionBloque(b);
                    if (pos) bloquesOkDocente.push({ bloque: b, pos });
                }
            });
        });

        const rotaciones = Math.min(MAX_ROTACIONES, Math.max(1, bloquesFailDocente.length));
        let mejorRotSnap  = snapEncadenado;
        let mejorFallsRot = fallsEncadenados;

        for (let rot = 0; rot < rotaciones; rot++) {
            restaurarSnapshot(snapEncadenado);
            bloquesOkDocente.forEach(({ bloque, pos }) => {
                quitarAsignacion(bloque.grupo, bloque, pos.dia, pos.hInicio);
            });

            const rotFail = [
                ...bloquesFailDocente.slice(rot),
                ...bloquesFailDocente.slice(0, rot)
            ];
            const cola = [...rotFail, ...bloquesOkDocente.map(r => r.bloque)];

            const nuevosFallidosDoc = [];
            for (let i = 0; i < cola.length; i++) {
                const b = cola[i];
                if (progFn) {
                    const pct = Math.round(
                        ((di * MAX_ROTACIONES + rot) /
                         (docentesFail.length * MAX_ROTACIONES)) * 80
                    );
                    progFn(pct,
                        `🔄 Rescate doc ${di + 1}/${docentesFail.length} ` +
                        `(rot ${rot + 1}): ${b.grupo.nombre_grupo}…`);
                    await cederControlUI();
                }
                if (!colocarBloque(b)) nuevosFallidosDoc.push(b);
            }

            // Combinar: nuevos fallos de este docente + fallos de otros docentes
            const totalFallidos = [
                ...nuevosFallidosDoc,
                ...fallsEncadenados.filter(b => b.docente !== docente)
            ];

            if (totalFallidos.length < mejorFallsRot.length) {
                mejorFallsRot = totalFallidos;
                mejorRotSnap  = tomarSnapshot();
                if (mejorFallsRot.length === 0) return [];
            }
        }

        // Avanzar cadena: el siguiente docente parte del mejor estado de este
        snapEncadenado  = mejorRotSnap;
        fallsEncadenados = mejorFallsRot;

        if (fallsEncadenados.length < mejorFallidos.length) {
            mejorFallidos = fallsEncadenados;
            mejorSnap     = snapEncadenado;
        }
    }

    // ── Helper: ejecutar un rescate global dado un conjunto de docentes ──────
    async function rescateGlobal(fallidos, docentesExtra, pctBase, pctRange, label) {
        restaurarSnapshot(mejorSnap);
        const fallidosSet = new Set(fallidos);
        const todosDocentes = new Set([...docentesFail, ...docentesExtra]);
        const bloquesMover = [];
        todosDocentes.forEach(doc => {
            MAPA_GRUPOS.forEach(g => {
                g.bloques.forEach(b => {
                    if (b.docente === doc && !fallidosSet.has(b)) {
                        const pos = encontrarPosicionBloque(b);
                        if (pos) bloquesMover.push({ bloque: b, pos });
                    }
                });
            });
        });

        bloquesMover.forEach(({ bloque, pos }) => {
            quitarAsignacion(bloque.grupo, bloque, pos.dia, pos.hInicio);
        });

        // Fallidos: PA primero (más restringidos), luego PTC; dentro de cada tipo, por flexibilidad
        const colaGlobal = [
            ...fallidos.slice().sort((a, b) =>
                (b.docente.tipo_docente === 2 ? 1 : 0) -
                (a.docente.tipo_docente === 2 ? 1 : 0)
            ),
            ...bloquesMover.map(r => r.bloque)
        ];

        const nuevosFallidos = [];
        for (let i = 0; i < colaGlobal.length; i++) {
            const b = colaGlobal[i];
            if (progFn) {
                progFn(pctBase + Math.round(i / Math.max(1, colaGlobal.length) * pctRange),
                    `${label} (${i + 1}/${colaGlobal.length})…`);
                await cederControlUI();
            }
            if (!colocarBloque(b)) nuevosFallidos.push(b);
        }

        if (nuevosFallidos.length < mejorFallidos.length) {
            mejorFallidos = nuevosFallidos;
            mejorSnap     = tomarSnapshot();
            return true; // mejoró
        }
        restaurarSnapshot(mejorSnap);
        return false;
    }

    // ── Fase B: rescate global — solo docentes fallidos ───────────────────────
    if (mejorFallidos.length > 0) {
        await rescateGlobal(mejorFallidos, [], 80, 6, '🌐 Rescate global B');
    }

    // ── Fase C: rescate con docentes-obstáculo ────────────────────────────────
    // Si los fallidos siguen sin ubicarse es porque otros docentes (sin fallos
    // propios) ocupan exactamente los slots que los fallidos necesitan.
    // Detectamos esos "docentes-obstáculo" y los incluimos en el rescate global.
    if (mejorFallidos.length > 0) {
        restaurarSnapshot(mejorSnap);
        const docentesFailSet  = new Set(docentesFail); // O(1) lookups
        const docentesObstaculo = new Set();

        mejorFallidos.forEach(b => {
            const grupo   = b.grupo;
            const docente = b.docente;
            const durP    = b.duracion;
            diasSemana.forEach(dia => {
                if ((grupo.sesionesDia[dia][b.materia.nombre_materia] || 0) >= 1) return;
                for (let idx = 0; idx <= grupo.baseHoras.length - durP; idx++) {
                    const h = grupo.baseHoras[idx];
                    // ¿Tiene disponibilidad el docente aquí?
                    let dispOk = true;
                    for (let o = 0; o < durP; o++) {
                        if (!docente.disponibilidad[dia].has(h + o)) { dispOk = false; break; }
                    }
                    if (!dispOk) continue;
                    // Docente libre pero el slot en el GRUPO está ocupado → el ocupante es obstáculo
                    if (!docente.asignado[dia][h]) {
                        for (let o = 0; o < durP; o++) {
                            const ex = grupo.horario[dia][h + o];
                            if (ex && ex.docente !== docente && !docentesFailSet.has(ex.docente)) {
                                docentesObstaculo.add(ex.docente);
                            }
                        }
                    }
                    // Docente ocupado en otro grupo → ese bloque ya lo maneja Fase A/B; no duplicar
                }
            });
        });

        if (docentesObstaculo.size > 0) {
            await rescateGlobal(mejorFallidos, [...docentesObstaculo], 86, 10,
                `🔀 Rescate C (${docentesObstaculo.size} docentes-obstáculo)`);
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallidos;
}

async function construccionVorazCascada(cromosoma = null, ruido = 0, progFn = null, invertirOrden = false, eliteBase = null, inglesPreFijados = null) {
    let noAsignados = [];
    let TODOS_LOS_BLOQUES = [];
    LOG_CAMBIOS = [];

    // Cede al navegador y muestra un mensaje de fase (solo en modo normal con callback)
    async function avanzar(pct, msg) {
        if (!progFn) return;
        progFn(pct, msg);
        await cederControlUI();
    }

    MAPA_DOCENTES.forEach(d => {
        let dispTotal = 0;
        diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
        d.flexibilidad    = dispTotal - d.horas_carga;
        d.constraintRatio = d.horas_carga / Math.max(1, dispTotal); // mayor → más restringido
    });

    if (cromosoma !== null) {
        // Modo AG: reordenar bloques según el cromosoma (permutación de índices en AG_BLOQUES_SORTED)
        TODOS_LOS_BLOQUES = cromosoma.map(i => AG_BLOQUES_SORTED[i]);
    } else if (eliteBase !== null) {
        // Modo élite: partir del mejor orden conocido y aplicar ruido encima
        TODOS_LOS_BLOQUES = [...eliteBase];
        if (ruido > 0) {
            const sep    = TODOS_LOS_BLOQUES.findIndex(b => !esIngles(b));
            const offset = sep < 0 ? TODOS_LOS_BLOQUES.length : sep;
            const resto  = TODOS_LOS_BLOQUES.splice(offset);
            if (ruido >= 1.0) shuffleArray(resto);
            else              shuffleConRuido(resto, ruido);
            TODOS_LOS_BLOQUES.push(...resto);
        }
    } else {
        // Modo normal: construir y ordenar con heurística greedy
        MAPA_GRUPOS.forEach(g => { TODOS_LOS_BLOQUES.push(...g.bloques); });

        // Calcular flexibilidad efectiva por par docente-grupo:
        // Con la restricción de 1 sesión por materia por día, lo relevante es cuántos DÍAS ÚNICOS
        // tiene el docente disponible para el grupo vs cuántas SESIONES (bloques) necesita dar.
        // Un docente con 3 días disponibles y 3 sesiones tiene margen 0 → debe colocarse primero.
        let docGrupoFlex = new Map();
        TODOS_LOS_BLOQUES.forEach(b => {
            let key = b.docente.nombre_docente + '|' + b.grupo.nombre_grupo;
            if (!docGrupoFlex.has(key)) {
                // Días únicos donde el docente tiene al menos 1 hora disponible en el horario del grupo
                let diasDisponibles = 0;
                diasSemana.forEach(dia => {
                    let tieneSlot = b.grupo.baseHoras.some(h => b.docente.disponibilidad[dia].has(h));
                    if (tieneSlot) diasDisponibles++;
                });
                // Sesiones (bloques) que el docente debe colocar en este grupo
                let sesionesEnGrupo = b.grupo.bloques.filter(bl => bl.docente === b.docente).length;
                docGrupoFlex.set(key, diasDisponibles - sesionesEnGrupo);
            }
            b.flexibilidadEfectiva = docGrupoFlex.get(key);
        });

        TODOS_LOS_BLOQUES.sort((a, b) => {
            // 0. Inglés siempre primero
            const aI = esIngles(a) ? 1 : 0, bI = esIngles(b) ? 1 : 0;
            if (aI !== bI) return bI - aI;

            const signo = invertirOrden ? -1 : 1;

            // 1. Docente con mayor ratio carga/disponibilidad primero
            //    (más carga y menos disponibilidad → más urgente)
            if (a.docente.constraintRatio !== b.docente.constraintRatio)
                return signo * (b.docente.constraintRatio - a.docente.constraintRatio);

            // 2. Margen local en el grupo (días útiles disponibles − sesiones a dar)
            if (a.flexibilidadEfectiva !== b.flexibilidadEfectiva)
                return signo * (a.flexibilidadEfectiva - b.flexibilidadEfectiva);

            // 3. Bloques más largos primero (más difíciles de ubicar)
            return signo * (b.duracion - a.duracion);
        });

        // Multi-start: ruido > 0 mezcla la parte no-inglés del orden
        if (ruido > 0) {
            let sep = TODOS_LOS_BLOQUES.findIndex(b => !esIngles(b));
            if (sep < 0) sep = TODOS_LOS_BLOQUES.length;
            const resto = TODOS_LOS_BLOQUES.splice(sep);
            // ruido >= 1.0 → mezcla completa (Fisher-Yates); otro → mezcla parcial
            if (ruido >= 1.0) shuffleArray(resto);
            else              shuffleConRuido(resto, ruido);
            TODOS_LOS_BLOQUES.push(...resto);
        }
    }
    _ultimoOrden = [...TODOS_LOS_BLOQUES];

    // Inglés: usar posiciones ya fijadas al inicio de la ejecución (inglesPreFijados),
    // o calcularlas desde cero si se llama de forma aislada (p.ej. desde el RPA).
    // Los bloques de inglés son INMOVIBLES durante toda la fase de reparación.
    let inglesPreAsignados;
    if (inglesPreFijados !== null) {
        inglesPreAsignados = inglesPreFijados; // ya colocados y marcados preAsignado
    } else {
        inglesPreAsignados = preAsignarInglesSimultaneo();
    }

    // Pre-asignar PAs de forma óptima mediante backtracking por docente.
    // Solo en modo normal (cromosoma === null). En modo AG el cromosoma define
    // el orden de todos los bloques y no se pre-asignan PA por separado.
    let paPreAsignados = (cromosoma === null) ? preAsignarPAsOptimo() : new Set();

    // Cerrar huecos que pudo haber creado la contiguidad relajada durante el backtracking PA.
    // Debe correr antes del greedy para que los PTCs vean un horario ya compacto.
    if (cromosoma === null && paPreAsignados.size > 0) compactarHuecosPAs();

    let restantes = TODOS_LOS_BLOQUES.filter(
        b => !inglesPreAsignados.has(b) && !paPreAsignados.has(b)
    );

    // Orden de cola: 1) inglés  2) recurrentes (solo en arranques con sesgo)  3) resto
    const conSesgo = !_edaBloqueado && bloquesRecurrentesFallidos.size > 0;
    let queue = [
        ...restantes.filter(b =>  esIngles(b)),
        ...(conSesgo ? restantes.filter(b => !esIngles(b) &&  bloquesRecurrentesFallidos.has(b)) : []),
        ...restantes.filter(b => !esIngles(b) && (!conSesgo || !bloquesRecurrentesFallidos.has(b)))
    ];

    // Sanear horario: eliminar cualquier bloque huérfano (no registrado en g.bloques)
    // que haya podido quedar de runs anteriores o de mecanismos de split legacy.
    const todosBloques = new Set();
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => todosBloques.add(b)));
    MAPA_GRUPOS.forEach(g => {
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (b && !todosBloques.has(b)) {
                    g.horario[dia][h] = null;
                    delete b.docente.asignado[dia][h];
                }
            });
            MAPA_DOCENTES.forEach(d => {
                if (Object.keys(d.asignado[dia]).length === 0) d.diasActivos.delete(dia);
            });
        });
    });

    let bloquesFallidos = [];

    await avanzar(0, '📋 Construyendo horario base...');
    while(queue.length > 0) {
        let bloque = queue.shift();

        // Contiguidad NUNCA se relaja — regla dura de cero huecos
        if (intentarAsignar(bloque, false, false, false, false)) continue; // estricto
        if (intentarAsignar(bloque, false, true,  false, false)) continue; // relajar maxDias

        // NOTA: el split en horas sueltas se eliminó porque creaba copias anónimas
        // (spread objects) que NO están en g.bloques, quedando como "huérfanas" en
        // g.horario. reconfigurarSesiones las ignoraba y colocaba el bloque original
        // encima → horas duplicadas. El split lo maneja reconfigurarSesiones
        // con tracking completo después del greedy.

        if (intentarSwapDeHorarios(bloque, queue)) continue;

        // Guardar para segundo pase — después de que el resto del horario esté construido
        // puede haber oportunidades de swap que ahora no existen
        bloquesFallidos.push(bloque);
    }

    // Segundo pase: reintentar bloques fallidos con el horario ya construido
    // Los swaps ahora tienen más bloques para desplazar y crear espacio
    await avanzar(50, '🔄 2° pase: reasignando bloques difíciles...');
    for (let bloque of bloquesFallidos) {
        if (intentarAsignar(bloque, false, false, false, false)) continue;
        if (intentarAsignar(bloque, false, true,  false, false)) continue;
        if (intentarSwapDeHorarios(bloque, [])) continue;
        noAsignados.push(bloque); // pasa al flujo interactivo
    }

    // Tercer pase: cadenas de 2 swaps para bloques que siguen sin ubicar
    await avanzar(58, '🔗 3° pase: cadenas de swap...');
    {
        const tras3 = [];
        for (const bloque of noAsignados) {
            if (intentarCadenaSwap(bloque)) continue;
            tras3.push(bloque);
        }
        noAsignados = tras3;
    }

    // Cuarto pase: reestructuración cruzada entre grupos
    // Caso A: slot de G1 libre pero docente ocupado en otro grupo (mismo docente)
    await avanzar(68, '🌐 4° pase: cascada cruzada (mismo docente)...');
    {
        const tras4 = [];
        for (const bloque of noAsignados) {
            if (intentarReestructuracionCruzada(bloque)) continue;
            tras4.push(bloque);
        }
        noAsignados = tras4;
    }

    // Quinto pase: cascada cruzada multi-docente + cadena aumentante global BFS
    // Prueba primero el swap cruzado de profundidad 2 (más rápido); si falla,
    // el BFS global sin límite de profundidad buscando una cadena aumentante.
    {
        const n5    = noAsignados.length;
        const tras5 = [];
        for (let i = 0; i < n5; i++) {
            const bloque = noAsignados[i];
            await avanzar(
                78 + Math.round(i / Math.max(1, n5) * 17),
                `🕸️ 5° pase: cadena global (${i + 1}/${n5})...`
            );
            if (intentarCadenaSwap(bloque, 2, new Set([bloque]))) continue;
            if (intentarCadenaAumentanteGlobal(bloque))             continue;
            tras5.push(bloque);
        }
        noAsignados = tras5;
    }

    // Sexto pase: rescate por docente — solo en modo normal (no AG)
    // Quita todos los bloques del docente fallido y los recoloca priorizando los que fallaron
    if (cromosoma === null && noAsignados.length > 0) {
        const rescateFn = progFn
            ? (pct, msg) => progFn(95 + Math.round(pct / 100 * 3), msg)
            : null;
        noAsignados = await rescateBacktracking(noAsignados, rescateFn);
    }

    // Fase de reparación: intentar reubicar bloques fuera de disponibilidad
    await avanzar(99, '🔧 Reparando violaciones de disponibilidad...');
    repararViolacionesDisponibilidad();

    return noAsignados;
}

function enBorde(grupo, dia, h) {
    // Devuelve true si h está en el borde (inicio o fin) del bloque del día — quitarlo no crea hueco
    let base = grupo.baseHoras;
    let idx = base.indexOf(h);
    let prevOcup = idx > 0 && grupo.horario[dia][base[idx - 1]] !== null;
    let nextOcup = idx < base.length - 1 && grupo.horario[dia][base[idx + 1]] !== null;
    return !(prevOcup && nextOcup); // en el medio → false
}

function esAdyacenteOVacio(grupo, dia, h) {
    // Devuelve true si h está vacío y es adyacente a clases existentes (o el día está vacío)
    if (grupo.horario[dia][h] !== null) return false;
    let base = grupo.baseHoras;
    let tieneClases = base.some(hx => grupo.horario[dia][hx] !== null);
    if (!tieneClases) return true; // día vacío: cualquier slot es válido
    let idx = base.indexOf(h);
    let adjPrev = idx > 0 && grupo.horario[dia][base[idx - 1]] !== null;
    let adjNext = idx < base.length - 1 && grupo.horario[dia][base[idx + 1]] !== null;
    return adjPrev || adjNext;
}

function repararViolacionesDisponibilidad() {
    // Una reparación por iteración — usar break explícito para evitar movimientos múltiples
    // que se interfieran entre sí creando huecos
    for (let iter = 0; iter < 100; iter++) {
        let reparado = false;

        grupoLoop: for (let [, grupo] of MAPA_GRUPOS) {
            for (let dia of diasSemana) {
                for (let h of grupo.baseHoras) {
                    let bV = grupo.horario[dia][h];
                    if (!bV || bV.docente.disponibilidad[dia].has(h)) continue;
                    if (!enBorde(grupo, dia, h)) continue; // no se puede mover sin crear hueco

                    // Mover a slot vacío adyacente donde tenga disponibilidad
                    for (let diaB of diasSemana) {
                        for (let hB of grupo.baseHoras) {
                            if (!esAdyacenteOVacio(grupo, diaB, hB)) continue;
                            if (!bV.docente.disponibilidad[diaB].has(hB)) continue;
                            if (bV.docente.asignado[diaB][hB]) continue;
                            // Verificar que no cree sesión doble en el día destino (regla dura)
                            if (diaB !== dia && (grupo.sesionesDia[diaB][bV.materia.nombre_materia] || 0) >= 1) continue;
                            quitarAsignacion(grupo, bV, dia, h);
                            aplicarAsignacion(grupo, bV, diaB, hB);
                            reparado = true;
                            break grupoLoop;
                        }
                    }

                    // Swap con otro bloque del mismo grupo (ambos de 1hr)
                    if (reparado) break;
                    for (let diaB of diasSemana) {
                        for (let hB of grupo.baseHoras) {
                            let bO = grupo.horario[diaB][hB];
                            if (!bO || bO === bV || bO.duracion !== 1 || bV.duracion !== 1) continue;
                            if (!bV.docente.disponibilidad[diaB].has(hB)) continue;
                            if (bV.docente.asignado[diaB][hB] && bV.docente.asignado[diaB][hB] !== bV) continue;
                            if (!bO.docente.disponibilidad[dia].has(h)) continue;
                            if (bO.docente.asignado[dia][h] && bO.docente.asignado[dia][h] !== bO) continue;
                            let conf = false;
                            for (let [, otroG] of MAPA_GRUPOS) {
                                if (otroG === grupo) continue;
                                if (otroG.horario[diaB]?.[hB]?.docente === bV.docente) conf = true;
                                if (otroG.horario[dia]?.[h]?.docente === bO.docente) conf = true;
                            }
                            if (conf) continue;
                            // Verificar que el intercambio no cree sesión doble (regla dura)
                            let mismaMatRep = bV.materia.nombre_materia === bO.materia.nombre_materia;
                            if (!mismaMatRep) {
                                if ((grupo.sesionesDia[diaB][bV.materia.nombre_materia] || 0) >= 1) continue;
                                if ((grupo.sesionesDia[dia][bO.materia.nombre_materia] || 0) >= 1) continue;
                            }
                            quitarAsignacion(grupo, bV, dia, h);
                            quitarAsignacion(grupo, bO, diaB, hB);
                            aplicarAsignacion(grupo, bV, diaB, hB);
                            aplicarAsignacion(grupo, bO, dia, h);
                            reparado = true;
                            break grupoLoop;
                        }
                    }
                }
            }
        }

        if (!reparado) break;
    }
}

// ------------------------------------------------------------------
// FASE 2: MOTOR EXHAUSTIVO (Gravedad Anti-Huecos)
// ------------------------------------------------------------------
function aplicarGravedadIntraDia(grupo, dia) {
    let base = grupo.baseHoras;
    let movido = false;
    
    for (let iter = 0; iter < base.length; iter++) { 
        let primero = base.findIndex(h => grupo.horario[dia][h] !== null);
        let ultimo = -1;
        for(let i=base.length-1; i>=0; i--) { if(grupo.horario[dia][base[i]]!==null) {ultimo=i; break;} }
        
        if (primero === -1 || ultimo === -1 || primero === ultimo) break;

        let hizoCambio = false;
        for(let i = primero + 1; i < ultimo; i++) {
            let hHueco = base[i];
            if (grupo.horario[dia][hHueco] === null) {
                let hAbajo = base[i+1];
                let bAbajo = grupo.horario[dia][hAbajo];
                if (bAbajo && bAbajo.duracion === 1 && !bAbajo.preAsignado && !bAbajo.docente.asignado[dia][hHueco] && bAbajo.docente.disponibilidad[dia].has(hHueco)) {
                    quitarAsignacion(grupo, bAbajo, dia, hAbajo);
                    aplicarAsignacion(grupo, bAbajo, dia, hHueco);
                    hizoCambio = true; movido = true; break;
                }
                let hArriba = base[i-1];
                let bArriba = grupo.horario[dia][hArriba];
                if (bArriba && bArriba.duracion === 1 && !bArriba.preAsignado && !bArriba.docente.asignado[dia][hHueco] && bArriba.docente.disponibilidad[dia].has(hHueco)) {
                    quitarAsignacion(grupo, bArriba, dia, hArriba);
                    aplicarAsignacion(grupo, bArriba, dia, hHueco);
                    hizoCambio = true; movido = true; break;
                }
            }
        }
        if (!hizoCambio) break;
    }
    return movido;
}

function intentarTraerBordeAHueco(grupo, diaDestino, hHueco) {
    for (let diaOrigen of diasSemana) {
        if (diaOrigen === diaDestino) continue;
        let base = grupo.baseHoras;
        
        let primerIdx = base.findIndex(h => grupo.horario[diaOrigen][h] !== null);
        let ultimoIdx = -1;
        for(let i=base.length-1; i>=0; i--) { if(grupo.horario[diaOrigen][base[i]]!==null) {ultimoIdx=i; break;} }
        
        if (primerIdx === -1) continue;

        let candidatos = [];
        candidatos.push({h: base[primerIdx], bloque: grupo.horario[diaOrigen][base[primerIdx]]});
        if (primerIdx !== ultimoIdx) candidatos.push({h: base[ultimoIdx], bloque: grupo.horario[diaOrigen][base[ultimoIdx]]});

        for (let c of candidatos) {
            let bloque = c.bloque;
            if (bloque.duracion > 1) continue;
            if (bloque.preAsignado) continue; // no mover inglés pre-asignado
            if (!bloque.docente.disponibilidad[diaDestino].has(hHueco)) continue;
            if (bloque.docente.asignado[diaDestino][hHueco]) continue;
            // Verificar que no cree sesión doble en el día destino (regla dura)
            if ((grupo.sesionesDia[diaDestino][bloque.materia.nombre_materia] || 0) >= 1) continue;

            let activaNuevoDia = !bloque.docente.diasActivos.has(diaDestino);
            let dejaDiaLimpio = Object.keys(bloque.docente.asignado[diaOrigen]).length === 1;
            let diasFinales = bloque.docente.diasActivos.size;
            
            if (activaNuevoDia) diasFinales++;
            if (dejaDiaLimpio) diasFinales--;
            if (diasFinales > bloque.docente.maxDias) continue; 

            quitarAsignacion(grupo, bloque, diaOrigen, c.h);
            aplicarAsignacion(grupo, bloque, diaDestino, hHueco);
            return true; 
        }
    }
    return false;
}

/**
 * ─── RECOCIDO SIMULADO ────────────────────────────────────────────────────────
 *
 * Fase post-greedy: toma el mejor horario (con N bloques sin colocar) y explora
 * movimientos aleatorios sobre los bloques YA COLOCADOS para crear huecos donde
 * los fallidos puedan entrar. Acepta movimientos que empeoran temporalmente con
 * probabilidad e^(−Δ/T), donde T decrece con el tiempo (enfriamiento).
 *
 * Dos tipos de movimiento:
 *   Tipo A – General: mueve un bloque colocado aleatorio a otro slot libre suyo.
 *   Tipo B – Dirigido: para un bloque fallido, mueve el bloque del mismo docente
 *            que le bloquea a otro slot en su grupo, liberando el slot necesario.
 *
 * @param {Array}    bloquesFallidos  Bloques no colocados antes del SA
 * @param {number}   tiempoLimiteMs  Tiempo máximo en ms
 * @param {Function} progFn          (segsRestantes, msg) → void
 * @returns {Array}  Bloques que siguen sin colocar tras el SA
 */
async function recocidoSimulado(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const endTime   = Date.now() + tiempoLimiteMs;
    let T           = 3.0;      // temperatura inicial (1 bloque fallido ≈ energía 1)
    const T_MIN     = 0.002;
    const ALPHA     = 0.99997;  // enfriamiento muy lento (≈ 115 k iters hasta T_MIN)
    let lastYield   = Date.now();
    let iter = 0, aceptados = 0, mejoras = 0;
    let itersDesdeUltimaMejora = 0;
    const KICK_CADA   = 8000;  // kick cada N iters sin mejorar el mejor global
    const KICK_FRAC   = 0.20;  // fracción de bloques colocados a remover en el kick

    // ── Estado mutable ─────────────────────────────────────────────────────────
    let fallidosSet = new Set(bloquesFallidos);  // bloques actualmente sin colocar
    let mejorFallos = [...fallidosSet];
    let mejorSnap   = tomarSnapshot();

    // ── Colección de bloques colocados y no fijos ──────────────────────────────
    // (preAsignados = inglés sincronizado y PAs óptimos → no mover)
    function getColocados() {
        const arr = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (!fallidosSet.has(b) && !b.preAsignado) {
                    const pos = encontrarPosicionBloque(b);
                    if (pos) arr.push(b);
                }
            });
        });
        return arr;
    }

    // ── Slots libres en el grupo para un bloque (docente disponible + grupo libre + no doble) ──
    function slotsLibres(bloque, excluirPos) {
        const resultado = [];
        const g = bloque.grupo, d = bloque.docente, dur = bloque.duracion;
        for (const dia of diasSemana) {
            // sesión doble: si el bloque ya está en este día, puede moverse DENTRO del día
            const sesHoy = g.sesionesDia[dia][bloque.materia.nombre_materia] || 0;
            const esElMismo = excluirPos && excluirPos.dia === dia;
            if (sesHoy >= 1 && !esElMismo) continue;
            if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
                d.diasActivos.size >= d.maxDias) continue;
            for (let i = 0; i <= g.baseHoras.length - dur; i++) {
                const h = g.baseHoras[i];
                if (excluirPos && excluirPos.dia === dia && excluirPos.hInicio === h) continue;
                let ok = true;
                for (let o = 0; o < dur; o++) {
                    if (!d.disponibilidad[dia].has(h + o)) { ok = false; break; }
                    if (g.horario[dia][h + o] !== null)    { ok = false; break; }
                    if (d.asignado[dia][h + o])             { ok = false; break; }
                }
                if (ok) resultado.push({ dia, h });
            }
        }
        return resultado;
    }

    // ── Intentar colocar todos los bloques fallidos (solo asignación directa) ──
    function colocarFallidos() {
        const siguen = [];
        for (const b of fallidosSet) {
            if (intentarAsignar(b, false, false, false, false) ||
                intentarAsignar(b, false, true,  false, false)) {
                // colocado ✓
            } else {
                siguen.push(b);
            }
        }
        fallidosSet = new Set(siguen);
        return siguen.length;
    }

    // Intentar colocar al inicio (sin mover nada todavía)
    colocarFallidos();
    if (fallidosSet.size < mejorFallos.length) {
        mejorFallos = [...fallidosSet];
        mejorSnap   = tomarSnapshot();
        if (mejorFallos.length === 0) return [];
    }

    let energiaActual = fallidosSet.size;

    // ── Bucle SA ───────────────────────────────────────────────────────────────
    while (Date.now() < endTime && T > T_MIN && mejorFallos.length > 0) {
        iter++;

        // Yield al navegador cada ~400 ms
        const ahora = Date.now();
        if (ahora - lastYield >= 400) {
            if (progFn) {
                const s = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                const pct = Math.round((1 - s / (tiempoLimiteMs / 1000)) * 100);
                progFn(s,
                    `🌡️ SA ${mejorFallos.length} sin ubicar ` +
                    `· T=${T.toFixed(4)} · acept ${Math.round(aceptados / Math.max(1, iter) * 100)}%`
                );
            }
            await cederControlUI();
            lastYield = Date.now();
        }

        // ── Kick: perturbación aleatoria cuando SA lleva KICK_CADA iters estancado ──
        if (itersDesdeUltimaMejora >= KICK_CADA && fallidosSet.size > 0) {
            restaurarSnapshot(mejorSnap);
            fallidosSet   = new Set(mejorFallos);
            energiaActual = fallidosSet.size;

            const colocados = getColocados();
            const nKick = Math.max(1, Math.floor(colocados.length * KICK_FRAC));
            shuffleArray(colocados);

            for (const b of colocados.slice(0, nKick)) {
                const pos = encontrarPosicionBloque(b);
                if (pos) quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
            }

            const colaKick = [...fallidosSet,
                              ...colocados.slice(0, nKick).filter(b => !fallidosSet.has(b))];
            const nuevosF = new Set(fallidosSet);
            for (const b of colaKick) {
                if (intentarAsignar(b, false, false, false, false) ||
                    intentarAsignar(b, false, true,  false, false))
                    nuevosF.delete(b);
                else
                    nuevosF.add(b);
            }
            fallidosSet   = nuevosF;
            energiaActual = fallidosSet.size;

            if (fallidosSet.size < mejorFallos.length) {
                mejoras++;
                mejorFallos = [...fallidosSet];
                mejorSnap   = tomarSnapshot();
            }
            itersDesdeUltimaMejora = 0;
        }

        // ── Elegir tipo de movimiento (60% Tipo B dirigido, 40% Tipo A general) ─
        const usarDirigido = fallidosSet.size > 0 && Math.random() < 0.60;

        let bMover = null;
        let posActual = null;
        let destino   = null;

        if (usarDirigido) {
            // Tipo B: buscar el docente de un bloque fallido y mover su bloque en otro grupo
            const fallidosArr = [...fallidosSet];
            const bFallido = fallidosArr[Math.floor(Math.random() * fallidosArr.length)];
            const doc = bFallido.docente;

            // Encontrar el bloque del docente que ocupa un slot que bFallido necesita
            // (docente ocupado en otro grupo en los slots disponibles de bFallido)
            const gF = bFallido.grupo;
            let candidato = null;
            const diasOk = diasSemana.filter(dia =>
                (gF.sesionesDia[dia][bFallido.materia.nombre_materia] || 0) === 0 &&
                doc.disponibilidad[dia].size > 0
            );
            for (const dia of diasOk) {
                for (const h of gF.baseHoras) {
                    if (!doc.disponibilidad[dia].has(h)) continue;
                    if (!doc.asignado[dia][h]) continue; // docente libre → no es el problema
                    // Docente ocupado en algún otro grupo
                    for (const [, g2] of MAPA_GRUPOS) {
                        if (g2 === gF) continue;
                        const ex = g2.horario[dia][h];
                        if (ex && ex.docente === doc && !ex.preAsignado) {
                            candidato = ex; break;
                        }
                    }
                    if (candidato) break;
                }
                if (candidato) break;
            }

            if (candidato) {
                bMover    = candidato;
                posActual = encontrarPosicionBloque(candidato);
                if (posActual) {
                    const libres = slotsLibres(bMover, posActual);
                    if (libres.length > 0)
                        destino = libres[Math.floor(Math.random() * libres.length)];
                }
            }
        }

        if (!bMover || !posActual || !destino) {
            // Tipo A: mover un bloque colocado aleatorio
            const colocados = getColocados();
            if (colocados.length === 0) { T *= ALPHA; continue; }
            bMover    = colocados[Math.floor(Math.random() * colocados.length)];
            posActual = encontrarPosicionBloque(bMover);
            if (!posActual) { T *= ALPHA; continue; }
            const libres = slotsLibres(bMover, posActual);
            if (libres.length === 0) { T *= ALPHA; continue; }
            destino = libres[Math.floor(Math.random() * libres.length)];
        }

        // ── Aplicar movimiento ──────────────────────────────────────────────────
        const snap = tomarSnapshot();
        const fallosAntes = new Set(fallidosSet);

        quitarAsignacion(bMover.grupo, bMover, posActual.dia, posActual.hInicio);
        aplicarAsignacion(bMover.grupo, bMover, destino.dia, destino.h);

        // Intentar colocar bloques fallidos con el nuevo hueco
        const energiaNueva = colocarFallidos();

        // ── Criterio SA ────────────────────────────────────────────────────────
        const delta = energiaNueva - energiaActual;
        if (delta < 0 || Math.random() < Math.exp(-delta / T)) {
            // Aceptar movimiento
            aceptados++;
            energiaActual = energiaNueva;

            if (fallidosSet.size < mejorFallos.length) {
                mejoras++;
                mejorFallos = [...fallidosSet];
                mejorSnap   = tomarSnapshot();
                if (mejorFallos.length === 0) break;
            }
        } else {
            // Rechazar: restaurar estado
            restaurarSnapshot(snap);
            fallidosSet = fallosAntes;
        }

        // Rastrear estancamiento para el kick
        if (fallidosSet.size < mejorFallos.length) itersDesdeUltimaMejora = 0;
        else itersDesdeUltimaMejora++;

        T *= ALPHA;
    }

    // Restaurar el mejor estado encontrado
    restaurarSnapshot(mejorSnap);

    // Un último intento con las técnicas completas (cadenas + BFS) sobre los que quedan
    const ultimosFallidos = [];
    for (const b of mejorFallos) {
        const ok = intentarAsignar(b, false, false, false, false)
                || intentarAsignar(b, false, true, false, false)
                || intentarSwapDeHorarios(b, [])
                || intentarCadenaSwap(b)
                || intentarReestructuracionCruzada(b)
                || intentarCadenaSwap(b, 2, new Set([b]))
                || intentarCadenaAumentanteGlobal(b);
        if (!ok) ultimosFallidos.push(b);
    }
    return ultimosFallidos;
}

async function optimizacionExhaustiva(tiempoLimiteMs, progFn = null) {
    const endTime  = Date.now() + tiempoLimiteMs;
    let lastYield  = Date.now();

    while (Date.now() < endTime) {
        let movidoAlgoritmo = false;

        MAPA_GRUPOS.forEach(grupo => {
            diasSemana.forEach(d => { if (aplicarGravedadIntraDia(grupo, d)) movidoAlgoritmo = true; });

            diasSemana.forEach(diaDestino => {
                let base = grupo.baseHoras;
                let primero = base.findIndex(h => grupo.horario[diaDestino][h] !== null);
                let ultimo = -1;
                for(let i=base.length-1; i>=0; i--) { if(grupo.horario[diaDestino][base[i]]!==null) {ultimo=i; break;} }

                if(primero !== -1 && ultimo !== -1) {
                    for(let i=primero+1; i<ultimo; i++) {
                        let hHueco = base[i];
                        if(grupo.horario[diaDestino][hHueco] === null) {
                            if(intentarTraerBordeAHueco(grupo, diaDestino, hHueco)) movidoAlgoritmo = true;
                        }
                    }
                }
            });
        });

        // Ceder al navegador cada ~500 ms para que la barra de progreso se mueva
        const ahora = Date.now();
        if (ahora - lastYield >= 500) {
            if (progFn) {
                const segsRestantes = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                progFn(segsRestantes);
            }
            await cederControlUI();
            lastYield = Date.now();
        }
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// Snapshot global: usadas por ejecutarAlgoritmoFinal, ejecutarAG e
// intentarReestructuracionCruzada (que puede llamarse desde cualquiera de los dos)
// ─────────────────────────────────────────────────────────────────────────────

/** Captura el estado completo del horario en memoria.
 *  Incluye g.bloques y bloque.duracion para que restaurarSnapshot
 *  revierta correctamente los cambios estructurales de reconfigurarSesiones. */
function tomarSnapshot() {
    const s = { grupos: new Map(), docentes: new Map(), bloques: new Map() };
    MAPA_GRUPOS.forEach((g, gn) => {
        const gS = { horario: {}, sesionesDia: {}, bloques: [...g.bloques] };
        diasSemana.forEach(d => {
            gS.horario[d] = {};
            g.baseHoras.forEach(h => { gS.horario[d][h] = g.horario[d][h]; });
            gS.sesionesDia[d] = Object.assign({}, g.sesionesDia[d]);
        });
        s.grupos.set(gn, gS);
    });
    MAPA_DOCENTES.forEach((d, dn) => {
        const dS = { asignado: {}, diasActivos: new Set(d.diasActivos) };
        diasSemana.forEach(dia => { dS.asignado[dia] = Object.assign({}, d.asignado[dia]); });
        s.docentes.set(dn, dS);
    });
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        s.bloques.set(b, {
            preAsignado:     b.preAsignado,
            nombreStrRender: b.nombreStrRender,
            duracion:        b.duracion        // ← captura la duración actual
        });
    }));
    return s;
}

/** Restaura el estado capturado por tomarSnapshot().
 *  Restaura también g.bloques y bloque.duracion para deshacer
 *  los cambios estructurales de reconfigurarSesiones. */
function restaurarSnapshot(snap) {
    MAPA_GRUPOS.forEach((g, gn) => {
        const gS = snap.grupos.get(gn);
        // Restaurar la lista de bloques del grupo (deshace adiciones/eliminaciones de reconf.)
        if (gS.bloques) g.bloques = [...gS.bloques];
        diasSemana.forEach(d => {
            g.baseHoras.forEach(h => { g.horario[d][h] = gS.horario[d][h]; });
            g.sesionesDia[d] = Object.assign({}, gS.sesionesDia[d]);
        });
    });
    MAPA_DOCENTES.forEach((d, dn) => {
        const dS = snap.docentes.get(dn);
        d.diasActivos = new Set(dS.diasActivos);
        diasSemana.forEach(dia => { d.asignado[dia] = Object.assign({}, dS.asignado[dia]); });
    });
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        const bS = snap.bloques.get(b);
        if (!bS) return; // bloque nuevo no existía cuando se tomó el snapshot
        if (bS.preAsignado     !== undefined) b.preAsignado     = bS.preAsignado;
        else delete b.preAsignado;
        if (bS.nombreStrRender !== undefined) b.nombreStrRender = bS.nombreStrRender;
        else delete b.nombreStrRender;
        if (bS.duracion        !== undefined) b.duracion        = bS.duracion; // ← restaura duración
    }));
}

// ─────────────────────────────────────────────────────────────────────────────
// RECONFIGURACIÓN DE SESIONES
// Cuando una materia no puede colocarse con su partición original (p.ej. [2,2,2,1]
// para 7 h necesita 4 días distintos pero el docente solo tiene 3 disponibles),
// se prueban particiones alternativas con MENOS bloques (p.ej. [3,2,2] → 3 días).
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Genera todas las particiones no-crecientes de totalHoras en bloques ≤ maxDur,
 * ordenadas por número de bloques ascendente (menos bloques = menos días).
 */
function generarSplits(totalHoras, maxDur = 3) {
    const resultado = [];
    function bt(restantes, limSup, actual) {
        if (restantes === 0) { resultado.push([...actual]); return; }
        for (let d = Math.min(limSup, restantes); d >= 1; d--) {
            actual.push(d);
            bt(restantes - d, d, actual);
            actual.pop();
        }
    }
    bt(totalHoras, maxDur, []);
    // Menos bloques primero; ante igual count, bloque mayor primero
    resultado.sort((a, b) => a.length - b.length || b[0] - a[0]);
    return resultado;
}

/**
 * Captura la estructura de bloques (arrays g.bloques + duraciones b.duracion).
 * Complementa tomarSnapshot(), que solo guarda el estado del horario.
 */
function tomarSnapshotEstructura() {
    const snap = new Map();
    MAPA_GRUPOS.forEach((g, gn) => {
        const duraciones = new Map();
        g.bloques.forEach(b => duraciones.set(b, b.duracion));
        snap.set(gn, { bloques: [...g.bloques], duraciones });
    });
    return snap;
}

/**
 * Restaura la estructura capturada por tomarSnapshotEstructura().
 * Debe llamarse ANTES de restaurarSnapshot() para que los arrays g.bloques
 * estén en orden al iterar el snapshot de horario.
 */
function restaurarSnapshotEstructura(snap) {
    MAPA_GRUPOS.forEach((g, gn) => {
        const s = snap.get(gn);
        g.bloques = [...s.bloques];
        s.duraciones.forEach((dur, b) => { b.duracion = dur; });
    });
}

/**
 * Intenta reducir el número de bloques de materias con docentes que no tienen
 * suficientes días disponibles para la partición actual.
 *
 * Ejemplo: materia de 7 h → [2,2,2,1] necesita 4 días; si el docente solo
 * tiene 3 días disponibles se prueba [3,2,2] (3 bloques, 3 días).
 *
 * @param {Array}    bloquesFallidos  Bloques sin colocar
 * @param {Function} progFn          Callback opcional de progreso (pct 0-100, msg)
 * @returns {Array}  Bloques que siguen sin colocarse tras la reconfiguración
 */
async function reconfigurarSesiones(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    // Construir mapa de combos únicos (docente · materia · grupo)
    const combos = new Map();
    bloquesFallidos.forEach(b => {
        const key = `${b.docente.nombre_docente}|${b.materia.nombre_materia}|${b.grupo.nombre_grupo}`;
        if (!combos.has(key))
            combos.set(key, { docente: b.docente, materia: b.materia, grupo: b.grupo });
    });

    let fallidos = [...bloquesFallidos];
    let progI = 0;
    const progTotal = combos.size;

    for (const [, { docente, materia, grupo }] of combos) {
        progI++;

        // Todos los bloques de este combo en el grupo (colocados + fallidos)
        const todosLosBloques = grupo.bloques.filter(
            b => b.docente === docente && b.materia === materia
        );
        if (todosLosBloques.length === 0) continue;

        // Inglés siempre en bloques de 1 h y sincronizado — no reconfigurar
        if (todosLosBloques.some(b => esIngles(b))) continue;

        const totalHoras     = todosLosBloques.reduce((s, b) => s + b.duracion, 0);
        const numBloqueActual = todosLosBloques.length;

        // Días donde el docente tiene al menos 1 slot válido en el horario del grupo
        const diasDisponibles = diasSemana.filter(dia =>
            grupo.baseHoras.some(h => docente.disponibilidad[dia].has(h))
        ).length;

        // Para PAs, el límite real es min(días con disponibilidad, maxDias institucional)
        const diasEfectivos = docente.tipo_docente === 2
            ? Math.min(diasDisponibles, docente.maxDias)
            : diasDisponibles;

        if (diasEfectivos === 0) continue;

        // ── Candidatos: splits distintos al actual que quepan en los días efectivos ──
        //
        // Se prueban DOS direcciones:
        //  • Dirección 1 (FUSIÓN):   menos bloques → menos días requeridos
        //    Ej: [2,2,2,1] → [3,2,2] cuando el docente solo tiene 3 días disponibles.
        //  • Dirección 2 (DIVISIÓN): más bloques de menor tamaño → menos horas consecutivas
        //    Ej: [2] → [1,1]   (no caben 2h seguidas, sí 1h aislada)
        //        [2,2] → [2,1,1] (solo 1 día con 2h seguidas)
        //
        // Restricción: nBloques ≤ diasEfectivos (un bloque por día como máximo).

        const currentSplitStr = [...todosLosBloques.map(b => b.duracion)]
            .sort((a, b) => b - a).toString();

        const splits = generarSplits(totalHoras, 3);
        const splitsCandidatos = splits.filter(s => {
            if ([...s].sort((a, b) => b - a).toString() === currentSplitStr) return false;
            return s.length <= diasEfectivos;
        });

        // Ordenar: menos bloques primero (menos presión de días); ante igual count,
        // max bloque menor primero (menos presión de horas consecutivas).
        splitsCandidatos.sort((a, b) => {
            if (a.length !== b.length) return a.length - b.length;
            const mA = Math.max(...a), mB = Math.max(...b);
            if (mA !== mB) return mA - mB;
            return b[0] - a[0]; // primer bloque mayor primero (más difícil → intenta antes)
        });

        if (splitsCandidatos.length === 0) continue;

        // Capturar estado antes de cualquier cambio (estructura + horario)
        const snapEst = tomarSnapshotEstructura();
        const snapSch = tomarSnapshot();

        let exito = false;

        for (const nuevoSplit of splitsCandidatos) {
            if (progFn) {
                progFn(
                    Math.round((progI / progTotal) * 100),
                    `🔀 Reconf. ${progI}/${progTotal}: ` +
                    `${materia.nombre_materia} (${grupo.nombre_grupo}) ` +
                    `[${nuevoSplit.join(',')}]`
                );
                await cederControlUI();
            }

            // Restaurar estado limpio (deshace el intento anterior si falló)
            restaurarSnapshotEstructura(snapEst);
            restaurarSnapshot(snapSch);

            // Re-obtener bloques desde la estructura restaurada
            const bloques = grupo.bloques.filter(
                b => b.docente === docente && b.materia === materia
            );

            // 1. Desasignar todos los bloques del combo (con duracion original)
            bloques.forEach(b => {
                const pos = encontrarPosicionBloque(b);
                if (pos) quitarAsignacion(grupo, b, pos.dia, pos.hInicio);
            });

            // 2. Ajustar estructura según el nuevo split
            const ordenados = [...bloques].sort((a, b) => b.duracion - a.duracion);
            const nKeep = Math.min(nuevoSplit.length, bloques.length);
            const bloquesMantener = ordenados.slice(0, nKeep);
            const bloquesEliminar = ordenados.slice(nKeep); // cuando split tiene MENOS bloques

            // Eliminar bloques sobrantes de g.bloques
            bloquesEliminar.forEach(b => {
                const idx = grupo.bloques.indexOf(b);
                if (idx >= 0) grupo.bloques.splice(idx, 1);
            });

            // Crear bloques nuevos cuando el split tiene MÁS bloques que antes
            // (Ej: [2] → [1,1]  necesita 1 nuevo bloque)
            const bloquesNuevos = [];
            const nNew = Math.max(0, nuevoSplit.length - bloques.length);
            for (let i = 0; i < nNew; i++) {
                const nb = {
                    materia, docente, grupo,
                    duracion: 1,  // se actualizará abajo
                    nombreStr: `${materia.nombre_materia} (${docente.nombre_docente})`
                };
                grupo.bloques.push(nb);
                bloquesNuevos.push(nb);
            }

            // 3. Asignar nuevas duraciones — los más grandes a los bloques "más capaces"
            const splitOrdenado = [...nuevoSplit].sort((a, b) => b - a);
            const todosColocar  = [...bloquesMantener, ...bloquesNuevos];
            todosColocar.forEach((b, i) => { b.duracion = splitOrdenado[i]; });

            // 4. Intentar colocar todos (mayor duracion → menor)
            // Arsenal completo: incluye swap multi-docente para liberar horas
            // consecutivas ocupadas por otros docentes en el mismo grupo.
            let todosColocados = true;
            for (const b of todosColocar) {
                const ok =
                    intentarAsignar(b, false, false, false, false) ||
                    intentarAsignar(b, false, true,  false, false) ||
                    intentarSwapDeHorarios(b, [])                  ||
                    intentarCadenaSwap(b)                          ||
                    intentarReestructuracionCruzada(b)             ||
                    intentarCadenaSwap(b, 2, new Set([b]))         ||
                    intentarCadenaAumentanteGlobal(b)              ||
                    intentarSwapCadenaMultiDocente(b);             // libera slots ocupados por otros docentes
                if (!ok) { todosColocados = false; break; }
            }

            if (todosColocados) {
                exito = true;
                // Quitar del listado de fallidos todos los bloques originales del combo
                // (los bloques nuevos nunca estuvieron en fallidos)
                fallidos = fallidos.filter(b =>
                    !(b.docente === docente && b.materia === materia && b.grupo === grupo)
                );
                break;
            }
            // Si falló con este split, la próxima iteración restaurará el estado limpio
        }

        if (!exito) {
            // Ningún split funcionó → restaurar estado original
            restaurarSnapshotEstructura(snapEst);
            restaurarSnapshot(snapSch);
        }
    }

    return fallidos;
}

/**
 * Swap encadenado multi-docente (mismo grupo).
 *
 * Resuelve el caso en que el docente ESTÁ LIBRE en el slot (disponibilidad OK,
 * no está ocupado en otro grupo), pero el GRUPO tiene ese slot ocupado por
 * bloques de OTROS docentes que necesitan ser desplazados.
 *
 * Ejemplo: B(T1) necesita (G, Lun 8h-9h).
 *   T1 está libre → OK.
 *   Pero (G, Lun 8h) tiene B2(T2) y (G, Lun 9h) tiene B3(T3).
 *   → Quita B2 y B3, coloca B(T1), y reubica B2/B3 con el arsenal completo.
 *   → Si no caben, rollback.
 *   → La recursión permite cadenas: B3 puede necesitar desplazar B4 para caber.
 *
 * Complementa a paseForzadoCruzado (que maneja "docente ocupado en otro grupo").
 *
 * @param {object} bloquePendiente  Bloque sin colocar
 * @param {Set}    visitados        Bloques en proceso (anti-ciclos)
 * @param {number} profMax          Niveles de recursión permitidos
 */
function intentarSwapCadenaMultiDocente(bloquePendiente, visitados = new Set(), profMax = 4) {
    if (visitados.has(bloquePendiente) || profMax <= 0) return false;

    const misVis = new Set(visitados);
    misVis.add(bloquePendiente);

    const g   = bloquePendiente.grupo;
    const d   = bloquePendiente.docente;
    const dur = bloquePendiente.duracion;

    for (const dia of diasSemana) {
        // Regla sesión doble
        if ((g.sesionesDia[dia][bloquePendiente.materia.nombre_materia] || 0) >= 1) continue;
        // PA: no abrir día nuevo si ya está en maxDias
        if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
            d.diasActivos.size >= d.maxDias) continue;

        for (let idx = 0; idx <= g.baseHoras.length - dur; idx++) {
            const h = g.baseHoras[idx];

            // El docente pendiente debe estar DISPONIBLE Y LIBRE (no en otro grupo)
            let dpOk = true;
            for (let o = 0; o < dur; o++) {
                if (!d.disponibilidad[dia].has(h + o) || d.asignado[dia][h + o]) {
                    dpOk = false; break;
                }
            }
            if (!dpOk) continue;

            // Recoger los obstáculos del grupo (bloques de OTROS docentes en esas horas)
            const obstaculos = new Map(); // bloque → posición
            let slotValido = true;
            for (let o = 0; o < dur; o++) {
                const ex = g.horario[dia][h + o];
                if (!ex) continue;
                if (ex.preAsignado || misVis.has(ex)) { slotValido = false; break; }
                if (!obstaculos.has(ex)) {
                    const pos = encontrarPosicionBloque(ex);
                    if (!pos) { slotValido = false; break; }
                    obstaculos.set(ex, pos);
                }
            }
            // Si no hay obstáculos el slot ya es libre → otros algoritmos lo habrían resuelto
            if (!slotValido || obstaculos.size === 0) continue;

            const snap = tomarSnapshot();

            // Quitar todos los obstáculos
            for (const [obs, pos] of obstaculos) {
                quitarAsignacion(g, obs, pos.dia, pos.hInicio);
            }

            // Colocar el bloque pendiente (docente está libre, slot ahora vacío)
            const pendOk =
                intentarAsignar(bloquePendiente, false, false, false, false) ||
                intentarAsignar(bloquePendiente, false, true,  false, false);

            if (!pendOk) { restaurarSnapshot(snap); continue; }

            // Reubicar cada obstáculo con el arsenal completo + recursión
            let todosOk = true;
            for (const [obs] of obstaculos) {
                const ok =
                    intentarAsignar(obs, false, false, false, false) ||
                    intentarAsignar(obs, false, true,  false, false) ||
                    intentarSwapDeHorarios(obs, [])                  ||
                    intentarCadenaSwap(obs)                          ||
                    intentarReestructuracionCruzada(obs, 2)          ||
                    intentarCadenaSwap(obs, 2, new Set([obs]))        ||
                    intentarCadenaAumentanteGlobal(obs, 400)         ||
                    intentarSwapCadenaMultiDocente(obs, misVis, profMax - 1); // recursión
                if (!ok) { todosOk = false; break; }
            }

            if (todosOk) return true;
            restaurarSnapshot(snap);
        }
    }
    return false;
}

/**
 * Pase de desbloqueo forzado cruzado.
 *
 * Atiende el caso "🟡 Docente disponible pero ocupado en otro grupo":
 * el grupo tiene huecos libres, el docente tiene disponibilidad allí,
 * pero ya está asignado en otro(s) grupo(s) en esos slots.
 *
 * Estrategia en dos fases:
 *   1. Rápida: mayor profundidad (profMax=4) en reestructuración cruzada
 *      + más nodos BFS (800) para encontrar cadenas más largas.
 *   2. Multi-obstáculo: para cada slot candidato quita TODOS los bloques
 *      que bloquean al docente (pueden estar en varios grupos distintos),
 *      coloca el bloque pendiente y reubica cada bloqueante con el arsenal
 *      completo. Si algún bloqueante no cabe, hace rollback y prueba el
 *      siguiente slot.
 *
 * Se itera hasta 3 veces (los reintegros de una vuelta abren oportunidades
 * para otros bloques en la siguiente).
 */
async function paseForzadoCruzado(bloquesFallidos, progFn = null, maxIter = 3) {
    if (bloquesFallidos.length === 0) return [];

    let restantes = [...bloquesFallidos];
    let cambio    = true;
    let iter      = 0;
    const MAX_ITER = maxIter;

    while (cambio && iter < MAX_ITER && restantes.length > 0) {
        cambio = false;
        iter++;

        for (let i = restantes.length - 1; i >= 0; i--) {
            const b = restantes[i];

            if (progFn) {
                progFn(
                    Math.round((iter / MAX_ITER) * 100),
                    `⚡ Desbloqueo cruzado [${iter}/${MAX_ITER}]: ` +
                    `${b.materia.nombre_materia} (${b.grupo.nombre_grupo})`
                );
                await cederControlUI();
            }

            // ── Fase 1: mayor profundidad / más nodos BFS + multi-docente ────
            if (intentarReestructuracionCruzada(b, 4)  ||
                intentarCadenaAumentanteGlobal(b, 800) ||
                intentarSwapCadenaMultiDocente(b)) {
                restantes.splice(i, 1);
                cambio = true;
                continue;
            }

            // ── Fase 2: multi-obstáculo ──────────────────────────────────────
            const g = b.grupo, d = b.docente, dur = b.duracion;
            let colocado = false;

            slotLoop:
            for (const dia of diasSemana) {
                // No doblar sesión de la misma materia
                if ((g.sesionesDia[dia][b.materia.nombre_materia] || 0) >= 1) continue;
                // PA: no abrir día nuevo si ya está en maxDias
                if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
                    d.diasActivos.size >= d.maxDias) continue;

                for (let idx = 0; idx <= g.baseHoras.length - dur; idx++) {
                    const h = g.baseHoras[idx];

                    // El grupo debe tener el slot libre
                    let grupoLibre = true;
                    for (let o = 0; o < dur; o++) {
                        if (g.horario[dia][h + o] !== null) { grupoLibre = false; break; }
                    }
                    if (!grupoLibre) continue;

                    // El docente debe tener disponibilidad aquí
                    let dispOk = true;
                    for (let o = 0; o < dur; o++) {
                        if (!d.disponibilidad[dia].has(h + o)) { dispOk = false; break; }
                    }
                    if (!dispOk) continue;

                    // El docente debe estar ocupado aquí (si estuviese libre, los pasos
                    // anteriores ya lo habrían colocado)
                    let docOcupado = false;
                    for (let o = 0; o < dur; o++) {
                        if (d.asignado[dia][h + o]) { docOcupado = true; break; }
                    }
                    if (!docOcupado) continue;

                    // Recoger TODOS los bloques del docente en otros grupos que bloquean este slot
                    const bloqueantes = new Map(); // bloque → posición {dia, hInicio}
                    for (let o = 0; o < dur; o++) {
                        if (!d.asignado[dia][h + o]) continue;
                        for (const [, g2] of MAPA_GRUPOS) {
                            if (g2 === g) continue;
                            const ex = g2.horario[dia][h + o];
                            if (ex && ex.docente === d && !bloqueantes.has(ex)) {
                                const pos = encontrarPosicionBloque(ex);
                                if (pos && !ex.preAsignado) bloqueantes.set(ex, pos);
                            }
                        }
                    }

                    if (bloqueantes.size === 0) continue; // ya libre → casos anteriores lo habrían resuelto
                    if ([...bloqueantes.keys()].some(bk => bk.preAsignado)) continue; // no mover pre-asignados

                    const snap = tomarSnapshot();

                    // Quitar todos los bloqueantes de sus posiciones actuales
                    for (const [bk, pos] of bloqueantes) {
                        quitarAsignacion(bk.grupo, bk, pos.dia, pos.hInicio);
                    }

                    // Colocar el bloque pendiente (docente ya libre en ese slot)
                    const pendOk =
                        intentarAsignar(b, false, false, false, false) ||
                        intentarAsignar(b, false, true,  false, false);

                    if (!pendOk) { restaurarSnapshot(snap); continue; }

                    // Reubicar cada bloqueante con el arsenal completo
                    // (incluye intentarSwapCadenaMultiDocente para el caso en que el
                    //  destino del bloqueante tiene a su vez obstáculos de mismo grupo)
                    let todosOk = true;
                    for (const [bk] of bloqueantes) {
                        const ok =
                            intentarAsignar(bk, false, false, false, false)  ||
                            intentarAsignar(bk, false, true,  false, false)  ||
                            intentarSwapDeHorarios(bk, [])                   ||
                            intentarCadenaSwap(bk)                           ||
                            intentarReestructuracionCruzada(bk, 3)           ||
                            intentarCadenaSwap(bk, 2, new Set([bk]))          ||
                            intentarCadenaAumentanteGlobal(bk, 600)          ||
                            intentarSwapCadenaMultiDocente(bk);
                        if (!ok) { todosOk = false; break; }
                    }

                    if (todosOk) { colocado = true; break slotLoop; }
                    restaurarSnapshot(snap);
                }
            }

            // ── Fase 3: swap multi-docente en mismo grupo ────────────────────────
            // Caso: docente libre (no está en otro grupo), pero el slot del
            // grupo está ocupado por bloques de OTROS docentes que hay que mover.
            if (!colocado) colocado = intentarSwapCadenaMultiDocente(b);

            if (colocado) { restantes.splice(i, 1); cambio = true; }
        }
    }

    return restantes;
}

/**
 * ─── SOLVER EXACTO (Backtracking con MCV + Forward-Checking) ─────────────────
 *
 * Cuando quedan ≤12 bloques sin ubicar, el subproblema es pequeño y se puede
 * resolver con backtracking exhaustivo: prueba todas las combinaciones posibles
 * de (bloque → slot) respetando restricciones duras, y conserva la mejor
 * solución parcial encontrada dentro del límite de tiempo.
 *
 * Usa MCV (Minimum Constraining Variable): en cada nodo elige el bloque con
 * MENOS slots válidos disponibles, maximizando la poda.
 */
async function solverExacto(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];
    if (bloquesFallidos.length > 12) return bloquesFallidos;

    if (progFn) {
        progFn(Math.round(tiempoLimiteMs / 1000),
            `🔬 Solver exacto — ${bloquesFallidos.length} bloques · buscando óptimo...`);
        await cederControlUI();
    }

    const endTime = Date.now() + tiempoLimiteMs;
    let mejorN    = 0;
    let mejorSnap = tomarSnapshot();
    let nodos     = 0;

    function slotsValidos(b) {
        const g = b.grupo, d = b.docente, dur = b.duracion;
        const res = [];
        for (const dia of diasSemana) {
            if (dia === 'sabado' && !d.disponibilidad.sabado.size) continue;
            if ((g.sesionesDia[dia][b.materia.nombre_materia] || 0) >= 1) continue;
            if (d.tipo_docente === 2 && !d.diasActivos.has(dia) &&
                d.diasActivos.size >= d.maxDias) continue;
            for (let i = 0; i <= g.baseHoras.length - dur; i++) {
                const h = g.baseHoras[i];
                let ok = true;
                for (let o = 0; o < dur && ok; o++) {
                    if (g.horario[dia][h + o] !== null)       ok = false;
                    if (d.asignado[dia][h + o])               ok = false;
                    if (!d.disponibilidad[dia].has(h + o))    ok = false;
                }
                if (ok) res.push({ dia, hInicio: h });
            }
        }
        return res;
    }

    function bt(restantes, n) {
        nodos++;
        if (Date.now() >= endTime) return;
        if (n > mejorN) { mejorN = n; mejorSnap = tomarSnapshot(); }
