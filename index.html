<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From schedule</title>
    <link rel="icon" type="image/svg+xml" href="./assets/Schedule FI BLACK.svg">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');
        :root{
            --color-yellow: #FCB814;
            --color-black: #221F20;
            --color-ghost-white: #F3F7FF;
            --color-cerulean: #3D7B93;
            --color-dim-gray: #636466;
            --color-tomato: #F26649;
            --color-celadon: #81C99C;
            --color-gray-olive: #939598;
            --color-soft-periwinkle: #8781BD;
            --font-roboto-mono: "Roboto Mono", monospace;
            --font-size-lg : 10rem;
            --font-size-md : 5rem;
            --font-size-sm : 2rem;
            --font-size-xsm : 1rem;
            /* ── Sistema neo-brutalista (geometría) ── */
            --radius: 0;
            --borde-fuerte: 3px solid var(--color-black);   /* contenedores, inputs, botones grandes */
            --borde-medio:  2px solid var(--color-black);   /* botones chicos, badges */
            --borde-fino:   1px solid var(--color-black);   /* divisores de tabla */
            --sombra-lg: 6px 6px 0 0 var(--color-gray-olive); /* botones/contenedores grandes */
            --sombra-sm: 3px 3px 0 0 var(--color-black);      /* botones/elementos chicos */
        }
        body{
            width: 100%;
            min-height: 100dvh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        header{
            width: 100%;
            height: 7dvh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: var(--color-yellow);
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        header nav{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem 0 2rem;
            margin: 0;
            box-sizing: border-box;
        }

        header nav ul{
            width: auto;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-direction: row;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        header nav ul a{
            text-decoration: none;
            width: 5dvw;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--font-size-xsm);
            color: var(--color-black);
            font-family: var(--font-roboto-mono);
            font-weight: bolder;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        header nav ul:last-child a:first-child{
            width: 5dvw;
            height: 100%;
            box-shadow: inset 0 -5px 0 0 var(--color-black);
            background-color: transparent;
        }

        header nav ul:last-child a:last-child{
            width: 5dvw;
            height: 100%;
            
        }

        header nav ul a:nth-child(2){
            width: auto;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0 0 0 2rem;
        }

        header a img{
            width: auto;
            height: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main{
            width: 100%;
            height: 93dvh;
            display: grid;
            grid-template-rows: repeat(10, 1fr);
            grid-template-columns: repeat(13, 1fr);
            background-color: var(--color-ghost-white);
            padding: 0;
            margin: 0;
        }

        /* Se activa por JS cuando el contenido de #span_error desborda */
        main.error-expandido {
            height: auto;
            grid-template-rows: repeat(7, 9.3dvh) 37dvh 37dvh 9.3dvh;
        }

        main img{
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-area: 2/2/3/7;
        }

        main button{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-yellow);
            text-decoration: none;
            font-family: var(--font-roboto-mono);
            font-size: var(--font-size-sm);
            color: var(--color-black);
            font-weight: bold;
            border-radius: 1rem;
            border: 0px;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }


        main button:hover{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-black);
            font-family: var(--font-roboto-mono);
            font-size: var(--font-size-sm);
            color: var(--color-yellow);
            font-weight: bold;
            border-radius: 1rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }

        main input{
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            position: absolute;
            z-index: -1;
        }

        main label{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-yellow);
            font-family: var(--font-roboto-mono);
            font-size: var(--font-size-sm);
            color: var(--color-black);
            text-align: center;
            font-weight: bold;
            border-radius: 1rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }

        main label span{
            font-size: var(--font-size-sm);
            font-weight: bold;
        }

        main label:hover{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-black);
            font-family: var(--font-roboto-mono);
            font-size: var(--font-size-sm);
            color: var(--color-yellow);
            text-align: center;
            font-weight: bold;
            border-radius: 1rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }

        main label:hover span{
            font-size: var(--font-size-sm);
            font-weight: bold;
        }

        .label_carga{ grid-area: 5/2/7/5; }
        .label_disp{ grid-area: 5/6/7/9; }

        .button_accion{
            grid-area: 5/10/7/13;
        }

        #button_reset_aprendizaje{
            grid-area: 7/10/8/13;
            font-size: 0.75rem;
            background-color: var(--color-dim-gray);
            color: white;
        }
        #button_reset_aprendizaje:hover{
            background-color: var(--color-tomato);
            color: white;
        }

        .span_error{
            width: 100%;
            height: 100%;
            grid-area: 8/2/10/13;
            font-size: 1.2rem;
            color: var(--color-black);
            font-weight: bold;

            background-color: #ffffff;
            border: 2px solid var(--color-tomato);
            border-radius: 1rem;
            padding: 1rem;
            box-sizing: border-box;

            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
            display: block;
        }

        /* ── Sección desglose docente·materia·horas ── */
        #seccion_desglose {
            display: none;
            width: 100%;
            background: var(--color-ghost-white);
            padding: 2rem 3rem 3rem;
            box-sizing: border-box;
        }

        #seccion_desglose h2 {
            font-family: var(--font-roboto-mono);
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--color-black);
            margin: 0 0 1.5rem 0;
            padding-bottom: 0.6rem;
            border-bottom: 3px solid var(--color-yellow);
        }

        .desglose-tabla {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-roboto-mono);
            font-size: 0.85rem;
        }

        .desglose-tabla thead th {
            background: var(--color-black);
            color: var(--color-yellow);
            padding: 0.55rem 1rem;
            text-align: left;
            position: sticky;
            top: 0;
        }

        .desglose-tabla thead th:last-child { text-align: right; }

        .desglose-tabla tr.doc-header td {
            background: var(--color-yellow);
            color: var(--color-black);
            font-weight: bold;
            padding: 0.45rem 1rem;
            font-size: 0.9rem;
        }

        .desglose-tabla tr.asig-row td {
            padding: 0.3rem 1rem;
            border-bottom: 1px solid #e0e0e0;
            color: var(--color-dim-gray);
        }

        .desglose-tabla tr.asig-row:last-child td { border-bottom: none; }
        .desglose-tabla tr.asig-row:hover td { background: #fffbe8; color: var(--color-black); }

        .desglose-tabla .col-hrs {
            text-align: right;
            font-weight: bold;
            color: var(--color-black);
        }

        .badge-cat {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            margin-left: 0.6rem;
            font-weight: bold;
            vertical-align: middle;
        }
        .badge-ptc { background: var(--color-cerulean);  color: #fff; }
        .badge-pa  { background: var(--color-soft-periwinkle); color: #fff; }

        /* ── Sección de horarios visuales ── */
        #seccion_horarios {
            display: none;
            width: 100%;
            background: var(--color-ghost-white);
            padding: 2rem 3rem 3rem;
            box-sizing: border-box;
            border-top: 3px solid var(--color-yellow);
        }
        #seccion_horarios h2 {
            font-family: var(--font-roboto-mono);
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--color-black);
            margin: 0 0 1.2rem 0;
            padding-bottom: 0.6rem;
            border-bottom: 3px solid var(--color-yellow);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .badge-en-curso {
            display: none;
            background: var(--color-tomato);
            color: #fff;
            font-family: var(--font-roboto-mono);
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 0.3rem;
            animation: parpadeo 0.9s infinite;
        }
        @keyframes parpadeo { 0%,100%{opacity:1} 50%{opacity:.3} }
        .horario-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }
        .horario-tab {
            font-family: var(--font-roboto-mono);
            font-size: 0.72rem;
            font-weight: bold;
            padding: 0.3rem 0.75rem;
            border: 2px solid var(--color-black);
            background: transparent;
            cursor: pointer;
            border-radius: 0.3rem;
            color: var(--color-black);
            transition: background 0.15s, color 0.15s;
        }
        .horario-tab:hover, .horario-tab.activo {
            background: var(--color-black);
            color: var(--color-yellow);
        }
        .horario-tabla-wrap { overflow-x: auto; }
        .horario-tabla {
            border-collapse: collapse;
            font-family: var(--font-roboto-mono);
            font-size: 0.7rem;
            width: 100%;
            min-width: 560px;
        }
        .horario-tabla th {
            background: var(--color-black);
            color: var(--color-yellow);
            padding: 0.45rem 0.5rem;
            text-align: center;
            font-weight: bold;
            white-space: nowrap;
        }
        .horario-tabla td.hora-label {
            background: var(--color-black);
            color: var(--color-yellow);
            padding: 0.4rem 0.6rem;
            text-align: center;
            font-weight: bold;
            white-space: nowrap;
            min-width: 52px;
        }
        .horario-tabla td.h-celda {
            border: 1px solid #d8d8d8;
            padding: 0.25rem 0.35rem;
            text-align: center;
            vertical-align: middle;
            height: 3.2rem;
            min-width: 95px;
            transition: background-color 0.25s;
        }
        .horario-tabla td.h-libre { background: #f4f4f4; }
        .h-mat {
            font-weight: bold;
            font-size: 0.65rem;
            line-height: 1.25;
            display: block;
        }
        .h-doc {
            font-size: 0.58rem;
            opacity: 0.75;
            display: block;
            margin-top: 0.1rem;
        }

        /* ── Inventario de clases del grupo ── */
        .inventario-wrap {
            margin-top: 1.2rem;
            font-family: var(--font-roboto-mono);
            font-size: 0.72rem;
        }
        .inv-cabecera {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .inv-titulo {
            font-size: 0.78rem;
            font-weight: bold;
            color: var(--color-dim-gray);
        }
        .inv-total-barra-wrap {
            flex: 1;
            height: 7px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .inv-total-barra-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--color-celadon);
            transition: width 0.3s ease;
        }
        .inv-total-pct {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--color-cerulean);
            white-space: nowrap;
        }
        .inventario-tabla {
            width: 100%;
            border-collapse: collapse;
        }
        .inventario-tabla thead th {
            background: var(--color-black);
            color: var(--color-yellow);
            padding: 0.28rem 0.5rem;
            text-align: left;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .inventario-tabla tbody td {
            padding: 0.22rem 0.5rem;
            border-bottom: 1px solid #ebebeb;
            vertical-align: middle;
        }
        .inventario-tabla tr.inv-completo td { background: #e8f5e9; }
        .inventario-tabla tr.inv-vacio    td { background: #fff8e1; }
        .inventario-tabla tr.inv-parcial  td { background: #fff; }
        .inv-swatch {
            display: inline-block;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.15);
            vertical-align: middle;
            flex-shrink: 0;
        }
        .inv-barra-wrap {
            width: 70px;
            height: 7px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.35rem;
        }
        .inv-barra-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .inv-horas {
            font-weight: bold;
            font-size: 0.7rem;
        }
        .inv-estado {
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 2.2rem;
            display: inline-block;
            text-align: right;
        }

        footer{
            width: 100%;
            height: 40dvh;
            display: grid;
            grid-template-rows: repeat(10, 1fr);
            grid-template-columns: repeat(26, 1fr);
            background-color: var(--color-black);

            box-sizing: border-box;
        }

        footer img.img_logo_FI{
            width: auto;
            height: 4dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-area: 9/2/10/4;
        }

        footer a.a_instagram{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-area: 9/25/10/26;
        }

        footer a.a_mail{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-area: 9/24/10/25;
        }

        footer a img{
            width: 2rem;
            height: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        footer a.a_que_es{
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            grid-area: 2/2/4/5;
            text-decoration: none;
            font-size: var(--font-size-xsm);
            font-family: var(--font-roboto-mono);
            color: var(--color-ghost-white);
        }

        /* ── Layout en dos columnas: controles a la IZQUIERDA, info/resultados a la DERECHA ── */
        .app-layout {
            display: flex;
            gap: 1.4rem;
            align-items: flex-start;
            width: 100%;
            flex: 1 1 auto;
            min-height: calc(100dvh - 56px); /* llena el viewport bajo el header; el footer queda abajo */
            box-sizing: border-box;
            padding: 1.2rem 1.5rem;
            background-color: var(--color-ghost-white);
        }
        main {
            display: flex !important;
            flex-direction: column;
            gap: 0.85rem;
            width: auto;
            height: auto !important;
            flex: 0 0 250px;
            position: sticky;
            top: calc(7dvh + 0.8rem); /* pega DEBAJO del header (7dvh), no encima */
            padding: 0;
            margin: 0;
        }
        main > .label_carga,
        main > .label_disp,
        main > .button_accion,
        main > button {
            width: 100%;
            min-height: 3.4rem;
            grid-area: auto !important;
            margin: 0 !important;
        }
        .panel-info {
            flex: 1 1 auto;
            min-width: 0;
            align-self: stretch;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .panel-info > .span_error {
            width: 100%;
            /* Alto FIJO (no se expande con el contenido): siempre respeta su espacio y hace scroll dentro. */
            height: calc(100dvh - 7dvh - 2.4rem);
            overflow-y: auto;
            flex: 0 0 auto;
            grid-area: auto;
        }
        .panel-info > section { margin: 0; }
        @media (max-width: 860px) {
            .app-layout { flex-direction: column; }
            main { position: static; flex: 0 0 auto; width: 100%; }
        }

        /* ═══════════ SISTEMA NEO-BRUTALISTA · radius 0 · bordes duros · sombras sólidas ═══════════ */
        *, *::before, *::after { border-radius: 0 !important; }

        /* Botones grandes + labels de archivo (columna izquierda) */
        main .button_accion,
        main .label_carga,
        main .label_disp {
            border: var(--borde-fuerte);
            box-shadow: var(--sombra-lg);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform .06s ease, box-shadow .06s ease;
        }
        main .button_accion:hover,
        main .label_carga:hover,
        main .label_disp:hover {
            transform: translate(6px, 6px);     /* efecto "presionado" brutalista */
            box-shadow: 0 0 0 0 var(--color-gray-olive);
        }
        #button_reset_aprendizaje {
            border: var(--borde-medio) !important;
            box-shadow: var(--sombra-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Caja de info / estado: contenedor duro */
        .panel-info > .span_error {
            border: 3px solid var(--color-tomato) !important;
            box-shadow: 6px 6px 0 0 var(--color-black);
        }

        /* Títulos de módulo: jerarquía del spec (extra-bold, uppercase, tracking) */
        #seccion_desglose h2,
        #seccion_horarios h2 {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        /* Badges: cuadrados, borde negro, uppercase */
        .badge-cat, .badge-en-curso {
            border: var(--borde-medio);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        /* Tabla de desglose: borde exterior duro + divisores negros */
        .desglose-tabla { border: var(--borde-fuerte); }
        .desglose-tabla tr.asig-row td { border-bottom: var(--borde-fino) !important; }

        /* Caja de resultados CSP: sombra dura sólida */
        .csp-box { box-shadow: 4px 4px 0 0 var(--color-black) !important; }

        /* Paneles de info dentro de la caja (forzado/imposibles/expansión): listas COMPACTAS */
        #panel_forzado_disp, #panel_imposibles, #panel_expansion_dias { font-size: 0.78rem !important; line-height: 1.35; white-space: normal !important; }
        #panel_forzado_disp h3, #panel_imposibles h3, #panel_expansion_dias h3 { margin: 0 0 0.4rem !important; font-size: 0.9rem !important; }
        #panel_forzado_disp p, #panel_imposibles p, #panel_expansion_dias p { margin: 0 0 0.6rem !important; line-height: 1.4; }
        #panel_forzado_disp label, #panel_imposibles label, #panel_expansion_dias label { padding: 0.3rem 0 !important; gap: 0.5rem !important; }
        /* el contenido usa el ancho completo (no se encoge ni se envuelve en una columna angosta) */
        #panel_forzado_disp label > span, #panel_imposibles label > span, #panel_expansion_dias label > span { flex: 1 1 auto; min-width: 0; }

    </style>

</head>
<body>

    <header>
        <nav>
            <ul>
                <a href="index.html"><img src="assets/FI-LOGO-BRUTO-BLACK.svg" alt="LOGO"></a>
            </ul>
            <ul>
                <a href="./index.html">Generador</a>
                <a href="./manual.html">Manual</a>
            </ul>
        </nav>
        
    </header>

    <div class="app-layout">

        <main>
            <input class="input_excel" id="input_carga" type="file" accept=".xlsx,.xls">
            <label for="input_carga" class="label_carga">
                <span>Carga Académica</span>
            </label>
            <input class="input_excel" id="input_disp" type="file" accept=".xlsx,.xls">
            <label for="input_disp" class="label_disp">
                <span>Disponibilidades</span>
            </label>
            <button class="button_accion" id="button_accion">Generar horarios</button>
            <button class="button_accion" id="button_csp" title="Valida y resuelve con el solver de restricciones (beta)">Motor CSP (beta)</button>
            <button id="button_reset_aprendizaje" disabled style="opacity:0.4">Sin aprendizaje</button>
        </main>

        <div class="panel-info">
            <div class="span_error" id="span_error"></div>

            <section id="seccion_desglose">
                <h2>Desglose · Grupo &mdash; Materia &mdash; Horas</h2>
                <div id="desglose_contenido"></div>
            </section>

            <section id="seccion_horarios">
                <h2>
                    Horarios

    <script>
        // ── Detección de contexto: Worker vs hilo principal ──────────────────────
        const IS_WORKER = typeof document === 'undefined';

        const diasSemana = ["lunes", "martes", "miercoles", "jueves", "viernes", "sabado"];
let MAPA_DOCENTES = new Map(), MAPA_GRUPOS = new Map(), PLANTILLAS_MATERIAS = [];
// Worker infrastructure (solo en hilo principal)
let _workerUrl = null; // URL del blob-worker (creado una vez)
let _wBArr     = [];   // bArr[_wi] → bloque del hilo principal (asignado en serializarProblema)
let LOG_CAMBIOS = [];
let wbCarga = null, wbDisp = null;
let AG_BLOQUES_SORTED = [];

// ── Aprendizaje entre ejecuciones ─────────────────────────────────────────────
let eliteOrden           = null;   // Array<bloque> — orden del mejor arranque greedy
let eliteFallosCount     = Infinity;
let sinMejoraConsecutiva = 0;
let _ultimoOrden         = [];     // escrito por construccionVorazCascada al terminar
const ELITE_EMPIEZA_EN   = 5;     // primer arranque donde se usa el élite
const ELITE_RESET_TRAS   = Infinity; // el élite nunca se resetea dentro de una ejecución
let freqMap              = new Map(); // EDA: bloque → Map<"dia|hora", count>
let freqTotalRuns        = 0;         // ejecuciones acumuladas en freqMap
let globalBestFallos     = Infinity;  // mejor resultado histórico (para filtrar acumulación)
const FREQ_BONUS         = 100000;   // bonus máximo para slot con freq = 1.0
const NEAR_BEST_TOL      = 1;        // acumular si fallos <= globalBest + esta tolerancia

// ── SharedArrayBuffer: disponibilidad como bitmasks (solo lectura, compartido con Workers) ──
// Layout Int32Array: [nDoc*6 bitmasks de disponibilidad] [nDoc maxDias] [nDoc tipo_docente]
// Disponible solo si el servidor envía COOP + COEP. Si no, _sabProblema queda null
// y los Workers usan el fallback JSON (dp arrays).
let _sabProblema = null;  // SharedArrayBuffer actual
const DIAS_IDX = Object.fromEntries(["lunes","martes","miercoles","jueves","viernes","sabado"].map((d,i)=>[d,i]));

/** Codifica disponibilidad de todos los docentes en un SharedArrayBuffer.
 *  Requiere que asignarIndicesWorker() haya asignado _wi a cada docente. */
function _crearSABProblema() {
    if (typeof SharedArrayBuffer === 'undefined') return;
    const nDoc = MAPA_DOCENTES.size;
    const sab  = new SharedArrayBuffer((nDoc * 6 + nDoc * 2) * 4);
    const v    = new Int32Array(sab);
    MAPA_DOCENTES.forEach(d => {
        diasSemana.forEach((dia, dIdx) => {
            let mask = 0;
            d.disponibilidad[dia].forEach(h => { if (h < 32) mask |= (1 << h); });
            v[d._wi * 6 + dIdx] = mask;
        });
        v[nDoc * 6 + d._wi]         = d.maxDias;
        v[nDoc * 6 + nDoc + d._wi]  = d.tipo_docente;
    });
    _sabProblema = sab;
}

/** Serializa el estado actual del horario en el hilo principal.
 *  Mismo formato que _serializar() en el Worker. Permite enviarlo a Workers como punto de partida. */
function _serializarEstadoActual(fallos = []) {
    const horario = {}, docenteAsig = {}, docenteDias = {}, sesiones = {}, bloqueFlags = {};
    MAPA_GRUPOS.forEach((g, gn) => {
        horario[gn] = {}; sesiones[gn] = {};
        diasSemana.forEach(dia => {
            horario[gn][dia] = {};
            sesiones[gn][dia] = Object.assign({}, g.sesionesDia[dia]);
            g.baseHoras.forEach(h => { const b = g.horario[dia][h]; horario[gn][dia][h] = b ? b._wi : null; });
        });
        g.bloques.forEach(b => {
            const fl = {};
            if (b.preAsignado)     fl.pre = true;
            if (b.nombreStrRender) fl.nr  = b.nombreStrRender;
            if (Object.keys(fl).length) bloqueFlags[b._wi] = fl;
        });
    });
    MAPA_DOCENTES.forEach((d, dn) => {
        docenteAsig[dn] = {}; docenteDias[dn] = [...d.diasActivos];
        diasSemana.forEach(dia => { docenteAsig[dn][dia] = Object.assign({}, d.asignado[dia]); });
    });
    return {
        fallosCount: fallos.length,
        fallosIndices: fallos.filter(b => b._wi !== undefined).map(b => b._wi),
        horario, docenteAsig, docenteDias, sesiones, bloqueFlags,
        ultimoOrden: []
    };
}
const RESET_SALTO        = 2;        // reiniciar freqMap si la mejora supera este salto
let bloquesRecurrentesFallidos = new Set(); // bloques que fallaron en la última ejecución → prioridad absoluta
let mejorSnapGlobal            = null;      // mejor snapshot persistente entre ejecuciones (warm start)
let mejorFallosGlobal          = [];        // bloques fallidos del mejor snapshot global
let mejorHorasGlobal           = -1;        // horas colocadas en mejorSnapGlobal (métrica de monotonía)
let _bitacoraCSP               = [];        // resumen de cada cluster CSP de la corrida (se muestra al final)
let _edaBloqueado              = false;     // true en arranques libres (sin sesgo EDA ni recurrentes)

/** Devuelve true si el bloque corresponde a una materia de inglés. */
/** Inglés especial: requiere pre-asignación sincronizada y bloques de 1h.
 *  Inglés 8 e Inglés 9 son materias normales — se excluyen del trato especial. */
function esIngles(b) {
    const nm = b.materia.nombre_materia.toUpperCase()
        .normalize("NFD").replace(/[̀-ͯ]/g, "");
    if (/INGLES\s*[89]/.test(nm)) return false;
    return nm.includes("INGLES");
}

/** Máximo de sesiones de una misma materia por día/grupo.
 *  Inglés 1-7 se parte en 8-9 bloques de 1h pero la semana solo tiene 6 días:
 *  con límite 1 sería matemáticamente incompletable. El coordinador permite
 *  hasta 3h de inglés el mismo día (todas juntas, p.ej. 7:00-9:00) cuando la
 *  disponibilidad del docente está concentrada en pocos días → límite 3.
 *  Las demás materias (incluido inglés 8/9) conservan el límite duro de 1. */
function maxSesionesPorDia(b) {
    return esIngles(b) ? 3 : 1;
}

// ─── Paleta de colores por materia (Excel + vista desglose) ────────────────
// Colores de nivel-200 de Material Design, ordenados por máxima distancia
// perceptual entre sí: los primeros 10 cubren todo el espectro, garantizando
// que grupos con ≤10 materias nunca tengan dos colores parecidos.
const PALETA_MATERIAS = [
    "EF9A9A",  // 01 rojo         Red 200
    "90CAF9",  // 02 azul         Blue 200
    "FFE082",  // 03 ámbar        Amber 200
    "A5D6A7",  // 04 verde        Green 200
    "CE93D8",  // 05 púrpura      Purple 200
    "FFAB91",  // 06 naranja      Deep Orange 200
    "80CBC4",  // 07 teal         Teal 200
    "F48FB1",  // 08 rosa         Pink 200
    "E6EE9C",  // 09 lima         Lime 200
    "9FA8DA",  // 10 índigo       Indigo 200
    "FFF59D",  // 11 amarillo     Yellow 200
    "80DEEA",  // 12 cian         Cyan 200
    "C5E1A5",  // 13 verde claro  Light Green 200
    "B39DDB",  // 14 violeta      Deep Purple 200
    "FFCC80",  // 15 naranja cl.  Orange 200
    "81D4FA",  // 16 azul claro   Light Blue 200
    "BCAAA4",  // 17 café         Brown 200
    "F06292",  // 18 rosa med.    Pink 300
    "B0BEC5",  // 19 gris azul    Blue Grey 200
    "AED581",  // 20 verde lima   Light Green 300
];

/**
 * Devuelve un color hex de 6 dígitos (sin #) para la materia indicada.
 * Usa hash djb2 sobre el nombre normalizado → siempre el mismo color para la misma materia.
 */
function colorParaMateria(nombre) {
    let h = 5381;
    const s = nombre.toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
    return PALETA_MATERIAS[Math.abs(h) % PALETA_MATERIAS.length];
}

class Materia {
    constructor(nombre, horas, grado, turno, tsu) {
        this.nombre_materia = nombre;
        this.horas_materia = parseInt(horas);
        this.grado_materia = grado;
        this.turno_materia = turno;
        this.tsu = (tsu && tsu !== 'NA') ? tsu : null;
        this.docente = null;
        this.grupo = null;
    }
}

class Docente {
    constructor(n, t, e, cat) {
        this.nombre_docente = n.trim();
        this.tipo_docente = parseInt(t);
        this.categoria = cat || (parseInt(t) === 2 ? 'PA' : 'PTC');
        this.horas_extra_clase = parseInt(e) || 0;
        this.horas_carga = 0;
        this.disponibilidad = {};
        this.asignado = {};
        this.diasActivos = new Set();
        this.turnosAsignados = new Set();
        this.esDocenteIngles = false; // true si enseña inglés → puede ir toda la semana
        diasSemana.forEach(d => {
            this.disponibilidad[d] = new Set();
            this.asignado[d] = {};
        });
    }
    reset() {
        this.asignado = {};
        this.diasActivos = new Set();
        diasSemana.forEach(d => { this.asignado[d] = {}; });
    }
    calcularMaxDias() {
        if (this.tipo_docente === 2) { // PA
            // Regla institucional: carga 2-9 → 2 días, 10-20 → 3 días, 21+ → 4 días
            let total = this.horas_carga + this.horas_extra_clase;
            if (total <= 9)  return 2;
            if (total <= 20) return 3;
            return 4;
        }
        return 6; // PTC u otro
    }
}

class Grupo {
    constructor(n, t) { this.nombre_grupo = n.trim(); this.turno = t.toLowerCase(); this.bloques = []; this.reset(); }
    reset() {
        this.horario = {}; this.sesionesDia = {};
        this.baseHoras = (this.turno === "matutino") ? [7,8,9,10,11,12,13,14,15] : [12,13,14,15,16,17,18,19,20];
        diasSemana.forEach(d => {
            this.horario[d] = {};
            this.sesionesDia[d] = {};
            this.baseHoras.forEach(h => this.horario[d][h] = null);
        });
    }
}

function normalizarNombre(s) {
        return s.trim().normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
}

function buscarDocentePorHoja(sheetName) {
    let norm = normalizarNombre(sheetName);
    for (let [name, docente] of MAPA_DOCENTES) {
        if (normalizarNombre(name) === norm) return docente;
    }
    for (let [name, docente] of MAPA_DOCENTES) {
        let normName = normalizarNombre(name);
        if (normName.startsWith(norm) || norm.startsWith(normName)) return docente;
    }
    return null;
}

function parsearLineaAsignatura(line) {
    let match = line.match(/^(.+?)\s+(\d+)[°º]\s*(.+?)\s*\((\d+)\s*hrs?\)\s*$/i);
    if (!match) return null;

    let nombreMateria = match[1].trim();
    let grado = parseInt(match[2]);
    let middlePart = match[3].trim();
    let horas = parseInt(match[4]);

    let especialidad = null;
    if (/\bGCH\b/i.test(middlePart)) {
        especialidad = 'GCH';
        middlePart = middlePart.replace(/\bGCH\b/i, '').trim();
    } else if (/\bEFEP\b/i.test(middlePart)) {
        especialidad = 'EFEP';
        middlePart = middlePart.replace(/\bEFEP\b/i, '').trim();
    }

    // Specialty groups (GCH/EFEP) only exist in 5th semester.
    // "Ingles 5 8°a GCH" means English level 5 for group 5a GCH, not 8a GCH.
    if (especialidad) {
        let materiaNum = nombreMateria.match(/(\d+)\s*$/);
        if (materiaNum) grado = parseInt(materiaNum[1]);
    }

    let grupos = middlePart.match(/[a-c]/gi);
    if (!grupos || grupos.length === 0) return null;
    grupos = grupos.map(g => g.toLowerCase());

    return { nombreMateria, grado, grupos, especialidad, horas };
}

function parsearCargaAcademica(wb) {
    let sheet = wb.Sheets[wb.SheetNames[0]];
    // Los archivos reales tienen filas institucionales antes del encabezado real.
    // Detectamos dinámicamente la fila que contiene "Profesor" y la usamos como header.
    let rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    let headerIdx = rawRows.findIndex(row =>
        row.some(cell => String(cell).trim() === 'Profesor')
    );
    let rows = XLSX.utils.sheet_to_json(sheet, {
        range: headerIdx >= 0 ? headerIdx : 0,
        defval: ''
    });
    let asignacionesTemp = [];

    rows.forEach(row => {
        let nombre = String(row['Profesor'] || '').trim();
        if (!nombre) return;

        let categoriaRaw = row['CATEGORÍA'] || row['CATEGORIA'] || '';
        let categoria = String(categoriaRaw).trim().toUpperCase();
        let tipo = (categoria === 'PA') ? 2 : 1;

        if (!MAPA_DOCENTES.has(nombre)) {
            MAPA_DOCENTES.set(nombre, new Docente(nombre, tipo, 0, categoria));
        }
        let docente = MAPA_DOCENTES.get(nombre);

        let asigText = String(row['Asignatura'] || '');
        let lines = asigText.split('\n').map(l => l.trim()).filter(l => l.length > 0);

        lines.forEach(line => {
            let parsed = parsearLineaAsignatura(line);
            if (!parsed) return;

            let horasPerGrupo = Math.round(parsed.horas / parsed.grupos.length);

            parsed.grupos.forEach(letra => {
                let nombreGrupo = parsed.especialidad
                    ? `${parsed.grado}${letra} ${parsed.especialidad}`
                    : `${parsed.grado}${letra}`;
                let turno = parsed.grado <= 4 ? 'matutino' : 'vespertino';

                if (!MAPA_GRUPOS.has(nombreGrupo)) {
                    MAPA_GRUPOS.set(nombreGrupo, new Grupo(nombreGrupo, turno));
                }

                docente.horas_carga += horasPerGrupo;
                docente.turnosAsignados.add(turno);

                asignacionesTemp.push({
                    docente: nombre,
                    grupo: nombreGrupo,
                    materia: parsed.nombreMateria,
                    horas: horasPerGrupo,
                    grado: parsed.grado,
                    turno: turno
                });
            });
        });
    });

    MAPA_DOCENTES.forEach(d => { d.maxDias = d.calcularMaxDias(); });

    let asignacionesExitosas = 0;
    asignacionesTemp.forEach(asig => {
        let g = MAPA_GRUPOS.get(asig.grupo);
        let d = MAPA_DOCENTES.get(asig.docente);
        if (!g || !d) return;

        let c = new Materia(asig.materia, asig.horas, asig.grado, asig.turno, null);
        c.grupo = g; c.docente = d;


        let h = c.horas_materia;
        let nm = c.nombre_materia.toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
        let desglose = [];

        // Inglés 8 e Inglés 9 son materias normales: usan el split regular (2, 2, 1...)
        const esInglesEspecial = nm.includes("INGLES") && !/INGLES\s*[89]/.test(nm);
        // Inglés especial y tutoría: bloques de 1h para sincronizar por cuatrimestre
        if (esInglesEspecial || nm.includes("TUTORIA") || c.tsu) {
            if (esInglesEspecial) d.esDocenteIngles = true; // días ilimitados solo para inglés regular
            for (let i = 0; i < h; i++) desglose.push(1);
        } else {
            // Partición según los DÍAS DE ASISTENCIA del docente: con la regla de
            // 1 sesión por materia/día, un docente de 2 días no puede dar una
            // materia de 7h en [2,2,2,1] (necesitaría 4 días) → usa sesiones más
            // largas. Tablas del método tradicional validado:
            //   2 días: 7→[4,3]   6→[3,3]   5→[3,2]   4→[2,2] 3→[2,1] 2→[1,1]
            //   3 días: 7→[3,2,2] 6→[2,2,2] 5→[2,2,1] 4→[2,2] 3→[2,1] 2→[1,1]
            //   4+días: 7→[2,2,2,1] (resto igual que 3 días)
            const diasDoc = d.tipo_docente === 2 ? d.maxDias : 5;
            const TABLA = diasDoc <= 2
                ? { 7:[4,3],     6:[3,3],   5:[3,2],   4:[2,2], 3:[2,1], 2:[1,1], 1:[1] }
                : diasDoc === 3
                ? { 7:[3,2,2],   6:[2,2,2], 5:[2,2,1], 4:[2,2], 3:[2,1], 2:[1,1], 1:[1] }
                : { 7:[2,2,2,1], 6:[2,2,2], 5:[2,2,1], 4:[2,2], 3:[2,1], 2:[1,1], 1:[1] };
            if (TABLA[h]) {
                desglose = [...TABLA[h]];
            } else {
                // h > 7 (raro): repartir lo más parejo posible en los días del docente
                const nSes = Math.max(1, Math.min(diasDoc, Math.ceil(h / 2)));
                const base = Math.floor(h / nSes), extra = h % nSes;
                for (let i = 0; i < nSes; i++) desglose.push(base + (i < extra ? 1 : 0));
            }
        }

        desglose.forEach(dur => {
            g.bloques.push({ materia: c, docente: d, grupo: g, duracion: dur, nombreStr: `${c.nombre_materia} (${d.nombre_docente})` });
        });
        asignacionesExitosas++;
    });

    return asignacionesExitosas;
}

function parsearDisponibilidades(wb) {
    let docentesEncontrados = 0;

    wb.SheetNames.forEach(sheetName => {
        let docente = buscarDocentePorHoja(sheetName);
        if (!docente) return;

        let sheet = wb.Sheets[sheetName];
        let data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        for (let row = 1; row < Math.min(data.length, 15); row++) {
            let hora = 6 + row;
            if (!data[row]) continue;
            for (let col = 1; col <= 6; col++) {
                let val = data[row][col];
                if (val && String(val).trim() !== '') {
                    let dia = diasSemana[col - 1];
                    docente.disponibilidad[dia].add(hora);
                }
            }
        }
        docentesEncontrados++;
    });

    return docentesEncontrados;
}

function leerArchivo(file, callback) {
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
            callback(wb);
        } catch (error) {
            const errDiv = document.getElementById("span_error");
            errDiv.innerText = "✖ Error al leer el archivo: " + error.message;
            errDiv.style.color = "red";
        }
    };
    reader.readAsArrayBuffer(file);
}

function actualizarEstado() {
    const errDiv = document.getElementById("span_error");
    if (wbCarga && wbDisp) {
        errDiv.innerText = "⏳ Procesando archivos...";
        errDiv.style.color = "#888";
    } else if (wbCarga) {
        errDiv.innerText = "✔ Carga Académica cargada. Falta: Disponibilidades.";
        errDiv.style.color = "#D4A017";
    } else if (wbDisp) {
        errDiv.innerText = "✔ Disponibilidades cargadas. Falta: Carga Académica.";
        errDiv.style.color = "#D4A017";
    }
}

// ── FASE 1: Determinar maxDias por docente ────────────────────────────────────
// Contrasta la carga del docente con su disponibilidad real para decidir cuántos
// días usará el algoritmo en la iteración (Fase 2).
// Regla: si el peor día disponible dentro del top-N no tiene al menos 1h de
// holgura sobre la carga media diaria, se suma 1 día más (hasta el tope).
//   Ejemplo Abner 17h PA, disp=[10,5,5,4]:
//     maxDias=3 → peorDia=5, cargaMedia=⌈17/3⌉=6 → 5<7 → maxDias=4 ✓
function calcularDiasDocentes() {
    MAPA_DOCENTES.forEach(d => {
        // Partir siempre del valor base calculado por carga académica
        d.maxDias = d.calcularMaxDias();

        if (d.horas_carga === 0) return;
        if (d.esDocenteIngles)   return; // inglés usa todos los días disponibles

        const topeDias = d.tipo_docente === 2 ? 4 : 6;

        // Horas disponibles por día, ordenadas de mayor a menor
        const dispOrd = diasSemana
            .map(dia => d.disponibilidad[dia].size)
            .sort((a, b) => b - a);

        const diasConDisp = dispOrd.filter(n => n > 0).length;

        // Mientras haya un día extra disponible y no se alcance el tope:
        // Si el peor día del top-N no cubre (cargaMedia + 1h de holgura), sumar día
        while (diasConDisp > d.maxDias && d.maxDias < topeDias) {
            const peorDia    = dispOrd[d.maxDias - 1];
            const cargaMedia = Math.ceil(d.horas_carga / d.maxDias);
            if (peorDia >= cargaMedia + 1) break;
            d.maxDias++;
        }
    });

    // Docentes de inglés: sin restricción de días
    MAPA_DOCENTES.forEach(d => {
        if (d.esDocenteIngles) d.maxDias = diasSemana.length;
    });
}

function parsearTodo() {
    try {
        resetearAprendizaje();
        MAPA_DOCENTES.clear(); MAPA_GRUPOS.clear(); PLANTILLAS_MATERIAS = [];

        let asignacionesExitosas = parsearCargaAcademica(wbCarga);
        let docentesConDisp = parsearDisponibilidades(wbDisp);

        // Barrido de respaldo: marcar como inglés a cualquier docente que tenga
        // al menos un bloque de inglés (detecta casos que no matchearon por nombre).
        // Debe correr ANTES de calcularDiasDocentes para que esos docentes sean
        // excluidos correctamente de la lógica de expansión de días.
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (esIngles(b)) b.docente.esDocenteIngles = true;
            });
        });

        // Fase 1: calcular maxDias de cada docente según carga y disponibilidad
        calcularDiasDocentes();

        let advertencias = [];

        MAPA_DOCENTES.forEach((d, nombre) => {
            let dispTotal = 0;
            diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
            if (dispTotal === 0 && d.horas_carga > 0)
                advertencias.push(`⚠ Docente "${nombre}" tiene ${d.horas_carga}h de carga pero 0h de disponibilidad.`);
            else if (d.horas_carga > dispTotal && dispTotal > 0)
                advertencias.push(`⚠ Docente "${nombre}" tiene ${d.horas_carga}h de carga pero solo ${dispTotal}h disponibles.`);
        });

        MAPA_GRUPOS.forEach((g, nombre) => {
            let slotsTotal = g.baseHoras.length * diasSemana.length;
            let horasAsignadas = 0;
            g.bloques.forEach(b => horasAsignadas += b.duracion);
            if (horasAsignadas > slotsTotal)
                advertencias.push(`⚠ Grupo "${nombre}" tiene ${horasAsignadas}h asignadas pero solo ${slotsTotal} slots disponibles.`);
        });

        const errDiv = document.getElementById("span_error");
        if (asignacionesExitosas > 0 && advertencias.length === 0) {
            // Restablecer botón por si quedó deshabilitado de una ejecución anterior
            const btnAcc = document.getElementById("button_accion");
            if (btnAcc) { btnAcc.disabled = false; btnAcc.style.opacity = "1"; }

            errDiv.innerText = `✔ ${asignacionesExitosas} asignaciones · ${docentesConDisp} docentes con disponibilidad · ${MAPA_GRUPOS.size} grupos. Listo para generar.`;
            errDiv.style.color = "green";
            mostrarDesglose();
        } else if (asignacionesExitosas > 0 && advertencias.length > 0) {
            errDiv.innerText = `✔ ${asignacionesExitosas} asignaciones con ${advertencias.length} advertencia(s):\n\n` + [...new Set(advertencias)].join("\n");
            errDiv.style.color = "#D4A017";
            mostrarDesglose();
        } else {
            errDiv.innerText = "✖ ERROR: No se reconoció ninguna asignación. Verifica que la hoja tenga columnas: Profesor, Asignatura.";
            errDiv.style.color = "red";
            document.getElementById("seccion_desglose").style.display = "none";
        }
    } catch (error) {
        const errDiv = document.getElementById("span_error");
        errDiv.innerText = "✖ Error al procesar: " + error.message;
        errDiv.style.color = "red";
    }
}

function mostrarDesglose() {
    // Agregar horas por (materia, docente) dentro de cada grupo
    let porGrupo = [];

    MAPA_GRUPOS.forEach((grupo, nombreGrupo) => {
        let enGrupo = new Map();
        grupo.bloques.forEach(b => {
            let key = b.materia.nombre_materia + '§' + b.docente.nombre_docente;
            if (!enGrupo.has(key)) enGrupo.set(key, { materia: b.materia.nombre_materia, docente: b.docente, horas: 0 });
            enGrupo.get(key).horas += b.duracion;
        });
        let asigs = [...enGrupo.values()].sort((a, b) => a.materia.localeCompare(b.materia));
        let totalHrs = asigs.reduce((s, a) => s + a.horas, 0);
        porGrupo.push({ nombre: nombreGrupo, turno: grupo.turno, asigs, totalHrs });
    });

    // Ordenar grupos: primero matutino, luego vespertino; dentro de cada turno por nombre
    porGrupo.sort((a, b) => {
        if (a.turno !== b.turno) return a.turno === 'matutino' ? -1 : 1;
        return a.nombre.localeCompare(b.nombre);
    });

    let totalGrupos  = porGrupo.length;
    let totalHrsGlobal = porGrupo.reduce((s, g) => s + g.totalHrs, 0);

    let html = `<p style="font-family:var(--font-roboto-mono);font-size:0.85rem;margin:0 0 1rem;color:var(--color-dim-gray)">
        ${totalGrupos} grupos &nbsp;·&nbsp; ${totalHrsGlobal} horas totales asignadas
    </p>`;

    html += `<table class="desglose-tabla">
        <thead>
            <tr>
                <th style="width:12%">Grupo</th>
                <th style="width:10%">Turno</th>
                <th style="width:38%">Materia</th>
                <th style="width:28%">Docente</th>
                <th style="width:12%">Horas</th>
            </tr>
        </thead>
        <tbody>`;

    porGrupo.forEach(({ nombre, turno, asigs, totalHrs }) => {
        let turnoLabel = turno.charAt(0).toUpperCase() + turno.slice(1);
        let badgeClass = turno === 'matutino' ? 'badge-ptc' : 'badge-pa';

        html += `<tr class="doc-header">
            <td>${nombre}<span class="badge-cat ${badgeClass}">${turnoLabel}</span></td>
            <td></td>
            <td style="color:var(--color-dim-gray);font-size:0.78rem;font-weight:normal">
                ${asigs.length} materia${asigs.length !== 1 ? 's' : ''}
            </td>
            <td></td>
            <td class="col-hrs">${totalHrs} hrs</td>
        </tr>`;

        asigs.forEach(({ materia, docente, horas }) => {
            let cat   = docente.tipo_docente === 2 ? 'PA' : (docente.categoria || 'PTC');
            let badge = docente.tipo_docente === 2 ? 'badge-pa' : 'badge-ptc';
            // Clave materia+grupo → mismo color que la celda del Excel del grupo
            const hex = colorParaMateria(materia + ' [' + nombre + ']');
            html += `<tr class="asig-row">
                <td></td>
                <td></td>
                <td><span style="display:inline-block;width:0.65rem;height:0.65rem;border-radius:2px;background:#${hex};vertical-align:middle;margin-right:0.45rem;border:1px solid rgba(0,0,0,0.15)"></span>${materia}</td>
                <td>${docente.nombre_docente}<span class="badge-cat ${badge}" style="font-size:0.65rem">${cat}</span></td>
                <td class="col-hrs">${horas}h</td>
            </tr>`;
        });
    });

    html += '</tbody></table>';

    document.getElementById("desglose_contenido").innerHTML = html;
    document.getElementById("seccion_desglose").style.display = "block";
    crearTabsHorarios();
}

function horasAsignadasEnDia(grupo, dia) {
    let horas = 0;
    grupo.baseHoras.forEach(h => { if (grupo.horario[dia][h] !== null) horas++; });
    return horas;
}

function aplicarAsignacion(grupo, bloque, dia, horaInicio, esForzado = false) {
    // Guardia: si el bloque ya está en cualquier slot del grupo, no duplicar.
    // Cubre el caso donde un swap o SA olvidó hacer quitarAsignacion primero.
    for (const dd of diasSemana)
        for (const h of grupo.baseHoras)
            if (grupo.horario[dd][h] === bloque) return;

    // No sobrescribir el inglés simultáneo fijo: lo protege de ser pisado por una reparación.
    for (let h = horaInicio; h < horaInicio + bloque.duracion; h++) {
        const occ = grupo.horario[dia][h];
        if (occ && occ !== bloque && esInglesFijo(occ, grupo)) return; // inglés inamovible: rechaza
    }

    for (let h = horaInicio; h < horaInicio + bloque.duracion; h++) {
        grupo.horario[dia][h] = bloque;
        let marca = esForzado ? " [⚠️ FORZADO]" : "";
        bloque.nombreStrRender = `${bloque.materia.nombre_materia} (${bloque.docente.nombre_docente})${marca}`;
        bloque.docente.asignado[dia][h] = `${bloque.materia.nombre_materia} [${grupo.nombre_grupo}]${marca}`;
    }
    bloque.docente.diasActivos.add(dia);
    grupo.sesionesDia[dia][bloque.materia.nombre_materia] = (grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0) + 1;
}

/** ¿Es inglés simultáneo FIJO (cuatri 1-7)? Las reparaciones no deben moverlo: si lo mueven,
 *  queda desincronizado. Tratan su slot como ocupado-inamovible (buscan otra opción, sin bucle). */
function esInglesFijo(bloque, grupo) {
    if (!bloque || !bloque.preAsignado || !esIngles(bloque)) return false;
    const m = String((grupo || bloque.grupo).nombre_grupo).match(/^(\d+)/);
    const c = m ? parseInt(m[1]) : 0;
    return c >= 1 && c <= 7;
}

/**
 * Devuelve {dia, hInicio} de un bloque ya asignado dentro de su grupo.
 * Busca el primer slot (hora de inicio) donde aparece el bloque.
 * Retorna null si el bloque no está asignado actualmente.
 */
function encontrarPosicionBloque(bloque) {
    const g    = bloque.grupo;
    const base = g.baseHoras;
    for (const dia of diasSemana) {
        for (let i = 0; i < base.length; i++) {
            if (g.horario[dia][base[i]] === bloque) {
                // El inicio es el primer índice donde aparece (sin bloque igual antes)
                if (i === 0 || g.horario[dia][base[i - 1]] !== bloque) {
                    return { dia, hInicio: base[i] };
                }
            }
        }
    }
    return null;
}

function quitarAsignacion(grupo, bloque, dia, horaInicio) {
    // Barrer TODAS las ocurrencias del bloque en el grupo (no solo horaInicio).
    // Elimina copias fantasma que quedan cuando un swap o SA no hizo rollback limpio.
    const nm = bloque.materia.nombre_materia;
    const d  = bloque.docente;
    const diasAfectados = new Set();
    for (const dd of diasSemana) {
        for (const h of grupo.baseHoras) {
            if (grupo.horario[dd][h] === bloque) {
                grupo.horario[dd][h] = null;
                delete d.asignado[dd][h];
                diasAfectados.add(dd);
            }
        }
    }
    // Actualizar sesionesDia y diasActivos para cada día donde se encontró el bloque
    for (const dd of diasAfectados) {
        if (grupo.sesionesDia[dd]?.[nm] > 0) grupo.sesionesDia[dd][nm]--;
        let quedan = false;
        for (const h in d.asignado[dd]) { quedan = true; break; }
        if (!quedan) d.diasActivos.delete(dd);
    }
}

function obtenerSnapshotAsignaciones() {
    let snapshot = {};
    MAPA_GRUPOS.forEach((grupo, nombreGrupo) => {
        snapshot[nombreGrupo] = {};
        diasSemana.forEach(d => {
            grupo.baseHoras.forEach(h => {
                let bloque = grupo.horario[d][h];
                if (bloque) snapshot[nombreGrupo][bloque.materia.nombre_materia] = bloque.docente.nombre_docente;
            });
        });
    });
    return snapshot;
}

// ------------------------------------------------------------------
// FASE 1: CONSTRUCCIÓN VORAZ 
// ------------------------------------------------------------------
function intentarAsignar(bloque, relajarSesiones, relajarDiasMax, relajarContiguidad, relajarDisponibilidad) {
    let grupo = bloque.grupo;
    let docente = bloque.docente;
    let mejorOpcion = null;
    let mejorCosto = Infinity;

    diasSemana.forEach(dia => {
        let penalizacionDia = (dia === "sabado") ? 10000 : 0;
        let horasDocenteHoy = Object.keys(docente.asignado[dia]).length;
        let activaNuevoDia = horasDocenteHoy === 0;

        // DURO: sábado solo si el docente declaró disponibilidad ese día
        if (dia === "sabado" && docente.disponibilidad["sabado"].size === 0) return;

        // DURO para PAs: maxDias es regla institucional, nunca se relaja.
        // Para PTCs: se puede relajar si el caller lo pide explícitamente.
        const maxDiasDuro = docente.tipo_docente === 2; // PA → siempre duro
        if (activaNuevoDia && docente.diasActivos.size >= docente.maxDias) {
            if (maxDiasDuro || !relajarDiasMax) return;
        }

        let sesionesActuales = grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0;
        if (sesionesActuales >= maxSesionesPorDia(bloque)) return; // DURO: 1/día (inglés 1-7: 2/día)

        let tieneClasesHoy = false;
        let primeraClase = 99, ultimaClase = -1;
        grupo.baseHoras.forEach(h => {
            if (grupo.horario[dia][h] !== null) {
                tieneClasesHoy = true;
                if (h < primeraClase) primeraClase = h;
                if (h > ultimaClase) ultimaClase = h;
            }
        });

        let horasPermitidas = [];
        if (!tieneClasesHoy || relajarContiguidad) {
            horasPermitidas = grupo.baseHoras;
        } else {
            let hArriba = primeraClase - bloque.duracion;
            if (grupo.baseHoras.includes(hArriba)) horasPermitidas.push(hArriba);

            let hAbajo = ultimaClase + 1;
            if (grupo.baseHoras.includes(hAbajo) && (hAbajo + bloque.duracion - 1) <= grupo.baseHoras[grupo.baseHoras.length-1]) {
                horasPermitidas.push(hAbajo);
            }
        }

        horasPermitidas.forEach(hInicio => {
            let valido = true;
            let horasFueraDisp = 0;
            for (let h = hInicio; h < hInicio + bloque.duracion; h++) {
                if (grupo.horario[dia][h] !== null) valido = false;
                if (docente.asignado[dia][h]) valido = false;
                if (!docente.disponibilidad[dia].has(h)) {
                    if (!relajarDisponibilidad) valido = false;
                    else horasFueraDisp++;
                }
            }

            if (valido) {
                let costo = penalizacionDia;
                costo += horasFueraDisp * 50000;

                // --- Distribución pareja: minimizar varianza de horas por día ---
                let horasEnEsteDia = horasAsignadasEnDia(grupo, dia);
                let nuevasHoras = horasEnEsteDia + bloque.duracion;

                // Simular el estado después de la asignación y calcular varianza
                let horasDespuesPorDia = diasSemana.map(d =>
                    horasAsignadasEnDia(grupo, d) + (d === dia ? bloque.duracion : 0)
                ).filter(h => h > 0);
                if (horasDespuesPorDia.length > 0) {
                    let media = horasDespuesPorDia.reduce((a, b) => a + b, 0) / horasDespuesPorDia.length;
                    let varianza = horasDespuesPorDia.reduce((s, h) => s + (h - media) ** 2, 0) / horasDespuesPorDia.length;
                    costo += varianza * 300;
                }

                // Preferir primer slot del turno al abrir un día nuevo
                if (!tieneClasesHoy) {
                    costo += (hInicio - grupo.baseHoras[0]) * 10;
                }

                // Solo PAs pagan penalización por abrir un día nuevo
                // (PTC, TA, Director pueden usar todos sus días disponibles)
                if (activaNuevoDia && docente.tipo_docente === 2) costo += 500;

                // --- Sincronización de inglés (fallback greedy) ---
                // Para bloques de inglés que no pudieron pre-asignarse: bono si coincide con
                // el slot donde OTROS grupos del mismo turno (cuatris 1-7) ya tienen inglés,
                // penalización leve si esos grupos tienen inglés en otro horario.
                let nmBloque = bloque.materia.nombre_materia.toUpperCase()
                    .normalize("NFD").replace(/[̀-ͯ]/g, "");
                if (nmBloque.includes('INGLES') && horasFueraDisp === 0) {
                    let cuatriMatch = grupo.nombre_grupo.match(/^(\d+)/);
                    let cuatriNum   = cuatriMatch ? parseInt(cuatriMatch[1]) : null;
                    // Regla global para cuatris 1-7: comparar contra TODOS los grupos del turno
                    // Para cuatris 8+: solo comparar contra el mismo cuatrimestre (lógica original)
                    let sincroniza    = false;
                    let desincroniza  = false;
                    for (let [gn, g] of MAPA_GRUPOS) {
                        if (g === grupo) continue;
                        let c2 = gn.match(/^(\d+)/);
                        let c2num = c2 ? parseInt(c2[1]) : null;
                        // Filtro de peer: mismo turno si cuatri 1-7, mismo cuatrimestre si 8+
                        if (cuatriNum !== null && cuatriNum <= 7) {
                            if (g.turno !== grupo.turno) continue;
                            if (c2num === null || c2num < 1 || c2num > 7) continue;
                        } else {
                            if (!c2 || c2[1] !== (cuatriMatch?.[1] ?? '')) continue;
                        }
                        let tieneInglesAqui = false;
                        let tieneInglesSemana = false;
                        for (let hh = hInicio; hh < hInicio + bloque.duracion; hh++) {
                            let oB = g.horario[dia][hh];
                            if (oB) {
                                let oNm = oB.materia.nombre_materia.toUpperCase()
                                    .normalize("NFD").replace(/[̀-ͯ]/g, "");
                                if (oNm.includes('INGLES')) tieneInglesAqui = true;
                            }
                        }
                        diasSemana.forEach(d => g.baseHoras.forEach(hh => {
                            let oB = g.horario[d][hh];
                            if (oB) {
                                let oNm = oB.materia.nombre_materia.toUpperCase()
                                    .normalize("NFD").replace(/[̀-ͯ]/g, "");
                                if (oNm.includes('INGLES')) tieneInglesSemana = true;
                            }
                        }));
                        if (tieneInglesAqui)                   sincroniza   = true;
                        if (tieneInglesSemana && !tieneInglesAqui) desincroniza = true;
                    }
                    if (sincroniza)   costo -= 150000; // bono fuerte por coincidir
                    if (desincroniza) costo +=  10000; // penalización leve por divergir
                }

                // Bonus EDA: preferir slots que funcionaron bien en ejecuciones anteriores
                if (freqTotalRuns > 0) {
                    const bm = freqMap.get(bloque);
                    if (bm) {
                        const cnt = bm.get(dia + '|' + hInicio) || 0;
                        if (cnt > 0) costo -= (cnt / freqTotalRuns) * FREQ_BONUS;
                    }
                }

                if (costo < mejorCosto) {
                    mejorCosto = costo;
                    mejorOpcion = { dia, hInicio };
                }
            }
        });
    });

    if (mejorOpcion) {
        aplicarAsignacion(grupo, bloque, mejorOpcion.dia, mejorOpcion.hInicio);
        return true;
    }
    return false;
}

// NUEVO: INTERCAMBIO DIRECTO (SLOT SWAP)
function intentarSwapDeHorarios(bloquePendiente, queue) {
    let grupo = bloquePendiente.grupo;
    let docentePendiente = bloquePendiente.docente;
    let durP = bloquePendiente.duracion;

    for (let diaP of diasSemana) {
        for (let idx = 0; idx <= grupo.baseHoras.length - durP; idx++) {
            let hP = grupo.baseHoras[idx];

            let pendienteValido = true;
            for (let o = 0; o < durP; o++) {
                let h = hP + o;
                if (!docentePendiente.disponibilidad[diaP].has(h) || docentePendiente.asignado[diaP][h]) { pendienteValido = false; break; }
            }
            if (!pendienteValido) continue;

            // DURO para PAs: no abrir un día nuevo si ya está en maxDias
            if (!docentePendiente.diasActivos.has(diaP) &&
                docentePendiente.tipo_docente === 2 &&
                docentePendiente.diasActivos.size >= docentePendiente.maxDias) continue;

            // Verificar que el bloque pendiente no tenga ya sesión ese día (regla dura)
            if ((grupo.sesionesDia[diaP][bloquePendiente.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloquePendiente)) continue;

            let bloquesDesplazar = new Map();
            let slotsValidos = true;
            for (let o = 0; o < durP; o++) {
                let h = hP + o;
                let existente = grupo.horario[diaP][h];
                if (existente === null) continue;
                if (existente.docente === docentePendiente) { slotsValidos = false; break; }
                if (esInglesFijo(existente, grupo)) { slotsValidos = false; break; } // inglés fijo: no desplazar
                if (!bloquesDesplazar.has(existente)) {
                    bloquesDesplazar.set(existente, h);
                }
            }
            if (!slotsValidos || bloquesDesplazar.size === 0) continue;

            let reubicaciones = [];
            let todosReubicables = true;
            for (let [bloqueEx, hOrigen] of bloquesDesplazar) {
                let encontrado = false;
                for (let diaE of diasSemana) {
                    for (let idxE = 0; idxE <= grupo.baseHoras.length - bloqueEx.duracion; idxE++) {
                        let hE = grupo.baseHoras[idxE];
                        // Verificar que el bloque desplazado no cree sesión doble en día destino (regla dura)
                        if (diaE !== diaP && (grupo.sesionesDia[diaE][bloqueEx.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloqueEx)) continue;
                        // DURO para PAs: el bloque desplazado no puede abrir un día nuevo si ya está en maxDias
                        // (conservador: no contabilizamos la posible liberación del día origen)
                        if (diaE !== diaP &&
                            !bloqueEx.docente.diasActivos.has(diaE) &&
                            bloqueEx.docente.tipo_docente === 2 &&
                            bloqueEx.docente.diasActivos.size >= bloqueEx.docente.maxDias) continue;
                        let destinoValido = true;
                        for (let o = 0; o < bloqueEx.duracion; o++) {
                            let hh = hE + o;
                            let ocupadoGrupo = grupo.horario[diaE][hh];
                            if (diaE === diaP && hh >= hP && hh < hP + durP) { destinoValido = false; break; }
                            if (ocupadoGrupo !== null && !bloquesDesplazar.has(ocupadoGrupo)) { destinoValido = false; break; }
                            if (ocupadoGrupo === null || bloquesDesplazar.has(ocupadoGrupo)) {} else { destinoValido = false; break; }
                            if (!bloqueEx.docente.disponibilidad[diaE].has(hh) || bloqueEx.docente.asignado[diaE][hh]) { destinoValido = false; break; }
                        }
                        if (!destinoValido) continue;

                        reubicaciones.push({ bloque: bloqueEx, diaOrigen: diaP, hOrigen, diaDest: diaE, hDest: hE });
                        encontrado = true;
                        break;
                    }
                    if (encontrado) break;
                }
                if (!encontrado) { todosReubicables = false; break; }
            }

            if (todosReubicables) {
                // Aplicar swap
                for (let r of reubicaciones) quitarAsignacion(grupo, r.bloque, r.diaOrigen, r.hOrigen);
                aplicarAsignacion(grupo, bloquePendiente, diaP, hP);
                for (let r of reubicaciones) aplicarAsignacion(grupo, r.bloque, r.diaDest, r.hDest);

                // Verificar que no se crearon huecos
                let creoHueco = false;
                for (let d of diasSemana) {
                    let first = -1, last = -1;
                    for (let h of grupo.baseHoras) {
                        if (grupo.horario[d][h]) { if (first === -1) first = h; last = h; }
                    }
                    if (first !== -1) {
                        for (let h = first; h <= last; h++) {
                            if (grupo.baseHoras.includes(h) && !grupo.horario[d][h]) { creoHueco = true; break; }
                        }
                    }
                    if (creoHueco) break;
                }

                if (!creoHueco) return true;

                // Deshacer swap si creó huecos
                for (let r of reubicaciones) quitarAsignacion(grupo, r.bloque, r.diaDest, r.hDest);
                quitarAsignacion(grupo, bloquePendiente, diaP, hP);
                for (let r of reubicaciones) aplicarAsignacion(grupo, r.bloque, r.diaOrigen, r.hOrigen);
            }
        }
    }
    return false;
}

/**
 * ─── CADENA AUMENTANTE GLOBAL (BFS multi-grupo) ─────────────────────────────
 *
 * Busca una cadena B0 → B1 → … → Bk donde:
 *   B0 = bloquePendiente (a colocar)
 *   Bi puede ir al slot actualmente ocupado por B(i+1)
 *   Bk puede ir a un slot completamente libre
 *
 * La búsqueda cruza grupos y docentes diferentes sin límite de profundidad
 * (BFS ≤ MAX_NODOS_BFS bloques explorados).
 *
 * Al encontrar la cadena la ejecuta en orden inverso (Bk primero) para que
 * cada bloque encuentre su slot ya desocupado.
 *
 * @returns {boolean}
 */
function intentarCadenaAumentanteGlobal(bloquePendiente, maxNodos = 300) {
    const MAX_NODOS_BFS = maxNodos; // límite de nodos para no tardar demasiado

    // nodeFrom: obstacle → {pred: bloque-anterior, dia, h}
    //   Significado: pred quiere ir a (dia, h), y obstacle está ahí → obstacle debe salir
    const nodeFrom = new Map();
    const visited  = new Set([bloquePendiente]);

    // ── Genera slots candidatos para un bloque (solo disponibilidad + sesión doble) ──
    function* candidatos(bloque) {
        const g = bloque.grupo, d = bloque.docente, dur = bloque.duracion;
        const posActual = (bloque !== bloquePendiente) ? encontrarPosicionBloque(bloque) : null;
        for (const dia of diasSemana) {
            // Restricción sesión doble: si ya hay una sesión de esta materia HOY en este grupo
            // ignorar SALVO que la sesión sea el propio bloque (que se va a mover)
            const sesHoy = g.sesionesDia[dia][bloque.materia.nombre_materia] || 0;
            if (sesHoy >= 1 && !(posActual && posActual.dia === dia)) continue;
            // PA: no abrir día nuevo si maxDias alcanzado
            if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
                d.diasActivos.size >= d.maxDias) continue;
            for (let i = 0; i <= g.baseHoras.length - dur; i++) {
                const h = g.baseHoras[i];
                let dispOk = true;
                for (let o = 0; o < dur; o++) {
                    if (!d.disponibilidad[dia].has(h + o)) { dispOk = false; break; }
                }
                if (!dispOk) continue;
                // No tiene sentido proponer el propio slot actual del bloque
                if (posActual && posActual.dia === dia && posActual.hInicio === h) continue;
                yield { dia, h };
            }
        }
    }

    // ── Obstáculo único en un slot para un bloque candidato ─────────────────
    // Devuelve: null = libre, objeto = único obstáculo, undefined = 2+ obstáculos
    function obstaculoUnico(bloque, dia, h) {
        const g = bloque.grupo, d = bloque.docente, dur = bloque.duracion;
        const obs = new Set();
        for (let o = 0; o < dur; o++) {
            const ex = g.horario[dia][h + o];
            if (ex !== null && ex !== bloque) obs.add(ex);
            // Docente ocupado en OTRO grupo en ese slot
            if (d.asignado[dia][h + o]) {
                for (const [, g2] of MAPA_GRUPOS) {
                    if (g2 === g) continue;
                    const ex2 = g2.horario[dia][h + o];
                    if (ex2 && ex2.docente === d) obs.add(ex2);
                }
            }
        }
        if (obs.size === 0) return null;
        if (obs.size === 1) return [...obs][0];
        return undefined; // demasiado complejo para esta función
    }

    // ── BFS ──────────────────────────────────────────────────────────────────
    const queue = [bloquePendiente];
    let endBloque = null, endDia = null, endH = null;
    let nodos = 0;

    bfsLoop:
    while (queue.length > 0 && nodos < MAX_NODOS_BFS) {
        const bloque = queue.shift();
        nodos++;

        for (const { dia, h } of candidatos(bloque)) {
            const obs = obstaculoUnico(bloque, dia, h);

            if (obs === null) {
                // ¡Slot libre! Fin de la cadena.
                endBloque = bloque;
                endDia    = dia;
                endH      = h;
                break bfsLoop;
            }

            if (obs !== undefined && !obs.preAsignado && !visited.has(obs)) {
                const posObs = encontrarPosicionBloque(obs);
                if (posObs) {
                    visited.add(obs);
                    nodeFrom.set(obs, { pred: bloque, dia, h });
                    queue.push(obs);
                }
            }
        }
    }

    if (!endBloque) return false;

    // ── Reconstruir la cadena hacia atrás ────────────────────────────────────
    const chain = [];
    {
        let b = endBloque;
        while (b) {
            chain.push(b);
            const info = nodeFrom.get(b);
            b = info ? info.pred : null;
        }
        chain.reverse(); // [bloquePendiente, B1, B2, ..., endBloque]
    }
    if (chain[0] !== bloquePendiente) return false;

    // ── Snapshot para rollback ────────────────────────────────────────────────
    const snap = tomarSnapshot();

    // ── Ejecutar en orden inverso ─────────────────────────────────────────────
    // chain[k] → endDia/endH (libre)
    // chain[k-1] → slot que chain[k] deja libre
    // ...
    // chain[0] → slot que chain[1] deja libre
    for (let i = chain.length - 1; i >= 0; i--) {
        const b = chain[i];

        let toDia, toH;
        if (i === chain.length - 1) {
            toDia = endDia;
            toH   = endH;
        } else {
            // Va al slot que ocupaba chain[i+1] (el que nodeFrom de chain[i+1] registra)
            const info = nodeFrom.get(chain[i + 1]);
            toDia = info.dia;
            toH   = info.h;
        }

        // Quitar posición actual (solo para bloques ya colocados)
        if (b !== bloquePendiente) {
            const pos = encontrarPosicionBloque(b);
            if (!pos) { restaurarSnapshot(snap); return false; }
            quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
        }

        aplicarAsignacion(b.grupo, b, toDia, toH);
    }

    return true;
}

// ─────────────────────────────────────────────────────────────────────────────

/**
 * Swap en cadena de 2 niveles.
 * Si el bloque pendiente no cabe en un slot porque hay exactamente UN bloque
 * obstáculo, se remueve el obstáculo, se coloca el pendiente y se intenta
 * reubicar el obstáculo en otro slot. Si no es posible, se deshace todo.
 */
/**
 * @param {number} profMaxCruzado   Si > 0, el obstáculo también puede liberarse
 *                                  mediante cascada cruzada (llama a
 *                                  intentarReestructuracionCruzada para él).
 * @param {Set}    visitadosCruzados Conjunto anti-ciclo heredado del llamador.
 */
function intentarCadenaSwap(bloquePendiente, profMaxCruzado = 0, visitadosCruzados = null) {
    const grupo   = bloquePendiente.grupo;
    const docente = bloquePendiente.docente;
    const durP    = bloquePendiente.duracion;

    for (const diaP of diasSemana) {
        if (diaP === "sabado" && docente.disponibilidad["sabado"].size === 0) continue;
        if (!docente.diasActivos.has(diaP) &&
            docente.tipo_docente === 2 &&
            docente.diasActivos.size >= docente.maxDias) continue;
        if ((grupo.sesionesDia[diaP][bloquePendiente.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloquePendiente)) continue;

        for (let idxP = 0; idxP <= grupo.baseHoras.length - durP; idxP++) {
            const hP = grupo.baseHoras[idxP];

            // El docente pendiente debe estar disponible y libre en todo el bloque
            let dpOk = true;
            for (let o = 0; o < durP; o++) {
                if (!docente.disponibilidad[diaP].has(hP + o)) { dpOk = false; break; }
                if (docente.asignado[diaP][hP + o])              { dpOk = false; break; }
            }
            if (!dpOk) continue;

            // Identificar el único obstáculo que ocupa este slot
            const obstaculos = new Map(); // bloque → hInicio
            let slotValido = true;
            for (let o = 0; o < durP; o++) {
                const ex = grupo.horario[diaP][hP + o];
                if (ex === null) continue;
                if (ex.docente === docente) { slotValido = false; break; }
                if (esInglesFijo(ex, grupo)) { slotValido = false; break; } // inglés fijo: no desplazar
                if (!obstaculos.has(ex)) {
                    // Buscar la hora de inicio del obstáculo
                    let hObs = hP + o;
                    while (hObs > grupo.baseHoras[0] && grupo.horario[diaP][hObs - 1] === ex) hObs--;
                    obstaculos.set(ex, hObs);
                }
            }
            if (!slotValido || obstaculos.size !== 1) continue;

            const [obs, hObsInicio] = [...obstaculos.entries()][0];

            // ── Remover obstáculo temporalmente ──────────────────────────────
            quitarAsignacion(grupo, obs, diaP, hObsInicio);

            // ¿Puede colocarse el bloque pendiente ahora?
            const pendColocado =
                intentarAsignar(bloquePendiente, false, false, false, false) ||
                intentarAsignar(bloquePendiente, false, true,  false, false);

            if (!pendColocado) {
                aplicarAsignacion(grupo, obs, diaP, hObsInicio); // restaurar
                continue;
            }

            // ¿Puede reubicarse el obstáculo en otro lado?
            let obsColocado =
