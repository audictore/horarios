        if (mejorN === bloquesFallidos.length || restantes.length === 0) return;

        // MCV: elegir el bloque con menos slots válidos (más difícil de colocar)
        let elegido = 0, elegidoSlots = [];
        let minS = Infinity;
        for (let i = 0; i < restantes.length; i++) {
            const s = slotsValidos(restantes[i]);
            if (s.length < minS) { minS = s.length; elegido = i; elegidoSlots = s; }
        }

        const b    = restantes[elegido];
        const rest = restantes.filter((_, i) => i !== elegido);

        // Rama 1: colocar en cada slot válido
        for (const { dia, hInicio } of elegidoSlots) {
            if (Date.now() >= endTime) return;
            aplicarAsignacion(b.grupo, b, dia, hInicio);
            bt(rest, n + 1);
            if (mejorN === bloquesFallidos.length) return;
            quitarAsignacion(b.grupo, b, dia, hInicio);
        }

        // Rama 2: saltar este bloque (buscar mejor solución parcial)
        bt(rest, n);
    }

    bt([...bloquesFallidos], 0);

    restaurarSnapshot(mejorSnap);

    if (progFn) {
        progFn(0, `🔬 Solver exacto — ${mejorN}/${bloquesFallidos.length} colocados · ${nodos} nodos`);
        await cederControlUI();
    }

    return bloquesFallidos.filter(b => !encontrarPosicionBloque(b));
}

/**
 * ─── LNS: BÚSQUEDA DE VECINO GRANDE (Ruin & Recreate) ────────────────────────
 *
 * Para cada bloque fallido: destruye un "vecindario" relacionado (todos los
 * bloques del mismo docente, del mismo grupo, o ambos), y lo reconstruye con
 * el greedy priorizando los bloques que fallaron. Si el resultado es mejor
 * (menos fallos), lo conserva; si no, restaura el mejor estado anterior.
 *
 * A diferencia del SA que mueve UN bloque a la vez, el LNS puede reorganizar
 * decenas de asignaciones en un solo paso, escapando mínimos locales profundos.
 */
async function busquedaVecinoGrande(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const endTime   = Date.now() + tiempoLimiteMs;
    let fallidosSet = new Set(bloquesFallidos);
    let mejorFallos = [...fallidosSet];
    let mejorSnap   = tomarSnapshot();
    let lastYield   = Date.now();
    let iter = 0, mejoras = 0;

    // Intenta colocar un bloque con todas las técnicas disponibles
    function colocarBloque(b) {
        return intentarAsignar(b, false, false, false, false)
            || intentarAsignar(b, false, true,  false, false)
            || intentarSwapDeHorarios(b, [])
            || intentarCadenaSwap(b)
            || intentarReestructuracionCruzada(b)
            || intentarCadenaSwap(b, 2, new Set([b]))
            || intentarCadenaAumentanteGlobal(b);
    }

    // Vecindad A: todos los bloques del mismo docente
    function vecinoDocente(b) {
        const v = [];
        MAPA_GRUPOS.forEach(g =>
            g.bloques.forEach(bl => {
                if (bl.docente === b.docente && !bl.preAsignado) v.push(bl);
            })
        );
        return v;
    }

    // Vecindad B: todos los bloques del mismo grupo
    function vecinoGrupo(b) {
        return b.grupo.bloques.filter(bl => !bl.preAsignado);
    }

    // Vecindad C: grupo del fallido + bloques del docente en otros grupos
    function vecinoGrupoMasDocente(b) {
        const v = new Set(vecinoGrupo(b));
        MAPA_GRUPOS.forEach(g =>
            g.bloques.forEach(bl => {
                if (bl.docente === b.docente && !bl.preAsignado) v.add(bl);
            })
        );
        return [...v];
    }

    const estrategias = [vecinoDocente, vecinoGrupo, vecinoGrupoMasDocente];

    while (Date.now() < endTime && mejorFallos.length > 0) {
        iter++;

        const ahora = Date.now();
        if (ahora - lastYield >= 400) {
            if (progFn) {
                const s = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                progFn(s,
                    `🔍 LNS iter ${iter} · ${mejorFallos.length} sin ubicar` +
                    ` · mejoras: ${mejoras} · ${s}s rest.`);
            }
            await cederControlUI();
            lastYield = Date.now();
        }

        // Partir siempre del mejor estado conocido
        restaurarSnapshot(mejorSnap);
        fallidosSet = new Set(mejorFallos);

        // Elegir bloque fallido y estrategia de vecindad (rotar entre las 3)
        const fallidosArr = [...fallidosSet];
        const bFallido    = fallidosArr[Math.floor(Math.random() * fallidosArr.length)];
        const vecindad    = estrategias[iter % estrategias.length](bFallido);

        if (vecindad.length <= 1) continue;

        // Ruin: quitar vecindad del horario (solo los ya colocados)
        const removidos = [];
        for (const b of vecindad) {
            if (fallidosSet.has(b)) continue;
            const pos = encontrarPosicionBloque(b);
            if (pos) {
                quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
                removidos.push(b);
            }
        }

        // Recreate: fallidos de la vecindad primero, luego los removidos
        const fallVecindad = vecindad.filter(b => fallidosSet.has(b));
        const cola = [bFallido,
                      ...fallVecindad.filter(b => b !== bFallido),
                      ...removidos];

        const nuevosFallos = new Set(fallidosSet);
        for (const b of cola) {
            if (colocarBloque(b)) nuevosFallos.delete(b);
            else                  nuevosFallos.add(b);
        }

        if (nuevosFallos.size < mejorFallos.length) {
            mejoras++;
            mejorFallos = [...nuevosFallos];
            mejorSnap   = tomarSnapshot();
            fallidosSet = nuevosFallos;
            if (mejorFallos.length === 0) break;
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * ─── REINICIO PARCIAL AGRESIVO ────────────────────────────────────────────────
 *
 * Libera el 70-85 % de los bloques colocados (no preAsignados) aleatoriamente
 * y reconstruye el horario priorizando los bloques que fallaron. Al liberar
 * tanto espacio, los fallidos encuentran el horario casi vacío y pueden
 * explorar caminos completamente nuevos que los swaps locales no pueden ver.
 *
 * Cada iteración varía la fracción liberada (70 % → 85 %) para maximizar
 * la diversidad de configuraciones exploradas.
 */
async function reinicioParcialAgresivo(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const endTime     = Date.now() + tiempoLimiteMs;
    const fallidosRef = new Set(bloquesFallidos);
    let mejorFallos   = [...bloquesFallidos];
    let mejorSnap     = tomarSnapshot();
    let lastYield     = Date.now();
    let iter = 0, mejoras = 0;

    // Fracciones altas: preserva los pocos bloques más anclados, libera casi todo lo demás
    // El shuffleArray ya garantiza que los bloques liberados sean distintos en cada iteración
    const FRACCIONES = [0.90, 0.95, 0.88, 0.97, 0.92, 0.85, 0.93, 0.90];

    while (Date.now() < endTime && mejorFallos.length > 0) {
        iter++;

        const ahora = Date.now();
        if (ahora - lastYield >= 400) {
            if (progFn) {
                const s = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                progFn(s,
                    `♻️ RPA iter ${iter} · ${mejorFallos.length} sin ubicar` +
                    ` · mejoras: ${mejoras} · ${s}s rest.`);
            }
            await cederControlUI();
            lastYield = Date.now();
        }

        // Partir del trabajo refinado por el SA, no desde cero
        restaurarSnapshot(mejorSnap);

        // Recopilar bloques colocados (excluir preAsignados y fallidos)
        const colocados = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (!fallidosRef.has(b) && !mejorFallos.some(f => f === b) && !b.preAsignado) {
                    const pos = encontrarPosicionBloque(b);
                    if (pos) colocados.push(b);
                }
            });
        });

        if (colocados.length === 0) break;

        // Mezcla aleatoria → cada iteración libera un subconjunto diferente
        const fraccion = FRACCIONES[(iter - 1) % FRACCIONES.length];
        const nLiberar = Math.max(1, Math.floor(colocados.length * fraccion));
        shuffleArray(colocados);
        const aLiberar = colocados.slice(0, nLiberar);

        for (const b of aLiberar) {
            const pos = encontrarPosicionBloque(b);
            if (pos) quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
        }

        // Intentar colocar los fallidos con el arsenal completo
        const nuevosFallos = new Set(mejorFallos);
        for (const b of mejorFallos) {
            const ok = intentarAsignar(b, false, false, false, false)
                    || intentarAsignar(b, false, true,  false, false)
                    || intentarSwapDeHorarios(b, [])
                    || intentarCadenaSwap(b)
                    || intentarCadenaAumentanteGlobal(b);
            if (ok) nuevosFallos.delete(b);
        }

        // Recolocar liberados (el orden ya es aleatorio por el shuffleArray anterior)
        for (const b of aLiberar) {
            if (nuevosFallos.has(b)) continue;
            intentarAsignar(b, false, false, false, false) ||
            intentarAsignar(b, false, true,  false, false);
        }

        if (nuevosFallos.size < mejorFallos.length) {
            mejoras++;
            mejorFallos = [...nuevosFallos];
            mejorSnap   = tomarSnapshot();
            fallidosRef.clear();
            mejorFallos.forEach(b => fallidosRef.add(b));
            if (mejorFallos.length === 0) break;
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Si un docente tiene bloques sin ubicar y sus slots disponibles en los días
 * actuales (maxDias) no alcanzan para cubrir las horas pendientes, aumenta
 * maxDias en 1 (respetando el tope institucional: PA→4, PTC→6) y reintenta
 * la asignación de sus bloques fallidos con el arsenal completo.
 *
 * La expansión es permanente dentro de la ejecución: el SA y fases posteriores
 * también se benefician del día extra.
 */
async function expandirDiasDocentes(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();
    let expansiones = 0;

    // Solo PAs no-inglés con bloques fallidos
    const candidatos = new Set(
        mejorFallos
            .filter(f => f.docente.tipo_docente === 2 && !f.docente.esDocenteIngles)
            .map(f => f.docente)
    );

    for (const d of candidatos) {
        // Tope: días donde el docente tiene disponibilidad declarada
        const diasConDisp = diasSemana.filter(dia => d.disponibilidad[dia].size > 0).length;

        // Expandir de a 1 día mientras los mejores maxDias días no alcancen.
        // Usamos slotsPorDia (ordenado desc) y comparamos los top-maxDias con horasPendientes.
        // g.horario[dia][h] ya refleja inglés pre-asignado → esos slots no cuentan.
        // hrs es un Set de horas únicas porque un docente ocupa 1 hora a la vez.
        while (d.maxDias < diasConDisp) {
            const horasPendientes = mejorFallos
                .filter(f => f.docente === d)
                .reduce((s, f) => s + f.duracion, 0);

            const slotsPorDia = diasSemana.map(dia => {
                const hrs = new Set();
                MAPA_GRUPOS.forEach(g => {
                    if (!g.bloques.some(b => b.docente === d)) return;
                    g.baseHoras.forEach(h => {
                        if (d.disponibilidad[dia].has(h)
                            && !d.asignado[dia][h]
                            && g.horario[dia][h] === null) hrs.add(h);
                    });
                });
                return hrs.size;
            }).sort((a, b) => b - a); // mejores días primero

            const slotsEnMaxDias = slotsPorDia.slice(0, d.maxDias).reduce((a, b) => a + b, 0);
            const hayDiaExtra    = slotsPorDia[d.maxDias] > 0; // siguiente día tiene slots

            // Si los mejores maxDias días ya cubren las horas o no hay día extra útil → parar
            if (slotsEnMaxDias >= horasPendientes || !hayDiaExtra) break;

            d.maxDias++;
            expansiones++;
            if (progFn) progFn(d.nombre_docente, d.maxDias, mejorFallos.length);
            await cederControlUI();
        }

        // Reintentar bloques fallidos con el día extra
        let mejoro = false;
        for (const b of [...mejorFallos.filter(f => f.docente === d)]) {
            const ok = intentarAsignar(b, false, false, false, false)
                    || intentarAsignar(b, false, true,  false, false)
                    || intentarSwapDeHorarios(b, [])
                    || intentarCadenaSwap(b)
                    || intentarCadenaAumentanteGlobal(b);
            if (ok) {
                mejorFallos = mejorFallos.filter(f => f !== b);
                mejoro = true;
            }
        }

        if (mejoro) mejorSnap = tomarSnapshot();
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Intercambio de docentes entre PAs que imparten la misma materia a distintos grupos.
 * Si docenteA → grupoA y docenteB → grupoB (misma materia+grado, ambos PAs),
 * prueba asignar docenteA → grupoB y docenteB → grupoA en busca de más caminos.
 * Solo aplica a tipo_docente === 2 (PA). Nunca toca PTCs, directivos ni TAs.
 */
async function intercambiarGruposPAs(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();
    let mejoras     = 0;
    let iter        = 0;
    let huboCambio  = true;

    while (huboCambio && mejorFallos.length > 0) {
        huboCambio = false;
        iter++;
        if (progFn) progFn(iter, mejorFallos.length);
        await cederControlUI();

        // Recopilar todos los bloques PA
        const bloquesPAs = [];
        MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
            if (b.docente.tipo_docente === 2) bloquesPAs.push(b);
        }));

        // Agrupar por materia+grado para encontrar pares candidatos
        const porMateria = new Map();
        bloquesPAs.forEach(b => {
            const key = b.materia.nombre_materia + '|' + b.materia.grado;
            if (!porMateria.has(key)) porMateria.set(key, []);
            porMateria.get(key).push(b);
        });

        outer:
        for (const [, bloques] of porMateria) {
            if (bloques.length < 2) continue;

            for (let i = 0; i < bloques.length; i++) {
                for (let j = i + 1; j < bloques.length; j++) {
                    const bA = bloques[i];
                    const bB = bloques[j];

                    if (bA.docente === bB.docente) continue; // mismo docente
                    if (bA.grupo   === bB.grupo)   continue; // mismo grupo

                    // Capturar docentes actuales (pueden haber cambiado por swaps previos)
                    const docCurrA = bA.docente;
                    const docCurrB = bB.docente;

                    // Quitar asignaciones actuales ANTES de intercambiar docentes
                    // (quitarAsignacion usa bloque.docente para limpiar su asignado)
                    const posA = encontrarPosicionBloque(bA);
                    const posB = encontrarPosicionBloque(bB);
                    if (posA) quitarAsignacion(bA.grupo, bA, posA.dia, posA.hInicio);
                    if (posB) quitarAsignacion(bB.grupo, bB, posB.dia, posB.hInicio);

                    // Intercambiar docentes
                    bA.docente = docCurrB;
                    bB.docente = docCurrA;

                    // Intentar reasignar con docentes intercambiados
                    const okA = intentarAsignar(bA, false, false, false, false)
                             || intentarAsignar(bA, false, true,  false, false)
                             || intentarSwapDeHorarios(bA, [])
                             || intentarCadenaSwap(bA);
                    const okB = intentarAsignar(bB, false, false, false, false)
                             || intentarAsignar(bB, false, true,  false, false)
                             || intentarSwapDeHorarios(bB, [])
                             || intentarCadenaSwap(bB);

                    // Calcular nuevos fallos
                    const nuevosFallos = mejorFallos.filter(f => f !== bA && f !== bB);
                    if (!okA) nuevosFallos.push(bA);
                    if (!okB) nuevosFallos.push(bB);

                    if (nuevosFallos.length < mejorFallos.length) {
                        mejoras++;
                        huboCambio  = true;
                        mejorFallos = nuevosFallos;
                        mejorSnap   = tomarSnapshot();
                        if (mejorFallos.length === 0) break outer;
                    } else {
                        // Rollback: restaurar agenda y revertir el swap de docentes
                        restaurarSnapshot(mejorSnap);
                        bA.docente = docCurrA;
                        bB.docente = docCurrB;
                    }
                }
            }
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Garantía de integridad: elimina celdas huérfanas del horario.
 * Una celda es huérfana si el bloque que la ocupa no está registrado
 * en g.bloques (puede ocurrir por cambios de split en reconfigurarSesiones
 * que no se revierten correctamente en fases posteriores).
 * También verifica que cada (materia, docente, grupo) no supere las horas
 * declaradas en los bloques de g.bloques.
 */
function normalizarHorasMaterias() {
    // Conjunto global de bloques legítimos
    const legit = new Set();
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => legit.add(b)));

    MAPA_GRUPOS.forEach(g => {
        // Horas esperadas por clave "materia|docente"
        const esperado = new Map();
        g.bloques.forEach(b => {
            const k = b.materia.nombre_materia + '|' + b.docente.nombre_docente;
            esperado.set(k, (esperado.get(k) || 0) + b.duracion);
        });

        // Paso 1: eliminar celdas con bloques no registrados en g.bloques
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (b && !legit.has(b)) {
                    g.horario[dia][h] = null;
                    delete b.docente.asignado[dia][h];
                }
            });
        });

        // Paso 2: contar horas reales y eliminar el excedente si lo hay
        const actual = new Map();
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (!b) return;
                const k = b.materia.nombre_materia + '|' + b.docente.nombre_docente;
                actual.set(k, (actual.get(k) || 0) + 1);
            });
        });

        actual.forEach((hrs, k) => {
            if (hrs <= (esperado.get(k) || 0)) return;
            // Hay más celdas de las esperadas — eliminar desde el final de la semana
            let exceso = hrs - (esperado.get(k) || 0);
            for (let di = diasSemana.length - 1; di >= 0 && exceso > 0; di--) {
                const dia = diasSemana[di];
                for (let hi = g.baseHoras.length - 1; hi >= 0 && exceso > 0; hi--) {
                    const h = g.baseHoras[hi];
                    const b = g.horario[dia][h];
                    if (!b) continue;
                    const bk = b.materia.nombre_materia + '|' + b.docente.nombre_docente;
                    if (bk !== k) continue;
                    g.horario[dia][h] = null;
                    delete b.docente.asignado[dia][h];
                    exceso--;
                }
            }
        });

        // Paso 3: recalcular sesionesDia desde el horario ya saneado
        diasSemana.forEach(dia => {
            g.sesionesDia[dia] = {};
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (!b) return;
                const mat = b.materia.nombre_materia;
                g.sesionesDia[dia][mat] = (g.sesionesDia[dia][mat] || 0) + 1;
            });
        });
    });

    // Paso 4: recalcular diasActivos de todos los docentes
    MAPA_DOCENTES.forEach(d => {
        d.diasActivos = new Set();
        diasSemana.forEach(dia => {
            if (Object.keys(d.asignado[dia]).length > 0) d.diasActivos.add(dia);
        });
    });
}

async function ejecutarAlgoritmoFinal() {
    // ── Parámetros fijos ─────────────────────────────────────────────────────
    const CFG = { sa: 180000, sa2: 120000, sa3: 90000, optim: 20000, forzIter: 12,
                  lns1: 20000, lns2: 15000, lns3: 10000,
                  rpa1: 60000, rpa: 90000, solver: 45000 };

    // ── Estrategias de arranque (8 arranques con alta diversidad) ───────────
    // Menos starts → más tiempo libre para SA que es lo más efectivo
    // "ruido" 0 = determinista, 0.12 = leve, 0.5 = agresivo, 1.0 = aleatorio
    // "invertir" = true → menos restringidos van primero
    const ESTRATEGIAS = [
        { ruido: 0,    invertir: false }, //  1: determinista
        { ruido: 0.08, invertir: false }, //  2: micro-ruido
        { ruido: 0.25, invertir: false }, //  3: leve-medio
        { ruido: 0.5,  invertir: false }, //  4: agresivo
        { ruido: 1.0,  invertir: false }, //  5: completamente aleatorio   ← élite desde aquí
        { ruido: 0,    invertir: true  }, //  6: determinista invertido
        { ruido: 0.3,  invertir: true  }, //  7: invertido medio
        { ruido: 0.75, invertir: false }, //  8: casi-aleatorio
    ];
    const N_STARTS = ESTRATEGIAS.length;
    const errDiv   = document.getElementById("span_error");
    const btn      = document.getElementById("button_accion");
    btn.disabled = true;
    btn.style.opacity = "0.5";
    const badgeEnCurso = document.getElementById('badge_en_curso');
    if (badgeEnCurso) badgeEnCurso.style.display = 'inline-block';

    function setProgreso(pct, msg, color = "#221F20") {
        errDiv.style.color = color;
        errDiv.innerHTML =
            `<div style="margin-bottom:0.5rem">${msg}</div>` +
            `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
            `<div style="background:var(--color-yellow);height:100%;width:${pct}%;` +
            `transition:width 0.25s ease;border-radius:0.5rem"></div></div>`;
    }

    let mejorFallos = null;
    let mejorSnap   = null;
    const tInicioTotal = Date.now();
    sinMejoraConsecutiva = 0; // evitar arrastre entre ejecuciones
    let mejorFallosRonda = Infinity; // mejor dentro de esta ejecución (para EDA en caliente)

    // ── Fijar inglés UNA SOLA VEZ ──────────────────────────────────────────────
    // Pre-asignamos inglés antes de cualquier arranque greedy y guardamos el
    // snapshot. Cada arranque restaura estas posiciones en lugar de recalcularlas,
    // de modo que los bloques de inglés son inmovibles durante toda la ejecución.
    setProgreso(0, '📌 Fijando clases de inglés...');
    await cederControlUI();
    MAPA_GRUPOS.forEach(g => {
        g.reset();
        g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; });
    });
    MAPA_DOCENTES.forEach(d => d.reset());
    const inglesGlobalFijados = preAsignarInglesSimultaneo(); // ← única ejecución
    const snapInglesGlobal    = tomarSnapshot();              // ← posiciones fijas

    // Mostrar qué aprendizaje hay activo antes de empezar
    {
        const partes = [];
        if (eliteOrden !== null) partes.push(`🧬 élite (${eliteFallosCount === Infinity ? '?' : eliteFallosCount} fallos)`);
        if (freqTotalRuns > 0)   partes.push(`📊 ${freqTotalRuns} ejecución${freqTotalRuns !== 1 ? 'es' : ''} EDA (${freqMap.size} bloques)`);
        const aprendizajeStr = partes.length > 0
            ? `<br><small style="color:var(--color-cerulean)">Aprendizaje activo: ${partes.join(' · ')}</small>`
            : `<br><small style="color:var(--color-gray-olive)">Sin aprendizaje previo — exploración libre</small>`;
        setProgreso(0, '🚀 Iniciando generación de horarios...' + aprendizajeStr);
        await cederControlUI();
    }

    try {
    // ── Fase 1: arranques greedy en PARALELO con Web Workers ────────────────
    {
        // Crear el blob-worker la primera vez (extrae el script de esta misma página)
        if (!_workerUrl) {
            const src = [...document.querySelectorAll('script:not([src])')].map(s => s.textContent).join('\n');
            _workerUrl = URL.createObjectURL(new Blob([src], { type: 'text/javascript' }));
        }

        // Asignar índices y serializar problema UNA sola vez
        asignarIndicesWorker();
        const problemaData = serializarProblema();

        // Pool: tantos workers como núcleos lógicos (máx. N_STARTS)
        const nW = Math.min(N_STARTS, navigator.hardwareConcurrency || 4);
        const pool = Array.from({ length: nW }, () => new Worker(_workerUrl));

        // Preparar tareas para cada arranque
        const tareas = ESTRATEGIAS.map((est, i) => ({
            problema: problemaData,
            ruido: est.ruido,
            invertir: est.invertir,
            eliteBaseIdxs: eliteOrden && i >= ELITE_EMPIEZA_EN
                ? eliteOrden.filter(b => b._wi !== undefined).map(b => b._wi) : null,
            freqData: serializarFreqMap(),
            recurrentesIdxs: [...bloquesRecurrentesFallidos].filter(b => b._wi !== undefined).map(b => b._wi),
            globalBest: globalBestFallos,
            edaBloqueado: _edaBloqueado,
            intentoNum: i
        }));

        setProgreso(2, `⚡ Lanzando <b>${N_STARTS}</b> arranques en <b>${nW}</b> núcleos en paralelo...`);
        await cederControlUI();

        const resultados = await ejecutarConPool(pool, tareas, (hecho, total, mejor) => {
            const elapsed = Math.round((Date.now() - tInicioTotal) / 1000);
            setProgreso(
                Math.round(2 + (hecho / total) * 55),
                `⚡ Arranques greedy: <b>${hecho}/${total}</b> listos &nbsp;·&nbsp; ` +
                `Mejor: <b>${mejor === Infinity ? '?' : mejor}</b> sin ubicar &nbsp;·&nbsp; ⏱ ${elapsed}s`
            );
        });

        // Terminar workers
        pool.forEach(w => w.terminate());

        // Elegir mejor resultado y restaurar estado en hilo principal
        const mejor = resultados.filter(Boolean).sort((a, b) => a.fallosCount - b.fallosCount)[0];
        restaurarDesdeWorker(mejor);
        let mejorFallosCount = mejor.fallosCount;
        mejorFallos = mejor.fallosIndices.map(i => _wBArr[i]).filter(Boolean);
        mejorSnap   = tomarSnapshot();

        // Actualizar élite y EDA con el mejor resultado
        if (mejor.ultimoOrden && mejor.ultimoOrden.length > 0) {
            const newOrden = mejor.ultimoOrden.map(i => _wBArr[i]).filter(Boolean);
            if (mejorFallosCount < eliteFallosCount) {
                eliteOrden = newOrden; eliteFallosCount = mejorFallosCount; actualizarBotonReset();
            }
        }
        if (mejorFallosCount <= globalBestFallos + NEAR_BEST_TOL) {
            if (mejorFallosCount < globalBestFallos - RESET_SALTO) { freqMap = new Map(); freqTotalRuns = 0; }
            globalBestFallos = Math.min(globalBestFallos, mejorFallosCount);
            acumularFrecuenciasDesde(mejorSnap);
        }
    }

    // Aplicar el mejor resultado encontrado
    setProgreso(58, `⚙️ Aplicando mejor resultado — <b>${mejorFallos.length}</b> bloque(s) sin ubicar...`);
    await cederControlUI();
    restaurarSnapshot(mejorSnap);

    // ── Recocido Simulado (pase 1/3) ────────────────────────────────────────
    if (mejorFallos.length > 0) {
        const SA_TIEMPO = CFG.sa;

            });
            setProgreso(92, `✅ Reconfiguración [3] — <b>${mejorFallos.length}</b> sin ubicar`);
            await cederControlUI();
        }
        if (mejorFallos.length > 0) {
            setProgreso(92, `⚡ Desbloqueo cruzado [3] — <b>${mejorFallos.length}</b> sin ubicar...`);
            await cederControlUI();
            mejorFallos = await paseForzadoCruzado(mejorFallos, (pct, msg) => {
                setProgreso(92 + Math.round(pct * 0.005), msg);
            }, CFG.forzIter);
            setProgreso(93, `✅ Desbloqueo [3] — <b>${mejorFallos.length}</b> sin ubicar`);
            await cederControlUI();
        }
        if (CFG.lns3 > 0 && mejorFallos.length > 0) {
            mejorFallos = await busquedaVecinoGrande(mejorFallos, CFG.lns3, (s, msg) => {
                setProgreso(93, `🔍 LNS [3/3] &nbsp;·&nbsp; ${msg}`);
            });
            setProgreso(94, `✅ LNS [3/3] — <b>${mejorFallos.length}</b> sin ubicar`);
            await cederControlUI();
        }
    }

    // ── Reinicio Parcial Agresivo: liberar 70-85 % y reconstruir ────────────
    if (CFG.rpa > 0 && mejorFallos.length > 0) {
        mejorFallos = await reinicioParcialAgresivo(mejorFallos, CFG.rpa, (s, msg) => {
            setProgreso(94, `♻️ RPA &nbsp;·&nbsp; ${msg}`);
        });
        setProgreso(94, `✅ RPA — <b>${mejorFallos.length}</b> sin ubicar`);
        await cederControlUI();
    }

    // ── Solver exacto (backtracking MCV) para los últimos ≤12 bloques ────────
    if (CFG.solver > 0 && mejorFallos.length > 0 && mejorFallos.length <= 12) {
        mejorFallos = await solverExacto(mejorFallos, CFG.solver, (s, msg) => {
            setProgreso(94, `🔬 Solver exacto &nbsp;·&nbsp; ${msg}`);
        });
        setProgreso(94, `✅ Solver exacto — <b>${mejorFallos.length}</b> sin ubicar`);
        await cederControlUI();
    }

    const estadoAntes = obtenerSnapshotAsignaciones();

    // ── Optimización de calidad ───────────────────────────────────────────────
    await optimizacionExhaustiva(CFG.optim, (segsRestantes) => {
        const pct = (CFG.sa2 > 0 ? 91 : 85) + Math.round((1 - segsRestantes / (CFG.optim / 1000)) * 3);
        setProgreso(Math.min(94, pct),
            `🔧 Optimizando calidad... &nbsp;<b>${segsRestantes}s</b> restantes`);
    });

    // Actualizar bloques recurrentemente fallidos → prioridad en la próxima corrida
    bloquesRecurrentesFallidos = new Set(mejorFallos);

    // A: Guardar el mejor snapshot global para warm start en la próxima ejecución
    if (mejorSnapGlobal === null || mejorFallos.length < mejorFallosGlobal.length) {
        mejorSnapGlobal   = tomarSnapshot();
        mejorFallosGlobal = [...mejorFallos];
    }

    // Acumular frecuencias EDA solo si el resultado es cercano al mejor histórico
    {
        const snapFinal = tomarSnapshot();
        const nFallos   = mejorFallos.length;

        if (nFallos <= globalBestFallos + NEAR_BEST_TOL) {
            // Mejora significativa: limpiar datos viejos para no arrastrar posiciones malas
            if (nFallos < globalBestFallos - RESET_SALTO) {
                freqMap       = new Map();
                freqTotalRuns = 0;
            }
            globalBestFallos = Math.min(globalBestFallos, nFallos);
            acumularFrecuenciasDesde(snapFinal);
        }
        // Si el run es mucho peor que el mejor, no contaminar el mapa
        actualizarBotonReset();
    }

    setProgreso(94, '✅ Generando archivo Excel...');
    await cederControlUI();

    const estadoDespues = obtenerSnapshotAsignaciones();
    LOG_CAMBIOS = [];
    for (let g in estadoAntes) {
        for (let m in estadoAntes[g]) {
            const docAntes   = estadoAntes[g][m];
            const docDespues = estadoDespues[g][m];
            if (docAntes && docDespues && docAntes !== docDespues)
                LOG_CAMBIOS.push({ Grupo: g, Materia: m, DocenteAnterior: docAntes, DocenteNuevo: docDespues });
        }
    }

    if (badgeEnCurso) badgeEnCurso.style.display = 'none';

    // Garantía final: asegurar que cada materia tenga exactamente las horas
    // que le corresponden según g.bloques. Elimina celdas huérfanas del horario.
    normalizarHorasMaterias();

    _forzarRenderHorario(); // render final con el resultado definitivo

    manejarFallos(mejorFallos, errDiv, '', () => {
        btn.disabled = false;
        btn.style.opacity = "1";
    });

    } catch (e) {
        console.error('[ejecutarAlgoritmoFinal]', e);
        if (badgeEnCurso) badgeEnCurso.style.display = 'none';
        errDiv.style.color = 'red';
        errDiv.innerHTML =
            `❌ <b>Error inesperado:</b> ${e.message || e}<br>` +
            `<small>Abre la consola del navegador (F12) para ver el detalle.</small>`;
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}

// ALGORITMO GENÉTICO — Opción A (decodificador greedy + semilla élite)
// =====================================================================

/** Evalúa la calidad del horario actual en memoria.
 *  @param {number} noAsignadosCount - bloques que el greedy no pudo ubicar
 *  @returns {number} fitness (menor = mejor) */
function calcularFitness(noAsignadosCount) {
    let f = noAsignadosCount * 500000; // bloques no colocados: penalización máxima
    MAPA_DOCENTES.forEach(d => {
        // Horas asignadas fuera de disponibilidad declarada
        diasSemana.forEach(dia => {
            Object.keys(d.asignado[dia]).forEach(hStr => {
                if (!d.disponibilidad[dia].has(parseInt(hStr))) f += 50000;
            });
        });
        // Días activos por encima de maxDias
        if (d.diasActivos.size > d.maxDias) f += 2000 * (d.diasActivos.size - d.maxDias);
    });
    MAPA_GRUPOS.forEach(g => {
        // Huecos internos en cada día de cada grupo
        diasSemana.forEach(dia => {
            let base = g.baseHoras;
            let primero = -1, ultimo = -1;
            for (let i = 0; i < base.length; i++) {
                if (g.horario[dia][base[i]] !== null) {
                    if (primero === -1) primero = i;
                    ultimo = i;
                }
            }
            if (primero !== -1) {
                for (let i = primero + 1; i < ultimo; i++) {
                    if (g.horario[dia][base[i]] === null) f += 5000;
                }
            }
        });
    });
    return f;
}

/** Fisher-Yates in-place shuffle. */
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/** Shuffle parcial: solo intercambia ~ruido*100% de posiciones (semilla semi-guiada). */
function shuffleConRuido(arr, ruido) {
    let swaps = Math.floor(arr.length * ruido);
    for (let i = 0; i < swaps; i++) {
        let a = Math.floor(Math.random() * arr.length);
        let b = Math.floor(Math.random() * arr.length);
        [arr[a], arr[b]] = [arr[b], arr[a]];
    }
    return arr;
}

/** Order Crossover (OX): copia un segmento de padreA y rellena en orden de padreB.
 *  Garantiza que cada índice aparezca exactamente una vez. */
function crossoverOX(padreA, padreB) {
    let n = padreA.length;
    let i = Math.floor(Math.random() * n);
    let j = Math.floor(Math.random() * n);
    if (i > j) [i, j] = [j, i];
    let hijo = new Array(n).fill(-1);
    let enSegmento = new Set();
    for (let k = i; k <= j; k++) { hijo[k] = padreA[k]; enSegmento.add(padreA[k]); }
    let restantes = padreB.filter(x => !enSegmento.has(x));
    let idx = 0;
    for (let k = 0; k < n; k++) { if (hijo[k] === -1) hijo[k] = restantes[idx++]; }
    return hijo;
}

/** Mutación por intercambio: con probabilidad `tasa`, swapea dos posiciones aleatorias. */
function mutar(cromosoma, tasa) {
    let c = cromosoma.slice();
    for (let i = 0; i < c.length; i++) {
        if (Math.random() < tasa) {
            let j = Math.floor(Math.random() * c.length);
            [c[i], c[j]] = [c[j], c[i]];
        }
    }
    return c;
}

/** Selección por torneo de tamaño k: elige el mejor de k individuos aleatorios. */
function seleccionTorneo(evaluados, k = 3) {
    let mejor = null;
    for (let i = 0; i < k; i++) {
        let c = evaluados[Math.floor(Math.random() * evaluados.length)];
        if (!mejor || c.fitness < mejor.fitness) mejor = c;
    }
    return mejor.crom;
}

/** Cede el control al navegador para actualizar la UI (evita congelar la pestaña). */
// ── Visualizador de horarios en tiempo real ──────────────────────────────────

let _grupoActivoHorario = null;
let _lastRenderHorario  = 0;
const HORARIO_THROTTLE  = 300; // ms mínimo entre renders

/** Crea los tabs de grupo y muestra la sección de horarios. */
function crearTabsHorarios() {
    const tabsDiv = document.getElementById('horario_tabs');
    if (!tabsDiv) return;
    tabsDiv.innerHTML = '';
    _grupoActivoHorario = null;

    MAPA_GRUPOS.forEach((grupo, nombre) => {
        const btn = document.createElement('button');
        btn.className = 'horario-tab';
        btn.textContent = nombre + ' · ' + grupo.turno.slice(0, 3).toUpperCase();
        btn.onclick = () => {
            _grupoActivoHorario = nombre;
            document.querySelectorAll('.horario-tab').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            _forzarRenderHorario();
        };
        tabsDiv.appendChild(btn);
        if (!_grupoActivoHorario) {
            _grupoActivoHorario = nombre;
            btn.classList.add('activo');
        }
    });

    document.getElementById('seccion_horarios').style.display = 'block';
    _forzarRenderHorario();
}

/** Renderiza el horario del grupo activo (fuerza render ignorando throttle). */
function _forzarRenderHorario() {
    _lastRenderHorario = 0;
    _renderHorarioActivo();
}

/** Renderiza solo el grupo activo en el contenedor. */
function _renderHorarioActivo() {
    const ahora = Date.now();
    if (ahora - _lastRenderHorario < HORARIO_THROTTLE) return;
    _lastRenderHorario = ahora;

    const wrap = document.getElementById('horario_tabla_wrap');
    if (!wrap || !_grupoActivoHorario) return;
    const grupo = MAPA_GRUPOS.get(_grupoActivoHorario);
    if (!grupo) return;

    const tabla = document.createElement('table');
    tabla.className = 'horario-tabla';

    // Cabecera de días
    const thead = document.createElement('thead');
    const trH = document.createElement('tr');
    trH.innerHTML = '<th>Hora</th>' +
        diasSemana.map(d => `<th>${d.charAt(0).toUpperCase()}${d.slice(1)}</th>`).join('');
    thead.appendChild(trH);
    tabla.appendChild(thead);

    // Filas de horas
    const tbody = document.createElement('tbody');
    grupo.baseHoras.forEach(h => {
        const tr = document.createElement('tr');
        const tdH = document.createElement('td');
        tdH.className = 'hora-label';
        tdH.textContent = h + ':00';
        tr.appendChild(tdH);

        diasSemana.forEach(dia => {
            const td = document.createElement('td');
            const bloque = grupo.horario[dia] && grupo.horario[dia][h];
            if (bloque) {
                const hex = colorParaMateria(bloque.materia.nombre_materia);
                const r = parseInt(hex.slice(0,2),16),
                      g = parseInt(hex.slice(2,4),16),
                      b = parseInt(hex.slice(4,6),16);
                const oscuro = (r*299 + g*587 + b*114) / 1000 < 140;
                td.className = 'h-celda';
                td.style.backgroundColor = '#' + hex;
                td.style.color = oscuro ? '#fff' : '#221F20';
                td.innerHTML =
                    `<span class="h-mat">${bloque.materia.nombre_materia}</span>` +
                    `<span class="h-doc">${bloque.docente.nombre_docente}</span>`;
            } else {
                td.className = 'h-celda h-libre';
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    tabla.appendChild(tbody);

    wrap.innerHTML = '';
    wrap.appendChild(tabla);
}

function cederControlUI() {
    if (!IS_WORKER) _renderHorarioActivo();
    return new Promise(resolve => setTimeout(resolve, 0));
}

/** Reset completo de grupos y docentes, limpiando también flags de bloques. */
function resetearParaAG() {
    MAPA_GRUPOS.forEach(g => {
        g.reset();
        g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; });
    });
    MAPA_DOCENTES.forEach(d => d.reset());
}

/** Punto de entrada principal: ejecuta el AG y exporta el campeón. */
async function ejecutarAG() {
    const TAM_POB       = 40;
    const GENERACIONES  = 150;
    const ELITISMO      = 5;
    const TASA_MUTACION = 0.05;

    const errDiv = document.getElementById("span_error");
    const btn    = document.getElementById("button_accion");
    btn.disabled = true;
    btn.style.opacity = "0.5";

    try {
    // ── Paso 1: construir AG_BLOQUES_SORTED con el orden greedy canónico ──────
    resetearParaAG();
    AG_BLOQUES_SORTED = [];

    MAPA_DOCENTES.forEach(d => {
        let dispTotal = 0;
        diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
        d.flexibilidad = dispTotal - d.horas_carga;
    });
    MAPA_GRUPOS.forEach(g => { AG_BLOQUES_SORTED.push(...g.bloques); });

    // Calcular flexibilidadEfectiva (mismo criterio que el greedy normal)
    let docGrupoFlex = new Map();
    AG_BLOQUES_SORTED.forEach(b => {
        let key = b.docente.nombre_docente + '|' + b.grupo.nombre_grupo;
        if (!docGrupoFlex.has(key)) {
            let diasDisponibles = 0;
            diasSemana.forEach(dia => {
                if (b.grupo.baseHoras.some(h => b.docente.disponibilidad[dia].has(h))) diasDisponibles++;
            });
            let sesiones = b.grupo.bloques.filter(bl => bl.docente === b.docente).length;
            docGrupoFlex.set(key, diasDisponibles - sesiones);
        }
        b.flexibilidadEfectiva = docGrupoFlex.get(key);
    });

    AG_BLOQUES_SORTED.sort((a, b) => {
        // 0. Inglés siempre primero
        let aI = esIngles(a) ? 1 : 0, bI = esIngles(b) ? 1 : 0;
        if (aI !== bI) return bI - aI;

        if (a.flexibilidadEfectiva !== b.flexibilidadEfectiva) return a.flexibilidadEfectiva - b.flexibilidadEfectiva;
        let pA = (a.materia.tsu || a.docente.tipo_docente === 1 || a.docente.flexibilidad <= 0) ? 1 : 0;
        let pB = (b.materia.tsu || b.docente.tipo_docente === 1 || b.docente.flexibilidad <= 0) ? 1 : 0;
        if (pA !== pB) return pB - pA;
        let tA = a.docente.turnosAsignados.size, tB = b.docente.turnosAsignados.size;
        if (tA !== tB) return tB - tA;
        if (a.docente.flexibilidad !== b.docente.flexibilidad) return a.docente.flexibilidad - b.docente.flexibilidad;
        return b.duracion - a.duracion;
    });

    let n     = AG_BLOQUES_SORTED.length;
    let elite = Array.from({ length: n }, (_, i) => i); // [0,1,2,...,n-1] = orden greedy

    // ── Paso 2: inicializar población ────────────────────────────────────────
    let poblacion = [elite.slice()]; // individuo 0: élite (semilla greedy exacta)
    let semiGuiados = Math.floor(TAM_POB * 0.3);
    for (let i = 0; i < semiGuiados; i++) poblacion.push(shuffleConRuido(elite.slice(), 0.1));
    while (poblacion.length < TAM_POB)   poblacion.push(shuffleArray(elite.slice()));

    let mejorGlobal = { fitness: Infinity, cromosoma: null, fallos: [] };
    const inicio = Date.now();

    // ── Paso 3: loop generacional ────────────────────────────────────────────
    for (let gen = 0; gen < GENERACIONES; gen++) {
        let evaluados = [];

        for (let idxCrom = 0; idxCrom < poblacion.length; idxCrom++) {
            const crom = poblacion[idxCrom];
            resetearParaAG();
            let fallos  = await construccionVorazCascada(crom);
            let fitness = calcularFitness(fallos.length);
            evaluados.push({ crom: crom.slice(), fitness, fallos });

            // Ceder al navegador cada ~5 individuos para mantener la UI responsiva
            if (idxCrom % 5 === 4) {
                const pctInner = Math.round(
                    ((gen + (idxCrom + 1) / poblacion.length) / GENERACIONES) * 100
                );
                const elInner = Math.round((Date.now() - inicio) / 1000);
                errDiv.innerHTML =
                    `<div style="margin-bottom:0.4rem">🧬 <b>Generación ${gen + 1} / ${GENERACIONES}</b>` +
                    ` &nbsp;·&nbsp; individuo ${idxCrom + 1}/${poblacion.length}` +
                    ` &nbsp;·&nbsp; ⏱ ${elInner}s</div>` +
                    `<div style="margin-bottom:0.4rem">Mejor fitness: <b>${mejorGlobal.fitness.toLocaleString()}</b>` +
                    ` &nbsp;·&nbsp; Sin ubicar: <b>${mejorGlobal.fallos.length}</b></div>` +
                    `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
                    `<div style="background:var(--color-yellow);height:100%;width:${pctInner}%;` +
                    `transition:width 0.15s;border-radius:0.5rem"></div></div>`;
                errDiv.style.color = "#221F20";
                await cederControlUI();
            }
        }

        evaluados.sort((a, b) => a.fitness - b.fitness);

        if (evaluados[0].fitness < mejorGlobal.fitness) {
            mejorGlobal = {
                fitness:   evaluados[0].fitness,
                cromosoma: evaluados[0].crom.slice(),
                fallos:    evaluados[0].fallos
            };
        }

        // Actualizar UI al final de la generación
        let pct     = Math.round(((gen + 1) / GENERACIONES) * 100);
        let elapsed = Math.round((Date.now() - inicio) / 1000);
        errDiv.innerHTML =
            `<div style="margin-bottom:0.4rem">🧬 <b>Generación ${gen + 1} / ${GENERACIONES}</b> &nbsp;·&nbsp; ⏱ ${elapsed}s</div>` +
            `<div style="margin-bottom:0.4rem">Mejor fitness: <b>${mejorGlobal.fitness.toLocaleString()}</b> &nbsp;·&nbsp; Bloques sin ubicar: <b>${mejorGlobal.fallos.length}</b></div>` +
            `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
            `<div style="background:var(--color-yellow);height:100%;width:${pct}%;transition:width 0.2s;border-radius:0.5rem"></div></div>`;
        errDiv.style.color = "#221F20";
        await cederControlUI();

        // Nueva generación: élite intacta + crossover + mutación
        let nueva = evaluados.slice(0, ELITISMO).map(e => e.crom.slice());
        while (nueva.length < TAM_POB) {
            let hijo = crossoverOX(seleccionTorneo(evaluados), seleccionTorneo(evaluados));
            nueva.push(mutar(hijo, TASA_MUTACION));
        }
        poblacion = nueva;
    }

    // ── Paso 4: decodificar campeón con gravedad completa (30 seg) ───────────
    errDiv.innerHTML =
        `<div>🏆 Evolución completada. Fitness campeón: <b>${mejorGlobal.fitness.toLocaleString()}</b></div>` +
        `<div style="margin-top:0.4rem">⚙️ Aplicando motor de gravedad completo (30 seg)...</div>` +
        `<div style="background:#ddd;border-radius:0.5rem;height:1.2rem;overflow:hidden;margin-top:0.4rem">` +
        `<div style="background:var(--color-yellow);height:100%;width:100%;border-radius:0.5rem"></div></div>`;
    await cederControlUI();

    resetearParaAG();
    let estadoAntes   = obtenerSnapshotAsignaciones();
    let fallosFinales = await construccionVorazCascada(mejorGlobal.cromosoma);
    await optimizacionExhaustiva(30000);
    let estadoDespues = obtenerSnapshotAsignaciones();

    LOG_CAMBIOS = [];
    for (let g in estadoAntes) {
        for (let m in estadoAntes[g]) {
            let dA = estadoAntes[g][m], dD = estadoDespues[g]?.[m];
            if (dA && dD && dA !== dD) LOG_CAMBIOS.push({ Grupo: g, Materia: m, DocenteAnterior: dA, DocenteNuevo: dD });
        }
    }

    const elapsed = Math.round((Date.now() - inicio) / 1000);
    const prefijo = `AG completado en ${elapsed}s — Fitness: ${mejorGlobal.fitness.toLocaleString()}. `;
    manejarFallos(fallosFinales, errDiv, prefijo, () => {
        btn.disabled = false;
        btn.style.opacity = "1";
    });

    } catch (e) {
        console.error('[ejecutarAG]', e);
        errDiv.style.color = 'red';
        errDiv.innerHTML =
            `❌ <b>Error inesperado:</b> ${e.message || e}<br>` +
            `<small>Abre la consola del navegador (F12) para ver el detalle.</small>`;
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}

// ─── Expansión interactiva de días de asistencia ─────────────────────────────

/**
 * Dado un arreglo de bloques no asignados, detecta qué docentes podrían
 * colocarlos si se les permitiera un día adicional.
 * Devuelve Map<docente, {diasActual, bloques[]}>.
 */
function detectarNecesidadesExtraDia(bloques) {
    const necesidades = new Map();
    for (const bloque of bloques) {
        const d = bloque.docente;
        const g = bloque.grupo;
        // PAs: días de asistencia son regla institucional dura, nunca se expanden
        if (d.tipo_docente === 2) continue;
        // Solo aplica si el docente YA llegó a su límite
        if (d.diasActivos.size < d.maxDias) continue;
        // Buscar al menos un slot válido en un DÍA NUEVO para este docente
        let haySlot = false;
        outer: for (const dia of diasSemana) {
            if (d.diasActivos.has(dia)) continue; // no es día nuevo
            for (const h of g.baseHoras) {
                if (g.horario[dia][h] !== null)          continue; // grupo ocupado
                if (d.asignado[dia][h])                  continue; // docente ocupado
                if (!d.disponibilidad[dia].has(h))       continue; // sin disponibilidad
                if ((g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= 1) continue;
                haySlot = true; break outer;
            }
        }
        if (!haySlot) continue;
        if (!necesidades.has(d)) necesidades.set(d, { diasActual: d.maxDias, bloques: [] });
        necesidades.get(d).bloques.push(bloque);
    }
    return necesidades;
}

/**
 * Busca el mejor slot FORZADO (fuera de disponibilidad) para un bloque.
 * No aplica la asignación. Devuelve {dia, hInicio, horasFueraDisp} o null.
 */
function encontrarSlotForzado(bloque) {
    // PAs: disponibilidad es regla institucional absoluta. NUNCA se fuerza.
    if (bloque.docente.tipo_docente === 2) return null;

    const grupo  = bloque.grupo;
    const docente = bloque.docente;
    let mejorCosto  = Infinity;
    let mejorOpcion = null;

    diasSemana.forEach(dia => {
        const activaNuevoDia = !docente.diasActivos.has(dia);
        // PAs: regla institucional dura — nunca abrir día nuevo si ya en maxDias
        if (activaNuevoDia && docente.tipo_docente === 2 &&
            docente.diasActivos.size >= docente.maxDias) return;
        // No sesión doble de misma materia en el mismo día
        if ((grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= 1) return;

        const base      = grupo.baseHoras;
        const dispHoras = docente.disponibilidad[dia];

        // Límites de la ventana de disponibilidad declarada en este día
        let minDisp = Infinity, maxDisp = -Infinity;
        dispHoras.forEach(h => {
            if (h < minDisp) minDisp = h;
            if (h > maxDisp) maxDisp = h;
        });

        for (let idx = 0; idx <= base.length - bloque.duracion; idx++) {
            const hInicio = base[idx];
            let valido = true;
            let horasFueraDisp = 0;
            for (let h = hInicio; h < hInicio + bloque.duracion; h++) {
                if (grupo.horario[dia][h]  !== null)  { valido = false; break; }
                if (docente.asignado[dia][h])          { valido = false; break; }
                if (!dispHoras.has(h)) horasFueraDisp++;
            }
            // Solo es FORZADO si al menos 1 hora está fuera de disponibilidad
            if (!valido || horasFueraDisp === 0) continue;

            // ── Calcular horas de espera ("gap") ──────────────────────────────
            // Si el bloque forzado queda ANTES del inicio de disponibilidad,
            // el docente llega anticipadamente y queda varado hasta que empiece
            // su ventana normal — esas horas de espera son parte del impacto real.
            // Lo mismo aplica si el bloque queda DESPUÉS del fin de disponibilidad.
            let gapHoras = 0;
            if (dispHoras.size > 0) {
                const finBloque = hInicio + bloque.duracion;
                if (finBloque <= minDisp) {
                    // Bloque completamente antes de la disponibilidad
                    gapHoras = minDisp - finBloque;
                } else if (hInicio > maxDisp) {
                    // Bloque completamente después de la disponibilidad
                    gapHoras = hInicio - (maxDisp + 1);
                }
                // Si el bloque se mezcla (parte dentro, parte fuera): no hay gap adicional
                // porque ya está penalizado por horasFueraDisp
            }

            const impactoReal = horasFueraDisp + gapHoras;
            const costo = impactoReal * 50000 + (activaNuevoDia ? 500 : 0);
            if (costo < mejorCosto) {
                mejorCosto  = costo;
                mejorOpcion = { dia, hInicio, horasFueraDisp, gapHoras, impactoReal };
            }
        }
    });

    return mejorOpcion;
}

/**
 * Panel Fase 2: el usuario aprueba colocaciones FORZADAS (fuera de disponibilidad).
 * @param {Array}    bloquesForzables – [{bloque, slot:{dia,hInicio,horasFueraDisp}}]

function mostrarPanelForzado(bloquesForzables, onAplicar) {

    panel.innerHTML = `

            Aprueba los que deseas conservar (quedarán marcados como <em>FORZADO</em>)
            o desmarca los que dejarás sin asignar.
        </p>
        <div style="max-height:260px;overflow-y:auto">${rows}</div>
        <div style="margin-top:1rem;display:flex;gap:0.8rem;flex-wrap:wrap">

                style="background:#FFAB91;border:none;padding:0.5rem 1.4rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       font-weight:bold;cursor:pointer;font-size:0.85rem">

            </button>

                style="background:transparent;border:2px solid #ccc;padding:0.5rem 1.2rem;

}

/**
 * Panel Fase 3: informa al usuario de bloques que no pueden asignarse
 * de ninguna manera. Solo puede confirmar para continuar.
 * @param {Array}    bloquesImposibles – bloques sin solución
 * @param {Function} onConfirmar       – callback sin argumentos
 */
function mostrarPanelImposibles(bloquesImposibles, onConfirmar) {
    document.getElementById('panel_imposibles')?.remove();

    const panel = document.createElement('div');
    panel.id = 'panel_imposibles';
    panel.style.cssText = `
        margin:1.5rem 3rem; background:#fff;
        border:2px solid #EF9A9A; border-radius:1rem;
        padding:1.5rem; font-family:var(--font-roboto-mono); font-size:0.85rem;
        box-shadow:0 4px 16px rgba(0,0,0,0.08);
    `;

    let rows = '';
    bloquesImposibles.forEach(bloque => {
        const d    = bloque.docente;
        const g    = bloque.grupo;
        const tipo = d.tipo_docente === 2 ? 'PA' : (d.categoria || 'PTC');

        // ── Diagnóstico detallado ──────────────────────────────────────────────
        // 1. Disponibilidad total del docente (horas declaradas)
        let horasDisp = 0;
        diasSemana.forEach(dia => { horasDisp += d.disponibilidad[dia].size; });

        // 2. Horas ya asignadas del docente en otros grupos
        let horasAsignadas = 0;
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => { if (d.asignado[dia][h]) horasAsignadas++; });
        });
        // contar TODAS las horas asignadas en cualquier grupo
        let horasTotAsign = 0;
        diasSemana.forEach(dia => {
            Object.keys(d.asignado[dia]).forEach(h => { if (d.asignado[dia][h]) horasTotAsign++; });
        });

        // 3. Grupos del docente que generan conflicto con este bloque
        const gruposEnConflicto = new Set();
        let haySlotGrupo        = false;
        let hayDispDoc          = false;
        let docOcupadoEnDisp    = false;
        let sesionesMismaMateria    = 0; // días del grupo con sesión de esta materia
        let diasConDispYSesion      = 0; // teacher has disp AND group has session of M
        let diasConDispSinSesion    = 0; // teacher has disp AND group has NO session of M (day potentially usable)
        let diasConDispSinSesionConSlots = 0; // as above + group has at least 1 free slot that day

        diasSemana.forEach(dia => {
            const tieneSesion = (g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= 1;
            const tieneDisp   = g.baseHoras.some(h => d.disponibilidad[dia].has(h));
            if (tieneSesion) sesionesMismaMateria++;
            if (tieneSesion && tieneDisp) diasConDispYSesion++;
            if (!tieneSesion && tieneDisp) {
                diasConDispSinSesion++;
                const tieneSlotLibre = g.baseHoras.some(h => g.horario[dia][h] === null);
                if (tieneSlotLibre) diasConDispSinSesionConSlots++;
            }
            if (tieneSesion) return; // regla: 1 sesión por materia por día
            const dispDia = d.disponibilidad[dia];
            for (let idx = 0; idx <= g.baseHoras.length - bloque.duracion; idx++) {
                const h = g.baseHoras[idx];
                let grupoLibre = true, docDisp = true, docLibre = true;
                for (let o = 0; o < bloque.duracion; o++) {
                    if (g.horario[dia][h + o] !== null)        grupoLibre = false;
                    if (!dispDia.has(h + o))                   docDisp = false;
                    if (d.asignado[dia][h + o])                docLibre = false;
                }
                if (!grupoLibre) continue;
                if (grupoLibre) haySlotGrupo = true;
                if (!docDisp)   continue;
                hayDispDoc = true;
                if (!docLibre) {
                    docOcupadoEnDisp = true;
                    // ¿en qué grupo está ocupado?
                    for (const [, g2] of MAPA_GRUPOS) {
                        if (g2 === g) continue;
                        for (let o = 0; o < bloque.duracion; o++) {
                            const ex = g2.horario[dia][h + o];
                            if (ex && ex.docente === d) {
                                gruposEnConflicto.add(`${g2.nombre_grupo} (${dia} ${h + o}h)`);
                            }
                        }
                    }
                }
            }
        });

        // 4. Determinar motivo principal
        let motivo, motivoColor = '#C62828';
        if (!haySlotGrupo) {
            motivo = '🔴 El grupo no tiene horas libres. Reducir carga de otras materias.';
        } else if (!hayDispDoc && diasConDispYSesion > 0 && diasConDispSinSesion === 0) {
            // Docente SOLO tiene disponibilidad en días que ya tienen sesión de esta materia
            // → necesita más días de disponibilidad en el dato
            const sesTotal = sesionesMismaMateria + 1; // ya colocadas + esta
            motivo = `🔴 Deadlock de sesiones: el docente solo tiene disponibilidad en ${diasConDispYSesion} día(s), `
                   + `todos ya ocupados por otra sesión de esta materia. `
                   + `Esta materia necesita ${sesTotal} días distintos pero el docente solo cubre ${diasConDispYSesion}. `
                   + `<b>Solución: ampliar disponibilidad del docente a ≥${sesTotal} días para este grupo.</b>`;
        } else if (!hayDispDoc && diasConDispYSesion > 0 && diasConDispSinSesionConSlots === 0) {
            // Docente tiene disponibilidad en días sin sesión, pero esos días tienen todos los slots ocupados
            // → problema de congestion en el grupo, algoritmo de swaps no pudo liberar espacio
            motivo = `🔴 Días disponibles bloqueados: el docente tiene disponibilidad en ${diasConDispSinSesion} día(s) sin sesión `
                   + `de esta materia, pero todos los slots de esos días están ocupados por otros docentes. `
                   + `<b>El algoritmo no pudo liberar espacio. Considera reducir la carga del grupo o ampliar el horario base.</b>`;
        } else if (!hayDispDoc && diasConDispYSesion > 0) {
            // Días sin sesión existen pero no con slots/disponibilidad suficiente
            motivo = `🔴 Días disponibles insuficientes: el docente tiene ${diasConDispYSesion} día(s) con disponibilidad `
                   + `ya ocupados por sesiones de esta materia, y ${diasConDispSinSesion} día(s) sin sesión `
                   + `pero sin hueco libre compatible. `
                   + `Ampliar disponibilidad o reducir horas de la materia.`;
        } else if (!hayDispDoc) {
            motivo = '🔴 El docente no tiene disponibilidad en ningún hueco libre del grupo. Ampliar su disponibilidad en los datos.';
        } else if (docOcupadoEnDisp) {
            const lista = [...gruposEnConflicto].slice(0, 4).join(', ');
            motivo = `🟡 Docente disponible pero ocupado en: <em>${lista || 'otro grupo'}</em>. `
                   + `El algoritmo no pudo liberar ese slot (posible deadlock con sesiones de esos grupos).`;
            motivoColor = '#E65100';
        } else {
            motivo = '🟠 Contiguidad o sesión doble impide la colocación. Revisar horario base del grupo.';
            motivoColor = '#E65100';
        }

        rows += `
        <div style="padding:0.7rem 0;border-bottom:1px solid #f0f0f0;">
            <div style="display:flex;align-items:baseline;gap:0.4rem;flex-wrap:wrap">
                <strong>${d.nombre_docente}</strong>
                <span style="background:${tipo==='PA'?'#E3F2FD':'#F3E5F5'};
                    color:${tipo==='PA'?'#1565C0':'#6A1B9A'};
                    border-radius:0.3rem;padding:0 0.35rem;font-size:0.72rem">
                    ${tipo}
                </span>
                <span style="color:#555">→</span>
                <strong>${bloque.materia.nombre_materia}</strong>
                <span style="color:var(--color-dim-gray)">[${g.nombre_grupo}]</span>
                <span style="color:var(--color-dim-gray);font-size:0.75rem">
                    · Disp: ${horasDisp}h · Asignadas: ${horasTotAsign}h
                </span>
            </div>
            <div style="color:${motivoColor};font-size:0.76rem;margin-top:0.3rem">
                ${motivo}
            </div>
        </div>`;
    });

    panel.innerHTML = `
        <h3 style="margin:0 0 0.5rem;font-size:0.95rem;color:var(--color-black)">
            ❌ Bloques sin solución posible
        </h3>
        <p style="margin:0 0 1rem;color:var(--color-dim-gray);font-size:0.82rem">
            Los siguientes bloques no pueden colocarse en ningún horario disponible,
            ni siquiera fuera de la disponibilidad declarada.
            Revisa la carga o disponibilidad del docente y regenera el horario para incluirlos.
        </p>
        <div style="max-height:260px;overflow-y:auto">${rows}</div>
        <div style="margin-top:1rem">
            <button id="btn_confirmar_imp"
                style="background:#EF9A9A;border:none;padding:0.5rem 1.4rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       font-weight:bold;cursor:pointer;font-size:0.85rem">
                Entendido — exportar horario parcial
            </button>
        </div>`;

    const ancla = document.getElementById('seccion_desglose') || document.body;
    ancla.before(panel);

    panel.querySelector('#btn_confirmar_imp').onclick = () => {
        panel.remove();
        onConfirmar();
    };
}
