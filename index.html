// MOTOR CSP (beta) — integración no destructiva del engine de restricciones (JS puro)
// Convierte las estructuras ya parseadas (MAPA_*) al formato del engine, corre los
// pre-checks de capacidad (escalan a datos reales) y, acotado por tamaño, el solver CP.
// No interfiere con el pipeline metaheurístico de ejecutarAlgoritmoFinal().
// ═══════════════════════════════════════════════════════════════════════════════

/** Adapta MAPA_DOCENTES / MAPA_GRUPOS al formato { grupos, docentes, cargas } del engine. */
function construirDatosCSP() {
    const grupos = {}, docentes = {}, cargasMap = new Map();
    MAPA_GRUPOS.forEach((g, gn) => {
        grupos[gn] = { turno: g.turno };
        g.bloques.forEach(b => {
            const dn = b.docente.nombre_docente;
            if (!docentes[dn]) {
                const disp = {};
                diasSemana.forEach((dia, i) => {
                    const hrs = [...b.docente.disponibilidad[dia]];
                    if (hrs.length) disp[i] = hrs;
                });
                // tipo del docente: 2 = PA (días por escalón); 1/otros = según disponibilidad.
                docentes[dn] = { disponibilidad: disp, tipo: b.docente.tipo_docente };
            }
            // La carga total de un (grupo,materia,docente) = suma de las duraciones de sus bloques.
            const key = gn + '|' + b.materia.nombre_materia + '|' + dn;
            const cur = cargasMap.get(key);
            if (cur) {
                cur.horas += b.duracion;
            } else {
                // Inglés simultáneo: mismo cuatrimestre (grado) → misma hora en todos los grupos,
                // salvo 8° y 9° que NO se sincronizan. La clave `sync` agrupa por cuatrimestre.
                const grado = b.materia.grado_materia;
                const esIngles = normalizarNombre(b.materia.nombre_materia).includes('ingles');
                const nc = { grupo: gn, materia: b.materia.nombre_materia, docente: dn, turno: g.turno, horas: b.duracion };
                if (esIngles && grado !== 8 && grado !== 9) nc.sync = 'INGLES|' + grado;
                cargasMap.set(key, nc);
            }
        });
    });
    return { grupos, docentes, cargas: [...cargasMap.values()] };
}

function _abrevCSP(nombre) {
    return String(nombre).replace(/\s+/g, ' ').trim().slice(0, 7);
}

/** Dibuja una rejilla neo-brutalista por grupo a partir de los bloques colocados por el engine. */
function renderGridCSP(bloques) {
    const porGrupo = new Map();
    bloques.forEach(b => { if (!porGrupo.has(b.grupo)) porGrupo.set(b.grupo, []); porGrupo.get(b.grupo).push(b); });
    let html = '';
    [...porGrupo.keys()].sort().forEach(gn => {
        const blks = porGrupo.get(gn);
        const g = MAPA_GRUPOS.get(gn) || {};
        const base = g.baseHoras || [];
        const cel = {};
        blks.forEach(b => { for (let h = b.inicio; h < b.inicio + b.duracion; h++) cel[b.dia + '|' + h] = b; });
        html += `<table class="csp-grid"><caption>${gn} · ${g.turno || ''}</caption><thead><tr><th></th>` +
            diasSemana.map(d => `<th>${d.slice(0, 3)}</th>`).join('') + `</tr></thead><tbody>`;
        base.forEach(h => {
            html += `<tr><th>${h}:00</th>`;
            diasSemana.forEach((d, i) => {
                const b = cel[i + '|' + h];
                html += b
                    ? `<td class="ocupado" title="${b.materia} · ${b.docente}">${_abrevCSP(b.materia)}</td>`
                    : `<td></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
    });
    return html;
}

/** Resuelve UN clúster (cuatrimestre) con la disponibilidad de docentes ya recortada. */
function _resolverClusterCSP(datos, cuatri, dispMut, ventanas, op) {
    const cuatriDe = g => parseInt(String(g).match(/^(\d+)/)[1]);
    const cargas = datos.cargas.filter(c => cuatriDe(c.grupo) === cuatri);
    const grupos = {}, docentes = {};
    for (const c of cargas) {
        grupos[c.grupo] = datos.grupos[c.grupo];
        if (!docentes[c.docente]) {
            const dd = {}; for (const d in dispMut[c.docente]) { const a = [...dispMut[c.docente][d]]; if (a.length) dd[d] = a; }
            docentes[c.docente] = { tipo: datos.docentes[c.docente].tipo, disponibilidad: dd };
        }
    }
    const total = cargas.reduce((s, c) => s + c.horas, 0);
    const r = Engine.resolverFactible({ grupos, docentes, cargas }, Object.assign({ ventanas }, op));
    return { cuatri, total, r };
}

/** Exporta los bloques colocados por el CP a un .xlsx (una hoja por grupo) con el XLSX del app. */
function exportarCSPaExcel(bloques) {
    if (typeof XLSX === 'undefined') { alert('XLSX no está disponible en esta página.'); return; }
    const wb = XLSX.utils.book_new();
    const porGrupo = new Map();
    bloques.forEach(b => { if (!porGrupo.has(b.grupo)) porGrupo.set(b.grupo, []); porGrupo.get(b.grupo).push(b); });
    [...porGrupo.keys()].sort().forEach(gn => {
        const g = MAPA_GRUPOS.get(gn) || {}; const base = g.baseHoras || [];
        const cel = {}; porGrupo.get(gn).forEach(b => { for (let h = b.inicio; h < b.inicio + b.duracion; h++) cel[b.dia + '|' + h] = b; });
        const aoa = [['HORA', ...diasSemana.map(d => d.toUpperCase())]];
        base.forEach(h => {
            const fila = [`${h}:00 - ${h + 1}:00`];
            diasSemana.forEach((d, i) => { const b = cel[i + '|' + h]; fila.push(b ? `${b.materia} (${b.docente})` : ''); });
            aoa.push(fila);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), String(gn).replace(/[\\/?*:\[\]]/g, '-').slice(0, 31));
    });
    XLSX.writeFile(wb, 'Horario_CP.xlsx');
}

/** Orquesta la corrida del motor CSP (por clústeres, con reinicios acotados) en #csp_resultado. */
function ejecutarMotorCSP() {
    const out = document.getElementById('csp_resultado');
    if (!window.Engine || !window.Prechecks) {
        out.innerHTML = ESTILO_CSP + `<div class="csp-box csp-err">Módulos CSP no cargados (revisa /src/*.js).</div>`;
        return;
    }
    let cant = 0; MAPA_GRUPOS.forEach(g => cant += g.bloques.length);
    if (cant === 0) {
        out.innerHTML = ESTILO_CSP + `<div class="csp-box csp-err">Carga una plantilla válida primero.</div>`;
        return;
    }
    out.innerHTML = ESTILO_CSP + `<div class="csp-box">⏳ Resolviendo con el motor CP (reinicios aleatorizados, por cuatrimestre)… puede tardar unos segundos.</div>`;
    setTimeout(() => _correrMotorCSP(out), 40); // cede el hilo para pintar el mensaje
}

async function _correrMotorCSP(out) {
    const ventanas = { matutino: [7, 16], vespertino: [12, 21] };
    const datos = construirDatosCSP();
    let html = ESTILO_CSP + `<div class="csp-box"><b>Motor CSP</b> · ${datos.cargas.length} cargas · ` +
        `${Object.keys(datos.docentes).length} docentes · ${Object.keys(datos.grupos).length} grupos</div>`;

    // 1) Pre-checks de capacidad (Nivel 1): nombran al culpable si hay un dato imposible.
    const problemas = Prechecks.verificarCapacidad(datos, { ventanas });
    if (problemas.length) {
        out.innerHTML = html + `<div class="csp-box csp-err"><b>⛔ ${problemas.length} problema(s) de datos (Nivel 1):</b><ul>` +
            problemas.map(p => `<li><code>${p.id}</code> ${p.mensaje}</li>`).join('') + `</ul></div>`;
        return;
    }
    html += `<div class="csp-box csp-ok">✅ Pre-checks Nivel 1 superados.</div>`;

    // 2) Resolver por clústeres (cuatrimestre), matutino primero, arrastrando ocupación de docentes.
    const cuatriDe = g => parseInt(String(g).match(/^(\d+)/)[1]);
    const turnoDe = c => datos.grupos[Object.keys(datos.grupos).find(g => cuatriDe(g) === c)].turno;
    const cuatris = [...new Set(Object.keys(datos.grupos).map(cuatriDe))]
        .sort((a, b) => (turnoDe(a) === 'matutino' ? 0 : 1) - (turnoDe(b) === 'matutino' ? 0 : 1) || a - b);
    const dispMut = {};
    for (const k in datos.docentes) { dispMut[k] = {}; for (const d in datos.docentes[k].disponibilidad) dispMut[k][d] = new Set(datos.docentes[k].disponibilidad[d]); }

    const op = { maxNodos: 3000000, maxNodosTope: 3000000, maxIntentos: 30, maxMs: 10000 }; // tope 10s/clúster
    const bloques = [], filas = [];
    const t0 = performance.now();
    for (const cuatri of cuatris) {
        out.innerHTML = html + `<div class="csp-box">⏳ Resolviendo ${cuatri}°…` +
            (filas.length ? `<ul>${filas.join('')}</ul>` : '') + `</div>`;
        await new Promise(res => setTimeout(res, 25)); // ceder para pintar el progreso
        let cl;
        try { cl = _resolverClusterCSP(datos, cuatri, dispMut, ventanas, op); }
        catch (e) { filas.push(`<li>${cuatri}°: ⛔ ${e.message}</li>`); continue; }
        if (cl.r.ok) {
            const col = cl.r.horario.bloques.reduce((s, b) => s + b.duracion, 0);
            filas.push(`<li>${cuatri}°: ✅ completo (${col}/${cl.total}h · ${cl.r.intentos} intento(s))</li>`);
            for (const b of cl.r.horario.bloques) { bloques.push(b); for (let h = b.inicio; h < b.inicio + b.duracion; h++) if (dispMut[b.docente] && dispMut[b.docente][b.dia]) dispMut[b.docente][b.dia].delete(h); }
        } else {
            filas.push(`<li>${cuatri}°: ⚠️ no resuelto en el presupuesto (${cl.total}h) — clúster muy denso (acotado por tiempo, no es prueba de infactibilidad)</li>`);
        }
    }
    const ms = Math.round(performance.now() - t0);

    const totalReq = datos.cargas.reduce((s, c) => s + c.horas, 0);
    const totalCol = bloques.reduce((s, b) => s + b.duracion, 0);
    const completo = totalCol === totalReq;
    html += `<div class="csp-box ${completo ? 'csp-ok' : 'csp-warn'}">${completo ? '✅' : '◑'} ` +
        `<b>${totalCol}/${totalReq}h</b> colocadas · ${ms} ms<ul>${filas.join('')}</ul></div>`;
    if (bloques.length) {
        html += `<div class="csp-box"><button class="button_accion" id="csp_descargar">⬇ Descargar Excel (CP)</button> ` +
            `<span style="font-size:0.8rem">— inglés sincronizado y grupos resueltos validados por el oráculo.</span></div>`;
        html += renderGridCSP(bloques);
    }
    out.innerHTML = html;
    const btn = document.getElementById('csp_descargar');
    if (btn) btn.onclick = () => exportarCSPaExcel(bloques);
}

/** Asigna índices _wi a docentes, grupos, materias y bloques.
 *  Debe llamarse antes de serializarProblema() y de usar _wBArr. */
function asignarIndicesWorker() {
    let dIdx = 0; MAPA_DOCENTES.forEach(d => { d._wi = dIdx++; });
    let gIdx = 0; MAPA_GRUPOS.forEach(g => { g._wi = gIdx++; });
    let mIdx = 0; const matKey = new Map();
    let bIdx = 0;
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        b._wi = bIdx++;
        const k = b.materia.nombre_materia + '|' + b.materia.grado_materia + '|' + b.materia.turno_materia;
        if (!matKey.has(k)) { matKey.set(k, mIdx); b.materia._wi = mIdx++; }
        else b.materia._wi = matKey.get(k);
    }));
    _wBArr = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => { _wBArr[b._wi] = b; }));
}

/** Serializa todo el problema para enviarlo a un Worker. */
function serializarProblema() {
    const docentes = [];
    MAPA_DOCENTES.forEach((d, n) => docentes.push({
        i: d._wi, n, t: d.tipo_docente, cat: d.categoria,
        hc: d.horas_carga, he: d.horas_extra_clase,
        md: d.maxDias, ing: d.esDocenteIngles,
        dp: Object.fromEntries(diasSemana.map(dia => [dia, [...d.disponibilidad[dia]]]))
    }));
    const grupos = [];
    MAPA_GRUPOS.forEach((g, n) => grupos.push({ i: g._wi, n, tu: g.turno }));
    const matArr = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        if (!matArr[b.materia._wi]) matArr[b.materia._wi] = {
            i: b.materia._wi, n: b.materia.nombre_materia, h: b.materia.horas_materia,
            g: b.materia.grado_materia, tu: b.materia.turno_materia, ts: b.materia.tsu
        };
    }));
    const bloques = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => bloques.push(
        { i: b._wi, di: b.docente._wi, gi: b.grupo._wi, mi: b.materia._wi, dur: b.duracion }
    )));
    return { docentes, grupos, materias: matArr.filter(Boolean), bloques };
}

/** Serializa el freqMap (EDA) para enviarlo al Worker. */
function serializarFreqMap() {
    if (freqTotalRuns === 0) return null;
    const entries = {};
    freqMap.forEach((slotMap, b) => {
        if (b._wi === undefined) return;
        entries[b._wi] = Object.fromEntries(slotMap);
    });
    return { entries, total: freqTotalRuns };
}

/** Restaura el estado del hilo principal desde el resultado de un Worker. */
function restaurarDesdeWorker(r) {
    MAPA_GRUPOS.forEach(g => g.reset());
    MAPA_DOCENTES.forEach(d => d.reset());
    // horario
    for (const [gn, hG] of Object.entries(r.horario)) {
        const g = MAPA_GRUPOS.get(gn); if (!g) continue;
        for (const [dia, hD] of Object.entries(hG))
            for (const [hStr, bi] of Object.entries(hD))
                if (bi !== null && bi !== undefined) g.horario[dia][+hStr] = _wBArr[bi];
    }
    // docentes
    for (const [dn, dD] of Object.entries(r.docenteAsig)) {
        const d = MAPA_DOCENTES.get(dn); if (!d) continue;
        d.diasActivos = new Set(r.docenteDias[dn] || []);
        for (const [dia, aD] of Object.entries(dD)) d.asignado[dia] = aD;
    }
    // sesionesDia
    for (const [gn, sG] of Object.entries(r.sesiones)) {
        const g = MAPA_GRUPOS.get(gn); if (!g) continue;
        for (const [dia, sD] of Object.entries(sG)) g.sesionesDia[dia] = sD;
    }
    // flags de bloque
    for (const [biStr, fl] of Object.entries(r.bloqueFlags)) {
        const b = _wBArr[+biStr]; if (!b) continue;
        if (fl.pre) b.preAsignado = true; else delete b.preAsignado;
        if (fl.nr)  b.nombreStrRender = fl.nr; else delete b.nombreStrRender;
    }
}

/** Ejecuta tareas en un pool de Workers, devuelve array de resultados en orden. */
async function ejecutarConPool(pool, tareas, onProgreso) {
    return new Promise(resolve => {
        const resultados = new Array(tareas.length);
        let completados = 0, tareaIdx = 0, mejorN = Infinity;
        function enviar(worker) {
            if (tareaIdx >= tareas.length) return;
            const tarea = tareas[tareaIdx++];
            const num = tarea.intentoNum;
            worker.onmessage = e => {
                resultados[num] = e.data;
                completados++;
                if (e.data.fallosCount < mejorN) mejorN = e.data.fallosCount;
                if (onProgreso) onProgreso(completados, tareas.length, mejorN);
                if (completados === tareas.length) resolve(resultados.filter(Boolean));
                else enviar(worker);
            };
            worker.onerror = err => {
                console.error('[Worker] error en intento', num,
                    err.message, 'línea', err.lineno, err.filename);
                // Recuperar: marcar como completado con resultado vacío
                resultados[num] = null;
                completados++;
                if (onProgreso) onProgreso(completados, tareas.length, mejorN);
                if (completados === tareas.length) resolve(resultados.filter(Boolean));
                else enviar(worker);
            };
            worker.postMessage(tarea);
        }
        pool.forEach(w => enviar(w));
    });
}

// ── Manejador de mensajes (solo activo dentro del Worker) ──────────────────────
if (IS_WORKER) {
    // Deserializa el problema enviado por el hilo principal.
    // Si se pasa sabBuffer (SharedArrayBuffer), reconstruye disponibilidad desde
    // bitmasks en lugar de parsear los arrays JSON (más rápido, cero copias).
    function _deserializar(data, sabBuffer) {
        MAPA_DOCENTES.clear(); MAPA_GRUPOS.clear();
        const dArr = [], gArr = [], mArr = [], bArr = [];
        const sabView = sabBuffer ? new Int32Array(sabBuffer) : null;
        data.docentes.forEach(d => {
            const doc = new Docente(d.n, d.t, d.he, d.cat);
            doc.horas_carga = d.hc; doc.maxDias = d.md; doc.esDocenteIngles = d.ing;
            if (sabView) {
                // Reconstruir Sets desde bitmasks del SAB (sin parsear JSON)
                diasSemana.forEach((dia, dIdx) => {
                    const mask = sabView[d.i * 6 + dIdx];
                    const s = new Set();
                    for (let bit = 0; bit < 24; bit++) if (mask & (1 << bit)) s.add(bit);
                    doc.disponibilidad[dia] = s;
                });
            } else {
                diasSemana.forEach(dia => { doc.disponibilidad[dia] = new Set(d.dp[dia] || []); });
            }
            MAPA_DOCENTES.set(d.n, doc); dArr[d.i] = doc;
        });
        data.materias.forEach(m => { mArr[m.i] = new Materia(m.n, m.h, m.g, m.tu, m.ts); });
        data.grupos.forEach(g => {
            const grp = new Grupo(g.n, g.tu);
            MAPA_GRUPOS.set(g.n, grp); gArr[g.i] = grp;
        });
        data.bloques.forEach(b => {
            const bloque = {
                docente: dArr[b.di], grupo: gArr[b.gi], materia: mArr[b.mi],
                duracion: b.dur, _wi: b.i,
                nombreStr: mArr[b.mi].nombre_materia + ' (' + dArr[b.di].nombre_docente + ')'
            };
            gArr[b.gi].bloques.push(bloque); bArr[b.i] = bloque;
            // Reconstruir turnosAsignados (no viaja serializado): necesario para
            // la regla institucional de prioridad a docentes con ambos turnos.
            dArr[b.di].turnosAsignados.add(gArr[b.gi].turno);
        });
        return bArr;
    }

    // Restaura el estado del horario en el Worker desde un snapData serializado.
    // Equivalente a restaurarDesdeWorker() del hilo principal.
    function _restaurarEstado(snap, bArr) {
        MAPA_GRUPOS.forEach(g => g.reset());
        MAPA_DOCENTES.forEach(d => d.reset());
        for (const [gn, hG] of Object.entries(snap.horario)) {
            const g = MAPA_GRUPOS.get(gn); if (!g) continue;
            for (const [dia, hD] of Object.entries(hG))
                for (const [hStr, bi] of Object.entries(hD))
                    if (bi !== null && bi !== undefined) g.horario[dia][+hStr] = bArr[bi];
        }
        for (const [dn, dD] of Object.entries(snap.docenteAsig)) {
            const d = MAPA_DOCENTES.get(dn); if (!d) continue;
            d.diasActivos = new Set(snap.docenteDias[dn] || []);
            for (const [dia, aD] of Object.entries(dD)) d.asignado[dia] = aD;
        }
        for (const [gn, sG] of Object.entries(snap.sesiones)) {
            const g = MAPA_GRUPOS.get(gn); if (!g) continue;
            for (const [dia, sD] of Object.entries(sG)) g.sesionesDia[dia] = sD;
        }
        for (const [biStr, fl] of Object.entries(snap.bloqueFlags || {})) {
            const b = bArr[+biStr]; if (!b) continue;
            if (fl.pre) b.preAsignado = true; else delete b.preAsignado;
        }
    }

    // Serializa el resultado del Worker para enviarlo al hilo principal
    function _serializar(fallos) {
        const horario = {}, docenteAsig = {}, docenteDias = {}, sesiones = {}, bloqueFlags = {};
        MAPA_GRUPOS.forEach((g, gn) => {
            horario[gn] = {}; sesiones[gn] = {};
            diasSemana.forEach(dia => {
                horario[gn][dia] = {}; sesiones[gn][dia] = Object.assign({}, g.sesionesDia[dia]);
                g.baseHoras.forEach(h => { const b = g.horario[dia][h]; horario[gn][dia][h] = b ? b._wi : null; });
            });
            g.bloques.forEach(b => {
                const fl = {};
                if (b.preAsignado)      fl.pre = true;
                if (b.nombreStrRender)  fl.nr  = b.nombreStrRender;
                if (Object.keys(fl).length) bloqueFlags[b._wi] = fl;
            });
        });
        MAPA_DOCENTES.forEach((d, dn) => {
            docenteAsig[dn] = {}; docenteDias[dn] = [...d.diasActivos];
            diasSemana.forEach(dia => { docenteAsig[dn][dia] = Object.assign({}, d.asignado[dia]); });
        });
        return {
            fallosCount: fallos.length,
            fallosIndices: fallos.map(b => b._wi),
            horario, docenteAsig, docenteDias, sesiones, bloqueFlags,
            ultimoOrden: _ultimoOrden.map(b => b._wi)
        };
    }

    self.onmessage = async function(e) {
        const type = e.data.type;

        // ── SA en isla: correr recocidoSimulado con parámetros propios ──────────
        if (type === 'sa') {
            const bArr = _deserializar(e.data.problema, e.data.sabBuffer);
            _restaurarEstado(e.data.snapData, bArr);
            const fallos = e.data.fallosIdxs.map(i => bArr[i]).filter(Boolean);
            const { tiempoMs, T, alpha } = e.data.params;
            const result = await recocidoSimulado(fallos, tiempoMs, null, T, alpha);
            self.postMessage({ type: 'sa_done', ..._serializar(result) });
            return;
        }

        // ── RPA paralelo: correr reinicioParcialAgresivo con random propio ───────
        if (type === 'rpa') {
            const bArr = _deserializar(e.data.problema, e.data.sabBuffer);
            _restaurarEstado(e.data.snapData, bArr);
            const fallos = e.data.fallosIdxs.map(i => bArr[i]).filter(Boolean);
            const result = await reinicioParcialAgresivo(fallos, e.data.tiempoMs, null);
            self.postMessage({ type: 'rpa_done', ..._serializar(result) });
            return;
        }

        // ── Greedy (comportamiento original, sin campo type) ─────────────────────
        const { problema, ruido, invertir, eliteBaseIdxs, freqData, recurrentesIdxs, globalBest, edaBloqueado } = e.data;

        const bArr = _deserializar(problema, e.data.sabBuffer);

        // Restaurar estado EDA/recurrentes
        globalBestFallos = globalBest;
        freqTotalRuns = freqData ? freqData.total : 0;
        freqMap = new Map();
        if (freqData && freqData.entries) {
            for (const [biStr, slots] of Object.entries(freqData.entries)) {
                const b = bArr[+biStr]; if (b) freqMap.set(b, new Map(Object.entries(slots)));
            }
        }
        bloquesRecurrentesFallidos = new Set((recurrentesIdxs || []).map(i => bArr[i]).filter(Boolean));
        _edaBloqueado = !!edaBloqueado;

        // Reset + fijar inglés
        MAPA_GRUPOS.forEach(g => { g.reset(); g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; }); });
        MAPA_DOCENTES.forEach(d => d.reset());
        const inglesFixed = preAsignarInglesSimultaneo();
        const snapIngles  = tomarSnapshot();
        restaurarSnapshot(snapIngles);
        inglesFixed.forEach(b => { b.preAsignado = true; });

        const eliteBase = eliteBaseIdxs ? eliteBaseIdxs.map(i => bArr[i]).filter(Boolean) : null;
        const fallos = await construccionVorazCascada(null, ruido, null, invertir, eliteBase, inglesFixed);

        self.postMessage(_serializar(fallos));
    };
}
    </script>
