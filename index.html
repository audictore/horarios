/**
 * Punto central de post-procesamiento — flujo completamente interactivo:
 *
 *  FASE 1 – Expansión de días de asistencia:
 *    Detecta docentes bloqueados por maxDias. El usuario aprueba quién
 *    puede tener un día extra; se reintenta la asignación.
 *
 *  FASE 2 – Colocaciones FORZADAS (fuera de disponibilidad):
 *    Para los bloques aún sin ubicar, busca slots fuera de disponibilidad.
 *    El usuario aprueba bloque por bloque qué colocaciones FORZADAS acepta.
 *
 *  FASE 3 – Bloques imposibles:
 *    Bloques para los que no existe ningún slot (ni siquiera FORZADO).
 *    Se informa al usuario; tras su confirmación se exporta el horario parcial.
 *
 * @param {Array}    bloquesFallidos  – bloques (objetos) que no se pudieron ubicar
 * @param {Element}  errDiv           – div de estado en el DOM
 * @param {string}   prefijo          – texto para iniciar el mensaje (e.g. "AG en 34s. ")
 * @param {Function} onDone           – callback sin argumentos, llamado al terminar
 */
function manejarFallos(bloquesFallidos, errDiv, prefijo, onDone) {

    // ── Paso final: exportar y mostrar estado ────────────────────────────────
    function exportarYListo(msg, color) {
        exportarExcel();
        errDiv.innerText  = msg;
        errDiv.style.color = color;
        onDone();
    }

    // ── Fase 3: bloques verdaderamente imposibles ────────────────────────────
    function faseImposibles(imposibles) {
        if (imposibles.length === 0) {
            exportarYListo(`✔ ${prefijo}Horarios generados correctamente.`, 'green');
            return;
        }
        mostrarPanelImposibles(imposibles, () => {
            exportarYListo(
                `✔ ${prefijo}Horario exportado. ${imposibles.length} bloque(s) sin solución (confirmados).`,
                'green'
            );
        });
    }

    // ── Fase 2: colocaciones FORZADAS ────────────────────────────────────────
    function faseForzado(pendientes) {
        if (pendientes.length === 0) { faseImposibles([]); return; }

        const forzables  = [];
        const imposibles = [];
        pendientes.forEach(b => {
            const slot = encontrarSlotForzado(b);
            if (slot) forzables.push({ bloque: b, slot });
            else      imposibles.push(b);
        });

        if (forzables.length === 0) { faseImposibles(imposibles); return; }

        mostrarPanelForzado(forzables, aprobados => {
            const aun_imposibles = [...imposibles];
            forzables.forEach(({ bloque, slot }) => {
                if (aprobados.has(bloque)) {
                    aplicarAsignacion(bloque.grupo, bloque, slot.dia, slot.hInicio, true);
                } else {
                    aun_imposibles.push(bloque);
                }
            });
            faseImposibles(aun_imposibles);
        });
    }

    // ── Helper: reintentar un bloque con todas las técnicas disponibles ─────────
    function reintentarBloque(b) {
        return intentarAsignar(b, false, false, false, false)
            || intentarAsignar(b, false, true,  false, false)
            || intentarSwapDeHorarios(b, [])
            || intentarCadenaSwap(b)
            || intentarReestructuracionCruzada(b)          // Caso A: slot libre, mismo docente en G2
            || intentarCadenaSwap(b, 2, new Set([b]))      // Caso B: obstáculo bloqueado en G2
            || intentarCadenaAumentanteGlobal(b)           // BFS sin límite de profundidad
            || intentarSwapCadenaMultiDocente(b);          // Caso C: slot del grupo con otros docentes
    }

    // ── Fase 1: expansión de días de asistencia ──────────────────────────────
    function faseExpansion(fallidos) {
        if (fallidos.length === 0) { faseForzado([]); return; }

        // Antes del panel, intentar reestructuración cruzada en los bloques fallidos
        // (puede resolver casos "docente ocupado en otro grupo" sin necesitar más días)
        const tras_reest = [];
        for (const b of fallidos) {
            if (intentarReestructuracionCruzada(b))           continue; // Caso A
            if (intentarCadenaSwap(b))                        continue; // swap simple
            if (intentarCadenaSwap(b, 2, new Set([b])))       continue; // Caso B: obstáculo cruzado
            if (intentarCadenaAumentanteGlobal(b))            continue; // BFS global
            tras_reest.push(b);
        }
        if (tras_reest.length === 0) { faseForzado([]); return; }

        // Reconfiguración de sesiones: intentar splits con menos bloques
        // (p.ej. [2,2,2,1] → [3,2,2]) antes de mostrar el panel de expansión.
        reconfigurarSesiones(tras_reest).then(async tras_reconf => {
            // Desbloqueo cruzado antes del panel de expansión:
            // resuelve "docente disponible pero ocupado en otro grupo" sin necesitar días extra.
            tras_reconf = await paseForzadoCruzado(tras_reconf);

            if (tras_reconf.length === 0) { faseForzado([]); return; }

            const necesidades = detectarNecesidadesExtraDia(tras_reconf);
            if (necesidades.size === 0) { faseForzado(tras_reconf); return; }

            mostrarPanelExpansion(necesidades, aprobados => {
                const yaProcesados = new Set();
                const aun_fallidos = [];

                necesidades.forEach(({ bloques }, docente) => {
                    bloques.forEach(b => yaProcesados.add(b));
                    if (!aprobados.has(docente.nombre_docente)) {
                        aun_fallidos.push(...bloques); return;
                    }
                    // Expandir el límite de días y reintentar con todas las técnicas
                    docente.maxDias++;
                    for (const b of bloques) {
                        if (reintentarBloque(b)) continue;
                        aun_fallidos.push(b);
                    }
                });
                // Bloques que no tenían solución con días extra (pertenecían a otros docentes)
                tras_reconf.forEach(b => { if (!yaProcesados.has(b)) aun_fallidos.push(b); });

                faseForzado(aun_fallidos);
            });
        });
    }

    // ── Punto de entrada ─────────────────────────────────────────────────────
    if (bloquesFallidos.length === 0) {
        exportarYListo(`✔ ${prefijo}Horarios generados correctamente.`, 'green');
        return;
    }

    faseExpansion(bloquesFallidos);
}

// ─────────────────────────────────────────────────────────────────────────────

function aplicarEstilosForzados(ws) {
    if (!ws['!ref']) return;
    const range = XLSX.utils.decode_range(ws['!ref']);
    // Solo marca en rojo las celdas FORZADAS; las demás ya tienen su color de materia.
    const estiloForzado = {
        fill: { patternType: "solid", fgColor: { rgb: "FFCCCC" } },
        font: { color: { rgb: "CC0000" }, bold: true }
    };
    for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
            const addr = XLSX.utils.encode_cell({ r: R, c: C });
            const cell = ws[addr];
            if (!cell) continue;
            if (typeof cell.v === 'string' && cell.v.includes('FORZADO')) {
                cell.s = estiloForzado;
            }
        }
    }
}

function exportarExcel() {
    const wb = XLSX.utils.book_new();
    MAPA_GRUPOS.forEach(g => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        // colorCeldas: "rowIdx,colIdx" → hex (sin #) para relleno de celda
        const colorCeldas = new Map();

        g.baseHoras.forEach((h, hIdx) => {
            const r = [h];
            diasSemana.forEach((d, dIdx) => {
                const bloque = g.horario[d][h];
                r.push(bloque ? (bloque.nombreStrRender || bloque.nombreStr) : "");
                if (bloque) {
                    // Clave materia+grupo para que el color sea único por (materia, grupo)
                    // y sea consistente con la hoja del docente.
                    const colorKey = bloque.materia.nombre_materia + ' [' + bloque.grupo.nombre_grupo + ']';
                    colorCeldas.set(`${hIdx + 1},${dIdx + 1}`, colorParaMateria(colorKey));
                }
            });
            rows.push(r);
        });

        let totalSemana = 0;
        diasSemana.forEach(d => { g.baseHoras.forEach(h => { if(g.horario[d][h] !== null) totalSemana++; }); });
        rows.push([]); rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`]);

        // ── Desglose materia · docente · horas ──────────────────────────
        const enGrupo = new Map();
        g.bloques.forEach(b => {
            const key = b.materia.nombre_materia + '§' + b.docente.nombre_docente;
            if (!enGrupo.has(key)) enGrupo.set(key, { materia: b.materia.nombre_materia, docente: b.docente.nombre_docente, horas: 0 });
            enGrupo.get(key).horas += b.duracion;
        });
        const asigs = [...enGrupo.values()].sort((a, b) => a.materia.localeCompare(b.materia));
        rows.push([]);
        rows.push(["MATERIA", "DOCENTE", "HORAS"]);
        asigs.forEach(({ materia, docente, horas }) => rows.push([materia, docente, `${horas}h`]));
        // ────────────────────────────────────────────────────────────────

        const ws = XLSX.utils.aoa_to_sheet(rows);

        // ── Aplicar colores por materia — grid del horario ───────────────
        colorCeldas.forEach((hex, key) => {
            const [r, c] = key.split(',').map(Number);
            const addr = XLSX.utils.encode_cell({ r, c });
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: hex } } };
        });

        // ── Colorear columna MATERIA en el desglose del final de hoja ────
        // Distribución de filas (0-indexed):
        //   0            → encabezado HORA/LUNES/…
        //   1…N          → grid (N = baseHoras.length)
        //   N+1          → fila vacía
        //   N+2          → TOTAL HORAS EN LA SEMANA
        //   N+3          → fila vacía
        //   N+4          → encabezado MATERIA/DOCENTE/HORAS
        //   N+5…         → una fila por materia
        const desgloseStart = g.baseHoras.length + 5;
        asigs.forEach(({ materia }, i) => {
            const addr = XLSX.utils.encode_cell({ r: desgloseStart + i, c: 0 });
            const colorKey = materia + ' [' + g.nombre_grupo + ']';
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: colorParaMateria(colorKey) } } };
        });
        // ────────────────────────────────────────────────────────────────

        // Anchos de columna para lectura cómoda
        ws['!cols'] = [
            { wch: 6 },
            { wch: 30 }, { wch: 30 }, { wch: 30 },
            { wch: 30 }, { wch: 30 }, { wch: 30 }
        ];

        aplicarEstilosForzados(ws);
        XLSX.utils.book_append_sheet(wb, ws, "G_" + g.nombre_grupo.substring(0, 25));
    });
    MAPA_DOCENTES.forEach(d => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        const colorCeldas = new Map();

        for (let h = 7; h <= 21; h++) {
            const r = [h];
            const hIdx = h - 7; // offset de fila (0 = encabezado)
            diasSemana.forEach((dia, dIdx) => {
                const txt = d.asignado[dia][h];
                r.push(txt ? txt : "");
                if (txt) {
                    // txt tiene formato "MATERIA [GRUPO]" — usar la cadena completa
                    // como clave para diferenciar el mismo curso en distintos grupos.
                    const materiaBase = txt.split(' [⚠')[0]; // quitar sufijo FORZADO si existe
                    colorCeldas.set(`${hIdx + 1},${dIdx + 1}`, colorParaMateria(materiaBase));
                }
            });
            rows.push(r);
        }

        let totalSemana = 0;
        diasSemana.forEach(dia => { totalSemana += Object.keys(d.asignado[dia]).length; });

        let estatusTipo = ` (${d.categoria || (d.tipo_docente === 2 ? 'PA' : (d.categoria || 'PTC'))})`;
        rows.push([]);
        rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`, "", "DÍAS ASISTIDOS:", `${d.diasActivos.size} de ${d.maxDias}${estatusTipo}`]);
        const ws = XLSX.utils.aoa_to_sheet(rows);

        // ── Aplicar colores por materia — grid del docente ───────────────
        colorCeldas.forEach((hex, key) => {
            const [r, c] = key.split(',').map(Number);
            const addr = XLSX.utils.encode_cell({ r, c });
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: hex } } };
        });
        // ────────────────────────────────────────────────────────────────

        // Anchos de columna para lectura cómoda
        ws['!cols'] = [
            { wch: 6 },
            { wch: 30 }, { wch: 30 }, { wch: 30 },
            { wch: 30 }, { wch: 30 }, { wch: 30 }
        ];

        aplicarEstilosForzados(ws);
        XLSX.utils.book_append_sheet(wb, ws, "D_" + d.nombre_docente.substring(0, 25));
    });

    const rowsCambios = [["GRUPO", "MATERIA", "DOCENTE ASIGNADO ORIGINALMENTE", "DOCENTE FINAL (OPTIMIZADO)"]];
    if (LOG_CAMBIOS.length === 0) rowsCambios.push(["No hubo intercambios finales de docentes", "-", "-", "-"]);
    else LOG_CAMBIOS.forEach(c => rowsCambios.push([c.Grupo, c.Materia, c.DocenteAnterior, c.DocenteNuevo]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rowsCambios), "Cambios_Docentes");

    XLSX.writeFile(wb, "Horarios_Exhaustivos_Final.xlsx", { cellStyles: true });
}

// ─── APRENDIZAJE ENTRE EJECUCIONES ───────────────────────────────────────────

function resetearAprendizaje() {
    eliteOrden           = null;
    eliteFallosCount     = Infinity;
    sinMejoraConsecutiva = 0;
    _ultimoOrden         = [];
    freqMap                    = new Map();
    freqTotalRuns              = 0;
    globalBestFallos           = Infinity;
    bloquesRecurrentesFallidos = new Set();
    mejorSnapGlobal            = null;
    mejorFallosGlobal          = [];
    _edaBloqueado              = false;
    actualizarBotonReset();
}

function actualizarBotonReset() {
    if (IS_WORKER) return;
    const btn = document.getElementById('button_reset_aprendizaje');
    if (!btn) return;
    const tieneElite = eliteOrden !== null;
    const tieneFreq  = freqTotalRuns > 0;
    if (!tieneElite && !tieneFreq) {
        btn.textContent   = 'Sin aprendizaje';
        btn.disabled      = true;
        btn.style.opacity = '0.4';
    } else {
        const partes = [];
        if (tieneElite) partes.push('élite activo');
        if (tieneFreq)  partes.push(freqTotalRuns + ' ejecución' + (freqTotalRuns !== 1 ? 'es' : '') + ' EDA');
        btn.textContent   = 'Borrar: ' + partes.join(' · ');
        btn.disabled      = false;
        btn.style.opacity = '1';
    }
}

function encontrarBloqueEnSnap(snap, g, b) {
    const gS = snap.grupos.get(g.nombre_grupo);
    if (!gS) return null;
    for (const dia of diasSemana) {
        for (let i = 0; i < g.baseHoras.length; i++) {
            const h = g.baseHoras[i];
            if (gS.horario[dia][h] !== b) continue;
            if (i === 0 || gS.horario[dia][g.baseHoras[i - 1]] !== b)
                return { dia, hInicio: h };
        }
    }
    return null;
}

function acumularFrecuenciasDesde(snap) {
    MAPA_GRUPOS.forEach(g => {
        g.bloques.forEach(b => {
            const pos = encontrarBloqueEnSnap(snap, g, b);
            if (!pos) return;
            if (!freqMap.has(b)) freqMap.set(b, new Map());
            const key = pos.dia + '|' + pos.hInicio;
            const m   = freqMap.get(b);
            m.set(key, (m.get(key) || 0) + 1);
        });
    });
    freqTotalRuns++;
}

if (!IS_WORKER) {
    document.getElementById("button_accion").onclick = () => {
        let cantBloques = 0;
        MAPA_GRUPOS.forEach(g => cantBloques += g.bloques.length);
        if (cantBloques === 0) return alert("Por favor, carga una plantilla válida primero.");
        ejecutarAlgoritmoFinal();
    };

    document.getElementById("button_reset_aprendizaje").onclick = () => {
        resetearAprendizaje();
        const errDiv = document.getElementById("span_error");
        errDiv.style.color = "var(--color-dim-gray)";
        errDiv.innerText = "Aprendizaje borrado. El próximo intento explorará desde cero.";
    };
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEB WORKERS — Serialización, pool y manejador
// ═══════════════════════════════════════════════════════════════════════════════

/** Asigna índices _wi a docentes, grupos, materias y bloques.
 *  Debe llamarse antes de serializarProblema() y de usar _wBArr. */
function asignarIndicesWorker() {
    let dIdx = 0; MAPA_DOCENTES.forEach(d => { d._wi = dIdx++; });
    let gIdx = 0; MAPA_GRUPOS.forEach(g => { g._wi = gIdx++; });
    let mIdx = 0; const matKey = new Map();
    let bIdx = 0;
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        b._wi = bIdx++;
        const k = b.materia.nombre_materia + '|' + b.materia.grado_materia + '|' + b.materia.turno_materia;
        if (!matKey.has(k)) { matKey.set(k, mIdx); b.materia._wi = mIdx++; }
        else b.materia._wi = matKey.get(k);
    }));
    _wBArr = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => { _wBArr[b._wi] = b; }));
}

/** Serializa todo el problema para enviarlo a un Worker. */
function serializarProblema() {
    const docentes = [];
    MAPA_DOCENTES.forEach((d, n) => docentes.push({
        i: d._wi, n, t: d.tipo_docente, cat: d.categoria,
        hc: d.horas_carga, he: d.horas_extra_clase,
        md: d.maxDias, ing: d.esDocenteIngles,
        dp: Object.fromEntries(diasSemana.map(dia => [dia, [...d.disponibilidad[dia]]]))
    }));
    const grupos = [];
    MAPA_GRUPOS.forEach((g, n) => grupos.push({ i: g._wi, n, tu: g.turno }));
    const matArr = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        if (!matArr[b.materia._wi]) matArr[b.materia._wi] = {
            i: b.materia._wi, n: b.materia.nombre_materia, h: b.materia.horas_materia,
            g: b.materia.grado_materia, tu: b.materia.turno_materia, ts: b.materia.tsu
        };
    }));
    const bloques = [];
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => bloques.push(
        { i: b._wi, di: b.docente._wi, gi: b.grupo._wi, mi: b.materia._wi, dur: b.duracion }
    )));
    return { docentes, grupos, materias: matArr.filter(Boolean), bloques };
}

/** Serializa el freqMap (EDA) para enviarlo al Worker. */
function serializarFreqMap() {
    if (freqTotalRuns === 0) return null;
    const entries = {};
    freqMap.forEach((slotMap, b) => {
        if (b._wi === undefined) return;
        entries[b._wi] = Object.fromEntries(slotMap);
    });
    return { entries, total: freqTotalRuns };
}

/** Restaura el estado del hilo principal desde el resultado de un Worker. */
function restaurarDesdeWorker(r) {
    MAPA_GRUPOS.forEach(g => g.reset());
    MAPA_DOCENTES.forEach(d => d.reset());
    // horario
    for (const [gn, hG] of Object.entries(r.horario)) {
        const g = MAPA_GRUPOS.get(gn); if (!g) continue;
        for (const [dia, hD] of Object.entries(hG))
            for (const [hStr, bi] of Object.entries(hD))
                if (bi !== null && bi !== undefined) g.horario[dia][+hStr] = _wBArr[bi];
    }
    // docentes
    for (const [dn, dD] of Object.entries(r.docenteAsig)) {
        const d = MAPA_DOCENTES.get(dn); if (!d) continue;
        d.diasActivos = new Set(r.docenteDias[dn] || []);
        for (const [dia, aD] of Object.entries(dD)) d.asignado[dia] = aD;
    }
    // sesionesDia
    for (const [gn, sG] of Object.entries(r.sesiones)) {
        const g = MAPA_GRUPOS.get(gn); if (!g) continue;
        for (const [dia, sD] of Object.entries(sG)) g.sesionesDia[dia] = sD;
    }
    // flags de bloque
    for (const [biStr, fl] of Object.entries(r.bloqueFlags)) {
        const b = _wBArr[+biStr]; if (!b) continue;
        if (fl.pre) b.preAsignado = true; else delete b.preAsignado;
        if (fl.nr)  b.nombreStrRender = fl.nr; else delete b.nombreStrRender;
    }
}

/** Ejecuta tareas en un pool de Workers, devuelve array de resultados en orden. */
async function ejecutarConPool(pool, tareas, onProgreso) {
    return new Promise(resolve => {
        const resultados = new Array(tareas.length);
        let completados = 0, tareaIdx = 0, mejorN = Infinity;
        function enviar(worker) {
            if (tareaIdx >= tareas.length) return;
            const tarea = tareas[tareaIdx++];
            const num = tarea.intentoNum;
            worker.onmessage = e => {
                resultados[num] = e.data;
                completados++;
                if (e.data.fallosCount < mejorN) mejorN = e.data.fallosCount;
                if (onProgreso) onProgreso(completados, tareas.length, mejorN);
                if (completados === tareas.length) resolve(resultados.filter(Boolean));
                else enviar(worker);
            };
            worker.onerror = err => {
                console.error('[Worker] error en intento', num,
                    err.message, 'línea', err.lineno, err.filename);
                // Recuperar: marcar como completado con resultado vacío
                resultados[num] = null;
                completados++;
                if (onProgreso) onProgreso(completados, tareas.length, mejorN);
                if (completados === tareas.length) resolve(resultados.filter(Boolean));
                else enviar(worker);
            };
            worker.postMessage(tarea);
        }
        pool.forEach(w => enviar(w));
    });
}

// ── Manejador de mensajes (solo activo dentro del Worker) ──────────────────────
if (IS_WORKER) {
    // Deserializa el problema enviado por el hilo principal
    function _deserializar(data) {
        MAPA_DOCENTES.clear(); MAPA_GRUPOS.clear();
        const dArr = [], gArr = [], mArr = [], bArr = [];
        data.docentes.forEach(d => {
            const doc = new Docente(d.n, d.t, d.he, d.cat);
            doc.horas_carga = d.hc; doc.maxDias = d.md; doc.esDocenteIngles = d.ing;
            diasSemana.forEach(dia => { doc.disponibilidad[dia] = new Set(d.dp[dia] || []); });
            MAPA_DOCENTES.set(d.n, doc); dArr[d.i] = doc;
        });
        data.materias.forEach(m => { mArr[m.i] = new Materia(m.n, m.h, m.g, m.tu, m.ts); });
        data.grupos.forEach(g => {
            const grp = new Grupo(g.n, g.tu);
            MAPA_GRUPOS.set(g.n, grp); gArr[g.i] = grp;
        });
        data.bloques.forEach(b => {
            const bloque = {
                docente: dArr[b.di], grupo: gArr[b.gi], materia: mArr[b.mi],
                duracion: b.dur, _wi: b.i,
                nombreStr: mArr[b.mi].nombre_materia + ' (' + dArr[b.di].nombre_docente + ')'
            };
            gArr[b.gi].bloques.push(bloque); bArr[b.i] = bloque;
        });
        return bArr;
    }

    // Serializa el resultado del Worker para enviarlo al hilo principal
    function _serializar(fallos) {
        const horario = {}, docenteAsig = {}, docenteDias = {}, sesiones = {}, bloqueFlags = {};
        MAPA_GRUPOS.forEach((g, gn) => {
            horario[gn] = {}; sesiones[gn] = {};
            diasSemana.forEach(dia => {
                horario[gn][dia] = {}; sesiones[gn][dia] = Object.assign({}, g.sesionesDia[dia]);
                g.baseHoras.forEach(h => { const b = g.horario[dia][h]; horario[gn][dia][h] = b ? b._wi : null; });
            });
            g.bloques.forEach(b => {
                const fl = {};
                if (b.preAsignado)      fl.pre = true;
                if (b.nombreStrRender)  fl.nr  = b.nombreStrRender;
                if (Object.keys(fl).length) bloqueFlags[b._wi] = fl;
            });
        });
        MAPA_DOCENTES.forEach((d, dn) => {
            docenteAsig[dn] = {}; docenteDias[dn] = [...d.diasActivos];
            diasSemana.forEach(dia => { docenteAsig[dn][dia] = Object.assign({}, d.asignado[dia]); });
        });
        return {
            fallosCount: fallos.length,
            fallosIndices: fallos.map(b => b._wi),
            horario, docenteAsig, docenteDias, sesiones, bloqueFlags,
            ultimoOrden: _ultimoOrden.map(b => b._wi)
        };
    }

    self.onmessage = async function(e) {
        const { problema, ruido, invertir, eliteBaseIdxs, freqData, recurrentesIdxs, globalBest, edaBloqueado } = e.data;

        const bArr = _deserializar(problema);

        // Restaurar estado EDA/recurrentes
        globalBestFallos = globalBest;
        freqTotalRuns = freqData ? freqData.total : 0;
        freqMap = new Map();
        if (freqData && freqData.entries) {
            for (const [biStr, slots] of Object.entries(freqData.entries)) {
                const b = bArr[+biStr]; if (b) freqMap.set(b, new Map(Object.entries(slots)));
            }
        }
        bloquesRecurrentesFallidos = new Set((recurrentesIdxs || []).map(i => bArr[i]).filter(Boolean));
        _edaBloqueado = !!edaBloqueado;

        // Reset + fijar inglés
        MAPA_GRUPOS.forEach(g => { g.reset(); g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; }); });
        MAPA_DOCENTES.forEach(d => d.reset());
        const inglesFixed = preAsignarInglesSimultaneo();
        const snapIngles  = tomarSnapshot();
        restaurarSnapshot(snapIngles);
        inglesFixed.forEach(b => { b.preAsignado = true; });

        const eliteBase = eliteBaseIdxs ? eliteBaseIdxs.map(i => bArr[i]).filter(Boolean) : null;
        const fallos = await construccionVorazCascada(null, ruido, null, invertir, eliteBase, inglesFixed);

        self.postMessage(_serializar(fallos));
    };
}
