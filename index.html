    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script>
        const diasSemana = ["lunes", "martes", "miercoles", "jueves", "viernes", "sabado"];
let MAPA_DOCENTES = new Map(), MAPA_GRUPOS = new Map(), PLANTILLAS_MATERIAS = [];
let LOG_CAMBIOS = [];
let wbCarga = null, wbDisp = null;

class Materia {
    constructor(nombre, horas, grado, turno, tsu) {
        this.nombre_materia = nombre;
        this.horas_materia = parseInt(horas);
        this.grado_materia = grado;
        this.turno_materia = turno;
        this.tsu = (tsu && tsu !== 'NA') ? tsu : null;
        this.docente = null;
        this.grupo = null;
    }
}

class Docente {
    constructor(n, t, e) {
        this.nombre_docente = n.trim();
        this.tipo_docente = parseInt(t);
        this.horas_extra_clase = parseInt(e) || 0;
        this.horas_carga = 0;
        this.disponibilidad = {};
        this.asignado = {};
        this.diasActivos = new Set();
        this.turnosAsignados = new Set();
        diasSemana.forEach(d => {
            this.disponibilidad[d] = new Set();
            this.asignado[d] = {};
        });
    }
    reset() {
        this.asignado = {};
        this.diasActivos = new Set();
        diasSemana.forEach(d => { this.asignado[d] = {}; });
    }
    calcularMaxDias() {
        if (this.tipo_docente === 2) { // PA
            let total = this.horas_carga + this.horas_extra_clase;
            if (total <= 8)  return 2;
            if (total <= 20) return 3;
            return 4;
        }
        return 6; // PTC u otro
    }
}

class Grupo {
    constructor(n, t) { this.nombre_grupo = n.trim(); this.turno = t.toLowerCase(); this.bloques = []; this.reset(); }
    reset() {
        this.horario = {}; this.sesionesDia = {};
        this.baseHoras = (this.turno === "matutino") ? [7,8,9,10,11,12,13,14,15] : [12,13,14,15,16,17,18,19,20];
        diasSemana.forEach(d => {
            this.horario[d] = {};
            this.sesionesDia[d] = {};
            this.baseHoras.forEach(h => this.horario[d][h] = null);
        });
    }
}

function normalizarNombre(s) {
        return s.trim().normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
}

function buscarDocentePorHoja(sheetName) {
    let norm = normalizarNombre(sheetName);
    for (let [name, docente] of MAPA_DOCENTES) {
        if (normalizarNombre(name) === norm) return docente;
    }
    for (let [name, docente] of MAPA_DOCENTES) {
        let normName = normalizarNombre(name);
        if (normName.startsWith(norm) || norm.startsWith(normName)) return docente;
    }
    return null;
}

function parsearLineaAsignatura(line) {
    let match = line.match(/^(.+?)\s+(\d+)[°º]\s*(.+?)\s*\((\d+)\s*hrs?\)\s*$/i);
    if (!match) return null;

    let nombreMateria = match[1].trim();
    let grado = parseInt(match[2]);
    let middlePart = match[3].trim();
    let horas = parseInt(match[4]);

    let especialidad = null;
    if (/\bGCH\b/i.test(middlePart)) {
        especialidad = 'GCH';
        middlePart = middlePart.replace(/\bGCH\b/i, '').trim();
    } else if (/\bEFEP\b/i.test(middlePart)) {
        especialidad = 'EFEP';
        middlePart = middlePart.replace(/\bEFEP\b/i, '').trim();
    }

    // Specialty groups (GCH/EFEP) only exist in 5th semester.
    // "Ingles 5 8°a GCH" means English level 5 for group 5a GCH, not 8a GCH.
    if (especialidad) {
        let materiaNum = nombreMateria.match(/(\d+)\s*$/);
        if (materiaNum) grado = parseInt(materiaNum[1]);
    }

    let grupos = middlePart.match(/[a-c]/gi);
    if (!grupos || grupos.length === 0) return null;
    grupos = grupos.map(g => g.toLowerCase());

    return { nombreMateria, grado, grupos, especialidad, horas };
}

function parsearCargaAcademica(wb) {
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let rows = XLSX.utils.sheet_to_json(sheet);
    let asignacionesTemp = [];

    rows.forEach(row => {
        let nombre = String(row['Profesor'] || '').trim();
        if (!nombre) return;

        let categoriaRaw = row['CATEGORÍA'] || row['CATEGORIA'] || '';
        let categoria = String(categoriaRaw).trim().toUpperCase();
        let tipo = (categoria === 'PA') ? 2 : 1;

        if (!MAPA_DOCENTES.has(nombre)) {
            MAPA_DOCENTES.set(nombre, new Docente(nombre, tipo, 0));
        }
        let docente = MAPA_DOCENTES.get(nombre);

        let asigText = String(row['Asignatura'] || '');
        let lines = asigText.split('\n').map(l => l.trim()).filter(l => l.length > 0);

        lines.forEach(line => {
            let parsed = parsearLineaAsignatura(line);
            if (!parsed) return;

            let horasPerGrupo = Math.round(parsed.horas / parsed.grupos.length);

            parsed.grupos.forEach(letra => {
                let nombreGrupo = parsed.especialidad
                    ? `${parsed.grado}${letra} ${parsed.especialidad}`
                    : `${parsed.grado}${letra}`;
                let turno = parsed.grado <= 4 ? 'matutino' : 'vespertino';

                if (!MAPA_GRUPOS.has(nombreGrupo)) {
                    MAPA_GRUPOS.set(nombreGrupo, new Grupo(nombreGrupo, turno));
                }

                docente.horas_carga += horasPerGrupo;
                docente.turnosAsignados.add(turno);

                asignacionesTemp.push({
                    docente: nombre,
                    grupo: nombreGrupo,
                    materia: parsed.nombreMateria,
                    horas: horasPerGrupo,
                    grado: parsed.grado,
                    turno: turno
                });
            });
        });
    });

    MAPA_DOCENTES.forEach(d => { d.maxDias = d.calcularMaxDias(); });

    let asignacionesExitosas = 0;
    asignacionesTemp.forEach(asig => {
        let g = MAPA_GRUPOS.get(asig.grupo);
        let d = MAPA_DOCENTES.get(asig.docente);
        if (!g || !d) return;

        let c = new Materia(asig.materia, asig.horas, asig.grado, asig.turno, null);
        c.grupo = g; c.docente = d;


        let h = c.horas_materia;
        let nm = c.nombre_materia.toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
        let desglose = [];

        if (d.tipo_docente === 2 && d.maxDias === 2 && h === 5) desglose = [3, 2];
        else if (d.tipo_docente === 2 && d.maxDias === 2 && h === 6) desglose = [3, 3];
        else if (nm.includes("INGLES") || nm.includes("TUTORIA") || c.tsu) {
            for (let i = 0; i < h; i++) desglose.push(1);
        } else {
            while (h > 0) {
                if (h >= 2) { desglose.push(2); h -= 2; }
                else { desglose.push(1); h -= 1; }
            }
        }

        desglose.forEach(dur => {
            g.bloques.push({ materia: c, docente: d, grupo: g, duracion: dur, nombreStr: `${c.nombre_materia} (${d.nombre_docente})` });
        });
        asignacionesExitosas++;
    });

    return asignacionesExitosas;
}

function parsearDisponibilidades(wb) {
    let docentesEncontrados = 0;

    wb.SheetNames.forEach(sheetName => {
        let docente = buscarDocentePorHoja(sheetName);
        if (!docente) return;

        let sheet = wb.Sheets[sheetName];
        let data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        for (let row = 1; row < Math.min(data.length, 15); row++) {
            let hora = 6 + row;
            if (!data[row]) continue;
            for (let col = 1; col <= 6; col++) {
                let val = data[row][col];
                if (val && String(val).trim() !== '') {
                    let dia = diasSemana[col - 1];
                    docente.disponibilidad[dia].add(hora);
                }
            }
        }
        docentesEncontrados++;
    });

    return docentesEncontrados;
}

function leerArchivo(file, callback) {
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
            callback(wb);
        } catch (error) {
            const errDiv = document.getElementById("span_error");
            errDiv.innerText = "✖ Error al leer el archivo: " + error.message;
            errDiv.style.color = "red";
        }
    };
    reader.readAsArrayBuffer(file);
}

function actualizarEstado() {
    const errDiv = document.getElementById("span_error");
    if (wbCarga && wbDisp) {
        errDiv.innerText = "⏳ Procesando archivos...";
        errDiv.style.color = "#888";
    } else if (wbCarga) {
        errDiv.innerText = "✔ Carga Académica cargada. Falta: Disponibilidades.";
        errDiv.style.color = "#D4A017";
    } else if (wbDisp) {
        errDiv.innerText = "✔ Disponibilidades cargadas. Falta: Carga Académica.";
        errDiv.style.color = "#D4A017";
    }
}

function parsearTodo() {
    try {
        MAPA_DOCENTES.clear(); MAPA_GRUPOS.clear(); PLANTILLAS_MATERIAS = [];

        let asignacionesExitosas = parsearCargaAcademica(wbCarga);
        let docentesConDisp = parsearDisponibilidades(wbDisp);

        // Ajustar maxDias: si los mejores maxDias días no tienen suficientes
        // slots para cubrir la carga, añadir 1 día (si hay disponibilidad).
        MAPA_DOCENTES.forEach(d => {
            if (d.horas_carga === 0) return;

            // Slots efectivos por día: horas únicas dentro del turno de sus grupos
            // en que el docente está disponible (un docente ocupa 1 slot/hora máx.)
            let slotsPorDia = diasSemana.map(dia => {
                let hrs = new Set();
                MAPA_GRUPOS.forEach(grupo => {
                    if (!grupo.bloques.some(b => b.docente === d)) return;
                    grupo.baseHoras.forEach(h => {
                        if (d.disponibilidad[dia].has(h)) hrs.add(h);
                    });
                });
                return hrs.size;
            }).sort((a, b) => b - a); // mejores días primero

            let diasDisponibles = slotsPorDia.filter(s => s > 0).length;
            let sumTopDias = slotsPorDia.slice(0, d.maxDias).reduce((a, b) => a + b, 0);

            // Si los mejores días no alcanzan y hay un día más con disponibilidad
            if (sumTopDias < d.horas_carga && diasDisponibles > d.maxDias) {
                d.maxDias++;
            }
        });

        let advertencias = [];

        MAPA_DOCENTES.forEach((d, nombre) => {
            let dispTotal = 0;
            diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
            if (dispTotal === 0 && d.horas_carga > 0)
                advertencias.push(`⚠ Docente "${nombre}" tiene ${d.horas_carga}h de carga pero 0h de disponibilidad.`);
            else if (d.horas_carga > dispTotal && dispTotal > 0)
                advertencias.push(`⚠ Docente "${nombre}" tiene ${d.horas_carga}h de carga pero solo ${dispTotal}h disponibles.`);
        });

        MAPA_GRUPOS.forEach((g, nombre) => {
            let slotsTotal = g.baseHoras.length * diasSemana.length;
            let horasAsignadas = 0;
            g.bloques.forEach(b => horasAsignadas += b.duracion);
            if (horasAsignadas > slotsTotal)
                advertencias.push(`⚠ Grupo "${nombre}" tiene ${horasAsignadas}h asignadas pero solo ${slotsTotal} slots disponibles.`);
        });

        const errDiv = document.getElementById("span_error");
        if (asignacionesExitosas > 0 && advertencias.length === 0) {
            errDiv.innerText = `✔ ${asignacionesExitosas} asignaciones · ${docentesConDisp} docentes con disponibilidad · ${MAPA_GRUPOS.size} grupos. Listo para generar.`;
            errDiv.style.color = "green";
        } else if (asignacionesExitosas > 0 && advertencias.length > 0) {
            errDiv.innerText = `✔ ${asignacionesExitosas} asignaciones con ${advertencias.length} advertencia(s):\n\n` + [...new Set(advertencias)].join("\n");
            errDiv.style.color = "#D4A017";
        } else {
            errDiv.innerText = "✖ ERROR: No se reconoció ninguna asignación. Verifica que la hoja tenga columnas: Profesor, Asignatura.";
            errDiv.style.color = "red";
        }
    } catch (error) {
        const errDiv = document.getElementById("span_error");
        errDiv.innerText = "✖ Error al procesar: " + error.message;
        errDiv.style.color = "red";
    }
}

document.getElementById("input_carga").onchange = e => {
    leerArchivo(e.target.files[0], wb => {
        wbCarga = wb;
        actualizarEstado();
        if (wbCarga && wbDisp) parsearTodo();
    });
};

document.getElementById("input_disp").onchange = e => {
    leerArchivo(e.target.files[0], wb => {
        wbDisp = wb;
        actualizarEstado();
        if (wbCarga && wbDisp) parsearTodo();
    });
};

function horasAsignadasEnDia(grupo, dia) {
    let horas = 0;
    grupo.baseHoras.forEach(h => { if (grupo.horario[dia][h] !== null) horas++; });
    return horas;
}

function aplicarAsignacion(grupo, bloque, dia, horaInicio, esForzado = false) {
    for (let h = horaInicio; h < horaInicio + bloque.duracion; h++) {
        grupo.horario[dia][h] = bloque;
        let marca = esForzado ? " [⚠️ FORZADO]" : "";
        bloque.nombreStrRender = `${bloque.materia.nombre_materia} (${bloque.docente.nombre_docente})${marca}`;
        bloque.docente.asignado[dia][h] = `${bloque.materia.nombre_materia} [${grupo.nombre_grupo}]${marca}`;
    }
    bloque.docente.diasActivos.add(dia);
    grupo.sesionesDia[dia][bloque.materia.nombre_materia] = (grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0) + 1;
}

function quitarAsignacion(grupo, bloque, dia, horaInicio) {
    for (let h = horaInicio; h < horaInicio + bloque.duracion; h++) {
        grupo.horario[dia][h] = null;
        delete bloque.docente.asignado[dia][h];
    }
    let quedanClases = false;
    for(let h in bloque.docente.asignado[dia]) quedanClases = true;
    if(!quedanClases) bloque.docente.diasActivos.delete(dia);
    grupo.sesionesDia[dia][bloque.materia.nombre_materia] -= 1;
}

function obtenerSnapshotAsignaciones() {
    let snapshot = {};
    MAPA_GRUPOS.forEach((grupo, nombreGrupo) => {
        snapshot[nombreGrupo] = {};
        diasSemana.forEach(d => {
            grupo.baseHoras.forEach(h => {
                let bloque = grupo.horario[d][h];
                if (bloque) snapshot[nombreGrupo][bloque.materia.nombre_materia] = bloque.docente.nombre_docente;
            });
        });
    });
    return snapshot;
}

// ------------------------------------------------------------------
// FASE 1: CONSTRUCCIÓN VORAZ 
// ------------------------------------------------------------------
function intentarAsignar(bloque, relajarSesiones, relajarDiasMax, relajarContiguidad, relajarDisponibilidad) {
    let grupo = bloque.grupo;
    let docente = bloque.docente;
    let mejorOpcion = null;
    let mejorCosto = Infinity;

    diasSemana.forEach(dia => {
        let penalizacionDia = (dia === "sabado") ? 10000 : 0;
        let horasDocenteHoy = Object.keys(docente.asignado[dia]).length;
        let activaNuevoDia = horasDocenteHoy === 0;

        if (!relajarDiasMax && activaNuevoDia && docente.diasActivos.size >= docente.maxDias) return;

        let sesionesActuales = grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0;
        if (!relajarSesiones && sesionesActuales >= 1) return;

        let tieneClasesHoy = false;
        let primeraClase = 99, ultimaClase = -1;
        grupo.baseHoras.forEach(h => {
            if (grupo.horario[dia][h] !== null) {
                tieneClasesHoy = true;
                if (h < primeraClase) primeraClase = h;
                if (h > ultimaClase) ultimaClase = h;
            }
        });

        let horasPermitidas = [];
        if (!tieneClasesHoy || relajarContiguidad) {
            horasPermitidas = grupo.baseHoras;
        } else {
            let hArriba = primeraClase - bloque.duracion;
            if (grupo.baseHoras.includes(hArriba)) horasPermitidas.push(hArriba);

            let hAbajo = ultimaClase + 1;
            if (grupo.baseHoras.includes(hAbajo) && (hAbajo + bloque.duracion - 1) <= grupo.baseHoras[grupo.baseHoras.length-1]) {
                horasPermitidas.push(hAbajo);
            }
        }

        horasPermitidas.forEach(hInicio => {
            let valido = true;
            let horasFueraDisp = 0;
            for (let h = hInicio; h < hInicio + bloque.duracion; h++) {
                if (grupo.horario[dia][h] !== null) valido = false;
                if (docente.asignado[dia][h]) valido = false;
                if (!docente.disponibilidad[dia].has(h)) {
                    if (!relajarDisponibilidad) valido = false;
                    else horasFueraDisp++;
                }
            }

            if (valido) {
                let costo = penalizacionDia;
                costo += horasFueraDisp * 50000;

                // --- Distribución pareja: minimizar varianza de horas por día ---
                let horasEnEsteDia = horasAsignadasEnDia(grupo, dia);
                let nuevasHoras = horasEnEsteDia + bloque.duracion;

                // Simular el estado después de la asignación y calcular varianza
                let horasDespuesPorDia = diasSemana.map(d =>
                    horasAsignadasEnDia(grupo, d) + (d === dia ? bloque.duracion : 0)
                ).filter(h => h > 0);
                if (horasDespuesPorDia.length > 0) {
                    let media = horasDespuesPorDia.reduce((a, b) => a + b, 0) / horasDespuesPorDia.length;
                    let varianza = horasDespuesPorDia.reduce((s, h) => s + (h - media) ** 2, 0) / horasDespuesPorDia.length;
                    costo += varianza * 300;
                }

                // Preferir primer slot del turno al abrir un día nuevo
                if (!tieneClasesHoy) {
                    costo += (hInicio - grupo.baseHoras[0]) * 10;
                }

                // Pequeña penalización por activar un día nuevo en el docente
                if (activaNuevoDia) costo += 500;

                if (costo < mejorCosto) {
                    mejorCosto = costo;
                    mejorOpcion = { dia, hInicio };
                }
            }
        });
    });

    if (mejorOpcion) {
        aplicarAsignacion(grupo, bloque, mejorOpcion.dia, mejorOpcion.hInicio);
        return true;
    }
    return false;
}

// NUEVO: INTERCAMBIO DIRECTO (SLOT SWAP)
function intentarSwapDeHorarios(bloquePendiente, queue) {
    let grupo = bloquePendiente.grupo;
    let docentePendiente = bloquePendiente.docente;
    let durP = bloquePendiente.duracion;

    for (let diaP of diasSemana) {
        for (let idx = 0; idx <= grupo.baseHoras.length - durP; idx++) {
            let hP = grupo.baseHoras[idx];

            let pendienteValido = true;
            for (let o = 0; o < durP; o++) {
                let h = hP + o;
                if (!docentePendiente.disponibilidad[diaP].has(h) || docentePendiente.asignado[diaP][h]) { pendienteValido = false; break; }
            }
            if (!pendienteValido) continue;

            let bloquesDesplazar = new Map();
            let slotsValidos = true;
            for (let o = 0; o < durP; o++) {
                let h = hP + o;
                let existente = grupo.horario[diaP][h];
                if (existente === null) continue;
                if (existente.docente === docentePendiente) { slotsValidos = false; break; }
                if (!bloquesDesplazar.has(existente)) {
                    bloquesDesplazar.set(existente, h);
                }
            }
            if (!slotsValidos || bloquesDesplazar.size === 0) continue;

            let reubicaciones = [];
            let todosReubicables = true;
            for (let [bloqueEx, hOrigen] of bloquesDesplazar) {
                let encontrado = false;
                for (let diaE of diasSemana) {
                    for (let idxE = 0; idxE <= grupo.baseHoras.length - bloqueEx.duracion; idxE++) {
                        let hE = grupo.baseHoras[idxE];
                        let destinoValido = true;
                        for (let o = 0; o < bloqueEx.duracion; o++) {
                            let hh = hE + o;
                            let ocupadoGrupo = grupo.horario[diaE][hh];
                            if (diaE === diaP && hh >= hP && hh < hP + durP) { destinoValido = false; break; }
                            if (ocupadoGrupo !== null && !bloquesDesplazar.has(ocupadoGrupo)) { destinoValido = false; break; }
                            if (ocupadoGrupo === null || bloquesDesplazar.has(ocupadoGrupo)) {} else { destinoValido = false; break; }
                            if (!bloqueEx.docente.disponibilidad[diaE].has(hh) || bloqueEx.docente.asignado[diaE][hh]) { destinoValido = false; break; }
                        }
                        if (!destinoValido) continue;

                        reubicaciones.push({ bloque: bloqueEx, diaOrigen: diaP, hOrigen, diaDest: diaE, hDest: hE });
                        encontrado = true;
                        break;
                    }
                    if (encontrado) break;
                }
                if (!encontrado) { todosReubicables = false; break; }
            }

            if (todosReubicables) {
                // Aplicar swap
                for (let r of reubicaciones) quitarAsignacion(grupo, r.bloque, r.diaOrigen, r.hOrigen);
                aplicarAsignacion(grupo, bloquePendiente, diaP, hP);
                for (let r of reubicaciones) aplicarAsignacion(grupo, r.bloque, r.diaDest, r.hDest);

                // Verificar que no se crearon huecos
                let creoHueco = false;
                for (let d of diasSemana) {
                    let first = -1, last = -1;
                    for (let h of grupo.baseHoras) {
                        if (grupo.horario[d][h]) { if (first === -1) first = h; last = h; }
                    }
                    if (first !== -1) {
                        for (let h = first; h <= last; h++) {
                            if (grupo.baseHoras.includes(h) && !grupo.horario[d][h]) { creoHueco = true; break; }
                        }
                    }
                    if (creoHueco) break;
                }

                if (!creoHueco) return true;

                // Deshacer swap si creó huecos
                for (let r of reubicaciones) quitarAsignacion(grupo, r.bloque, r.diaDest, r.hDest);
                quitarAsignacion(grupo, bloquePendiente, diaP, hP);
                for (let r of reubicaciones) aplicarAsignacion(grupo, r.bloque, r.diaOrigen, r.hOrigen);
            }
        }
    }
    return false;
}

function construccionVorazCascada() {
    let noAsignados = [];
    let TODOS_LOS_BLOQUES = [];
    LOG_CAMBIOS = []; 
    
    MAPA_DOCENTES.forEach(d => {
        let dispTotal = 0;
        diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
        d.flexibilidad = dispTotal - d.horas_carga;
    });

    MAPA_GRUPOS.forEach(g => { TODOS_LOS_BLOQUES.push(...g.bloques); });

    // Calcular flexibilidad efectiva por par docente-grupo:
    // cuántos slots del grupo coinciden con disponibilidad del docente, menos el total de horas que debe dar en ese grupo
    let docGrupoFlex = new Map();
    TODOS_LOS_BLOQUES.forEach(b => {
        let key = b.docente.nombre_docente + '|' + b.grupo.nombre_grupo;
        if (!docGrupoFlex.has(key)) {
            let slotsEfectivos = 0;
            diasSemana.forEach(dia => {
                b.grupo.baseHoras.forEach(h => { if (b.docente.disponibilidad[dia].has(h)) slotsEfectivos++; });
            });
            let totalHorasEnGrupo = b.grupo.bloques
                .filter(bl => bl.docente === b.docente)
                .reduce((sum, bl) => sum + bl.duracion, 0);
            docGrupoFlex.set(key, slotsEfectivos - totalHorasEnGrupo);
        }
        b.flexibilidadEfectiva = docGrupoFlex.get(key);
    });

    TODOS_LOS_BLOQUES.sort((a, b) => {
        // Primero: margen efectivo en el grupo (menos margen = más urgente)
        if (a.flexibilidadEfectiva !== b.flexibilidadEfectiva) return a.flexibilidadEfectiva - b.flexibilidadEfectiva;

        // Luego: docentes con múltiples turnos o tipo PTC primero
        let placaA = (a.materia.tsu || a.docente.tipo_docente === 1 || a.docente.flexibilidad <= 0) ? 1 : 0;
        let placaB = (b.materia.tsu || b.docente.tipo_docente === 1 || b.docente.flexibilidad <= 0) ? 1 : 0;
        if (placaA !== placaB) return placaB - placaA;

        let turnosA = a.docente.turnosAsignados.size;
        let turnosB = b.docente.turnosAsignados.size;
        if (turnosA !== turnosB) return turnosB - turnosA;

        if (a.docente.flexibilidad !== b.docente.flexibilidad) return a.docente.flexibilidad - b.docente.flexibilidad;
        return b.duracion - a.duracion;
    });

    let queue = [...TODOS_LOS_BLOQUES];

    while(queue.length > 0) {
        let bloque = queue.shift();

        // Contiguidad NUNCA se relaja — regla dura de cero huecos
        if (intentarAsignar(bloque, false, false, false, false)) continue; // estricto
        if (intentarAsignar(bloque, true,  false, false, false)) continue; // relajar sesiones
        if (intentarAsignar(bloque, true,  true,  false, false)) continue; // relajar sesiones + maxDias

        // Si el bloque es multi-hora y no cabe contiguo, partirlo en horas sueltas
        if (bloque.duracion > 1) {
            let dur = bloque.duracion;
            for (let k = 0; k < dur; k++) { queue.unshift({...bloque, duracion: 1}); }
            continue;
        }

        if (intentarSwapDeHorarios(bloque, queue)) continue;

        // Último recurso: colocar fuera de disponibilidad, pero SIN relajar contiguidad
        if (intentarAsignar(bloque, true, true, false, true)) continue;

        noAsignados.push(`${bloque.nombreStr} - G: ${bloque.grupo.nombre_grupo}`);
    }

    // Fase de reparación: intentar reubicar bloques fuera de disponibilidad
    repararViolacionesDisponibilidad();

    return noAsignados;
}

function enBorde(grupo, dia, h) {
    // Devuelve true si h está en el borde (inicio o fin) del bloque del día — quitarlo no crea hueco
    let base = grupo.baseHoras;
    let idx = base.indexOf(h);
    let prevOcup = idx > 0 && grupo.horario[dia][base[idx - 1]] !== null;
    let nextOcup = idx < base.length - 1 && grupo.horario[dia][base[idx + 1]] !== null;
    return !(prevOcup && nextOcup); // en el medio → false
}

function esAdyacenteOVacio(grupo, dia, h) {
    // Devuelve true si h está vacío y es adyacente a clases existentes (o el día está vacío)
    if (grupo.horario[dia][h] !== null) return false;
    let base = grupo.baseHoras;
    let tieneClases = base.some(hx => grupo.horario[dia][hx] !== null);
    if (!tieneClases) return true; // día vacío: cualquier slot es válido
    let idx = base.indexOf(h);
    let adjPrev = idx > 0 && grupo.horario[dia][base[idx - 1]] !== null;
    let adjNext = idx < base.length - 1 && grupo.horario[dia][base[idx + 1]] !== null;
    return adjPrev || adjNext;
}

function repararViolacionesDisponibilidad() {
    // Una reparación por iteración — usar break explícito para evitar movimientos múltiples
    // que se interfieran entre sí creando huecos
    for (let iter = 0; iter < 100; iter++) {
        let reparado = false;

        grupoLoop: for (let [, grupo] of MAPA_GRUPOS) {
            for (let dia of diasSemana) {
                for (let h of grupo.baseHoras) {
                    let bV = grupo.horario[dia][h];
                    if (!bV || bV.docente.disponibilidad[dia].has(h)) continue;
                    if (!enBorde(grupo, dia, h)) continue; // no se puede mover sin crear hueco

                    // Mover a slot vacío adyacente donde tenga disponibilidad
                    for (let diaB of diasSemana) {
                        for (let hB of grupo.baseHoras) {
                            if (!esAdyacenteOVacio(grupo, diaB, hB)) continue;
                            if (!bV.docente.disponibilidad[diaB].has(hB)) continue;
                            if (bV.docente.asignado[diaB][hB]) continue;
                            quitarAsignacion(grupo, bV, dia, h);
                            aplicarAsignacion(grupo, bV, diaB, hB);
                            reparado = true;
                            break grupoLoop;
                        }
                    }

                    // Swap con otro bloque del mismo grupo (ambos de 1hr)
                    if (reparado) break;
                    for (let diaB of diasSemana) {
                        for (let hB of grupo.baseHoras) {
                            let bO = grupo.horario[diaB][hB];
                            if (!bO || bO === bV || bO.duracion !== 1 || bV.duracion !== 1) continue;
                            if (!bV.docente.disponibilidad[diaB].has(hB)) continue;
                            if (bV.docente.asignado[diaB][hB] && bV.docente.asignado[diaB][hB] !== bV) continue;
                            if (!bO.docente.disponibilidad[dia].has(h)) continue;
                            if (bO.docente.asignado[dia][h] && bO.docente.asignado[dia][h] !== bO) continue;
                            let conf = false;
                            for (let [, otroG] of MAPA_GRUPOS) {
                                if (otroG === grupo) continue;
                                if (otroG.horario[diaB]?.[hB]?.docente === bV.docente) conf = true;
                                if (otroG.horario[dia]?.[h]?.docente === bO.docente) conf = true;
                            }
                            if (conf) continue;
                            quitarAsignacion(grupo, bV, dia, h);
                            quitarAsignacion(grupo, bO, diaB, hB);
                            aplicarAsignacion(grupo, bV, diaB, hB);
                            aplicarAsignacion(grupo, bO, dia, h);
                            reparado = true;
                            break grupoLoop;
                        }
                    }
                }
            }
        }

        if (!reparado) break;
    }
}

// ------------------------------------------------------------------
// FASE 2: MOTOR EXHAUSTIVO (Gravedad Anti-Huecos)
// ------------------------------------------------------------------
function aplicarGravedadIntraDia(grupo, dia) {
    let base = grupo.baseHoras;
    let movido = false;
    
    for (let iter = 0; iter < base.length; iter++) { 
        let primero = base.findIndex(h => grupo.horario[dia][h] !== null);
        let ultimo = -1;
        for(let i=base.length-1; i>=0; i--) { if(grupo.horario[dia][base[i]]!==null) {ultimo=i; break;} }
        
        if (primero === -1 || ultimo === -1 || primero === ultimo) break;

        let hizoCambio = false;
        for(let i = primero + 1; i < ultimo; i++) {
            let hHueco = base[i];
            if (grupo.horario[dia][hHueco] === null) {
                let hAbajo = base[i+1];
                let bAbajo = grupo.horario[dia][hAbajo];
                if (bAbajo && bAbajo.duracion === 1 && !bAbajo.docente.asignado[dia][hHueco] && bAbajo.docente.disponibilidad[dia].has(hHueco)) {
                    quitarAsignacion(grupo, bAbajo, dia, hAbajo);
                    aplicarAsignacion(grupo, bAbajo, dia, hHueco);
                    hizoCambio = true; movido = true; break;
                }
                let hArriba = base[i-1];
                let bArriba = grupo.horario[dia][hArriba];
                if (bArriba && bArriba.duracion === 1 && !bArriba.docente.asignado[dia][hHueco] && bArriba.docente.disponibilidad[dia].has(hHueco)) {
                    quitarAsignacion(grupo, bArriba, dia, hArriba);
                    aplicarAsignacion(grupo, bArriba, dia, hHueco);
                    hizoCambio = true; movido = true; break;
                }
            }
        }
        if (!hizoCambio) break;
    }
    return movido;
}

function intentarTraerBordeAHueco(grupo, diaDestino, hHueco) {
    for (let diaOrigen of diasSemana) {
        if (diaOrigen === diaDestino) continue;
        let base = grupo.baseHoras;
        
        let primerIdx = base.findIndex(h => grupo.horario[diaOrigen][h] !== null);
        let ultimoIdx = -1;
        for(let i=base.length-1; i>=0; i--) { if(grupo.horario[diaOrigen][base[i]]!==null) {ultimoIdx=i; break;} }
        
        if (primerIdx === -1) continue;

        let candidatos = [];
        candidatos.push({h: base[primerIdx], bloque: grupo.horario[diaOrigen][base[primerIdx]]});
        if (primerIdx !== ultimoIdx) candidatos.push({h: base[ultimoIdx], bloque: grupo.horario[diaOrigen][base[ultimoIdx]]});

        for (let c of candidatos) {
            let bloque = c.bloque;
            if (bloque.duracion > 1) continue; 
            if (!bloque.docente.disponibilidad[diaDestino].has(hHueco)) continue;
            if (bloque.docente.asignado[diaDestino][hHueco]) continue; 

            let activaNuevoDia = !bloque.docente.diasActivos.has(diaDestino);
            let dejaDiaLimpio = Object.keys(bloque.docente.asignado[diaOrigen]).length === 1;
            let diasFinales = bloque.docente.diasActivos.size;
            
            if (activaNuevoDia) diasFinales++;
            if (dejaDiaLimpio) diasFinales--;
            if (diasFinales > bloque.docente.maxDias) continue; 

            quitarAsignacion(grupo, bloque, diaOrigen, c.h);
            aplicarAsignacion(grupo, bloque, diaDestino, hHueco);
            return true; 
        }
    }
    return false;
}

function optimizacionExhaustiva(tiempoLimiteMs) {
    const endTime = Date.now() + tiempoLimiteMs;

    while (Date.now() < endTime) {
        let movidoAlgoritmo = false;

        MAPA_GRUPOS.forEach(grupo => {
            diasSemana.forEach(d => { if (aplicarGravedadIntraDia(grupo, d)) movidoAlgoritmo = true; });
            
            diasSemana.forEach(diaDestino => {
                let base = grupo.baseHoras;
                let primero = base.findIndex(h => grupo.horario[diaDestino][h] !== null);
                let ultimo = -1;
                for(let i=base.length-1; i>=0; i--) { if(grupo.horario[diaDestino][base[i]]!==null) {ultimo=i; break;} }
                
                if(primero !== -1 && ultimo !== -1) {
                    for(let i=primero+1; i<ultimo; i++) {
                        let hHueco = base[i];
                        if(grupo.horario[diaDestino][hHueco] === null) {
                            if(intentarTraerBordeAHueco(grupo, diaDestino, hHueco)) movidoAlgoritmo = true;
                        }
                    }
                }
            });
        });
    }
}

function ejecutarAlgoritmoFinal() {
    MAPA_GRUPOS.forEach(g => g.reset());
    MAPA_DOCENTES.forEach(d => d.reset());

    let estadoAntes = obtenerSnapshotAsignaciones();

    console.log("Fase 1: Generación Voraz y Negociación...");
    let fallos = construccionVorazCascada();

    console.log("Fase 2: Optimización Exhaustiva y Anti-Huecos (30 Segundos)...");
    optimizacionExhaustiva(30000);

    let estadoDespues = obtenerSnapshotAsignaciones();

    LOG_CAMBIOS = [];
    for (let g in estadoAntes) {
        for (let m in estadoAntes[g]) {
            let docAntes = estadoAntes[g][m];
            let docDespues = estadoDespues[g][m];
            if (docAntes && docDespues && docAntes !== docDespues) {
                LOG_CAMBIOS.push({ Grupo: g, Materia: m, DocenteAnterior: docAntes, DocenteNuevo: docDespues });
            }
        }
    }

    exportarExcel();

    const errDiv = document.getElementById("span_error");
    if (fallos.length === 0) {
        errDiv.innerText = `✔ Horarios 100% llenos. Si ves una materia con [⚠️ FORZADO], negocia ese horario con el profesor.`;
        errDiv.style.color = "green";
    } else {
        errDiv.innerText = `⚠ Chocaron ${fallos.length} horas físicamente imposibles de cruzar:\n` + fallos.join("\n");
        errDiv.style.color = "#F26649";
    }
}

function exportarExcel() {
    const wb = XLSX.utils.book_new();
    MAPA_GRUPOS.forEach(g => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        g.baseHoras.forEach(h => { 
            const r = [h]; 
            diasSemana.forEach(d => { 
                const bloque = g.horario[d][h]; 
                r.push(bloque ? (bloque.nombreStrRender || bloque.nombreStr) : ""); 
            }); 
            rows.push(r); 
        });
        let totalSemana = 0;
        diasSemana.forEach(d => { g.baseHoras.forEach(h => { if(g.horario[d][h] !== null) totalSemana++; }); });
        rows.push([]); rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "G_" + g.nombre_grupo.substring(0, 25));
    });
    MAPA_DOCENTES.forEach(d => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        for (let h = 7; h <= 21; h++) { 
            const r = [h]; 
            diasSemana.forEach(dia => { 
                const txt = d.asignado[dia][h]; 
                r.push(txt ? txt : ""); 
            }); 
            rows.push(r); 
        }
        let totalSemana = 0;
        diasSemana.forEach(dia => { totalSemana += Object.keys(d.asignado[dia]).length; });
        
        let estatusTipo = d.tipo_docente === 2 ? " (PA)" : " (Libre)";
        rows.push([]); 
        rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`, "", "DÍAS ASISTIDOS:", `${d.diasActivos.size} de ${d.maxDias}${estatusTipo}`]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "D_" + d.nombre_docente.substring(0, 25));
    });

    const rowsCambios = [["GRUPO", "MATERIA", "DOCENTE ASIGNADO ORIGINALMENTE", "DOCENTE FINAL (OPTIMIZADO)"]];
    if (LOG_CAMBIOS.length === 0) rowsCambios.push(["No hubo intercambios finales de docentes", "-", "-", "-"]);
    else LOG_CAMBIOS.forEach(c => rowsCambios.push([c.Grupo, c.Materia, c.DocenteAnterior, c.DocenteNuevo]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rowsCambios), "Cambios_Docentes");
    
    XLSX.writeFile(wb, "Horarios_Exhaustivos_Final.xlsx");
}

document.getElementById("button_accion").onclick = () => {
    let cantBloques = 0;
    MAPA_GRUPOS.forEach(g => cantBloques += g.bloques.length);
    if (cantBloques === 0) return alert("Por favor, carga una plantilla válida primero.");
    const errDiv = document.getElementById("span_error");
    errDiv.style.color = "#888"; 
    errDiv.innerText = "⏳ Exterminando huecos y forzando clases conflictivas (Por favor espera 30 segundos)...";
    setTimeout(() => { ejecutarAlgoritmoFinal(); }, 100);
};
