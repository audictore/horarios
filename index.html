        // por herramientas de desarrollo (ej. Live Server) que acceden a `window`/`document`
        // en contexto de worker y causan ReferenceError.
        if (!_workerUrl) {
            const allScripts = [...document.querySelectorAll('script:not([src])')];
            const mainScript = allScripts.find(s => s.textContent.includes('const IS_WORKER'));
            const src = mainScript ? mainScript.textContent
                                   : allScripts.map(s => s.textContent).join('\n');
            _workerUrl = URL.createObjectURL(new Blob([src], { type: 'text/javascript' }));
        }

        // Asignar índices y serializar problema UNA sola vez
        asignarIndicesWorker();
        const problemaData = serializarProblema();
        _crearSABProblema(); // SharedArrayBuffer de disponibilidad (cero copias hacia Workers)

        // Pool: tantos workers como núcleos lógicos (máx. N_STARTS)
        const nW = Math.min(N_STARTS, navigator.hardwareConcurrency || 4);
        const pool = Array.from({ length: nW }, () => new Worker(_workerUrl));

        // Preparar tareas para cada arranque
        const tareas = ESTRATEGIAS.map((est, i) => ({
            problema: problemaData,
            ruido: est.ruido,
            invertir: est.invertir,
            eliteBaseIdxs: eliteOrden && i >= ELITE_EMPIEZA_EN
                ? eliteOrden.filter(b => b._wi !== undefined).map(b => b._wi) : null,
            freqData: serializarFreqMap(),
            recurrentesIdxs: [...bloquesRecurrentesFallidos].filter(b => b._wi !== undefined).map(b => b._wi),
            globalBest: globalBestFallos,
            edaBloqueado: _edaBloqueado,
            intentoNum: i
        }));

        setProgreso(2, `⚡ Lanzando <b>${N_STARTS}</b> arranques en <b>${nW}</b> núcleos en paralelo...`);
        await cederControlUI();

        const resultados = await ejecutarConPool(pool, tareas, (hecho, total, mejor) => {
            const elapsed = Math.round((Date.now() - tInicioTotal) / 1000);
            setProgreso(
                Math.round(2 + (hecho / total) * 55),
                `⚡ Arranques greedy: <b>${hecho}/${total}</b> listos &nbsp;·&nbsp; ` +
                `Mejor: <b>${mejor === Infinity ? '?' : mejor}</b> sin ubicar &nbsp;·&nbsp; ⏱ ${elapsed}s`
            );
        });

        // Terminar workers
        pool.forEach(w => w.terminate());

/** Evalúa la calidad del horario actual en memoria.
 *  @param {number} noAsignadosCount - bloques que el greedy no pudo ubicar
 *  @returns {number} fitness (menor = mejor) */
function calcularFitness(noAsignadosCount) {
    let f = noAsignadosCount * 500000; // bloques no colocados: penalización máxima
    MAPA_DOCENTES.forEach(d => {
        // Horas asignadas fuera de disponibilidad declarada
        diasSemana.forEach(dia => {
            Object.keys(d.asignado[dia]).forEach(hStr => {
                if (!d.disponibilidad[dia].has(parseInt(hStr))) f += 50000;
            });
        });
        // Días activos por encima de maxDias
        if (d.diasActivos.size > d.maxDias) f += 2000 * (d.diasActivos.size - d.maxDias);
    });
    MAPA_GRUPOS.forEach(g => {
        // Huecos internos en cada día de cada grupo
        diasSemana.forEach(dia => {
            let base = g.baseHoras;
            let primero = -1, ultimo = -1;
            for (let i = 0; i < base.length; i++) {
                if (g.horario[dia][base[i]] !== null) {
                    if (primero === -1) primero = i;
                    ultimo = i;
                }
            }
            if (primero !== -1) {
                for (let i = primero + 1; i < ultimo; i++) {
                    if (g.horario[dia][base[i]] === null) f += 5000;
                }
            }
        });
    });
    return f;
}

/** Fisher-Yates in-place shuffle. */
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/** Shuffle parcial: solo intercambia ~ruido*100% de posiciones (semilla semi-guiada). */
function shuffleConRuido(arr, ruido) {
    let swaps = Math.floor(arr.length * ruido);
    for (let i = 0; i < swaps; i++) {
        let a = Math.floor(Math.random() * arr.length);
        let b = Math.floor(Math.random() * arr.length);
        [arr[a], arr[b]] = [arr[b], arr[a]];
    }
    return arr;
}

/** Order Crossover (OX): copia un segmento de padreA y rellena en orden de padreB.
 *  Garantiza que cada índice aparezca exactamente una vez. */
function crossoverOX(padreA, padreB) {
    let n = padreA.length;
    let i = Math.floor(Math.random() * n);
    let j = Math.floor(Math.random() * n);
    if (i > j) [i, j] = [j, i];
    let hijo = new Array(n).fill(-1);
    let enSegmento = new Set();
    for (let k = i; k <= j; k++) { hijo[k] = padreA[k]; enSegmento.add(padreA[k]); }
    let restantes = padreB.filter(x => !enSegmento.has(x));
    let idx = 0;
    for (let k = 0; k < n; k++) { if (hijo[k] === -1) hijo[k] = restantes[idx++]; }
    return hijo;
}

/** Mutación por intercambio: con probabilidad `tasa`, swapea dos posiciones aleatorias. */
function mutar(cromosoma, tasa) {
    let c = cromosoma.slice();
    for (let i = 0; i < c.length; i++) {
        if (Math.random() < tasa) {
            let j = Math.floor(Math.random() * c.length);
            [c[i], c[j]] = [c[j], c[i]];
        }
    }
    return c;
}

/** Selección por torneo de tamaño k: elige el mejor de k individuos aleatorios. */
function seleccionTorneo(evaluados, k = 3) {
    let mejor = null;
    for (let i = 0; i < k; i++) {
        let c = evaluados[Math.floor(Math.random() * evaluados.length)];
        if (!mejor || c.fitness < mejor.fitness) mejor = c;
    }
    return mejor.crom;
}

        <span class="inv-total-pct">${totalPct}%</span>
    </div>
    <table class="inventario-tabla">
        <thead><tr>
            <th style="width:1.2rem"></th>
            <th>Materia</th>
            <th>Docente</th>
            <th colspan="2">Progreso</th>
        </tr></thead>
        <tbody>`;

    entradas.forEach(({ materia, docente, requeridas, colocadas, hex }) => {
        const pct      = requeridas > 0 ? Math.round((colocadas / requeridas) * 100) : 0;
        const completo = colocadas === requeridas;
        const vacio    = colocadas === 0;
        const rowClass = completo ? 'inv-completo' : vacio ? 'inv-vacio' : 'inv-parcial';
        const color    = completo ? '#388e3c' : vacio ? '#f57c00' : 'var(--color-cerulean)';
        const estado   = completo ? '✓' : vacio ? '—' : pct + '%';
        html += `<tr class="${rowClass}">
            <td><span class="inv-swatch" style="background:#${hex}"></span></td>
            <td>${materia}</td>
            <td style="color:var(--color-dim-gray);font-size:0.65rem">${docente}</td>
            <td>
                <span class="inv-barra-wrap">
                    <span class="inv-barra-fill" style="width:${pct}%;background:${color}"></span>
                </span>
                <span class="inv-horas" style="color:${color}">${colocadas}/${requeridas}h</span>
            </td>
            <td><span class="inv-estado" style="color:${color}">${estado}</span></td>
        </tr>`;
    });

    html += '</tbody></table>';
    invDiv.innerHTML = html;

    wrap.innerHTML = '';
    wrap.appendChild(tabla);
    wrap.appendChild(invDiv);
}

function cederControlUI() {
    if (!IS_WORKER) _renderHorarioActivo();
    return new Promise(resolve => setTimeout(resolve, 0));
}

/** Reset completo de grupos y docentes, limpiando también flags de bloques. */
function resetearParaAG() {
    MAPA_GRUPOS.forEach(g => {
        g.reset();
        g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; });
    });
    MAPA_DOCENTES.forEach(d => d.reset());
}

/** Punto de entrada principal: ejecuta el AG y exporta el campeón. */
async function ejecutarAG() {
    const TAM_POB       = 40;
    const GENERACIONES  = 150;
    const ELITISMO      = 5;
    const TASA_MUTACION = 0.05;

    const errDiv = document.getElementById("span_error");
    const btn    = document.getElementById("button_accion");
    btn.disabled = true;
    btn.style.opacity = "0.5";

    try {
    // ── Paso 1: construir AG_BLOQUES_SORTED con el orden greedy canónico ──────
    resetearParaAG();
    AG_BLOQUES_SORTED = [];

    MAPA_DOCENTES.forEach(d => {
        let dispTotal = 0;
        diasSemana.forEach(dia => dispTotal += d.disponibilidad[dia].size);
        d.flexibilidad = dispTotal - d.horas_carga;
    });
    MAPA_GRUPOS.forEach(g => { AG_BLOQUES_SORTED.push(...g.bloques); });

    // Calcular flexibilidadEfectiva (mismo criterio que el greedy normal)
    let docGrupoFlex = new Map();
    AG_BLOQUES_SORTED.forEach(b => {
        let key = b.docente.nombre_docente + '|' + b.grupo.nombre_grupo;
        if (!docGrupoFlex.has(key)) {
            let diasDisponibles = 0;
            diasSemana.forEach(dia => {
                if (b.grupo.baseHoras.some(h => b.docente.disponibilidad[dia].has(h))) diasDisponibles++;
            });
            let sesiones = b.grupo.bloques.filter(bl => bl.docente === b.docente).length;
            docGrupoFlex.set(key, diasDisponibles - sesiones);
        }
        b.flexibilidadEfectiva = docGrupoFlex.get(key);
    });

    AG_BLOQUES_SORTED.sort((a, b) => {
        // 0. Inglés siempre primero
        let aI = esIngles(a) ? 1 : 0, bI = esIngles(b) ? 1 : 0;
        if (aI !== bI) return bI - aI;

        if (a.flexibilidadEfectiva !== b.flexibilidadEfectiva) return a.flexibilidadEfectiva - b.flexibilidadEfectiva;
        let pA = (a.materia.tsu || a.docente.tipo_docente === 1 || a.docente.flexibilidad <= 0) ? 1 : 0;
        let pB = (b.materia.tsu || b.docente.tipo_docente === 1 || b.docente.flexibilidad <= 0) ? 1 : 0;
        if (pA !== pB) return pB - pA;
        let tA = a.docente.turnosAsignados.size, tB = b.docente.turnosAsignados.size;
        if (tA !== tB) return tB - tA;
        if (a.docente.flexibilidad !== b.docente.flexibilidad) return a.docente.flexibilidad - b.docente.flexibilidad;
        return b.duracion - a.duracion;
    });

    let n     = AG_BLOQUES_SORTED.length;
    let elite = Array.from({ length: n }, (_, i) => i); // [0,1,2,...,n-1] = orden greedy

    // ── Paso 2: inicializar población ────────────────────────────────────────
    let poblacion = [elite.slice()]; // individuo 0: élite (semilla greedy exacta)
    let semiGuiados = Math.floor(TAM_POB * 0.3);
    for (let i = 0; i < semiGuiados; i++) poblacion.push(shuffleConRuido(elite.slice(), 0.1));
    while (poblacion.length < TAM_POB)   poblacion.push(shuffleArray(elite.slice()));

    let mejorGlobal = { fitness: Infinity, cromosoma: null, fallos: [] };
    const inicio = Date.now();

    // ── Paso 3: loop generacional ────────────────────────────────────────────
    for (let gen = 0; gen < GENERACIONES; gen++) {
        let evaluados = [];

        for (let idxCrom = 0; idxCrom < poblacion.length; idxCrom++) {
            const crom = poblacion[idxCrom];
            resetearParaAG();
            let fallos  = await construccionVorazCascada(crom);
            let fitness = calcularFitness(fallos.length);
            evaluados.push({ crom: crom.slice(), fitness, fallos });

            // Ceder al navegador cada ~5 individuos para mantener la UI responsiva
            if (idxCrom % 5 === 4) {
                const pctInner = Math.round(
                    ((gen + (idxCrom + 1) / poblacion.length) / GENERACIONES) * 100
                );
                const elInner = Math.round((Date.now() - inicio) / 1000);
                errDiv.innerHTML =
                    `<div style="margin-bottom:0.4rem">🧬 <b>Generación ${gen + 1} / ${GENERACIONES}</b>` +
                    ` &nbsp;·&nbsp; individuo ${idxCrom + 1}/${poblacion.length}` +
                    ` &nbsp;·&nbsp; ⏱ ${elInner}s</div>` +
                    `<div style="margin-bottom:0.4rem">Mejor fitness: <b>${mejorGlobal.fitness.toLocaleString()}</b>` +
                    ` &nbsp;·&nbsp; Sin ubicar: <b>${mejorGlobal.fallos.length}</b></div>` +
                    `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
                    `<div style="background:var(--color-yellow);height:100%;width:${pctInner}%;` +
                    `transition:width 0.15s;border-radius:0.5rem"></div></div>`;
                errDiv.style.color = "#221F20";
                await cederControlUI();
            }
        }

        evaluados.sort((a, b) => a.fitness - b.fitness);

        if (evaluados[0].fitness < mejorGlobal.fitness) {
            mejorGlobal = {
                fitness:   evaluados[0].fitness,
                cromosoma: evaluados[0].crom.slice(),
                fallos:    evaluados[0].fallos
            };
        }

        // Actualizar UI al final de la generación
        let pct     = Math.round(((gen + 1) / GENERACIONES) * 100);
        let elapsed = Math.round((Date.now() - inicio) / 1000);
        errDiv.innerHTML =
            `<div style="margin-bottom:0.4rem">🧬 <b>Generación ${gen + 1} / ${GENERACIONES}</b> &nbsp;·&nbsp; ⏱ ${elapsed}s</div>` +
            `<div style="margin-bottom:0.4rem">Mejor fitness: <b>${mejorGlobal.fitness.toLocaleString()}</b> &nbsp;·&nbsp; Bloques sin ubicar: <b>${mejorGlobal.fallos.length}</b></div>` +
            `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
            `<div style="background:var(--color-yellow);height:100%;width:${pct}%;transition:width 0.2s;border-radius:0.5rem"></div></div>`;
        errDiv.style.color = "#221F20";
        await cederControlUI();

        // Nueva generación: élite intacta + crossover + mutación
        let nueva = evaluados.slice(0, ELITISMO).map(e => e.crom.slice());
        while (nueva.length < TAM_POB) {
            let hijo = crossoverOX(seleccionTorneo(evaluados), seleccionTorneo(evaluados));
            nueva.push(mutar(hijo, TASA_MUTACION));
        }
        poblacion = nueva;
    }

    // ── Paso 4: decodificar campeón con gravedad completa (30 seg) ───────────
    errDiv.innerHTML =
        `<div>🏆 Evolución completada. Fitness campeón: <b>${mejorGlobal.fitness.toLocaleString()}</b></div>` +
        `<div style="margin-top:0.4rem">⚙️ Aplicando motor de gravedad completo (30 seg)...</div>` +
        `<div style="background:#ddd;border-radius:0.5rem;height:1.2rem;overflow:hidden;margin-top:0.4rem">` +
        `<div style="background:var(--color-yellow);height:100%;width:100%;border-radius:0.5rem"></div></div>`;
    await cederControlUI();

    resetearParaAG();
    let estadoAntes   = obtenerSnapshotAsignaciones();
    let fallosFinales = await construccionVorazCascada(mejorGlobal.cromosoma);
    await optimizacionExhaustiva(30000);
    let estadoDespues = obtenerSnapshotAsignaciones();

    LOG_CAMBIOS = [];
    for (let g in estadoAntes) {
        for (let m in estadoAntes[g]) {
            let dA = estadoAntes[g][m], dD = estadoDespues[g]?.[m];
            if (dA && dD && dA !== dD) LOG_CAMBIOS.push({ Grupo: g, Materia: m, DocenteAnterior: dA, DocenteNuevo: dD });
        }
    }

    const elapsed = Math.round((Date.now() - inicio) / 1000);
    const prefijo = `AG completado en ${elapsed}s — Fitness: ${mejorGlobal.fitness.toLocaleString()}. `;
    manejarFallos(fallosFinales, errDiv, prefijo, () => {
        btn.disabled = false;
        btn.style.opacity = "1";
    });

    } catch (e) {
        console.error('[ejecutarAG]', e);
        errDiv.style.color = 'red';
        errDiv.innerHTML =
            `❌ <b>Error inesperado:</b> ${e.message || e}<br>` +
            `<small>Abre la consola del navegador (F12) para ver el detalle.</small>`;
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}

// ─── Expansión interactiva de días de asistencia ─────────────────────────────

/**
 * Dado un arreglo de bloques no asignados, detecta qué docentes podrían
 * colocarlos si se les permitiera un día adicional.
 * Devuelve Map<docente, {diasActual, bloques[]}>.
 */
function detectarNecesidadesExtraDia(bloques) {
    const necesidades = new Map();
    for (const bloque of bloques) {
        const d = bloque.docente;
        const g = bloque.grupo;
        // PAs: días de asistencia son regla institucional dura, nunca se expanden
        if (d.tipo_docente === 2) continue;
        // Solo aplica si el docente YA llegó a su límite
        if (d.diasActivos.size < d.maxDias) continue;
        // Buscar al menos un slot válido en un DÍA NUEVO para este docente
        let haySlot = false;
        outer: for (const dia of diasSemana) {
            if (d.diasActivos.has(dia)) continue; // no es día nuevo
            for (const h of g.baseHoras) {
                if (g.horario[dia][h] !== null)          continue; // grupo ocupado
                if (d.asignado[dia][h])                  continue; // docente ocupado
                if (!d.disponibilidad[dia].has(h))       continue; // sin disponibilidad
                if ((g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloque)) continue;
                haySlot = true; break outer;
            }
        }
        if (!haySlot) continue;
        if (!necesidades.has(d)) necesidades.set(d, { diasActual: d.maxDias, bloques: [] });
        necesidades.get(d).bloques.push(bloque);
    }
    return necesidades;
}

/**
 * Busca el mejor slot FORZADO (fuera de disponibilidad) para un bloque.
 * No aplica la asignación. Devuelve {dia, hInicio, horasFueraDisp} o null.
 */
function encontrarSlotForzado(bloque) {
    // PAs: disponibilidad es regla institucional absoluta. NUNCA se fuerza.
    if (bloque.docente.tipo_docente === 2) return null;

    const grupo  = bloque.grupo;
    const docente = bloque.docente;
    let mejorCosto  = Infinity;
    let mejorOpcion = null;

    diasSemana.forEach(dia => {
        const activaNuevoDia = !docente.diasActivos.has(dia);
        // PAs: regla institucional dura — nunca abrir día nuevo si ya en maxDias
        if (activaNuevoDia && docente.tipo_docente === 2 &&
            docente.diasActivos.size >= docente.maxDias) return;
        // No sesión doble de misma materia en el mismo día
        if ((grupo.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloque)) return;

        const base      = grupo.baseHoras;
        const dispHoras = docente.disponibilidad[dia];

        // Límites de la ventana de disponibilidad declarada en este día
        let minDisp = Infinity, maxDisp = -Infinity;
        dispHoras.forEach(h => {
            if (h < minDisp) minDisp = h;
            if (h > maxDisp) maxDisp = h;
        });

        for (let idx = 0; idx <= base.length - bloque.duracion; idx++) {
            const hInicio = base[idx];
            let valido = true;
            let horasFueraDisp = 0;
            for (let h = hInicio; h < hInicio + bloque.duracion; h++) {
                if (grupo.horario[dia][h]  !== null)  { valido = false; break; }
                if (docente.asignado[dia][h])          { valido = false; break; }
                if (!dispHoras.has(h)) horasFueraDisp++;
            }
            // Solo es FORZADO si al menos 1 hora está fuera de disponibilidad
            if (!valido || horasFueraDisp === 0) continue;

            // ── Calcular horas de espera ("gap") ──────────────────────────────
            // Si el bloque forzado queda ANTES del inicio de disponibilidad,
            // el docente llega anticipadamente y queda varado hasta que empiece
            // su ventana normal — esas horas de espera son parte del impacto real.
            // Lo mismo aplica si el bloque queda DESPUÉS del fin de disponibilidad.
            let gapHoras = 0;
            if (dispHoras.size > 0) {
                const finBloque = hInicio + bloque.duracion;
                if (finBloque <= minDisp) {
                    // Bloque completamente antes de la disponibilidad
                    gapHoras = minDisp - finBloque;
                } else if (hInicio > maxDisp) {
                    // Bloque completamente después de la disponibilidad
                    gapHoras = hInicio - (maxDisp + 1);
                }
                // Si el bloque se mezcla (parte dentro, parte fuera): no hay gap adicional
                // porque ya está penalizado por horasFueraDisp
            }

            const impactoReal = horasFueraDisp + gapHoras;
            const costo = impactoReal * 50000 + (activaNuevoDia ? 500 : 0);
            if (costo < mejorCosto) {
                mejorCosto  = costo;
                mejorOpcion = { dia, hInicio, horasFueraDisp, gapHoras, impactoReal };
            }
        }
    });

    return mejorOpcion;
}

/**
 * Panel Fase 2: el usuario aprueba colocaciones FORZADAS (fuera de disponibilidad).
 * @param {Array}    bloquesForzables – [{bloque, slot:{dia,hInicio,horasFueraDisp}}]
 * @param {Function} onAplicar        – callback(Set<bloque> aprobados)
 */
function mostrarPanelForzado(bloquesForzables, onAplicar) {

    panel.id = 'panel_forzado_disp';

        margin-top:1rem; background:transparent; padding:0; box-sizing:border-box;

    `;

    let rows = '';
    bloquesForzables.forEach(({ bloque, slot }, i) => {
        const d    = bloque.docente;
        const tipo = d.tipo_docente === 2 ? 'PA' : (d.categoria || 'PTC');
        const hFin = slot.hInicio + bloque.duracion;

        // Construir descripción de impacto real
        const gapHoras    = slot.gapHoras    || 0;
        const impactoReal = slot.impactoReal || slot.horasFueraDisp;
        let impactoStr;
        if (gapHoras > 0) {
            impactoStr = `${slot.horasFueraDisp}h fuera de disponibilidad`
                       + ` + ${gapHoras}h de espera`
                       + ` = <strong>${impactoReal}h de impacto real</strong>`;
        } else {
            impactoStr = `${slot.horasFueraDisp}h fuera de disponibilidad`;
        }

        rows += `
        <label style="display:flex;align-items:flex-start;gap:0.5rem;padding:0.3rem 0;
                       border-bottom:1px solid #eee;cursor:pointer;line-height:1.35">
            <input type="checkbox" data-idx="${i}" checked
                   style="margin-top:0.15rem;accent-color:#FFAB91;width:0.95rem;height:0.95rem;flex:none">
            <span style="flex:1 1 auto;min-width:0">
                <strong>${d.nombre_docente}</strong>
                <span style="color:var(--color-dim-gray)">(${tipo})</span> ·
                <strong>${bloque.materia.nombre_materia}</strong> [${bloque.grupo.nombre_grupo}]
                <span style="color:#E65100;display:block;margin-top:0.1rem">→ ${slot.dia} ${slot.hInicio}:00–${hFin}:00 (${impactoStr})</span>
            </span>
        </label>`;
    });

    panel.innerHTML = `
        <h3 style="margin:0 0 0.5rem;font-size:0.95rem;color:var(--color-black)">
            📋 Colocaciones fuera de disponibilidad declarada
        </h3>
        <p style="margin:0 0 1rem;color:var(--color-dim-gray);font-size:0.82rem">
            Los siguientes bloques solo caben en horarios donde el docente no declaró disponibilidad.
            Aprueba los que deseas conservar (quedarán marcados como <em>FORZADO</em>)
            o desmarca los que dejarás sin asignar.
        </p>
        <div style="margin-top:0.5rem">${rows}</div>
        <div style="margin-top:1rem;display:flex;gap:0.8rem;flex-wrap:wrap">
            <button id="btn_aplicar_forz"
                style="background:#FFAB91;border:none;padding:0.5rem 1.4rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       font-weight:bold;cursor:pointer;font-size:0.85rem">
                Aplicar seleccionados (FORZADO)
            </button>
            <button id="btn_omitir_forz"
                style="background:transparent;border:2px solid #ccc;padding:0.5rem 1.2rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       cursor:pointer;font-size:0.85rem">
                Omitir todos
            </button>
        </div>`;

    const caja = document.getElementById('span_error') || document.body;
    caja.appendChild(panel);

    panel.querySelector('#btn_aplicar_forz').onclick = () => {
        const aprobados = new Set();
        panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
            if (cb.checked) aprobados.add(bloquesForzables[parseInt(cb.dataset.idx)].bloque);
        });
        panel.remove();
        onAplicar(aprobados);
    };
    panel.querySelector('#btn_omitir_forz').onclick = () => {
        panel.remove();
        onAplicar(new Set());
    };
}

/**
 * Panel Fase 3: informa al usuario de bloques que no pueden asignarse
 * de ninguna manera. Solo puede confirmar para continuar.
 * @param {Array}    bloquesImposibles – bloques sin solución
 * @param {Function} onConfirmar       – callback sin argumentos
 */
function mostrarPanelImposibles(bloquesImposibles, onConfirmar) {
    document.getElementById('panel_imposibles')?.remove();

    const panel = document.createElement('div');
    panel.id = 'panel_imposibles';
    // Se renderiza DENTRO de la caja de info/errores (#span_error): transparente, sin caja propia.
    panel.style.cssText = `
        margin-top:1rem; background:transparent; padding:0; box-sizing:border-box;
        font-family:var(--font-roboto-mono); font-size:0.85rem;
    `;

    let rows = '';
    bloquesImposibles.forEach(bloque => {
        const d    = bloque.docente;
        const g    = bloque.grupo;
        const tipo = d.tipo_docente === 2 ? 'PA' : (d.categoria || 'PTC');

        // ── Diagnóstico detallado ──────────────────────────────────────────────
        // 1. Disponibilidad total del docente (horas declaradas)
        let horasDisp = 0;
        diasSemana.forEach(dia => { horasDisp += d.disponibilidad[dia].size; });

        // 2. Horas ya asignadas del docente en otros grupos
        let horasAsignadas = 0;
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => { if (d.asignado[dia][h]) horasAsignadas++; });
        });
        // contar TODAS las horas asignadas en cualquier grupo
        let horasTotAsign = 0;
        diasSemana.forEach(dia => {
            Object.keys(d.asignado[dia]).forEach(h => { if (d.asignado[dia][h]) horasTotAsign++; });
        });

        // 3. Grupos del docente que generan conflicto con este bloque
        const gruposEnConflicto = new Set();
        let haySlotGrupo        = false;
        let hayDispDoc          = false;
        let docOcupadoEnDisp    = false;
        let sesionesMismaMateria    = 0; // días del grupo con sesión de esta materia
        let diasConDispYSesion      = 0; // teacher has disp AND group has session of M
        let diasConDispSinSesion    = 0; // teacher has disp AND group has NO session of M (day potentially usable)
        let diasConDispSinSesionConSlots = 0; // as above + group has at least 1 free slot that day

        diasSemana.forEach(dia => {
            const tieneSesion = (g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloque);
            const tieneDisp   = g.baseHoras.some(h => d.disponibilidad[dia].has(h));
            if (tieneSesion) sesionesMismaMateria++;
            if (tieneSesion && tieneDisp) diasConDispYSesion++;
            if (!tieneSesion && tieneDisp) {
                diasConDispSinSesion++;
                const tieneSlotLibre = g.baseHoras.some(h => g.horario[dia][h] === null);
                if (tieneSlotLibre) diasConDispSinSesionConSlots++;
            }
            if (tieneSesion) return; // regla: 1 sesión por materia por día
            const dispDia = d.disponibilidad[dia];
            for (let idx = 0; idx <= g.baseHoras.length - bloque.duracion; idx++) {
                const h = g.baseHoras[idx];
                let grupoLibre = true, docDisp = true, docLibre = true;
                for (let o = 0; o < bloque.duracion; o++) {
                    if (g.horario[dia][h + o] !== null)        grupoLibre = false;
                    if (!dispDia.has(h + o))                   docDisp = false;
                    if (d.asignado[dia][h + o])                docLibre = false;
                }
                if (!grupoLibre) continue;
                if (grupoLibre) haySlotGrupo = true;
                if (!docDisp)   continue;
                hayDispDoc = true;
                if (!docLibre) {
                    docOcupadoEnDisp = true;
                    // ¿en qué grupo está ocupado?
                    for (const [, g2] of MAPA_GRUPOS) {
                        if (g2 === g) continue;
                        for (let o = 0; o < bloque.duracion; o++) {
                            const ex = g2.horario[dia][h + o];
                            if (ex && ex.docente === d) {
                                gruposEnConflicto.add(`${g2.nombre_grupo} (${dia} ${h + o}h)`);
                            }
                        }
                    }
                }
            }
        });

        // 3b. Ventanas ESTRUCTURALES: ignorando por completo la ocupación
        // actual (como si el grupo estuviera vacío), ¿en cuántas posiciones
        // (día, hora) cabe una ventana de bloque.duracion horas contiguas
        // dentro del horario del grupo con disponibilidad declarada del
        // docente? Si es 0, NINGÚN algoritmo puede colocarlo: es un problema
        // de datos, no de búsqueda.
        let ventanasEstructurales = 0;
        diasSemana.forEach(dia => {
            const dispDia = d.disponibilidad[dia];
            for (let idx = 0; idx <= g.baseHoras.length - bloque.duracion; idx++) {
                const h = g.baseHoras[idx];
                let ok = true;
                for (let o = 0; o < bloque.duracion; o++) {
                    if (!dispDia.has(h + o)) { ok = false; break; }
                }
                if (ok) ventanasEstructurales++;
            }
        });

        // 4. Determinar motivo principal
        let motivo, motivoColor = '#C62828';
        if (ventanasEstructurales === 0) {
            motivo = `🔴 Estructuralmente imposible: incluso con el grupo completamente VACÍO `
                   + `no existe ninguna ventana de ${bloque.duracion}h contiguas dentro del horario `
                   + `del grupo cubierta por la disponibilidad declarada del docente. `
                   + `<b>Problema de datos, no de algoritmo: ampliar la disponibilidad del docente `
                   + `a ≥${bloque.duracion}h continuas en el turno del grupo, o dividir el bloque.</b>`;
        } else if (!haySlotGrupo) {
            motivo = '🔴 El grupo no tiene horas libres. Reducir carga de otras materias.';
        } else if (!hayDispDoc && diasConDispYSesion > 0 && diasConDispSinSesion === 0) {
            // Docente SOLO tiene disponibilidad en días que ya tienen sesión de esta materia
            // → necesita más días de disponibilidad en el dato
            const sesTotal = sesionesMismaMateria + 1; // ya colocadas + esta
            motivo = `🔴 Deadlock de sesiones: el docente solo tiene disponibilidad en ${diasConDispYSesion} día(s), `
                   + `todos ya ocupados por otra sesión de esta materia. `
                   + `Esta materia necesita ${sesTotal} días distintos pero el docente solo cubre ${diasConDispYSesion}. `
                   + `<b>Solución: ampliar disponibilidad del docente a ≥${sesTotal} días para este grupo.</b>`;
        } else if (!hayDispDoc && diasConDispYSesion > 0 && diasConDispSinSesionConSlots === 0) {
            // Docente tiene disponibilidad en días sin sesión, pero esos días tienen todos los slots ocupados
            // → problema de congestion en el grupo, algoritmo de swaps no pudo liberar espacio
            motivo = `🔴 Días disponibles bloqueados: el docente tiene disponibilidad en ${diasConDispSinSesion} día(s) sin sesión `
                   + `de esta materia, pero todos los slots de esos días están ocupados por otros docentes. `
                   + `<b>El algoritmo no pudo liberar espacio. Considera reducir la carga del grupo o ampliar el horario base.</b>`;
        } else if (!hayDispDoc && diasConDispYSesion > 0) {
            // Días sin sesión existen pero ninguno tiene una ventana de `bloque.duracion`
            // horas consecutivas donde AMBAS condiciones se cumplan: grupo libre Y docente con
            // disponibilidad declarada en esas horas.
            // Calcular la ventana máxima por día para dar al usuario información accionable.
            const detalleDias = [];
            diasSemana.forEach(dia => {
                const tieneSesionDia = (g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloque);
                if (tieneSesionDia) return; // ya tiene sesión → ya contado aparte
                if (!g.baseHoras.some(h => d.disponibilidad[dia].has(h))) return; // sin disp
                let maxVentana = 0, racha = 0;
                g.baseHoras.forEach(h => {
                    if (g.horario[dia][h] === null && d.disponibilidad[dia].has(h)) {
                        racha++;
                        if (racha > maxVentana) maxVentana = racha;
                    } else {
                        racha = 0;
                    }
                });
                detalleDias.push({ dia, maxVentana });
            });
            const necesita   = bloque.duracion;
            const esPTC      = d.tipo_docente !== 2;
            const detalleStr = detalleDias.length
                ? detalleDias.map(({ dia, maxVentana }) =>
                    `<b>${dia}</b>: máx ${maxVentana}h libre${maxVentana >= necesita ? ' ✓' : ` (faltan ${necesita - maxVentana}h)`}`
                  ).join(' · ')
                : 'ningún día con disponibilidad';
            motivo = `🔴 Sin ventana de ${necesita}h consecutivas: el bloque necesita ${necesita}h seguidas `
                   + `donde el grupo esté libre <em>y</em> el docente tenga disponibilidad declarada. `
                   + `Días candidatos (sin sesión de esta materia): ${detalleStr}. `
                   + (esPTC
                       ? `Como PTC el docente puede usar cualquier día; el límite real es la <b>ventana horaria</b> `
                       + `dentro de su disponibilidad. Agregar ${necesita}h continuas en al menos uno de esos días.`
                       : `Ampliar disponibilidad a bloques continuos de ≥${necesita}h.`);
        } else if (!hayDispDoc) {
            motivo = '🔴 El docente no tiene disponibilidad en ningún hueco libre del grupo. Ampliar su disponibilidad en los datos.';
        } else if (docOcupadoEnDisp) {
            const lista = [...gruposEnConflicto].slice(0, 4).join(', ');
            motivo = `🟡 Docente disponible pero ocupado en: <em>${lista || 'otro grupo'}</em>. `
                   + `El algoritmo no pudo liberar ese slot (posible deadlock con sesiones de esos grupos).`;
            motivoColor = '#E65100';
        } else {
            motivo = '🟠 Contiguidad o sesión doble impide la colocación. Revisar horario base del grupo.';
            motivoColor = '#E65100';
        }

        rows += `
        <div style="padding:0.35rem 0;border-bottom:1px solid #eee;line-height:1.35;font-size:0.8rem">
            <div>
                <strong>${d.nombre_docente}</strong>
                <span style="color:var(--color-dim-gray)">(${tipo})</span> ·
                <strong>${bloque.materia.nombre_materia}</strong>
                <span style="color:var(--color-dim-gray)">[${g.nombre_grupo}]</span>
                <span style="color:var(--color-dim-gray);font-size:0.72rem">· ${horasDisp}h disp · ${horasTotAsign}h asig · ${ventanasEstructurales} vent.</span>
            </div>
            <div style="color:${motivoColor};font-size:0.74rem;margin-top:0.1rem">${motivo}</div>
        </div>`;
    });

    panel.innerHTML = `
        <h3 style="margin:0 0 0.5rem;font-size:0.95rem;color:var(--color-black)">
            ❌ Bloques sin solución posible
        </h3>
        <p style="margin:0 0 1rem;color:var(--color-dim-gray);font-size:0.82rem">
            Los siguientes bloques no pueden colocarse en ningún horario disponible,
            ni siquiera fuera de la disponibilidad declarada.
            Revisa la carga o disponibilidad del docente y regenera el horario para incluirlos.
        </p>
        <div style="margin-top:0.5rem">${rows}</div>
        <div style="margin-top:1rem">
            <button id="btn_confirmar_imp"
                style="background:#EF9A9A;border:none;padding:0.5rem 1.4rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       font-weight:bold;cursor:pointer;font-size:0.85rem">
                Entendido — exportar horario parcial
            </button>
        </div>`;

    const caja = document.getElementById('span_error') || document.body;
    caja.appendChild(panel);

    panel.querySelector('#btn_confirmar_imp').onclick = () => {
        panel.remove();
        onConfirmar();
    };
}

/**
 * Muestra un panel con checkboxes para que el usuario apruebe la expansión
 * de días de asistencia por docente.
 * @param {Map} necesidades  – resultado de detectarNecesidadesExtraDia
 * @param {Function} onAplicar – callback(Set<nombre_docente> aprobados)
 */
function mostrarPanelExpansion(necesidades, onAplicar) {
    // Quitar panel anterior si existía
    document.getElementById('panel_expansion_dias')?.remove();

    const panel = document.createElement('div');
    panel.id = 'panel_expansion_dias';
    panel.style.cssText = `
        margin-top:1rem; background:transparent; padding:0; box-sizing:border-box;
        font-family:var(--font-roboto-mono); font-size:0.85rem;
    `;

    let rows = '';
    necesidades.forEach(({ diasActual, bloques }, docente) => {
        const tipo  = docente.tipo_docente === 2 ? 'PA' : (docente.categoria || 'PTC');
        const bStr  = bloques.map(b => `${b.materia.nombre_materia} [${b.grupo.nombre_grupo}]`).join(', ');
        rows += `
        <label style="display:flex;align-items:flex-start;gap:0.7rem;padding:0.55rem 0;
                       border-bottom:1px solid #f0f0f0;cursor:pointer">
            <input type="checkbox" data-docente="${docente.nombre_docente}" checked
                   style="margin-top:0.15rem;accent-color:var(--color-yellow);width:1rem;height:1rem">
            <span>
                <strong>${docente.nombre_docente}</strong>
                <span style="color:var(--color-dim-gray);font-size:0.78rem">(${tipo})</span>
                &nbsp;—&nbsp;
                <strong>${diasActual}</strong> días actuales
                &nbsp;→&nbsp; permitir <strong>${diasActual + 1}</strong>
                <div style="color:var(--color-tomato);font-size:0.75rem;margin-top:0.2rem">
                    ${bloques.length} bloque${bloques.length > 1 ? 's' : ''} sin ubicar:
                    <em>${bStr}</em>
                </div>
            </span>
        </label>`;
    });

    panel.innerHTML = `
        <h3 style="margin:0 0 0.5rem;font-size:0.95rem;color:var(--color-black)">
            ⚠ Algunos docentes necesitan un día adicional
        </h3>
        <p style="margin:0 0 1rem;color:var(--color-dim-gray);font-size:0.82rem">
            El algoritmo no pudo ubicar todos los bloques dentro del límite de días actual.
            Selecciona los docentes a quienes deseas permitir un día extra y haz clic en
            <em>Reintentar</em>. Esta acción solo afecta a la generación actual.
        </p>
        <div style="margin-top:0.5rem">${rows}</div>
        <div style="margin-top:1rem;display:flex;gap:0.8rem;flex-wrap:wrap">
            <button id="btn_aplicar_exp"
                style="background:var(--color-yellow);border:none;padding:0.5rem 1.4rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       font-weight:bold;cursor:pointer;font-size:0.85rem">
                Reintentar con días expandidos
            </button>
            <button id="btn_omitir_exp"
                style="background:transparent;border:2px solid #ccc;padding:0.5rem 1.2rem;
                       border-radius:0.5rem;font-family:var(--font-roboto-mono);
                       cursor:pointer;font-size:0.85rem">
                Omitir — exportar tal cual
            </button>
        </div>`;

    // Insertar justo antes del desglose (o al final del body si no existe)
    const caja = document.getElementById('span_error') || document.body;
    caja.appendChild(panel);

    panel.querySelector('#btn_aplicar_exp').onclick = () => {
        const aprobados = new Set();
        panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
            if (cb.checked) aprobados.add(cb.dataset.docente);
        });
        panel.remove();
        onAplicar(aprobados);
    };
    panel.querySelector('#btn_omitir_exp').onclick = () => {
        panel.remove();
        onAplicar(new Set());
    };
}

/**
 * Punto central de post-procesamiento — flujo completamente interactivo:
 *
 *  FASE 1 – Expansión de días de asistencia:
 *    Detecta docentes bloqueados por maxDias. El usuario aprueba quién
 *    puede tener un día extra; se reintenta la asignación.
 *
 *  FASE 2 – Colocaciones FORZADAS (fuera de disponibilidad):
 *    Para los bloques aún sin ubicar, busca slots fuera de disponibilidad.
 *    El usuario aprueba bloque por bloque qué colocaciones FORZADAS acepta.
 *
 *  FASE 3 – Bloques imposibles:
 *    Bloques para los que no existe ningún slot (ni siquiera FORZADO).
 *    Se informa al usuario; tras su confirmación se exporta el horario parcial.
 *
 * @param {Array}    bloquesFallidos  – bloques (objetos) que no se pudieron ubicar
 * @param {Element}  errDiv           – div de estado en el DOM
 * @param {string}   prefijo          – texto para iniciar el mensaje (e.g. "AG en 34s. ")
 * @param {Function} onDone           – callback sin argumentos, llamado al terminar
 */
function manejarFallos(bloquesFallidos, errDiv, prefijo, onDone) {

    // ── Paso final: exportar y mostrar estado ────────────────────────────────

    // Genera una tabla HTML con todos los grupos que tienen horas sin colocar,
    // con el mismo cálculo que el panel "Clases del grupo" de la vista inferior.
    // Se embebe en el recuadro de estado (errDiv) para que el usuario vea de un
    // vistazo qué faltó en cada grupo sin tener que navegar pestaña a pestaña.
    function generarResumenGruposIncompletos() {
        const secciones = [];
        MAPA_GRUPOS.forEach((grupo, nombreGrupo) => {
            // Replicar el cálculo de _renderHorarioActivo (requeridas/colocadas)
            const invMap = new Map();
            grupo.bloques.forEach(b => {
                const key = b.materia.nombre_materia + '§' + b.docente.nombre_docente;
                if (!invMap.has(key)) invMap.set(key, {
                    materia: b.materia.nombre_materia, docente: b.docente.nombre_docente,
                    requeridas: 0, colocadas: 0, bloques: []
                });
                invMap.get(key).requeridas += b.duracion;
                invMap.get(key).bloques.push(b);
            });
            diasSemana.forEach(dia => {
                if (!grupo.horario[dia]) return;
                grupo.baseHoras.forEach(h => {
                    const bl = grupo.horario[dia][h];
                    if (!bl) return;
                    const key = bl.materia.nombre_materia + '§' + bl.docente.nombre_docente;
                    if (invMap.has(key)) invMap.get(key).colocadas++;
                });
            });
            const totalReq = [...invMap.values()].reduce((s, v) => s + v.requeridas, 0);
            const totalCol = [...invMap.values()].reduce((s, v) => s + v.colocadas, 0);
            // Ventanas ESTRUCTURALES de un bloque: posiciones (día, hInicio)
            // donde cabría con el grupo VACÍO, solo mirando la disponibilidad
            // declarada del docente y la contiguidad. 0 = imposible por datos.
            const ventanasDe = (b) => {
                let n = 0;
                diasSemana.forEach(dia => {
                    const dispDia = b.docente.disponibilidad[dia];
                    for (let idx = 0; idx <= grupo.baseHoras.length - b.duracion; idx++) {
                        const h = grupo.baseHoras[idx];
                        let ok = true;
                        for (let o = 0; o < b.duracion; o++) {
                            if (!dispDia.has(h + o)) { ok = false; break; }
                        }
                        if (ok) n++;
                    }
                });
                return n;
            };
            const incompletos = [...invMap.values()]
                .filter(v => v.colocadas < v.requeridas)
                .sort((a, b) => (a.colocadas / a.requeridas) - (b.colocadas / b.requeridas));
            // El cuello de botella estructural de la entrada es su PEOR bloque
            incompletos.forEach(v => {
                v.ventanas = Math.min(...v.bloques.map(ventanasDe));
                // 📌 = tiene bloques preAsignado (inglés sync / PA fijado / forzado):
                // invisibles para los scans de reparación → si aparece incompleto
                // aquí, las horas se perdieron en un punto ciego del pipeline.
                v.preAsig  = v.bloques.some(b => b.preAsignado);
            });
            if (incompletos.length > 0)
                secciones.push({ grupo: nombreGrupo, totalCol, totalReq, incompletos });
        });
        if (secciones.length === 0) return '';

        let rows = '';
        secciones.forEach(({ grupo, totalCol, totalReq, incompletos }) => {
            const pctG = totalReq > 0 ? Math.round(totalCol / totalReq * 100) : 100;
            // Fila separadora con el nombre del grupo
            rows += `<tr><td colspan="5" style="padding:0.25rem 0.5rem;background:#221F20;
                color:var(--color-yellow);font-size:0.67rem;font-weight:bold;
                letter-spacing:0.03em">${grupo} &mdash; ${totalCol}/${totalReq}h&nbsp;(${pctG}%)</td></tr>`;
            incompletos.forEach(v => {
                const pct = Math.round(v.colocadas / v.requeridas * 100);
                const col = v.colocadas === 0 ? '#e65100' : 'var(--color-cerulean)';
                const colVent = v.ventanas === 0 ? '#C62828' : '#888';
                rows += `<tr class="${v.colocadas === 0 ? 'inv-vacio' : 'inv-parcial'}">
                    <td style="padding:0.22rem 0.5rem;font-size:0.73rem">${v.materia}${v.preAsig ? ' <span title="Bloque preAsignado (inglés sync / PA fijado / forzado): invisible para las reparaciones">📌</span>' : ''}</td>
                    <td style="padding:0.22rem 0.5rem;font-size:0.73rem;color:#555">${v.docente}</td>
                    <td style="padding:0.22rem 0.5rem;text-align:right">
                        <span style="font-size:0.73rem;font-weight:600;color:${col}">${v.colocadas}/${v.requeridas}h</span>
                    </td>
                    <td style="padding:0.22rem 0.5rem;font-size:0.73rem;text-align:right;color:#888">${pct}%</td>
                    <td style="padding:0.22rem 0.5rem;font-size:0.73rem;text-align:right;font-weight:${v.ventanas === 0 ? '700' : '400'};color:${colVent}">${v.ventanas === 0 ? '0 ⚠️' : v.ventanas}</td>
                </tr>`;
            });
        });
        return `<div style="margin-top:0.7rem;overflow-x:auto">
            <table class="inventario-tabla">
                <thead><tr>
                    <th>Materia</th><th>Docente</th>
                    <th style="text-align:right">Horas</th>
                    <th style="text-align:right">%</th>
                    <th style="text-align:right" title="Posiciones (día, hora) donde el bloque cabría con el grupo VACÍO, según disponibilidad declarada. 0 = imposible por datos.">Ventanas</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table></div>`;
    }

    // ── Garantía de monotonía entre corridas ─────────────────────────────────
    // SA/RPA son estocásticos: una corrida con mala suerte puede terminar mucho
    // peor que la anterior. Si esta corrida colocó MENOS horas que el mejor
    // resultado histórico, restauramos ese tablero; si colocó más, pasa a ser
    // el nuevo mejor. Idempotente: tras restaurar/guardar, una segunda llamada
    // ve horas iguales y no hace nada. Se invoca ANTES del panel de imposibles
    // (para que panel, resumen y Excel describan el mismo tablero) y de nuevo
    // en exportarYListo como red de seguridad para los caminos sin panel.
    let _notaMonotonia = '';
    function aplicarMonotonia() {
        const horasAhora = contarHorasColocadasTotales();
        if (mejorSnapGlobal === null || horasAhora > mejorHorasGlobal) {
            mejorSnapGlobal   = tomarSnapshot();
            mejorFallosGlobal = recolectarTodosIncompletos([]);
            mejorHorasGlobal  = horasAhora;
        } else if (horasAhora < mejorHorasGlobal) {
            restaurarSnapshot(mejorSnapGlobal);
            // Los incompletos del mejor tablero pasan a ser los recurrentes
            // (sesgo de prioridad) de la próxima corrida.
            bloquesRecurrentesFallidos = new Set(recolectarTodosIncompletos([]));
            _notaMonotonia =
                `<br><small style="color:#1565C0">♻️ Esta corrida colocó ${horasAhora}h, ` +
                `menos que el mejor histórico (${mejorHorasGlobal}h); se restauró el mejor ` +
                `horario logrado hasta ahora y las reparaciones continuaron sobre él.</small>`;
            console.log(`[monotonía] corrida ${horasAhora}h < mejor ${mejorHorasGlobal}h → restaurado mejor histórico`);
        }
    }

    function exportarYListo(msg, color) {
        aplicarMonotonia(); // red de seguridad (no-op si ya se aplicó antes del panel)
        exportarExcel();
        // Re-renderizar el horario/panel "Clases del grupo" con el resultado YA
        // CONSOLIDADO: durante las fases de reparación (reconfigurarSesiones,
        // paseForzadoCruzado, etc.) el panel se va actualizando en vivo vía
        // cederControlUI() y puede quedar "congelado" en un estado transitorio
        // (con más huecos de los que realmente quedan al terminar). Forzamos un
        // último render aquí para que ambos contadores —el mensaje final y el
        // panel por grupo— reflejen exactamente el mismo estado.
        _forzarRenderHorario();
        const resumen = generarResumenGruposIncompletos();
        // Si la tabla tiene faltantes, cambiar el ✔ por una advertencia aunque
        // el algoritmo creyera que colocó todo (falso positivo por parciales).
        let msgFinal    = msg;
        let colorFinal  = color;
        if (resumen !== '' && color === 'green') {
            msgFinal   = `⚠️ ${prefijo}Horarios generados con horas sin completar.`;
            colorFinal = '#e65100';
        }
        errDiv.style.color = '#221F20';
        // Bitácora del CSP de clusters: visible en el mensaje final para poder
        // diagnosticar qué hizo (o no hizo) sin depender de la consola.
        _bitacoraCSP.push(`export: ${contarHorasColocadasTotales()}h`);
        const bitacora = _bitacoraCSP.length
            ? `<br><small style="color:#777">🔍 CSP: ${_bitacoraCSP.join(' · ')}</small>`
            : '';
        errDiv.innerHTML =
            `<span style="font-weight:600;color:${colorFinal}">${msgFinal}</span>${_notaMonotonia}${bitacora}${resumen}`;
        onDone();
    }

    // ── Fase 3: bloques verdaderamente imposibles ────────────────────────────
    async function faseImposibles(imposibles) {
        // ── Auditoría final: bloques ausentes O parcialmente colocados ────────
        // Soluciona la discrepancia "panel dice 30/37h pero contador global dice
        // 0 sin solución".  Hay dos casos que el scan anterior no cubría bien:
        //
        //  (a) Bloque AUSENTE (slotsOcupados = 0): el scan anterior sí lo veía.
        //  (b) Bloque PARCIALMENTE colocado (0 < slotsOcupados < b.duracion):
        //      el scan anterior encontraba la referencia y decía "está en
        //      horario"; sin embargo el panel suma b.duracion en requeridas y
        //      cuenta solo slots reales en colocadas → horas faltantes en panel
        //      pero contador global = 0 (falso positivo).
        //      Causa raíz: aplicarAsignacion tiene un early-return guard
        //      ("si el bloque ya aparece en algún slot, no duplicar") que
        //      impide completar la colocación sobre referencias obsoletas.
        {
            const contarSlots = (g, b) => {
                let n = 0;
                diasSemana.forEach(dia => {
                    g.baseHoras.forEach(h => {
                        if (g.horario[dia][h] === b) n++;
                    });
                });
                return n;
            };
            // Total de horas ocupadas en TODO el horario (todos los grupos).
            // Sirve para aceptar/rechazar un reintento por su efecto GLOBAL,
            // en vez de "todo o nada" sobre un solo bloque.
            const totalHorasColocadas = () => {
                let n = 0;
                MAPA_GRUPOS.forEach(g => {
                    diasSemana.forEach(dia => {
                        g.baseHoras.forEach(h => { if (g.horario[dia][h] !== null) n++; });
                    });
                });
                return n;
            };
            // Recolectar primero la lista de incompletos para poder iterar con
            // cesiones de control (await): con 40+ bloques este lazo síncrono
            // congelaba la pestaña varios minutos y parecía colgado.
            const porReparar = [];
            MAPA_GRUPOS.forEach(g => {
                g.bloques.forEach(b => {
                    if (b.preAsignado) return;
                    if (contarSlots(g, b) < b.duracion) porReparar.push({ g, b });
                });
            });
            const tFinAuditoria = Date.now() + 30000; // presupuesto duro: 30 s
            for (let i = 0; i < porReparar.length; i++) {
                if (Date.now() > tFinAuditoria) break; // lo restante lo ve el CSP/panel
                const { g, b } = porReparar[i];
                if (contarSlots(g, b) >= b.duracion) continue; // reparado de rebote ✓
                errDiv.style.color = '#221F20';
                errDiv.innerHTML = `🔧 Reparación final ${i + 1}/${porReparar.length}…`;
                await cederControlUI();
                // Las funciones de swap/cadena pueden devolver "true" sin
                // colocar las b.duracion horas completas, o incluso dejar
                // el bloque peor que antes. Solo aceptamos el resultado si
                // el total de horas colocadas en TODO el horario aumenta
                // estrictamente (mejora real, aunque b no quede al 100% o
                // la mejora venga de un efecto colateral en otro bloque);
                // si no mejora, revertimos todo.
                const snapPrevio = tomarSnapshot();
                const totalAntes = totalHorasColocadas();
                // Limpiar refs parciales/huérfanas: sin esto aplicarAsignacion
                // haría early-return al encontrar la referencia obsoleta y
                // el reintento dejaría el bloque igual de incompleto.
                if (contarSlots(g, b) > 0) quitarAsignacion(g, b, diasSemana[0], g.baseHoras[0]);
                // Reintentar con el arsenal completo (swaps, BFS, etc.)
                reintentarBloque(b)
                    || intentarAsignar(b, true,  false, false, false)
                    || intentarAsignar(b, true,  true,  false, false)
                    || intentarAsignar(b, true,  true,  true,  false);
                if (totalHorasColocadas() <= totalAntes) {
                    restaurarSnapshot(snapPrevio);
                }
            }
        }
        // ── Segunda pasada del CSP de clusters, sobre el tablero YA reparado:
        // tras swaps/expansiones/forzados quedan menos obstáculos y el branch
        // & bound puede recuperar horas que la primera pasada (al 95%) no pudo.
        // Su gate interno por horas garantiza que solo mejora o queda igual.
        {
            const incompletosAhora = recolectarTodosIncompletos([]);
            if (incompletosAhora.length > 0) {
                console.log(`[CSP 2ª pasada] ${incompletosAhora.length} incompleto(s) al CSP de clusters`);
                _bitacoraCSP.push(`2ª pasada: ${incompletosAhora.length} incompletos, ${contarHorasColocadasTotales()}h`);
                // progFn: muestra avance Y cede el control al navegador entre
                // clusters (sin esto la pestaña se congela durante la búsqueda)
                await planificarDocentesBottleneck(incompletosAhora, msg => {
                    errDiv.style.color = '#221F20';
                    errDiv.innerHTML = msg;
                });
            }
        }
        // ── Último recurso: dividir en piezas de 1h los bloques que siguen
        // atascados tras el CSP (típico: necesitan 2h contiguas y el grupo,
        // ~97% lleno, solo tiene huecos sueltos de 1h en días distintos).
        {
            const atascados = recolectarTodosIncompletos([]);
            for (const b of atascados) {
                if (intentarDividirBloqueEn1h(b)) {
                    _bitacoraCSP.push(`split 1h: ${b.materia.nombre_materia} [${b.grupo.nombre_grupo}] ✓`);
                    console.log(`[split 1h] ${b.materia.nombre_materia} [${b.grupo.nombre_grupo}] — ${b.docente.nombre_docente} dividido y colocado`);
                }
            }
        }
        // ── Decidir AQUÍ el tablero definitivo (mejor histórico vs corrida
        // actual) y reconstruir la lista del panel desde ese tablero: así
        // panel, resumen y Excel describen exactamente el mismo estado, y
        // CUALQUIER bloque incompleto llega al panel (sin importar qué fase
        // lo dio por resuelto).
        aplicarMonotonia();
        imposibles = recolectarTodosIncompletos([]);
        // ─────────────────────────────────────────────────────────────────────
        console.log(`[faseImposibles] ${imposibles.length} bloque(s) al panel:`,
            imposibles.map(b => `${b.materia.nombre_materia} [${b.grupo.nombre_grupo}] — ${b.docente.nombre_docente} (${b.duracion}h)`));
        if (imposibles.length === 0) {
            exportarYListo(`✔ ${prefijo}Horarios generados correctamente.`, 'green');
            return;
        }
        mostrarPanelImposibles(imposibles, () => {
            exportarYListo(
                `✔ ${prefijo}Horario exportado. ${imposibles.length} bloque(s) sin solución (confirmados).`,
                'green'
            );
        });
    }

    // ── Re-scan exhaustivo: cualquier bloque (de cualquier grupo) que no
    // tenga sus b.duracion horas en g.horario se considera "pendiente",
    // sin importar si fases anteriores (reconfigurarSesiones, swaps, etc.)
    // lo dieron por resuelto. Evita que un pedazo de bloque (p.ej. tras un
    // split [3,2]) se pierda entre fases y nunca llegue a faseForzado ni a
    // faseImposibles, quedando invisible en los paneles pero visible en el
    // resumen de horas faltantes.
    function recolectarTodosIncompletos(pendientesExistentes) {
        // Los preAsignado incompletos son estados rotos: liberarlos aquí
        // garantiza que NINGUNA fase de reparación los pase por alto.
        liberarPreAsignadosIncompletos();
        const set = new Set(pendientesExistentes);
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (b.preAsignado) return;
                let n = 0;
                diasSemana.forEach(dia => {
                    g.baseHoras.forEach(h => { if (g.horario[dia][h] === b) n++; });
                });
                if (n < b.duracion) set.add(b);
            });
        });
        return [...set];
    }

    // ── Último recurso para un bloque atascado: dividirlo en piezas de 1h ───
    // Caso típico del final de pipeline: la pieza necesita 2h CONTIGUAS pero
    // el grupo (~97% lleno) solo tiene huecos sueltos de 1h en días distintos.
    // A diferencia de reconfigurarSesiones (todo-o-nada sobre el combo entero
    // de la materia), aquí solo se divide EL bloque atascado y el resto del
    // tablero no se toca. Acepta solo si las horas totales SUBEN; si no,
    // revierte estructura y horario por completo.
    function intentarDividirBloqueEn1h(b) {
        if (b.preAsignado || esIngles(b) || b.duracion < 2) return false;
        const g   = b.grupo;
        const dur = b.duracion;
        const snapEst    = tomarSnapshotEstructura();
        const snapSch    = tomarSnapshot();
        const horasAntes = contarHorasColocadasTotales();

        const pos = encontrarPosicionBloque(b);
        if (pos) quitarAsignacion(g, b, pos.dia, pos.hInicio);

        // El bloque original se convierte en la primera pieza de 1h; el resto
        // se crea con tracking completo (g.bloques + índice worker _wi).
        b.duracion = 1;
        const piezas = [b];
        const nuevasEnWArr = [];
        for (let i = 1; i < dur; i++) {
            const nb = {
                materia: b.materia, docente: b.docente, grupo: g,
                duracion: 1,
                nombreStr: b.nombreStr
            };
            if (typeof _wBArr !== 'undefined' && Array.isArray(_wBArr)) {
                nb._wi = _wBArr.length;
                _wBArr.push(nb);
                nuevasEnWArr.push(nb);
            }
            g.bloques.push(nb);
            piezas.push(nb);
        }

        // Colocar cada pieza: la regla 1 sesión/día las reparte en días distintos
        for (const p of piezas) {
            intentarAsignar(p, false, false, false, false)
                || intentarAsignar(p, false, true,  false, false)
                || intentarAsignar(p, true,  true,  false, false)
                || intentarAsignar(p, true,  true,  true,  false)
                || reintentarBloque(p);
        }

        if (contarHorasColocadasTotales() > horasAntes) return true;

        // Sin mejora → revertir estructura (quita piezas, restaura duracion)
        // y tablero. Sacar también las piezas nuevas del array de workers.
        restaurarSnapshotEstructura(snapEst);
        restaurarSnapshot(snapSch);
        nuevasEnWArr.forEach(() => _wBArr.pop());
        return false;
    }

    // ── Fase 2: colocaciones FORZADAS ────────────────────────────────────────
    function faseForzado(pendientes) {
        pendientes = recolectarTodosIncompletos(pendientes);
        console.log(`[faseForzado] ${pendientes.length} bloque(s) incompletos:`,
            pendientes.map(b => `${b.materia.nombre_materia} [${b.grupo.nombre_grupo}] — ${b.docente.nombre_docente} (${b.duracion}h)`));
        if (pendientes.length === 0) { faseImposibles([]); return; }

        const forzables  = [];
        const imposibles = [];
        pendientes.forEach(b => {
            const slot = encontrarSlotForzado(b);
            if (slot) forzables.push({ bloque: b, slot });
            else      imposibles.push(b);
        });

        if (forzables.length === 0) { faseImposibles(imposibles); return; }

        mostrarPanelForzado(forzables, aprobados => {
            const aun_imposibles = [...imposibles];
            forzables.forEach(({ bloque, slot }) => {
                if (aprobados.has(bloque)) {
                    aplicarAsignacion(bloque.grupo, bloque, slot.dia, slot.hInicio, true);
                } else {
                    aun_imposibles.push(bloque);
                }
            });
            faseImposibles(aun_imposibles);
        });
    }

    // ── Helper: reintentar un bloque con todas las técnicas disponibles ─────────
    function reintentarBloque(b) {
        return intentarAsignar(b, false, false, false, false)
            || intentarAsignar(b, false, true,  false, false)
            || intentarSwapDeHorarios(b, [])
            || intentarCadenaSwap(b)
            || intentarReestructuracionCruzada(b)          // Caso A: slot libre, mismo docente en G2
            || intentarCadenaSwap(b, 2, new Set([b]))      // Caso B: obstáculo bloqueado en G2
            || intentarCadenaAumentanteGlobal(b)           // BFS sin límite de profundidad
            || intentarSwapCadenaMultiDocente(b);          // Caso C: slot del grupo con otros docentes
    }

    // ── Fase 1: expansión de días de asistencia ──────────────────────────────
    function faseExpansion(fallidos) {
        if (fallidos.length === 0) { faseForzado([]); return; }

        // Antes del panel, intentar reestructuración cruzada en los bloques fallidos
        // (puede resolver casos "docente ocupado en otro grupo" sin necesitar más días)
        const tras_reest = [];
        for (const b of fallidos) {
            if (intentarReestructuracionCruzada(b))           continue; // Caso A
            if (intentarCadenaSwap(b))                        continue; // swap simple
            if (intentarCadenaSwap(b, 2, new Set([b])))       continue; // Caso B: obstáculo cruzado
            if (intentarCadenaAumentanteGlobal(b))            continue; // BFS global
            tras_reest.push(b);
        }
        if (tras_reest.length === 0) { faseForzado([]); return; }

        // Reconfiguración de sesiones: intentar splits con menos bloques
        // (p.ej. [2,2,2,1] → [3,2,2]) antes de mostrar el panel de expansión.
        reconfigurarSesiones(tras_reest).then(async tras_reconf => {
            // Desbloqueo cruzado antes del panel de expansión:
            // resuelve "docente disponible pero ocupado en otro grupo" sin necesitar días extra.
            tras_reconf = await paseForzadoCruzado(tras_reconf);

            // Reinicio por docente: rompe ciclos que los swaps locales no resuelven
            if (tras_reconf.length > 0) {
                tras_reconf = await rescateReinicioDocente(tras_reconf);
            }

            if (tras_reconf.length === 0) { faseForzado([]); return; }

            const necesidades = detectarNecesidadesExtraDia(tras_reconf);
            if (necesidades.size === 0) { faseForzado(tras_reconf); return; }

            mostrarPanelExpansion(necesidades, aprobados => {
                const yaProcesados = new Set();
                const aun_fallidos = [];

                necesidades.forEach(({ bloques }, docente) => {
                    bloques.forEach(b => yaProcesados.add(b));
                    if (!aprobados.has(docente.nombre_docente)) {
                        aun_fallidos.push(...bloques); return;
                    }
                    // Expandir el límite de días y reintentar con todas las técnicas
                    docente.maxDias++;
                    for (const b of bloques) {
                        if (reintentarBloque(b)) continue;
                        aun_fallidos.push(b);
                    }
                });
                // Bloques que no tenían solución con días extra (pertenecían a otros docentes)
                tras_reconf.forEach(b => { if (!yaProcesados.has(b)) aun_fallidos.push(b); });

                faseForzado(aun_fallidos);
            });
        });
    }

    // ── Punto de entrada ─────────────────────────────────────────────────────
    // Decidir ANTES de reparar sobre qué tablero trabajar: si esta corrida
    // venía peor que el mejor histórico, se restaura el mejor y las fases de
    // reparación (expansión, forzados, CSP 2ª pasada) intentan mejorarlo A ÉL,
    // acumulando avances entre corridas. Además, así los paneles de forzados
    // e imposibles siempre describen el tablero que realmente se exporta
    // (antes podían proponer forzados de una corrida que luego se descartaba).
    aplicarMonotonia();
    bloquesFallidos = recolectarTodosIncompletos([]);
    if (bloquesFallidos.length === 0) {
        exportarYListo(`✔ ${prefijo}Horarios generados correctamente.`, 'green');
        return;
    }

    faseExpansion(bloquesFallidos);
}

function aplicarEstilosForzados(ws) {
    if (!ws['!ref']) return;
    const range = XLSX.utils.decode_range(ws['!ref']);
    // Solo marca en rojo las celdas FORZADAS; las demás ya tienen su color de materia.
    const estiloForzado = {
        fill: { patternType: "solid", fgColor: { rgb: "FFCCCC" } },
        font: { color: { rgb: "CC0000" }, bold: true }
    };
    for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
            const addr = XLSX.utils.encode_cell({ r: R, c: C });
            const cell = ws[addr];
            if (!cell) continue;
            if (typeof cell.v === 'string' && cell.v.includes('FORZADO')) {
                cell.s = estiloForzado;
            }
        }
    }
}

function exportarExcel() {
    const wb = XLSX.utils.book_new();
    MAPA_GRUPOS.forEach(g => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        // colorCeldas: "rowIdx,colIdx" → hex (sin #) para relleno de celda
        const colorCeldas = new Map();

        g.baseHoras.forEach((h, hIdx) => {
            const r = [h];
            diasSemana.forEach((d, dIdx) => {
                const bloque = g.horario[d][h];
                r.push(bloque ? (bloque.nombreStrRender || bloque.nombreStr) : "");
                if (bloque) {
                    // Clave materia+grupo para que el color sea único por (materia, grupo)
                    // y sea consistente con la hoja del docente.
                    const colorKey = bloque.materia.nombre_materia + ' [' + bloque.grupo.nombre_grupo + ']';
                    colorCeldas.set(`${hIdx + 1},${dIdx + 1}`, colorParaMateria(colorKey));
                }
            });
            rows.push(r);
        });

        let totalSemana = 0;
        diasSemana.forEach(d => { g.baseHoras.forEach(h => { if(g.horario[d][h] !== null) totalSemana++; }); });
        rows.push([]); rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`]);

        // ── Desglose materia · docente · horas ──────────────────────────
        const enGrupo = new Map();
        g.bloques.forEach(b => {
            const key = b.materia.nombre_materia + '§' + b.docente.nombre_docente;
            if (!enGrupo.has(key)) enGrupo.set(key, { materia: b.materia.nombre_materia, docente: b.docente.nombre_docente, horas: 0 });
            enGrupo.get(key).horas += b.duracion;
        });
        const asigs = [...enGrupo.values()].sort((a, b) => a.materia.localeCompare(b.materia));
        rows.push([]);
        rows.push(["MATERIA", "DOCENTE", "HORAS"]);
        asigs.forEach(({ materia, docente, horas }) => rows.push([materia, docente, `${horas}h`]));
        // ────────────────────────────────────────────────────────────────

        const ws = XLSX.utils.aoa_to_sheet(rows);

        // ── Aplicar colores por materia — grid del horario ───────────────
        colorCeldas.forEach((hex, key) => {
            const [r, c] = key.split(',').map(Number);
            const addr = XLSX.utils.encode_cell({ r, c });
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: hex } } };
        });

        // ── Colorear columna MATERIA en el desglose del final de hoja ────
        // Distribución de filas (0-indexed):
        //   0            → encabezado HORA/LUNES/…
        //   1…N          → grid (N = baseHoras.length)
        //   N+1          → fila vacía
        //   N+2          → TOTAL HORAS EN LA SEMANA
        //   N+3          → fila vacía
        //   N+4          → encabezado MATERIA/DOCENTE/HORAS
        //   N+5…         → una fila por materia
        const desgloseStart = g.baseHoras.length + 5;
        asigs.forEach(({ materia }, i) => {
            const addr = XLSX.utils.encode_cell({ r: desgloseStart + i, c: 0 });
            const colorKey = materia + ' [' + g.nombre_grupo + ']';
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: colorParaMateria(colorKey) } } };
        });
        // ────────────────────────────────────────────────────────────────

        // Anchos de columna para lectura cómoda
        ws['!cols'] = [
            { wch: 6 },
            { wch: 30 }, { wch: 30 }, { wch: 30 },
            { wch: 30 }, { wch: 30 }, { wch: 30 }
        ];

        aplicarEstilosForzados(ws);
        XLSX.utils.book_append_sheet(wb, ws, "G_" + g.nombre_grupo.substring(0, 25));
    });
    MAPA_DOCENTES.forEach(d => {
        const rows = [["HORA", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"]];
        const colorCeldas = new Map();

        for (let h = 7; h <= 21; h++) {
            const r = [h];
            const hIdx = h - 7; // offset de fila (0 = encabezado)
            diasSemana.forEach((dia, dIdx) => {
                const txt = d.asignado[dia][h];
                r.push(txt ? txt : "");
                if (txt) {
                    // txt tiene formato "MATERIA [GRUPO]" — usar la cadena completa
                    // como clave para diferenciar el mismo curso en distintos grupos.
                    const materiaBase = txt.split(' [⚠')[0]; // quitar sufijo FORZADO si existe
                    colorCeldas.set(`${hIdx + 1},${dIdx + 1}`, colorParaMateria(materiaBase));
                }
            });
            rows.push(r);
        }

        let totalSemana = 0;
        diasSemana.forEach(dia => { totalSemana += Object.keys(d.asignado[dia]).length; });

        let estatusTipo = ` (${d.categoria || (d.tipo_docente === 2 ? 'PA' : (d.categoria || 'PTC'))})`;
        rows.push([]);
        rows.push(["TOTAL HORAS EN LA SEMANA:", `${totalSemana} hrs`, "", "DÍAS ASISTIDOS:", `${d.diasActivos.size} de ${d.maxDias}${estatusTipo}`]);
        const ws = XLSX.utils.aoa_to_sheet(rows);

        // ── Aplicar colores por materia — grid del docente ───────────────
        colorCeldas.forEach((hex, key) => {
            const [r, c] = key.split(',').map(Number);
            const addr = XLSX.utils.encode_cell({ r, c });
            if (ws[addr]) ws[addr].s = { fill: { patternType: "solid", fgColor: { rgb: hex } } };
        });
        // ────────────────────────────────────────────────────────────────

        // Anchos de columna para lectura cómoda
        ws['!cols'] = [
            { wch: 6 },
            { wch: 30 }, { wch: 30 }, { wch: 30 },
            { wch: 30 }, { wch: 30 }, { wch: 30 }
        ];

        aplicarEstilosForzados(ws);
        XLSX.utils.book_append_sheet(wb, ws, "D_" + d.nombre_docente.substring(0, 25));
    });

    const rowsCambios = [["GRUPO", "MATERIA", "DOCENTE ASIGNADO ORIGINALMENTE", "DOCENTE FINAL (OPTIMIZADO)"]];
    if (LOG_CAMBIOS.length === 0) rowsCambios.push(["No hubo intercambios finales de docentes", "-", "-", "-"]);
    else LOG_CAMBIOS.forEach(c => rowsCambios.push([c.Grupo, c.Materia, c.DocenteAnterior, c.DocenteNuevo]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rowsCambios), "Cambios_Docentes");

    XLSX.writeFile(wb, "Horarios_Exhaustivos_Final.xlsx", { cellStyles: true });
}

// ─── APRENDIZAJE ENTRE EJECUCIONES ───────────────────────────────────────────

function resetearAprendizaje() {
    eliteOrden           = null;
    eliteFallosCount     = Infinity;
    sinMejoraConsecutiva = 0;
    _ultimoOrden         = [];
    freqMap                    = new Map();
    freqTotalRuns              = 0;
    globalBestFallos           = Infinity;
    bloquesRecurrentesFallidos = new Set();
    mejorSnapGlobal            = null;
    mejorFallosGlobal          = [];
    mejorHorasGlobal           = -1;
    _edaBloqueado              = false;
    actualizarBotonReset();
}

function actualizarBotonReset() {
    if (IS_WORKER) return;
    const btn = document.getElementById('button_reset_aprendizaje');
    if (!btn) return;
    const tieneElite = eliteOrden !== null;
    const tieneFreq  = freqTotalRuns > 0;
    if (!tieneElite && !tieneFreq) {
        btn.textContent   = 'Sin aprendizaje';
        btn.disabled      = true;
        btn.style.opacity = '0.4';
    } else {
        const partes = [];
        if (tieneElite) partes.push('élite activo');
        if (tieneFreq)  partes.push(freqTotalRuns + ' ejecución' + (freqTotalRuns !== 1 ? 'es' : '') + ' EDA');
        btn.textContent   = 'Borrar: ' + partes.join(' · ');
        btn.disabled      = false;
        btn.style.opacity = '1';
    }
}

function encontrarBloqueEnSnap(snap, g, b) {
    const gS = snap.grupos.get(g.nombre_grupo);
    if (!gS) return null;
    for (const dia of diasSemana) {
        for (let i = 0; i < g.baseHoras.length; i++) {
            const h = g.baseHoras[i];
            if (gS.horario[dia][h] !== b) continue;
            if (i === 0 || gS.horario[dia][g.baseHoras[i - 1]] !== b)
                return { dia, hInicio: h };
        }
    }
    return null;
}

function acumularFrecuenciasDesde(snap) {
    MAPA_GRUPOS.forEach(g => {
        g.bloques.forEach(b => {
            const pos = encontrarBloqueEnSnap(snap, g, b);
            if (!pos) return;
            if (!freqMap.has(b)) freqMap.set(b, new Map());
            const key = pos.dia + '|' + pos.hInicio;
            const m   = freqMap.get(b);
            m.set(key, (m.get(key) || 0) + 1);
        });
    });
    freqTotalRuns++;
}
