/** Captura el estado completo del horario en memoria.
 *  Incluye g.bloques y bloque.duracion para que restaurarSnapshot
 *  revierta correctamente los cambios estructurales de reconfigurarSesiones. */
function tomarSnapshot() {
    const s = { grupos: new Map(), docentes: new Map(), bloques: new Map() };
    MAPA_GRUPOS.forEach((g, gn) => {
        const gS = { horario: {}, sesionesDia: {}, bloques: [...g.bloques] };
        diasSemana.forEach(d => {
            gS.horario[d] = {};
            g.baseHoras.forEach(h => { gS.horario[d][h] = g.horario[d][h]; });
            gS.sesionesDia[d] = Object.assign({}, g.sesionesDia[d]);
        });
        s.grupos.set(gn, gS);
    });
    MAPA_DOCENTES.forEach((d, dn) => {
        const dS = { asignado: {}, diasActivos: new Set(d.diasActivos) };
        diasSemana.forEach(dia => { dS.asignado[dia] = Object.assign({}, d.asignado[dia]); });
        s.docentes.set(dn, dS);
    });
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        s.bloques.set(b, {
            preAsignado:     b.preAsignado,
            consensoFijado:  b.consensoFijado,  // ← necesario para restaurar pre-asignación Inglés
            nombreStrRender: b.nombreStrRender,
            duracion:        b.duracion
        });
    }));
    return s;
}

/** Restaura el estado capturado por tomarSnapshot().
 *  Restaura también g.bloques y bloque.duracion para deshacer
 *  los cambios estructurales de reconfigurarSesiones. */
function restaurarSnapshot(snap) {
    MAPA_GRUPOS.forEach((g, gn) => {
        const gS = snap.grupos.get(gn);
        // Restaurar la lista de bloques del grupo (deshace adiciones/eliminaciones de reconf.)
        if (gS.bloques) g.bloques = [...gS.bloques];
        diasSemana.forEach(d => {
            g.baseHoras.forEach(h => { g.horario[d][h] = gS.horario[d][h]; });
            g.sesionesDia[d] = Object.assign({}, gS.sesionesDia[d]);
        });
    });
    MAPA_DOCENTES.forEach((d, dn) => {
        const dS = snap.docentes.get(dn);
        d.diasActivos = new Set(dS.diasActivos);
        diasSemana.forEach(dia => { d.asignado[dia] = Object.assign({}, dS.asignado[dia]); });
    });
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
        const bS = snap.bloques.get(b);
        if (!bS) return; // bloque nuevo no existía cuando se tomó el snapshot
        if (bS.preAsignado     !== undefined) b.preAsignado     = bS.preAsignado;     else delete b.preAsignado;
        if (bS.consensoFijado  !== undefined) b.consensoFijado  = bS.consensoFijado;  else delete b.consensoFijado;
        if (bS.nombreStrRender !== undefined) b.nombreStrRender = bS.nombreStrRender; else delete b.nombreStrRender;
        if (bS.duracion        !== undefined) b.duracion        = bS.duracion;
    }));
}

// ─────────────────────────────────────────────────────────────────────────────
// RECONFIGURACIÓN DE SESIONES
// Cuando una materia no puede colocarse con su partición original (p.ej. [2,2,2,1]
// para 7 h necesita 4 días distintos pero el docente solo tiene 3 disponibles),
// se prueban particiones alternativas con MENOS bloques (p.ej. [3,2,2] → 3 días).
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Genera todas las particiones no-crecientes de totalHoras en bloques ≤ maxDur,
 * ordenadas por número de bloques ascendente (menos bloques = menos días).
 */
function generarSplits(totalHoras, maxDur = 3) {
    const resultado = [];
    function bt(restantes, limSup, actual) {
        if (restantes === 0) { resultado.push([...actual]); return; }
        for (let d = Math.min(limSup, restantes); d >= 1; d--) {
            actual.push(d);
            bt(restantes - d, d, actual);
            actual.pop();
        }
    }
    bt(totalHoras, maxDur, []);
    // Menos bloques primero; ante igual count, bloque mayor primero
    resultado.sort((a, b) => a.length - b.length || b[0] - a[0]);
    return resultado;
}

/**
 * Captura la estructura de bloques (arrays g.bloques + duraciones b.duracion).
 * Complementa tomarSnapshot(), que solo guarda el estado del horario.
 */
function tomarSnapshotEstructura() {
    const snap = new Map();
    MAPA_GRUPOS.forEach((g, gn) => {
        const duraciones = new Map();
        g.bloques.forEach(b => duraciones.set(b, b.duracion));
        snap.set(gn, { bloques: [...g.bloques], duraciones });
    });
    return snap;
}

/**
 * Restaura la estructura capturada por tomarSnapshotEstructura().
 * Debe llamarse ANTES de restaurarSnapshot() para que los arrays g.bloques
 * estén en orden al iterar el snapshot de horario.
 */
function restaurarSnapshotEstructura(snap) {
    MAPA_GRUPOS.forEach((g, gn) => {
        const s = snap.get(gn);
        g.bloques = [...s.bloques];
        s.duraciones.forEach((dur, b) => { b.duracion = dur; });
    });
}

/**
 * Intenta reducir el número de bloques de materias con docentes que no tienen
 * suficientes días disponibles para la partición actual.
 *
 * Ejemplo: materia de 7 h → [2,2,2,1] necesita 4 días; si el docente solo
 * tiene 3 días disponibles se prueba [3,2,2] (3 bloques, 3 días).
 *
 * @param {Array}    bloquesFallidos  Bloques sin colocar
 * @param {Function} progFn          Callback opcional de progreso (pct 0-100, msg)
 * @returns {Array}  Bloques que siguen sin colocarse tras la reconfiguración
 */
async function reconfigurarSesiones(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    // Construir mapa de combos únicos (docente · materia · grupo)
    const combos = new Map();
    bloquesFallidos.forEach(b => {
        const key = `${b.docente.nombre_docente}|${b.materia.nombre_materia}|${b.grupo.nombre_grupo}`;
        if (!combos.has(key))
            combos.set(key, { docente: b.docente, materia: b.materia, grupo: b.grupo });
    });

    let fallidos = [...bloquesFallidos];
    let progI = 0;
    const progTotal = combos.size;

    for (const [, { docente, materia, grupo }] of combos) {
        progI++;

        // Todos los bloques de este combo en el grupo (colocados + fallidos)
        const todosLosBloques = grupo.bloques.filter(
            b => b.docente === docente && b.materia === materia
        );
        if (todosLosBloques.length === 0) continue;

        // Inglés siempre en bloques de 1 h y sincronizado — no reconfigurar
        if (todosLosBloques.some(b => esIngles(b))) continue;

        const totalHoras     = todosLosBloques.reduce((s, b) => s + b.duracion, 0);
        const numBloqueActual = todosLosBloques.length;

        // Días donde el docente tiene al menos 1 slot válido en el horario del grupo
        const diasDisponibles = diasSemana.filter(dia =>
            grupo.baseHoras.some(h => docente.disponibilidad[dia].has(h))
        ).length;

        // Para PAs, el límite real es min(días con disponibilidad, maxDias institucional)
        const diasEfectivos = docente.tipo_docente === 2
            ? Math.min(diasDisponibles, docente.maxDias)
            : diasDisponibles;

        if (diasEfectivos === 0) continue;

        // ── Candidatos: splits distintos al actual que quepan en los días efectivos ──
        //
        // Se prueban DOS direcciones:
        //  • Dirección 1 (FUSIÓN):   menos bloques → menos días requeridos
        //    Ej: [2,2,2,1] → [3,2,2] cuando el docente solo tiene 3 días disponibles.
        //  • Dirección 2 (DIVISIÓN): más bloques de menor tamaño → menos horas consecutivas
        //    Ej: [2] → [1,1]   (no caben 2h seguidas, sí 1h aislada)
        //        [2,2] → [2,1,1] (solo 1 día con 2h seguidas)
        //
        // Restricción: nBloques ≤ diasEfectivos (un bloque por día como máximo).

        const currentSplitStr = [...todosLosBloques.map(b => b.duracion)]
            .sort((a, b) => b - a).toString();

        const splits = generarSplits(totalHoras, 3);
        const splitsCandidatos = splits.filter(s => {
            if ([...s].sort((a, b) => b - a).toString() === currentSplitStr) return false;
            return s.length <= diasEfectivos;
        });

        // Ordenar: menos bloques primero (menos presión de días); ante igual count,
        // max bloque menor primero (menos presión de horas consecutivas).
        splitsCandidatos.sort((a, b) => {
            if (a.length !== b.length) return a.length - b.length;
            const mA = Math.max(...a), mB = Math.max(...b);
            if (mA !== mB) return mA - mB;
            return b[0] - a[0]; // primer bloque mayor primero (más difícil → intenta antes)
        });

        if (splitsCandidatos.length === 0) continue;

        // Capturar estado antes de cualquier cambio (estructura + horario)
        const snapEst = tomarSnapshotEstructura();
        const snapSch = tomarSnapshot();

        let exito = false;

        for (const nuevoSplit of splitsCandidatos) {
            if (progFn) {
                progFn(
                    Math.round((progI / progTotal) * 100),
                    `🔀 Reconf. ${progI}/${progTotal}: ` +
                    `${materia.nombre_materia} (${grupo.nombre_grupo}) ` +
                    `[${nuevoSplit.join(',')}]`
                );
                await cederControlUI();
            }

            // Restaurar estado limpio (deshace el intento anterior si falló)
            restaurarSnapshotEstructura(snapEst);
            restaurarSnapshot(snapSch);

            // Re-obtener bloques desde la estructura restaurada
            const bloques = grupo.bloques.filter(
                b => b.docente === docente && b.materia === materia
            );

            // 1. Desasignar todos los bloques del combo (con duracion original)
            bloques.forEach(b => {
                const pos = encontrarPosicionBloque(b);
                if (pos) quitarAsignacion(grupo, b, pos.dia, pos.hInicio);
            });

            // 2. Ajustar estructura según el nuevo split
            const ordenados = [...bloques].sort((a, b) => b.duracion - a.duracion);
            const nKeep = Math.min(nuevoSplit.length, bloques.length);
            const bloquesMantener = ordenados.slice(0, nKeep);
            const bloquesEliminar = ordenados.slice(nKeep); // cuando split tiene MENOS bloques

            // Eliminar bloques sobrantes de g.bloques
            bloquesEliminar.forEach(b => {
                const idx = grupo.bloques.indexOf(b);
                if (idx >= 0) grupo.bloques.splice(idx, 1);
            });

            // Crear bloques nuevos cuando el split tiene MÁS bloques que antes
            // (Ej: [2] → [1,1]  necesita 1 nuevo bloque)
            const bloquesNuevos = [];
            const nNew = Math.max(0, nuevoSplit.length - bloques.length);
            for (let i = 0; i < nNew; i++) {
                const nb = {
                    materia, docente, grupo,
                    duracion: 1,  // se actualizará abajo
                    nombreStr: `${materia.nombre_materia} (${docente.nombre_docente})`,
                    _wi: _wBArr.length  // índice worker: sin esto, los Workers (SA/RPA) descartan
                                        // este bloque al serializar/restaurar y queda "perdido"
                };
                _wBArr.push(nb);
                grupo.bloques.push(nb);
                bloquesNuevos.push(nb);
            }

            // 3. Asignar nuevas duraciones — los más grandes a los bloques "más capaces"
            const splitOrdenado = [...nuevoSplit].sort((a, b) => b - a);
            const todosColocar  = [...bloquesMantener, ...bloquesNuevos];
            todosColocar.forEach((b, i) => { b.duracion = splitOrdenado[i]; });

            // 4. Intentar colocar todos (mayor duracion → menor)
            // Arsenal completo: incluye swap multi-docente para liberar horas
            // consecutivas ocupadas por otros docentes en el mismo grupo.
            let todosColocados = true;
            for (const b of todosColocar) {
                const ok =
                    intentarAsignar(b, false, false, false, false) ||
                    intentarAsignar(b, false, true,  false, false) ||
                    intentarSwapDeHorarios(b, [])                  ||
                    intentarCadenaSwap(b)                          ||
                    intentarReestructuracionCruzada(b)             ||
                    intentarCadenaSwap(b, 2, new Set([b]))         ||
                    intentarCadenaAumentanteGlobal(b)              ||
                    intentarSwapCadenaMultiDocente(b);             // libera slots ocupados por otros docentes
                if (!ok) { todosColocados = false; break; }
            }

            if (todosColocados) {
                exito = true;
                // Quitar del listado de fallidos todos los bloques originales del combo
                // (los bloques nuevos nunca estuvieron en fallidos)
                fallidos = fallidos.filter(b =>
                    !(b.docente === docente && b.materia === materia && b.grupo === grupo)
                );
                break;
            }
            // Si falló con este split, la próxima iteración restaurará el estado limpio
        }

        if (!exito) {
            // Ningún split funcionó → restaurar estado original
            restaurarSnapshotEstructura(snapEst);
            restaurarSnapshot(snapSch);
        }
    }

    return fallidos;
}

/**
 * Swap encadenado multi-docente (mismo grupo).
 *
 * Resuelve el caso en que el docente ESTÁ LIBRE en el slot (disponibilidad OK,
 * no está ocupado en otro grupo), pero el GRUPO tiene ese slot ocupado por
 * bloques de OTROS docentes que necesitan ser desplazados.
 *
 * Ejemplo: B(T1) necesita (G, Lun 8h-9h).
 *   T1 está libre → OK.
 *   Pero (G, Lun 8h) tiene B2(T2) y (G, Lun 9h) tiene B3(T3).
 *   → Quita B2 y B3, coloca B(T1), y reubica B2/B3 con el arsenal completo.
 *   → Si no caben, rollback.
 *   → La recursión permite cadenas: B3 puede necesitar desplazar B4 para caber.
 *
 * Complementa a paseForzadoCruzado (que maneja "docente ocupado en otro grupo").
 *
 * @param {object} bloquePendiente  Bloque sin colocar
 * @param {Set}    visitados        Bloques en proceso (anti-ciclos)
 * @param {number} profMax          Niveles de recursión permitidos
 */
function intentarSwapCadenaMultiDocente(bloquePendiente, visitados = new Set(), profMax = 4) {
    if (visitados.has(bloquePendiente) || profMax <= 0) return false;

    const misVis = new Set(visitados);
    misVis.add(bloquePendiente);

    const g   = bloquePendiente.grupo;
    const d   = bloquePendiente.docente;
    const dur = bloquePendiente.duracion;

    for (const dia of diasSemana) {
        // Regla sesión doble
        if ((g.sesionesDia[dia][bloquePendiente.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloquePendiente)) continue;
        // PA: no abrir día nuevo si ya está en maxDias
        if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
            d.diasActivos.size >= d.maxDias) continue;

        for (let idx = 0; idx <= g.baseHoras.length - dur; idx++) {
            const h = g.baseHoras[idx];

            // El docente pendiente debe estar DISPONIBLE Y LIBRE (no en otro grupo)
            let dpOk = true;
            for (let o = 0; o < dur; o++) {
                if (!d.disponibilidad[dia].has(h + o) || d.asignado[dia][h + o]) {
                    dpOk = false; break;
                }
            }
            if (!dpOk) continue;

            // Recoger los obstáculos del grupo (bloques de OTROS docentes en esas horas)
            const obstaculos = new Map(); // bloque → posición
            let slotValido = true;
            for (let o = 0; o < dur; o++) {
                const ex = g.horario[dia][h + o];
                if (!ex) continue;
                if (ex.preAsignado || misVis.has(ex)) { slotValido = false; break; }
                if (!obstaculos.has(ex)) {
                    const pos = encontrarPosicionBloque(ex);
                    if (!pos) { slotValido = false; break; }
                    obstaculos.set(ex, pos);
                }
            }
            // Si no hay obstáculos el slot ya es libre → otros algoritmos lo habrían resuelto
            if (!slotValido || obstaculos.size === 0) continue;

            const snap = tomarSnapshot();

            // Quitar todos los obstáculos
            for (const [obs, pos] of obstaculos) {
                quitarAsignacion(g, obs, pos.dia, pos.hInicio);
            }

            // Colocar el bloque pendiente (docente está libre, slot ahora vacío)
            const pendOk =
                intentarAsignar(bloquePendiente, false, false, false, false) ||
                intentarAsignar(bloquePendiente, false, true,  false, false);

            if (!pendOk) { restaurarSnapshot(snap); continue; }

            // Reubicar cada obstáculo con el arsenal completo + recursión
            let todosOk = true;
            for (const [obs] of obstaculos) {
                const ok =
                    intentarAsignar(obs, false, false, false, false) ||
                    intentarAsignar(obs, false, true,  false, false) ||
                    intentarSwapDeHorarios(obs, [])                  ||
                    intentarCadenaSwap(obs)                          ||
                    intentarReestructuracionCruzada(obs, 2)          ||
                    intentarCadenaSwap(obs, 2, new Set([obs]))        ||
                    intentarCadenaAumentanteGlobal(obs, 400)         ||
                    intentarSwapCadenaMultiDocente(obs, misVis, profMax - 1); // recursión
                if (!ok) { todosOk = false; break; }
            }

            if (todosOk) return true;
            restaurarSnapshot(snap);
        }
    }
    return false;
}

/**
 * Pase de desbloqueo forzado cruzado.
 *
 * Atiende el caso "🟡 Docente disponible pero ocupado en otro grupo":
 * el grupo tiene huecos libres, el docente tiene disponibilidad allí,
 * pero ya está asignado en otro(s) grupo(s) en esos slots.
 *
 * Estrategia en dos fases:
 *   1. Rápida: mayor profundidad (profMax=4) en reestructuración cruzada
 *      + más nodos BFS (800) para encontrar cadenas más largas.
 *   2. Multi-obstáculo: para cada slot candidato quita TODOS los bloques
 *      que bloquean al docente (pueden estar en varios grupos distintos),
 *      coloca el bloque pendiente y reubica cada bloqueante con el arsenal
 *      completo. Si algún bloqueante no cabe, hace rollback y prueba el
 *      siguiente slot.
 *
 * Se itera hasta 3 veces (los reintegros de una vuelta abren oportunidades
 * para otros bloques en la siguiente).
 */
async function paseForzadoCruzado(bloquesFallidos, progFn = null, maxIter = 3) {
    if (bloquesFallidos.length === 0) return [];

    let restantes = [...bloquesFallidos];
    let cambio    = true;
    let iter      = 0;
    const MAX_ITER = maxIter;

    while (cambio && iter < MAX_ITER && restantes.length > 0) {
        cambio = false;
        iter++;

        for (let i = restantes.length - 1; i >= 0; i--) {
            const b = restantes[i];

            if (progFn) {
                progFn(
                    Math.round((iter / MAX_ITER) * 100),
                    `⚡ Desbloqueo cruzado [${iter}/${MAX_ITER}]: ` +
                    `${b.materia.nombre_materia} (${b.grupo.nombre_grupo})`
                );
                await cederControlUI();
            }

            // ── Fase 1: mayor profundidad / más nodos BFS + multi-docente ────
            if (intentarReestructuracionCruzada(b, 4)  ||
                intentarCadenaAumentanteGlobal(b, 800) ||
                intentarSwapCadenaMultiDocente(b)) {
                restantes.splice(i, 1);
                cambio = true;
                continue;
            }

            // ── Fase 2: multi-obstáculo ──────────────────────────────────────
            const g = b.grupo, d = b.docente, dur = b.duracion;
            let colocado = false;

            slotLoop:
            for (const dia of diasSemana) {
                // No doblar sesión de la misma materia
                if ((g.sesionesDia[dia][b.materia.nombre_materia] || 0) >= maxSesionesPorDia(b)) continue;
                // PA: no abrir día nuevo si ya está en maxDias
                if (!d.diasActivos.has(dia) && d.tipo_docente === 2 &&
                    d.diasActivos.size >= d.maxDias) continue;

                for (let idx = 0; idx <= g.baseHoras.length - dur; idx++) {
                    const h = g.baseHoras[idx];

                    // El grupo debe tener el slot libre
                    let grupoLibre = true;
                    for (let o = 0; o < dur; o++) {
                        if (g.horario[dia][h + o] !== null) { grupoLibre = false; break; }
                    }
                    if (!grupoLibre) continue;

                    // El docente debe tener disponibilidad aquí
                    let dispOk = true;
                    for (let o = 0; o < dur; o++) {
                        if (!d.disponibilidad[dia].has(h + o)) { dispOk = false; break; }
                    }
                    if (!dispOk) continue;

                    // El docente debe estar ocupado aquí (si estuviese libre, los pasos
                    // anteriores ya lo habrían colocado)
                    let docOcupado = false;
                    for (let o = 0; o < dur; o++) {
                        if (d.asignado[dia][h + o]) { docOcupado = true; break; }
                    }
                    if (!docOcupado) continue;

                    // Recoger TODOS los bloques del docente en otros grupos que bloquean este slot
                    const bloqueantes = new Map(); // bloque → posición {dia, hInicio}
                    for (let o = 0; o < dur; o++) {
                        if (!d.asignado[dia][h + o]) continue;
                        for (const [, g2] of MAPA_GRUPOS) {
                            if (g2 === g) continue;
                            const ex = g2.horario[dia][h + o];
                            if (ex && ex.docente === d && !bloqueantes.has(ex)) {
                                const pos = encontrarPosicionBloque(ex);
                                if (pos && !ex.preAsignado) bloqueantes.set(ex, pos);
                            }
                        }
                    }

                    if (bloqueantes.size === 0) continue; // ya libre → casos anteriores lo habrían resuelto
                    if ([...bloqueantes.keys()].some(bk => bk.preAsignado)) continue; // no mover pre-asignados

                    const snap = tomarSnapshot();

                    // Quitar todos los bloqueantes de sus posiciones actuales
                    for (const [bk, pos] of bloqueantes) {
                        quitarAsignacion(bk.grupo, bk, pos.dia, pos.hInicio);
                    }

                    // Colocar el bloque pendiente (docente ya libre en ese slot)
                    const pendOk =
                        intentarAsignar(b, false, false, false, false) ||
                        intentarAsignar(b, false, true,  false, false);

                    if (!pendOk) { restaurarSnapshot(snap); continue; }

                    // Reubicar cada bloqueante con el arsenal completo
                    // (incluye intentarSwapCadenaMultiDocente para el caso en que el
                    //  destino del bloqueante tiene a su vez obstáculos de mismo grupo)
                    let todosOk = true;
                    for (const [bk] of bloqueantes) {
                        const ok =
                            intentarAsignar(bk, false, false, false, false)  ||
                            intentarAsignar(bk, false, true,  false, false)  ||
                            intentarSwapDeHorarios(bk, [])                   ||
                            intentarCadenaSwap(bk)                           ||
                            intentarReestructuracionCruzada(bk, 3)           ||
                            intentarCadenaSwap(bk, 2, new Set([bk]))          ||
                            intentarCadenaAumentanteGlobal(bk, 600)          ||
                            intentarSwapCadenaMultiDocente(bk);
                        if (!ok) { todosOk = false; break; }
                    }

                    if (todosOk) { colocado = true; break slotLoop; }
                    restaurarSnapshot(snap);
                }
            }

            // ── Fase 3: swap multi-docente en mismo grupo ────────────────────────
            // Caso: docente libre (no está en otro grupo), pero el slot del
            // grupo está ocupado por bloques de OTROS docentes que hay que mover.
            if (!colocado) colocado = intentarSwapCadenaMultiDocente(b);

            if (colocado) { restantes.splice(i, 1); cambio = true; }
        }
    }

    return restantes;
}

/**
 * ─── SOLVER EXACTO (Backtracking con MCV + Forward-Checking) ─────────────────
 *
 * Cuando quedan ≤12 bloques sin ubicar, el subproblema es pequeño y se puede
 * resolver con backtracking exhaustivo: prueba todas las combinaciones posibles
 * de (bloque → slot) respetando restricciones duras, y conserva la mejor
 * solución parcial encontrada dentro del límite de tiempo.
 *
 * Usa MCV (Minimum Constraining Variable): en cada nodo elige el bloque con
 * MENOS slots válidos disponibles, maximizando la poda.
 */
async function solverExacto(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];
    if (bloquesFallidos.length > 12) return bloquesFallidos;

    if (progFn) {
        progFn(Math.round(tiempoLimiteMs / 1000),
            `🔬 Solver exacto — ${bloquesFallidos.length} bloques · buscando óptimo...`);
        await cederControlUI();
    }

    const endTime = Date.now() + tiempoLimiteMs;
    let mejorN    = 0;
    let mejorSnap = tomarSnapshot();
    let nodos     = 0;

    function slotsValidos(b) {
        const g = b.grupo, d = b.docente, dur = b.duracion;
        const res = [];
        for (const dia of diasSemana) {
            if (dia === 'sabado' && !d.disponibilidad.sabado.size) continue;
            if ((g.sesionesDia[dia][b.materia.nombre_materia] || 0) >= maxSesionesPorDia(b)) continue;
            if (d.tipo_docente === 2 && !d.diasActivos.has(dia) &&
                d.diasActivos.size >= d.maxDias) continue;
            for (let i = 0; i <= g.baseHoras.length - dur; i++) {
                const h = g.baseHoras[i];
                let ok = true;
                for (let o = 0; o < dur && ok; o++) {
                    if (g.horario[dia][h + o] !== null)       ok = false;
                    if (d.asignado[dia][h + o])               ok = false;
                    if (!d.disponibilidad[dia].has(h + o))    ok = false;
                }
                if (ok) res.push({ dia, hInicio: h });
            }
        }
        return res;
    }

    function bt(restantes, n) {
        nodos++;
        if (Date.now() >= endTime) return;
        if (n > mejorN) { mejorN = n; mejorSnap = tomarSnapshot(); }
        if (mejorN === bloquesFallidos.length || restantes.length === 0) return;

        // MCV: elegir el bloque con menos slots válidos (más difícil de colocar)
        let elegido = 0, elegidoSlots = [];
        let minS = Infinity;
        for (let i = 0; i < restantes.length; i++) {
            const s = slotsValidos(restantes[i]);
            if (s.length < minS) { minS = s.length; elegido = i; elegidoSlots = s; }
        }

        const b    = restantes[elegido];
        const rest = restantes.filter((_, i) => i !== elegido);

        // Rama 1: colocar en cada slot válido
        for (const { dia, hInicio } of elegidoSlots) {
            if (Date.now() >= endTime) return;
            aplicarAsignacion(b.grupo, b, dia, hInicio);
            bt(rest, n + 1);
            if (mejorN === bloquesFallidos.length) return;
            quitarAsignacion(b.grupo, b, dia, hInicio);
        }

        // Rama 2: saltar este bloque (buscar mejor solución parcial)
        bt(rest, n);
    }

    bt([...bloquesFallidos], 0);

    restaurarSnapshot(mejorSnap);

    if (progFn) {
        progFn(0, `🔬 Solver exacto — ${mejorN}/${bloquesFallidos.length} colocados · ${nodos} nodos`);
        await cederControlUI();
    }

    return bloquesFallidos.filter(b => !encontrarPosicionBloque(b));
}

/**
 * ─── LNS: BÚSQUEDA DE VECINO GRANDE (Ruin & Recreate) ────────────────────────
 *
 * Para cada bloque fallido: destruye un "vecindario" relacionado (todos los
 * bloques del mismo docente, del mismo grupo, o ambos), y lo reconstruye con
 * el greedy priorizando los bloques que fallaron. Si el resultado es mejor
 * (menos fallos), lo conserva; si no, restaura el mejor estado anterior.
 *
 * A diferencia del SA que mueve UN bloque a la vez, el LNS puede reorganizar
 * decenas de asignaciones en un solo paso, escapando mínimos locales profundos.
 */
async function busquedaVecinoGrande(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const endTime   = Date.now() + tiempoLimiteMs;
    let fallidosSet = new Set(bloquesFallidos);
    let mejorFallos = [...fallidosSet];
    let mejorSnap   = tomarSnapshot();
    let lastYield   = Date.now();
    let iter = 0, mejoras = 0;

    // Intenta colocar un bloque con todas las técnicas disponibles
    function colocarBloque(b) {
        return intentarAsignar(b, false, false, false, false)
            || intentarAsignar(b, false, true,  false, false)
            || intentarSwapDeHorarios(b, [])
            || intentarCadenaSwap(b)
            || intentarReestructuracionCruzada(b)
            || intentarCadenaSwap(b, 2, new Set([b]))
            || intentarCadenaAumentanteGlobal(b);
    }

    // Vecindad A: todos los bloques del mismo docente
    function vecinoDocente(b) {
        const v = [];
        MAPA_GRUPOS.forEach(g =>
            g.bloques.forEach(bl => {
                if (bl.docente === b.docente && !bl.preAsignado) v.push(bl);
            })
        );
        return v;
    }

    // Vecindad B: todos los bloques del mismo grupo
    function vecinoGrupo(b) {
        return b.grupo.bloques.filter(bl => !bl.preAsignado);
    }

    // Vecindad C: grupo del fallido + bloques del docente en otros grupos
    function vecinoGrupoMasDocente(b) {
        const v = new Set(vecinoGrupo(b));
        MAPA_GRUPOS.forEach(g =>
            g.bloques.forEach(bl => {
                if (bl.docente === b.docente && !bl.preAsignado) v.add(bl);
            })
        );
        return [...v];
    }

    const estrategias = [vecinoDocente, vecinoGrupo, vecinoGrupoMasDocente];

    while (Date.now() < endTime && mejorFallos.length > 0) {
        iter++;

        const ahora = Date.now();
        if (ahora - lastYield >= 400) {
            if (progFn) {
                const s = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                progFn(s,
                    `🔍 LNS iter ${iter} · ${mejorFallos.length} sin ubicar` +
                    ` · mejoras: ${mejoras} · ${s}s rest.`);
            }
            await cederControlUI();
            lastYield = Date.now();
        }

        // Partir siempre del mejor estado conocido
        restaurarSnapshot(mejorSnap);
        fallidosSet = new Set(mejorFallos);

        // Elegir bloque fallido y estrategia de vecindad (rotar entre las 3)
        const fallidosArr = [...fallidosSet];
        const bFallido    = fallidosArr[Math.floor(Math.random() * fallidosArr.length)];
        const vecindad    = estrategias[iter % estrategias.length](bFallido);

        if (vecindad.length <= 1) continue;

        // Ruin: quitar vecindad del horario (solo los ya colocados)
        const removidos = [];
        for (const b of vecindad) {
            if (fallidosSet.has(b)) continue;
            const pos = encontrarPosicionBloque(b);
            if (pos) {
                quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
                removidos.push(b);
            }
        }

        // Recreate: fallidos de la vecindad primero, luego los removidos
        const fallVecindad = vecindad.filter(b => fallidosSet.has(b));
        const cola = [bFallido,
                      ...fallVecindad.filter(b => b !== bFallido),
                      ...removidos];

        const nuevosFallos = new Set(fallidosSet);
        for (const b of cola) {
            if (colocarBloque(b)) nuevosFallos.delete(b);
            else                  nuevosFallos.add(b);
        }

        if (nuevosFallos.size < mejorFallos.length) {
            mejoras++;
            mejorFallos = [...nuevosFallos];
            mejorSnap   = tomarSnapshot();
            fallidosSet = nuevosFallos;
            if (mejorFallos.length === 0) break;
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * ─── REINICIO PARCIAL AGRESIVO ────────────────────────────────────────────────
 *
 * Libera el 70-85 % de los bloques colocados (no preAsignados) aleatoriamente
 * y reconstruye el horario priorizando los bloques que fallaron. Al liberar
 * tanto espacio, los fallidos encuentran el horario casi vacío y pueden
 * explorar caminos completamente nuevos que los swaps locales no pueden ver.
 *
 * Cada iteración varía la fracción liberada (70 % → 85 %) para maximizar
 * la diversidad de configuraciones exploradas.
 */
async function reinicioParcialAgresivo(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const endTime     = Date.now() + tiempoLimiteMs;
    const fallidosRef = new Set(bloquesFallidos);
    let mejorFallos   = [...bloquesFallidos];
    let mejorSnap     = tomarSnapshot();
    let lastYield     = Date.now();
    let iter = 0, mejoras = 0;

    // Fracciones altas: preserva los pocos bloques más anclados, libera casi todo lo demás
    // El shuffleArray ya garantiza que los bloques liberados sean distintos en cada iteración
    const FRACCIONES = [0.90, 0.95, 0.88, 0.97, 0.92, 0.85, 0.93, 0.90];

    while (Date.now() < endTime && mejorFallos.length > 0) {
        iter++;

        const ahora = Date.now();
        if (ahora - lastYield >= 400) {
            if (progFn) {
                const s = Math.max(0, Math.ceil((endTime - ahora) / 1000));
                progFn(s,
                    `♻️ RPA iter ${iter} · ${mejorFallos.length} sin ubicar` +
                    ` · mejoras: ${mejoras} · ${s}s rest.`);
            }
            await cederControlUI();
            lastYield = Date.now();
        }

        // Partir del trabajo refinado por el SA, no desde cero
        restaurarSnapshot(mejorSnap);

        // Recopilar bloques colocados (excluir preAsignados y fallidos)
        const colocados = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (!fallidosRef.has(b) && !mejorFallos.some(f => f === b) && !b.preAsignado) {
                    const pos = encontrarPosicionBloque(b);
                    if (pos) colocados.push(b);
                }
            });
        });

        if (colocados.length === 0) break;

        // Mezcla aleatoria → cada iteración libera un subconjunto diferente
        const fraccion = FRACCIONES[(iter - 1) % FRACCIONES.length];
        const nLiberar = Math.max(1, Math.floor(colocados.length * fraccion));
        shuffleArray(colocados);
        const aLiberar = colocados.slice(0, nLiberar);

        for (const b of aLiberar) {
            const pos = encontrarPosicionBloque(b);
            if (pos) quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
        }

        // Intentar colocar los fallidos con el arsenal completo
        const nuevosFallos = new Set(mejorFallos);
        for (const b of mejorFallos) {
            const ok = intentarAsignar(b, false, false, false, false)
                    || intentarAsignar(b, false, true,  false, false)
                    || intentarSwapDeHorarios(b, [])
                    || intentarCadenaSwap(b)
                    || intentarCadenaAumentanteGlobal(b);
            if (ok) nuevosFallos.delete(b);
        }

        // Recolocar liberados (el orden ya es aleatorio por el shuffleArray anterior)
        for (const b of aLiberar) {
            if (nuevosFallos.has(b)) continue;
            intentarAsignar(b, false, false, false, false) ||
            intentarAsignar(b, false, true,  false, false);
        }

        if (nuevosFallos.size < mejorFallos.length) {
            mejoras++;
            mejorFallos = [...nuevosFallos];
            mejorSnap   = tomarSnapshot();
            fallidosRef.clear();
            mejorFallos.forEach(b => fallidosRef.add(b));
            if (mejorFallos.length === 0) break;
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Reinicio de agenda por docente.
 *
 * Cuando la cadena de swaps no logra liberar un slot bloqueado, la causa más
 * frecuente es un ciclo de dependencias: A necesita el slot de B, B necesita el
 * de C y C necesita el de A.  Ninguna técnica local (swap-chain, BFS) puede romper
 * ese ciclo sin desvincular todos los participantes a la vez.
 *
 * Esta función lo hace de forma quirúrgica:
 *   1. Para cada docente con bloques fallidos, desasigna TODOS sus bloques.
 *   2. Los reasigna en un orden donde los bloques fallidos van PRIMERO, dándoles
 *      prioridad para elegir el mejor slot disponible.
 *   3. Solo acepta el resultado si la cantidad de fallos del docente disminuye
 *      y no se crean nuevos fallos en bloques que antes estaban colocados.
 *   4. Prueba hasta 4 ordenaciones distintas antes de rendirse con ese docente.
 */
async function rescateReinicioDocente(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const docentesFallidos = [...new Set(bloquesFallidos.map(b => b.docente))];
    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();

    for (const docente of docentesFallidos) {
        // Todos los bloques del docente que no están pre-asignados
        const todosBloques = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (b.docente === docente && !b.preAsignado) todosBloques.push(b);
            });
        });

        const failingSet = new Set(mejorFallos.filter(b => b.docente === docente));
        if (failingSet.size === 0) continue;

        let progreso = false;

        for (let intento = 0; intento < 4 && !progreso; intento++) {
            if (progFn) {
                progFn(`🔄 Reinicio docente [${intento + 1}/4]: ${docente.nombre_docente} — ${failingSet.size} bloq. sin ubicar`);
                await cederControlUI();
            }

            const snap = tomarSnapshot();

            // 1. Desasignar todos los bloques del docente de un golpe
            for (const b of todosBloques) {
                const pos = encontrarPosicionBloque(b);
                if (pos) quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
            }

            // 2. Orden: fallidos primero, resto variado en intentos sucesivos
            const failingArr = [...failingSet];
            const otrosArr   = todosBloques.filter(b => !failingSet.has(b));
            if (intento > 0) shuffleArray(otrosArr);
            const ordenados  = [...failingArr, ...otrosArr];

            // 3. Reasignar; los fallidos obtienen relajaciones extra si es necesario
            const sinColocar = new Set();
            for (const b of ordenados) {
                const esFallido = failingSet.has(b);
                let ok = intentarAsignar(b, false, false, false, false)
                      || intentarAsignar(b, false, true,  false, false);
                if (!ok && esFallido) {
                    ok = intentarAsignar(b, true, true, false, false)
                      || intentarAsignar(b, true, true, true,  false);
                }
                if (!ok) sinColocar.add(b);
            }

            // 4. Aceptar solo si: menos fallos Y sin crear nuevos fallos
            const hayNuevasFallas = [...sinColocar].some(b => !failingSet.has(b));
            if (!hayNuevasFallas && sinColocar.size < failingSet.size) {
                const otrasFallas = mejorFallos.filter(b => b.docente !== docente);
                mejorFallos = [...otrasFallas, ...sinColocar];
                mejorSnap   = tomarSnapshot();
                progreso    = true;
            } else {
                restaurarSnapshot(snap);
            }
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

// ─────────────────────────────────────────────────────────────────────────────
// CSP POR DOCENTES BOTTLENECK
// Para docentes con bloques fallidos, usa backtracking con fail-first +
// forward checking para encontrar una asignación global válida para TODOS
// sus bloques simultáneamente — evita los deadlocks por orden de colocación.
// ─────────────────────────────────────────────────────────────────────────────

/** Genera candidatos (dia, hInicio) para un bloque con el tablero en estado
 *  limpio (todos los bloques del docente ya desasignados). */
function _cspCandidatosBase(bloque) {
    const g       = bloque.grupo;
    const d       = bloque.docente;
    const baseSet = new Set(g.baseHoras);
    const lista   = [];

    for (const dia of diasSemana) {
        if (dia === 'sabado' && d.disponibilidad['sabado'].size === 0) continue;
        // sesionesDia ya fue decrementado por quitarAsignacion → refleja solo otros docentes
        if ((g.sesionesDia[dia][bloque.materia.nombre_materia] || 0) >= maxSesionesPorDia(bloque)) continue;

        for (const hInicio of g.baseHoras) {
            let valido = true;
            for (let h = hInicio; h < hInicio + bloque.duracion; h++) {
                if (!baseSet.has(h))               { valido = false; break; }
                if (g.horario[dia][h] !== null)    { valido = false; break; } // otro docente
                if (d.asignado[dia][h])             { valido = false; break; } // bloque preAsignado
                if (!d.disponibilidad[dia].has(h)) { valido = false; break; }
            }
            if (valido) lista.push({ dia, hInicio });
        }
    }
    return lista;
}

/**
 * Backtracking CSP PARCIAL — branch & bound de MÁXIMA COLOCACIÓN.
 * Los bloques pueden pertenecer a VARIOS docentes (cada bloque trae su
 * propio b.docente) — permite resolver bloqueos mutuos: dos docentes que
 * comparten grupo y cuyos huecos libres están ocupados por bloques del otro.
 *
 * Ya NO es todo-o-nada: cada bloque tiene una rama extra "saltarlo", y la
 * búsqueda recuerda en `mejor` la asignación con MÁS HORAS colocadas vista
 * hasta el momento (algoritmo anytime). La primera inmersión —colocar en el
 * primer candidato viable, saltar lo que no quepa— garantiza una solución
 * base aunque el tiempo se agote de inmediato; el resto del tiempo se usa
 * en mejorarla. Poda por cota optimista: si ni colocando TODOS los bloques
 * restantes se supera `mejor.horas`, la rama se corta.
 * (El forward-checking todo-o-nada se eliminó: en el modo parcial un bloque
 * futuro sin candidatos ya no invalida la rama — simplemente se saltará.)
 *
 * Estado mutable (se pasa por referencia y se deshace en backtrack):
 *   ocDoc      – docente → Set("dia|h")  → slots de ESE docente ocupados en el CSP
 *   ocGrupo    – "grupo|dia|h"           → slot del grupo ocupado en el CSP
 *   sesiones   – "grupo|dia|materia"     → sesiones comprometidas en el CSP
 *   diasUsados – docente → Set(dia)      → días nuevos usados por ESE docente en el CSP
 *
 * @param {Array}  actual – asignación en construcción ({dia,hInicio} | null por bloque)
 * @param {Object} mejor  – { horas, asignacion } mejor solución encontrada (se muta)
 * @param {Array}  sufijo – sufijo[i] = Σ duraciones de bloques[i..fin] (cota optimista)
 * @returns {boolean} true = CORTAR toda la búsqueda (timeout o solución perfecta)
 */
function _cspBacktrackParcial(bloques, candidatos, actual, mejor, sufijo,
                              ocDoc, ocGrupo, sesiones, diasUsados, idx, horas, tFin) {
    if (idx === bloques.length) {
        if (horas > mejor.horas) {
            mejor.horas      = horas;
            mejor.asignacion = actual.slice();
        }
        return mejor.horas >= sufijo[0]; // solución perfecta → no hay nada mejor
    }
    if (Date.now() > tFin) return true; // timeout → cortar, mejor ya tiene lo logrado
    // Cota optimista: ni colocando TODOS los bloques restantes se supera el mejor
    if (horas + sufijo[idx] <= mejor.horas) return false;

    const b    = bloques[idx];
    const doc  = b.docente;
    const gNom = b.grupo.nombre_grupo;
    const mNom = b.materia.nombre_materia;
    const esPA = doc.tipo_docente === 2;

    let docOc = ocDoc.get(doc);
    if (!docOc) { docOc = new Set(); ocDoc.set(doc, docOc); }
    let docDias = diasUsados.get(doc);
    if (!docDias) { docDias = new Set(); diasUsados.set(doc, docDias); }

    for (const { dia, hInicio } of candidatos[idx]) {

        // ── maxDias para PAs (duro) ───────────────────────────────────────────
        if (esPA) {
            const diaYaActivoTotal = doc.diasActivos.has(dia) || docDias.has(dia);
            if (!diaYaActivoTotal) {
                const totalDias = doc.diasActivos.size + docDias.size;
                if (totalDias >= doc.maxDias) continue;
            }
        }

        // ── máx. sesiones por materia/día/grupo en el CSP (inglés 1-7: 2) ───
        const sesKey = `${gNom}|${dia}|${mNom}`;
        if ((sesiones.get(sesKey) || 0) >= maxSesionesPorDia(b)) continue;

        // ── docente libre y slot de grupo libre (CSP interno) ────────────────
        const clvDoc   = [];
        const clvGrupo = [];
        let libre = true;
        for (let h = hInicio; h < hInicio + b.duracion; h++) {
            const kD = `${dia}|${h}`;
            const kG = `${gNom}|${dia}|${h}`;
            if (docOc.has(kD) || ocGrupo.has(kG)) { libre = false; break; }
            clvDoc.push(kD);
            clvGrupo.push(kG);
        }
        if (!libre) continue;

        // ── Comprometer ───────────────────────────────────────────────────────
        clvDoc.forEach(k => docOc.add(k));
        clvGrupo.forEach(k => ocGrupo.set(k, true));
        sesiones.set(sesKey, (sesiones.get(sesKey) || 0) + 1);
        const diaEraNuevo = !docDias.has(dia);
        if (diaEraNuevo) docDias.add(dia);
        actual[idx] = { dia, hInicio };

        const cortar = _cspBacktrackParcial(bloques, candidatos, actual, mejor, sufijo,
            ocDoc, ocGrupo, sesiones, diasUsados, idx + 1, horas + b.duracion, tFin);

        // ── Deshacer ──────────────────────────────────────────────────────────
        clvDoc.forEach(k => docOc.delete(k));
        clvGrupo.forEach(k => ocGrupo.delete(k));
        const sv = sesiones.get(sesKey) - 1;
        if (sv <= 0) sesiones.delete(sesKey); else sesiones.set(sesKey, sv);
        if (diaEraNuevo) docDias.delete(dia);
        actual[idx] = null;

        if (cortar) return true;
    }

    // ── Rama "saltar este bloque": sacrificarlo puede liberar huecos que
    // valen más horas en los bloques siguientes (o simplemente no cabe).
    actual[idx] = null;
    return _cspBacktrackParcial(bloques, candidatos, actual, mejor, sufijo,
        ocDoc, ocGrupo, sesiones, diasUsados, idx + 1, horas, tFin);
}

/**
 * Agrupa los docentes con bloques fallidos en "clusters": dos docentes caen
 * en el mismo cluster si AMBOS tienen un bloque fallido en el MISMO grupo
 * (posible bloqueo mutuo — el hueco que necesita uno está ocupado por un
 * bloque del otro). Para cada cluster (1 o más docentes):
 *  1. Desasigna TODOS los bloques no-preAsignados de TODOS sus docentes,
 *     liberando a la vez los huecos que se bloqueaban entre sí.
 *  2. Genera candidatos (dia, hInicio) para cada bloque.
 *  3. Ordena TODOS los bloques del cluster (de cualquier docente) por número
 *     de candidatos ASC (fail-first global), con prioridad a los 0/Nh.
 *  4. Ejecuta backtracking CSP conjunto PARCIAL (branch & bound de máxima
 *     colocación): siempre produce la mejor asignación parcial encontrada.
 *  5. Gate por HORAS: la aplica solo si el total de horas colocadas del
 *     tablero SUBE estrictamente; si no → restaura estado previo.
 */
async function planificarDocentesBottleneck(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    const docentesFallidos = [...new Set(bloquesFallidos.map(b => b.docente))];
    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();

    // ── Agrupar en clusters: misma componente conexa si comparten grupo ──────
    const gruposPorDocente = new Map();
    bloquesFallidos.forEach(b => {
        if (!gruposPorDocente.has(b.docente)) gruposPorDocente.set(b.docente, new Set());
        gruposPorDocente.get(b.docente).add(b.grupo.nombre_grupo);
    });
    const padre = new Map(docentesFallidos.map(d => [d, d]));
    const raiz = d => { while (padre.get(d) !== d) d = padre.get(d); return d; };
    for (let i = 0; i < docentesFallidos.length; i++) {
        for (let j = i + 1; j < docentesFallidos.length; j++) {
            const di = docentesFallidos[i], dj = docentesFallidos[j];
            let comparten = false;
            gruposPorDocente.get(di).forEach(g => { if (gruposPorDocente.get(dj).has(g)) comparten = true; });
            if (comparten) padre.set(raiz(di), raiz(dj));
        }
    }
    const clustersMap = new Map();
    docentesFallidos.forEach(d => {
        const r = raiz(d);
        if (!clustersMap.has(r)) clustersMap.set(r, []);
        clustersMap.get(r).push(d);
    });
    const clusters = [...clustersMap.values()];

    for (const cluster of clusters) {
        const fallosCluster = mejorFallos.filter(b => cluster.includes(b.docente));
        if (fallosCluster.length === 0) continue;

        // 0a. Docentes-OBSTÁCULO: ocupan slots donde un fallido del cluster
        // tiene disponibilidad y el grupo no tiene sesión de esa materia ese
        // día (es decir, los huecos que el fallido NECESITA). Incluir a los 3
        // más frecuentes en el cluster permite al CSP moverlos también, en vez
        // de tratarlos como muro. El gate por horas protege de empeorar.
        const obstaculos = new Map();
        fallosCluster.forEach(b => {
            const g = b.grupo, d = b.docente;
            diasSemana.forEach(dia => {
                if ((g.sesionesDia[dia][b.materia.nombre_materia] || 0) >= maxSesionesPorDia(b)) return;
                for (let idx = 0; idx <= g.baseHoras.length - b.duracion; idx++) {
                    const h0 = g.baseHoras[idx];
                    let dispOk = true;
                    for (let o = 0; o < b.duracion; o++) {
                        if (!d.disponibilidad[dia].has(h0 + o) || d.asignado[dia][h0 + o]) {
                            dispOk = false; break;
                        }
                    }
                    if (!dispOk) continue;
                    for (let o = 0; o < b.duracion; o++) {
                        const occ = g.horario[dia][h0 + o];
                        if (occ && occ.docente !== d && !occ.preAsignado && !cluster.includes(occ.docente))
                            obstaculos.set(occ.docente, (obstaculos.get(occ.docente) || 0) + 1);
                    }
                }
            });
        });
        const topObstaculos = [...obstaculos.entries()]
            .sort((a, b) => b[1] - a[1]).slice(0, 3).map(e => e[0]);
        const clusterAmpliado = [...cluster, ...topObstaculos];

        // Todos los bloques no-preAsignados de TODOS los docentes del cluster ampliado
        const todosBloques = [];
        MAPA_GRUPOS.forEach(g => {
            g.bloques.forEach(b => {
                if (clusterAmpliado.includes(b.docente) && !b.preAsignado) todosBloques.push(b);
            });
        });

        if (progFn) {
            const nombres = clusterAmpliado.map(d => d.nombre_docente).join(' + ');
            progFn(`🔍 CSP [${nombres}] ${fallosCluster.length} fallidos / ${todosBloques.length} bloq.`);
            await cederControlUI();
        }

        // 0. ¿Qué bloques estaban completamente vacíos (0/Nh) ANTES de tocar nada?
        //    Son los "recurrentes" más graves y deben tener prioridad de colocación.
        const estabaVacio = todosBloques.map(b => encontrarPosicionBloque(b) === null);

        const horasAntes = contarHorasColocadasTotales();
        const snapAntes  = tomarSnapshot();

        // 1. Desasignar todos los bloques del cluster → libera huecos compartidos
        for (const b of todosBloques) {
            const pos = encontrarPosicionBloque(b);
            if (pos) quitarAsignacion(b.grupo, b, pos.dia, pos.hInicio);
        }

        // 2. Candidatos base (tablero libre de TODOS los docentes del cluster)
        const candidatosRaw = todosBloques.map(b => _cspCandidatosBase(b));

        // 3. Prioridad: primero los que estaban en 0/Nh (recurrentes más graves);
        //    dentro de cada grupo, fail-first por número de candidatos.
        const orden = todosBloques.map((_, i) => i)
            .sort((a, b) => {
                if (estabaVacio[a] !== estabaVacio[b]) return estabaVacio[a] ? -1 : 1;
                return candidatosRaw[a].length - candidatosRaw[b].length;
            });

        const bloquesOrd    = orden.map(i => todosBloques[i]);
        const candidatosOrd = orden.map(i => candidatosRaw[i]);

        // 4. CSP conjunto PARCIAL (más tiempo si el cluster involucra más docentes)
        const tLimite = Math.min(8000 + (clusterAmpliado.length - 1) * 4000, 25000);
        const sufijo  = new Array(bloquesOrd.length + 1).fill(0);
        for (let i = bloquesOrd.length - 1; i >= 0; i--)
            sufijo[i] = sufijo[i + 1] + bloquesOrd[i].duracion;
        const mejor = { horas: -1, asignacion: null };
        _cspBacktrackParcial(
            bloquesOrd, candidatosOrd, new Array(bloquesOrd.length).fill(null), mejor, sufijo,
            new Map(), new Map(), new Map(), new Map(),
            0, 0, Date.now() + tLimite
        );

        if (mejor.asignacion) {
            // 5. Aplicar la mejor asignación parcial (los null quedan sin colocar)
            for (let i = 0; i < bloquesOrd.length; i++) {
                const pos = mejor.asignacion[i];
                if (pos) aplicarAsignacion(bloquesOrd[i].grupo, bloquesOrd[i], pos.dia, pos.hInicio);
            }
            // 6. Gate por HORAS: aceptar solo si el total colocado del tablero
            //    sube estrictamente (misma métrica que el trinquete global).
            const horasDespues = contarHorasColocadasTotales();
            const nombres = clusterAmpliado.map(d => d.nombre_docente.split(' ')[0]).join('+');
            if (horasDespues > horasAntes) {
                console.log(`[CSP cluster] ${nombres}: ${horasAntes}h → ${horasDespues}h (aceptado)`);
                _bitacoraCSP.push(`${nombres}: ${horasAntes}→${horasDespues}h ✓`);
                // Fallos del cluster ya colocados salen de la lista...
                mejorFallos = mejorFallos.filter(b =>
                    !clusterAmpliado.includes(b.docente) || encontrarPosicionBloque(b) === null
                );
                // ...y los bloques saltados por el CSP entran (siguen sin colocar)
                for (let i = 0; i < bloquesOrd.length; i++) {
                    if (!mejor.asignacion[i] && !mejorFallos.includes(bloquesOrd[i]))
                        mejorFallos.push(bloquesOrd[i]);
                }
                mejorSnap = tomarSnapshot();
            } else {
                console.log(`[CSP cluster] ${nombres}: ${horasAntes}h → ${horasDespues}h (revertido)`);
                _bitacoraCSP.push(`${nombres}: sin mejora (${horasAntes}h) ✗`);
                restaurarSnapshot(snapAntes);
            }
        } else {
            // Ni siquiera la inmersión greedy terminó (no debería pasar) → restaurar
            restaurarSnapshot(snapAntes);
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Si un docente tiene bloques sin ubicar y sus slots disponibles en los días
 * actuales (maxDias) no alcanzan para cubrir las horas pendientes, aumenta
 * maxDias en 1 (respetando el tope institucional: PA→4, PTC→6) y reintenta
 * la asignación de sus bloques fallidos con el arsenal completo.
 *
 * La expansión es permanente dentro de la ejecución: el SA y fases posteriores
 * también se benefician del día extra.
 */
async function expandirDiasDocentes(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();
    let expansiones = 0;

    // Solo PAs no-inglés con bloques fallidos
    const candidatos = new Set(
        mejorFallos
            .filter(f => f.docente.tipo_docente === 2 && !f.docente.esDocenteIngles)
            .map(f => f.docente)
    );

    for (const d of candidatos) {
        // Tope: días donde el docente tiene disponibilidad declarada
        const diasConDisp = diasSemana.filter(dia => d.disponibilidad[dia].size > 0).length;

        // Expandir de a 1 día mientras los mejores maxDias días no alcancen.
        // Usamos slotsPorDia (ordenado desc) y comparamos los top-maxDias con horasPendientes.
        // g.horario[dia][h] ya refleja inglés pre-asignado → esos slots no cuentan.
        // hrs es un Set de horas únicas porque un docente ocupa 1 hora a la vez.
        while (d.maxDias < diasConDisp) {
            const horasPendientes = mejorFallos
                .filter(f => f.docente === d)
                .reduce((s, f) => s + f.duracion, 0);

            const slotsPorDia = diasSemana.map(dia => {
                const hrs = new Set();
                MAPA_GRUPOS.forEach(g => {
                    if (!g.bloques.some(b => b.docente === d)) return;
                    g.baseHoras.forEach(h => {
                        if (d.disponibilidad[dia].has(h)
                            && !d.asignado[dia][h]
                            && g.horario[dia][h] === null) hrs.add(h);
                    });
                });
                return hrs.size;
            }).sort((a, b) => b - a); // mejores días primero

            const slotsEnMaxDias = slotsPorDia.slice(0, d.maxDias).reduce((a, b) => a + b, 0);
            const hayDiaExtra    = slotsPorDia[d.maxDias] > 0; // siguiente día tiene slots

            // Si los mejores maxDias días ya cubren las horas o no hay día extra útil → parar
            if (slotsEnMaxDias >= horasPendientes || !hayDiaExtra) break;

            d.maxDias++;
            expansiones++;
            if (progFn) progFn(d.nombre_docente, d.maxDias, mejorFallos.length);
            await cederControlUI();
        }

        // Reintentar bloques fallidos con el día extra
        let mejoro = false;
        for (const b of [...mejorFallos.filter(f => f.docente === d)]) {
            const ok = intentarAsignar(b, false, false, false, false)
                    || intentarAsignar(b, false, true,  false, false)
                    || intentarSwapDeHorarios(b, [])
                    || intentarCadenaSwap(b)
                    || intentarCadenaAumentanteGlobal(b);
            if (ok) {
                mejorFallos = mejorFallos.filter(f => f !== b);
                mejoro = true;
            }
        }

        if (mejoro) mejorSnap = tomarSnapshot();
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Intercambio de docentes entre PAs que imparten la misma materia a distintos grupos.
 * Si docenteA → grupoA y docenteB → grupoB (misma materia+grado, ambos PAs),
 * prueba asignar docenteA → grupoB y docenteB → grupoA en busca de más caminos.
 * Solo aplica a tipo_docente === 2 (PA). Nunca toca PTCs, directivos ni TAs.
 */
async function intercambiarGruposPAs(bloquesFallidos, progFn = null) {
    if (bloquesFallidos.length === 0) return [];

    let mejorFallos = [...bloquesFallidos];
    let mejorSnap   = tomarSnapshot();
    let mejoras     = 0;
    let iter        = 0;
    let huboCambio  = true;

    while (huboCambio && mejorFallos.length > 0) {
        huboCambio = false;
        iter++;
        if (progFn) progFn(iter, mejorFallos.length);
        await cederControlUI();

        // Recopilar todos los bloques PA
        const bloquesPAs = [];
        MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => {
            if (b.docente.tipo_docente === 2) bloquesPAs.push(b);
        }));

        // Agrupar por materia+grado para encontrar pares candidatos
        const porMateria = new Map();
        bloquesPAs.forEach(b => {
            const key = b.materia.nombre_materia + '|' + b.materia.grado;
            if (!porMateria.has(key)) porMateria.set(key, []);
            porMateria.get(key).push(b);
        });

        outer:
        for (const [, bloques] of porMateria) {
            if (bloques.length < 2) continue;

            for (let i = 0; i < bloques.length; i++) {
                for (let j = i + 1; j < bloques.length; j++) {
                    const bA = bloques[i];
                    const bB = bloques[j];

                    if (bA.docente === bB.docente) continue; // mismo docente
                    if (bA.grupo   === bB.grupo)   continue; // mismo grupo

                    // Capturar docentes actuales (pueden haber cambiado por swaps previos)
                    const docCurrA = bA.docente;
                    const docCurrB = bB.docente;

                    // Quitar asignaciones actuales ANTES de intercambiar docentes
                    // (quitarAsignacion usa bloque.docente para limpiar su asignado)
                    const posA = encontrarPosicionBloque(bA);
                    const posB = encontrarPosicionBloque(bB);
                    if (posA) quitarAsignacion(bA.grupo, bA, posA.dia, posA.hInicio);
                    if (posB) quitarAsignacion(bB.grupo, bB, posB.dia, posB.hInicio);

                    // Intercambiar docentes
                    bA.docente = docCurrB;
                    bB.docente = docCurrA;

                    // Intentar reasignar con docentes intercambiados
                    const okA = intentarAsignar(bA, false, false, false, false)
                             || intentarAsignar(bA, false, true,  false, false)
                             || intentarSwapDeHorarios(bA, [])
                             || intentarCadenaSwap(bA);
                    const okB = intentarAsignar(bB, false, false, false, false)
                             || intentarAsignar(bB, false, true,  false, false)
                             || intentarSwapDeHorarios(bB, [])
                             || intentarCadenaSwap(bB);

                    // Calcular nuevos fallos
                    const nuevosFallos = mejorFallos.filter(f => f !== bA && f !== bB);
                    if (!okA) nuevosFallos.push(bA);
                    if (!okB) nuevosFallos.push(bB);

                    if (nuevosFallos.length < mejorFallos.length) {
                        mejoras++;
                        huboCambio  = true;
                        mejorFallos = nuevosFallos;
                        mejorSnap   = tomarSnapshot();
                        if (mejorFallos.length === 0) break outer;
                    } else {
                        // Rollback: restaurar agenda y revertir el swap de docentes
                        restaurarSnapshot(mejorSnap);
                        bA.docente = docCurrA;
                        bB.docente = docCurrB;
                    }
                }
            }
        }
    }

    restaurarSnapshot(mejorSnap);
    return mejorFallos;
}

/**
 * Valida la integridad del horario y corrige todas las violaciones en el sitio.
 *
 * Detecta y repara (en orden):
 *   0. Bloques huérfanos (en horario pero no en g.bloques)      → eliminados
 *   1. Bloques duplicados (mismo objeto en más slots que duracion,
 *      o en días distintos, o no contiguos)                     → eliminados + fallidos
 *   2. Docente con doble asignación en el mismo slot             → eliminados + fallidos
 *   3. Reconstruye sesionesDia, d.asignado y d.diasActivos
 *      desde el horario ya limpio (fuente de verdad)
 *   4. Bloques perdidos (en g.bloques, no en horario ni fallidos) → fallidos
 *
 * @param {Array} bloquesFallidos  Lista de bloques ya conocidos como no ubicados.
 * @returns {{ fallos: Array, resumen: {multiplicaciones, dobles, perdidos} }}
 */
function validarYLimpiar(bloquesFallidos = []) {
    const fallidos = new Set(bloquesFallidos);
    const resumen  = { multiplicaciones: 0, dobles: 0, perdidos: 0 };

    // ── Fase 0: bloques huérfanos ─────────────────────────────────────────────
    const legitimos = new Set();
    MAPA_GRUPOS.forEach(g => g.bloques.forEach(b => legitimos.add(b)));
    MAPA_GRUPOS.forEach(g => {
        diasSemana.forEach(dia => g.baseHoras.forEach(h => {
            const b = g.horario[dia][h];
            if (b && !legitimos.has(b)) g.horario[dia][h] = null;
        }));
    });

    // ── Fase 0.5: bloques fuera de disponibilidad del docente ────────────────
    // SA y fases de reparación pueden colocar bloques con relajarDisponibilidad=true.
    // Si no se corrigen antes de la siguiente fase, el resultado viola reglas duras.
    MAPA_GRUPOS.forEach(g => {
        diasSemana.forEach(dia => {
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (!b || b.preAsignado) return;
                if (!b.docente.disponibilidad[dia].has(h)) {
                    g.horario[dia][h] = null;
                    if (!fallidos.has(b)) { fallidos.add(b); resumen.disponibilidad = (resumen.disponibilidad || 0) + 1; }
                }
            });
        });
    });

    // ── Fase 1: bloques duplicados / mal colocados ────────────────────────────
    MAPA_GRUPOS.forEach(g => {
        const conteos = new Map(); // bloque → [{dia, h}]
        diasSemana.forEach(dia => g.baseHoras.forEach(h => {
            const b = g.horario[dia][h];
            if (!b) return;
            if (!conteos.has(b)) conteos.set(b, []);
            conteos.get(b).push({ dia, h });
        }));

        conteos.forEach((slots, b) => {
            const diasUnicos = new Set(slots.map(s => s.dia));
            const sorted     = slots.slice().sort((a, bx) => a.h - bx.h);
            const contiguo   = sorted.every((s, i) => i === 0 || s.h === sorted[i-1].h + 1);
            const ok = slots.length === b.duracion && diasUnicos.size === 1 && contiguo;
            if (ok) return;
            // Violación: quitar todos los slots y reencolar
            slots.forEach(({ dia, h }) => { g.horario[dia][h] = null; });
            if (!b.preAsignado) { fallidos.add(b); resumen.multiplicaciones++; }
        });
    });

    // ── Fase 2: docente doblemente asignado en el mismo slot ─────────────────
    MAPA_DOCENTES.forEach(d => {
        diasSemana.forEach(dia => {
            const porSlot = new Map(); // h → [{g, b}]
            MAPA_GRUPOS.forEach(g => g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (!b || b.docente !== d) return;
                if (!porSlot.has(h)) porSlot.set(h, []);
                porSlot.get(h).push({ g, b });
            }));
            porSlot.forEach((asigs, h) => {
                if (asigs.length <= 1) return;
                asigs.forEach(({ g, b }) => {
                    g.horario[dia][h] = null;
                    if (!b.preAsignado) fallidos.add(b);
                });
                resumen.dobles++;
            });
        });
    });

    // ── Fase 3: reconstruir contadores desde el horario limpio ───────────────
    MAPA_GRUPOS.forEach(g => diasSemana.forEach(d => { g.sesionesDia[d] = {}; }));
    MAPA_DOCENTES.forEach(d => {
        diasSemana.forEach(dia => { d.asignado[dia] = {}; });
        d.diasActivos = new Set();
    });
    MAPA_GRUPOS.forEach(g => {
        diasSemana.forEach(dia => {
            const yaContados = new Set();
            g.baseHoras.forEach(h => {
                const b = g.horario[dia][h];
                if (!b) return;
                b.docente.asignado[dia][h] = `${b.materia.nombre_materia} [${g.nombre_grupo}]`;
                b.docente.diasActivos.add(dia);
                if (!yaContados.has(b)) {
                    yaContados.add(b);
                    g.sesionesDia[dia][b.materia.nombre_materia] =
                        (g.sesionesDia[dia][b.materia.nombre_materia] || 0) + 1;
                }
            });
        });
    });

    // ── Fase 4: bloques perdidos ──────────────────────────────────────────────
    MAPA_GRUPOS.forEach(g => {
        g.bloques.forEach(b => {
            if (b.preAsignado) return;
            const enHorario = diasSemana.some(dia => g.baseHoras.some(h => g.horario[dia][h] === b));
            if (!enHorario && !fallidos.has(b)) { fallidos.add(b); resumen.perdidos++; }
        });
    });

    return { fallos: [...fallidos], resumen };
}

/** Badge HTML para mostrar correcciones en la barra de progreso. */
function _tagValidacion({ multiplicaciones, dobles, perdidos, disponibilidad }) {
    const total = (multiplicaciones||0) + (dobles||0) + (perdidos||0) + (disponibilidad||0);
    if (total === 0) return '';
    const parts = [];
    if (multiplicaciones > 0)  parts.push(`${multiplicaciones}×dup`);
    if (dobles > 0)            parts.push(`${dobles}×doble`);
    if (perdidos > 0)          parts.push(`${perdidos}×perdido`);
    if (disponibilidad > 0)    parts.push(`${disponibilidad}×disp`);
    return ` <span style="color:var(--color-tomato);font-size:0.75rem;font-weight:normal">` +
           `[⚠ ${parts.join(' ')} corr.]</span>`;
}

/** Compatibilidad: llamada al final del algoritmo sin tracking de fallidos. */
function normalizarHorasMaterias() { validarYLimpiar([]); }

// ── SA en islas: lanza N Workers con distintos parámetros T/α en paralelo ────
// Cada isla explora el espacio de forma independiente desde el mismo punto de
// arranque. El hilo principal toma el mejor resultado al finalizar todas las islas.
async function recocidoSimuladoIslas(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];
    if (!_workerUrl) return recocidoSimulado(bloquesFallidos, tiempoLimiteMs, progFn);

    const nIslas = Math.min(4, navigator.hardwareConcurrency || 2);
    // Configuraciones con distintos regímenes térmicos para maximizar diversidad
    const CONFIGS = [
        { T: 3.0, alpha: 0.99997 }, // canónico — equilibrio exploración/explotación
        { T: 8.0, alpha: 0.9999  }, // caliente  — exploración amplia
        { T: 1.0, alpha: 0.9998  }, // frío      — explotación intensiva
        { T: 4.0, alpha: 0.99995 }, // rápido    — convergencia acelerada
    ].slice(0, nIslas);

    const snapData   = _serializarEstadoActual(bloquesFallidos);
    const fallosIdxs = bloquesFallidos.filter(b => b._wi !== undefined).map(b => b._wi);
    const probData   = serializarProblema();

    const pool  = Array.from({ length: nIslas }, () => new Worker(_workerUrl));
    const tareas = CONFIGS.map((cfg, i) => ({
        type: 'sa', problema: probData, sabBuffer: _sabProblema,
        snapData, fallosIdxs, params: { tiempoMs: tiempoLimiteMs, T: cfg.T, alpha: cfg.alpha },
        intentoNum: i
    }));

    // Actualizar la barra de progreso desde un timer del hilo principal
    const inicio = Date.now();
    let timer;
    if (progFn) {
        timer = setInterval(() => {
            const s = Math.max(0, Math.ceil((tiempoLimiteMs - (Date.now() - inicio)) / 1000));
            progFn(s, `🌡️ SA <b>${nIslas}</b> islas en paralelo &nbsp;·&nbsp; <b>${s}s</b> restantes`);
        }, 1000);
    }

    const resultados = await ejecutarConPool(pool, tareas, null);
    clearInterval(timer);
    pool.forEach(w => w.terminate());

    const mejor = resultados.filter(Boolean).sort((a, b) => a.fallosCount - b.fallosCount)[0];
    if (!mejor) return bloquesFallidos;
    restaurarDesdeWorker(mejor);
    return mejor.fallosIndices.map(i => _wBArr[i]).filter(Boolean);
}

// ── RPA paralelo: N Workers exploran distintas fracciones de liberación en paralelo ──
// Cada Worker parte del mismo snapshot óptimo pero usa un random diferente
// (cada Worker tiene su propio estado de Math.random()), garantizando diversidad.
async function reinicioParcialAgresivoParalelo(bloquesFallidos, tiempoLimiteMs, progFn = null) {
    if (bloquesFallidos.length === 0) return [];
    if (!_workerUrl) return reinicioParcialAgresivo(bloquesFallidos, tiempoLimiteMs, progFn);

    const nW = Math.min(4, navigator.hardwareConcurrency || 2);

    const snapData   = _serializarEstadoActual(bloquesFallidos);
    const fallosIdxs = bloquesFallidos.filter(b => b._wi !== undefined).map(b => b._wi);
    const probData   = serializarProblema();

    const pool  = Array.from({ length: nW }, () => new Worker(_workerUrl));
    const tareas = Array.from({ length: nW }, (_, i) => ({
        type: 'rpa', problema: probData, sabBuffer: _sabProblema,
        snapData, fallosIdxs, tiempoMs: tiempoLimiteMs,
        intentoNum: i
    }));

    const inicio = Date.now();
    let timer;
    if (progFn) {
        timer = setInterval(() => {
            const s = Math.max(0, Math.ceil((tiempoLimiteMs - (Date.now() - inicio)) / 1000));
            progFn(s, `♻️ RPA <b>${nW}</b> paralelo &nbsp;·&nbsp; <b>${s}s</b> restantes`);
        }, 1000);
    }

    const resultados = await ejecutarConPool(pool, tareas, null);
    clearInterval(timer);
    pool.forEach(w => w.terminate());

    const mejor = resultados.filter(Boolean).sort((a, b) => a.fallosCount - b.fallosCount)[0];
    if (!mejor) return bloquesFallidos;
    restaurarDesdeWorker(mejor);
    return mejor.fallosIndices.map(i => _wBArr[i]).filter(Boolean);
}

async function ejecutarAlgoritmoFinal() {
    // ── Parámetros fijos ─────────────────────────────────────────────────────
    // Con islas paralelas, cada SA corre en N núcleos simultáneamente.
    // SA1 120s × 4 islas = 480s de exploración efectiva (vs 180s × 1 antes).
    // SA3, LNS3 y RPA1 eliminados — las islas los suplen con creces.
    const CFG = { sa: 120000, sa2: 90000, optim: 15000, forzIter: 12,
                  lns1: 20000, lns2: 15000,
                  rpa: 60000, solver: 30000 };

    // ── Estrategias de arranque (8 arranques con alta diversidad) ───────────
    // Menos starts → más tiempo libre para SA que es lo más efectivo
    // "ruido" 0 = determinista, 0.12 = leve, 0.5 = agresivo, 1.0 = aleatorio
    // "invertir" = true → menos restringidos van primero
    const ESTRATEGIAS = [
        { ruido: 0,    invertir: false }, //  1: determinista
        { ruido: 0.08, invertir: false }, //  2: micro-ruido
        { ruido: 0.25, invertir: false }, //  3: leve-medio
        { ruido: 0.5,  invertir: false }, //  4: agresivo
        { ruido: 1.0,  invertir: false }, //  5: completamente aleatorio   ← élite desde aquí
        { ruido: 0,    invertir: true  }, //  6: determinista invertido
        { ruido: 0.3,  invertir: true  }, //  7: invertido medio
        { ruido: 0.75, invertir: false }, //  8: casi-aleatorio
    ];
    const N_STARTS = ESTRATEGIAS.length;
    const errDiv   = document.getElementById("span_error");
    const btn      = document.getElementById("button_accion");
    btn.disabled = true;
    btn.style.opacity = "0.5";
    const badgeEnCurso = document.getElementById('badge_en_curso');
    if (badgeEnCurso) badgeEnCurso.style.display = 'inline-block';

    function setProgreso(pct, msg, color = "#221F20") {
        errDiv.style.color = color;
        errDiv.innerHTML =
            `<div style="margin-bottom:0.5rem">${msg}</div>` +
            `<div style="background:#e0e0e0;border-radius:0.5rem;height:1.2rem;overflow:hidden">` +
            `<div style="background:var(--color-yellow);height:100%;width:${pct}%;` +
            `transition:width 0.25s ease;border-radius:0.5rem"></div></div>`;
    }

    let mejorFallos = null;
    let mejorSnap   = null;
    const tInicioTotal = Date.now();
    sinMejoraConsecutiva = 0; // evitar arrastre entre ejecuciones
    let mejorFallosRonda = Infinity; // mejor dentro de esta ejecución (para EDA en caliente)

    // ── Fijar inglés UNA SOLA VEZ ──────────────────────────────────────────────
    // Pre-asignamos inglés antes de cualquier arranque greedy y guardamos el
    // snapshot. Cada arranque restaura estas posiciones en lugar de recalcularlas,
    // de modo que los bloques de inglés son inmovibles durante toda la ejecución.
    setProgreso(0, '📌 Fijando clases de inglés...');
    await cederControlUI();
    MAPA_GRUPOS.forEach(g => {
        g.reset();
        g.bloques.forEach(b => { delete b.preAsignado; delete b.consensoFijado; delete b.nombreStrRender; });
    });
    MAPA_DOCENTES.forEach(d => d.reset());

    // ── Fase 1: determinar maxDias de cada docente antes de iterar ────────────
    calcularDiasDocentes();

    const inglesGlobalFijados = preAsignarInglesSimultaneo(); // ← única ejecución
    const snapInglesGlobal    = tomarSnapshot();              // ← posiciones fijas

    // Mostrar qué aprendizaje hay activo antes de empezar
    {
        const partes = [];
        if (eliteOrden !== null) partes.push(`🧬 élite (${eliteFallosCount === Infinity ? '?' : eliteFallosCount} fallos)`);
        if (freqTotalRuns > 0)   partes.push(`📊 ${freqTotalRuns} ejecución${freqTotalRuns !== 1 ? 'es' : ''} EDA (${freqMap.size} bloques)`);
        const aprendizajeStr = partes.length > 0
            ? `<br><small style="color:var(--color-cerulean)">Aprendizaje activo: ${partes.join(' · ')}</small>`
            : `<br><small style="color:var(--color-gray-olive)">Sin aprendizaje previo — exploración libre</small>`;
        setProgreso(0, '🚀 Iniciando generación de horarios...' + aprendizajeStr);
        await cederControlUI();
    }

    try {
    // ── Fase 1: arranques greedy en PARALELO con Web Workers ────────────────
    {
        // Crear el blob-worker la primera vez (extrae el script de esta misma página).
        // Filtramos por el script que define IS_WORKER para excluir snippets inyectados
